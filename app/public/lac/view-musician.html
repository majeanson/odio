<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odio · Musician Guide — LAC Wiki</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #12100e;
  --bg-sidebar:  #0e0c0a;
  --bg-card:     #1a1714;
  --bg-hover:    #201d1a;
  --bg-active:   #251f18;
  --border:      #2a2420;
  --border-soft: #221e1b;
  --text:        #e8ddd4;
  --text-mid:    #b0a49c;
  --text-soft:   #7a6a5a;
  --accent:      #c4a255;
  --accent-warm: #e8b865;
  --mono:        'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

  --status-active:     #4aad72;
  --status-draft:      #c4a255;
  --status-frozen:     #5b82cc;
  --status-deprecated: #cc5b5b;

  --status-active-bg:     rgba(74,173,114,0.12);
  --status-draft-bg:      rgba(196,162,85,0.12);
  --status-frozen-bg:     rgba(91,130,204,0.12);
  --status-deprecated-bg: rgba(204,91,91,0.12);
}

html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; display: flex; flex-direction: column; }

/* ── Shell ──────────────────────────────────────────────── */

.shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
}
.topbar-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
.topbar-sep  { color: var(--border); }
.topbar-project { font-family: var(--mono); font-size: 12px; color: var(--text-mid); }
.topbar-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-soft); }

.body-row { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ────────────────────────────────────────────── */

.sidebar {
  width: 264px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-soft); }

.sidebar-sort {
  display: flex;
  gap: 4px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sort-btn {
  flex: 1;
  padding: 4px 6px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.sort-btn:hover { color: var(--text-mid); border-color: var(--text-soft); }
.sort-btn.active { background: var(--bg-card); color: var(--accent); border-color: var(--accent); }

.nav-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.nav-tree::-webkit-scrollbar { width: 4px; }
.nav-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Domain group */
.nav-group { margin-bottom: 2px; }

.nav-domain {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  cursor: pointer;
  user-select: none;
}
.nav-domain:hover { color: var(--text-mid); }
.nav-domain-arrow { transition: transform 0.15s; font-size: 8px; }
.nav-domain.collapsed .nav-domain-arrow { transform: rotate(-90deg); }
.nav-domain-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

.nav-group-items { overflow: hidden; }
.nav-group.collapsed .nav-group-items { display: none; }

/* Feature item */
.nav-item {
  display: flex;
  align-items: baseline;
  gap: 7px;
  padding: 5px 14px 5px 18px;
  cursor: pointer;
  user-select: none;
  border-left: 2px solid transparent;
  transition: background 0.1s;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active {
  background: var(--bg-active);
  border-left-color: var(--accent);
}
.nav-item[data-depth="1"] { padding-left: 30px; }
.nav-item[data-depth="2"] { padding-left: 42px; }
.nav-item[data-depth="3"] { padding-left: 54px; }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}
.nav-item[data-status="active"]     .nav-dot { background: var(--status-active); }
.nav-item[data-status="draft"]      .nav-dot { background: var(--status-draft); }
.nav-item[data-status="frozen"]     .nav-dot { background: var(--status-frozen); }
.nav-item[data-status="deprecated"] .nav-dot { background: var(--status-deprecated); opacity: 0.5; }

.nav-item-key {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  flex-shrink: 0;
}
.nav-item-title {
  font-size: 12px;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.nav-item:hover .nav-item-title,
.nav-item.active .nav-item-title { color: var(--text); }
.nav-item.active .nav-item-key { color: var(--accent); }

.nav-child-arrow {
  font-size: 9px;
  color: var(--text-soft);
  flex-shrink: 0;
  opacity: 0.5;
}

/* ── Content ────────────────────────────────────────────── */

.content {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Home / welcome */
.home-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 40px 80px;
}
.home-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}
.home-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}
.home-subtitle {
  font-size: 14px;
  color: var(--text-mid);
  margin-bottom: 40px;
}

.stat-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
}
.stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-pill-num { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-pill-label { color: var(--text-soft); }

.home-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.domain-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 40px;
}
.domain-chip {
  padding: 4px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.domain-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Feature page */
.feature-page {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

.feature-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.feature-key {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-active     { color: var(--status-active);     background: var(--status-active-bg);     border: 1px solid rgba(74,173,114,0.25); }
.badge-draft      { color: var(--status-draft);      background: var(--status-draft-bg);      border: 1px solid rgba(196,162,85,0.25); }
.badge-frozen     { color: var(--status-frozen);     background: var(--status-frozen-bg);     border: 1px solid rgba(91,130,204,0.25); }
.badge-deprecated { color: var(--status-deprecated); background: var(--status-deprecated-bg); border: 1px solid rgba(204,91,91,0.25); }

.badge-domain {
  color: var(--text-mid);
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.feature-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 6px;
}
.feature-completeness {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
  margin-bottom: 12px;
}
.guide-link {
  display: inline-block;
  margin-bottom: 28px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid rgba(196,162,85,0.3);
  border-radius: 4px;
  padding: 3px 10px;
}
.guide-link:hover { background: rgba(196,162,85,0.08); }
.completeness-bar {
  display: inline-block;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 6px;
  position: relative;
  top: -1px;
  overflow: hidden;
}
.completeness-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

/* Sections */
.section { margin-bottom: 36px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
}
.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border);
}

.section-body p { color: var(--text-mid); line-height: 1.75; margin-bottom: 10px; }
.section-body p:last-child { margin-bottom: 0; }
.section-body strong { color: var(--text); }
.section-body code {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
}
.section-body ul { padding-left: 20px; color: var(--text-mid); }
.section-body li { margin-bottom: 4px; line-height: 1.6; }

/* Decision cards */
.decisions-list { display: flex; flex-direction: column; gap: 12px; }

.decision-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 14px 16px;
}
.decision-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.decision-rationale {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 8px;
}
.decision-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.decision-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}
.decision-alts {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}

/* Limitations list */
.limitations-list { display: flex; flex-direction: column; gap: 6px; }
.limitation-item {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.55;
}
.limitation-bullet { color: var(--text-soft); flex-shrink: 0; margin-top: 1px; }

/* Tags row */
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 3px 9px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

/* Lineage */
.lineage-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.lineage-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  text-decoration: none;
}
.lineage-link:hover { border-color: var(--accent); color: var(--accent); }
.lineage-arrow { color: var(--text-soft); font-size: 10px; }

/* Empty states */
.empty { color: var(--text-soft); font-size: 13px; font-style: italic; }

/* No results */
.no-results {
  padding: 24px 18px;
  font-size: 12px;
  color: var(--text-soft);
  text-align: center;
  font-family: var(--mono);
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="topbar-logo">◈ lac</span>
    <span class="topbar-sep">|</span>
    <span class="topbar-project">Odio <span style="opacity:.55;font-weight:400">· Musician Guide view</span></span>
    <span class="topbar-count">44 features · 10 domains</span>
  </div>
  <div class="body-row">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="filter-input" placeholder="Filter features…" autocomplete="off" spellcheck="false">
      </div>
      <div class="sidebar-sort">
        <button class="sort-btn active" id="sort-domain" onclick="setSortMode('domain')">Domain</button>
        <button class="sort-btn" id="sort-build" onclick="setSortMode('build-order')">Build Order</button>
      </div>
      <nav class="nav-tree" id="nav-tree"></nav>
    </aside>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
const FEATURES = [{"featureKey":"odio-2026-002","title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","status":"frozen","problem":"@ffmpeg-installer/ffmpeg bundles the FFmpeg binary at ~38MB compressed. Vercel's serverless function size limit is ~50MB (250MB uncompressed). This is the single highest-risk technical constraint in the project. If the bundle is too large or the render takes too long (Vercel function timeout: 10s on Hobby), the entire render architecture needs to change before feat-render can be built. This POC must validate or invalidate the approach before any production code is written.","tags":["ffmpeg","poc","vercel","bundle-size","spike","render"],"successCriteria":"- Next.js project with @ffmpeg-installer/ffmpeg + fluent-ffmpeg deploys to Vercel Hobby without bundle size error\n- Deployed function executes an atrim+concat operation on a test .aac file\n- Output file is a valid .aac file playable in browser\n- Cold start + render time for a 2-8 min clip is under 30s total (10s preferred)\n- Render time for a 30-min source clip with multiple cut regions is measured and documented\n- If any constraint fails: document exactly which limit was hit and the recommended alternative with cost/complexity trade-off","domain":"render","priority":1,"userGuide":"This is an internal validation endpoint, not a user-facing feature. To test: GET /api/render/poc?url=<public-audio-url>. The endpoint downloads the audio, applies a test cut (removes seconds 0-10), and returns the trimmed file. Used during development to confirm Vercel can run FFmpeg before building the real render pipeline."},{"featureKey":"odio-2026-003","title":"Auth — Google OAuth via NextAuth.js","status":"frozen","problem":"Band members need a shared identity layer — without creating yet another account. Google sign-in is universal in the target audience and doubles as the credential for Google Drive access.","tags":["auth","google-oauth","nextauth","session","drive.file"],"successCriteria":"- Sign in with Google works on iOS Safari, Android Chrome, and desktop\n- Session persists across browser restarts (refresh token handled by NextAuth)\n- All private routes redirect to /login if unauthenticated\n- Sign-out clears session and redirects to landing\n- drive.file scope requested at initial sign-in (needed for audio upload and clip access)\n- Token refreshed automatically by NextAuth before expiry\n- Auth state available synchronously on client via Zustand (no flicker)","domain":"auth","priority":1,"userGuide":"Users visit the app and click 'Sign in with Google'. They are prompted to grant Google Drive access (files created by Odio only). After sign-in, they are redirected to the bands home page. Sessions persist across browser restarts. Sign-out via the Band settings page. The /share/[token] public page requires no sign-in."},{"featureKey":"odio-2026-005","title":"Band Space — Band Creation, Invites, Drive Folder, Members","status":"active","problem":"Band members need a shared space where all sessions are visible and access is controlled. Joining must be frictionless. The recorder's Google Drive folder is the audio source of truth — the app needs to bridge from 'here is an invite link' to 'you now have access to the band's recordings'.","tags":["band","invite","members","google-drive","postgres","qr-code","role-management"],"successCriteria":"- Create band: enter name → band record created in Postgres → invite link generated\n- Invite link opens a join page: shows band name, prompts Google sign-in\n- After joining, app shows member's Google email with clear instruction to recorder to share Drive folder\n- Session screen shows QR code of current session URL\n- Band member list: display name + email, role badge, join date\n- Recorder can change member roles using styled pill buttons (Editor / Member) — no native select\n- Remove member: visible button → confirmation sheet → delete from Postgres\n- Leave band: visible button → confirmation sheet → redirect to /bands\n- Multiple bands: user sees all their bands on the home screen\n- Band roles: Recorder (full access + unfreeze), Editor (create versions + freeze + record), Member (vote + comment only)\n- Default role for new members: Editor","domain":"band","priority":1,"userGuide":"Create a band from the home screen. Share the invite link or QR code with bandmates — they sign in with Google and join as Editors. After someone joins, their email appears in Settings → Members. Share the Drive folder with that email from Google Drive (one-time step). In Settings, use the pill buttons to switch a member between Editor and Member role. Tap Remove to remove a member (confirmation required). Non-Recorder members can Leave band from their own member row (confirmation required). Editors and Recorders can open 'Manage files / sync' from the Storage section to see all Drive files grouped by session. Hit 'Sync' to check which files still exist in Drive (green dot = ok, red dot = missing). Delete a source file to free Drive space while keeping the clip and its versions. Delete a clip to remove it entirely from Odio and Drive."},{"featureKey":"odio-2026-050","title":"JoinBandClient — Invite Link Band Join Flow","status":"active","problem":"Most users arrive in Odio as joiners — they received an invite link from a band creator. The join flow must be frictionless: one tap to join, then immediately into the band's session list. No Drive authorization needed for joiners (they don't upload).","tags":["band","onboarding","invite","join","first-run"],"successCriteria":"- Renders band name and 'Join [Band Name]' button\n- Button tap: POST to join endpoint, navigates to session list on success\n- Error states: 'Invalid invite link', 'Already a member', 'Invite has expired'\n- No Drive authorization step (joiners are MEMBER or EDITOR role — no drive.file scope requested)\n- Loading state on join button while POST in-flight","domain":"band","priority":1,"userGuide":"When you follow a band invite link, you'll see the band name and a Join button. Tap it to get immediate access to the band's sessions and clips."},{"featureKey":"odio-2026-043","title":"SubmitVersionSheet — Version Description and Submission Confirmation","status":"active","problem":"Submitting a new version is the final step of the editing workflow. The sheet provides one last chance to add a description ('removed setup noise', 'trimmed to 3:20') before committing. It also guards against submitting a version with no cuts.","tags":["editor","submit","version","bottom-sheet","description","zero-change-guard"],"successCriteria":"- Opens as BottomSheet from 'Submit as v[N]' button\n- Description field: optional textarea, max 200ch, placeholder 'What changed? (optional)'\n- Zero-change guard: Submit blocked (inline message shown) when no cut regions exist\n- Submit with cuts: calls onSubmit(description), shows spinner, error inline on failure\n- Cancel button: closes sheet, returns to editor with cuts intact\n- 'v[N]' in the button label correctly reflects next version number","domain":"editing","priority":1,"userGuide":"After marking your cuts, tap 'Submit edit' to save a new version. You can optionally describe what changed. Tap Submit to confirm — your version will be visible to the whole band within seconds."},{"featureKey":"odio-2026-039","title":"WaveformCanvas — Waveform Presenter with Cut Region Overlay","status":"active","problem":"The waveform display needs to show the audio waveform, cut regions (red or dark overlays), stamp dots, annotation pins, and a drag-interaction overlay — all layered correctly without WaveSurfer's built-in interactions (which conflict with custom cut region handling).","tags":["waveform","canvas","cut-regions","overlay","pointer-events","wavesurfer","css-divs"],"successCriteria":"- WaveSurfer mounts in container div with interact:false\n- Cut bands (CSS divs) render at correct positions for given cutMarks, zoom, scroll\n- pointer-events:none on cut bands — click-to-seek works through them\n- Overlay div at z-20 intercepts all pointer events in edit variant\n- Player variant: no overlay, no handles, dark masking bands (not red)\n- Suggested-cut overlays render in orange dashed style, distinct from user cuts\n- Edge grip indicators visible as visual affordance at 24px from each cut edge\n- Preview cut band renders during drag-create (before release)\n- Stamp dots render at computed timestamp positions\n- Waveform loads progressively — shimmer shown on unrendered segments","domain":"editing","priority":1,"userGuide":"The waveform display shows your audio as a wave. Red (or dark) bands show cut regions. Colored dots show moments stamped during recording. In the editor, drag on the waveform to add a cut."},{"featureKey":"odio-2026-047","title":"AuthShell — Authenticated Layout Wrapper","status":"active","problem":"All authenticated pages need shared layout elements: the BottomTabBar, the UploadBanner (persistent upload progress), and eventually the OfflineBanner (global offline indicator). These cannot live at the page level — they'd need to be duplicated on every route. A single client-side shell mounts them once.","tags":["layout","auth","shell","upload-banner","offline-banner","bottom-tab-bar"],"successCriteria":"- UploadBanner mounted and visible on all authenticated pages\n- BottomTabBar mounted at bottom of viewport\n- bandId and sessionId correctly extracted from pathname and passed to BottomTabBar\n- OfflineBanner slot ready for mounting (even if component not yet implemented)\n- Children content renders between top (banners) and bottom (tab bar) sections","domain":"app-shell","priority":1,"userGuide":"AuthShell is an internal layout component — users don't interact with it directly. It ensures the upload progress bar and tab navigation are always visible."},{"featureKey":"odio-2026-046","title":"BottomTabBar — Four-Tab Persistent Navigation","status":"active","problem":"The app has four distinct areas (Sessions, Record, Clips, Band) that need to be reachable in one tap from anywhere in the app. Hierarchical-only navigation (back buttons) would require 3+ taps to switch from editing a clip to starting a new recording mid-jam.","tags":["navigation","tab-bar","routing","bottom-nav","mobile-first","role-based"],"successCriteria":"- Four tabs visible on all non-editor routes\n- Active tab: amber icon + label\n- Hidden on /bands/.../clips/.../edit routes\n- Record tab hidden for MEMBER role\n- Clips tab hidden when !sessionId\n- Record tab shows pulsing amber ring when recording is active\n- 44×56px touch target per tab\n- Content never hidden behind tab bar (pb-[calc(56px+env(safe-area-inset-bottom))] on pages)","domain":"app-shell","priority":1,"userGuide":"The tab bar at the bottom of the screen lets you switch between Sessions, Record, Clips, and Band settings with a single tap from anywhere in the app."},{"featureKey":"odio-2026-004","title":"App Shell — Navigation, Dark Theme, Onboarding, Empty States","status":"active","problem":"The app needs a solid foundation: a responsive web app that works on any device, navigates between recording/editing/collaboration screens fluidly, enforces auth correctly, handles first-time setup (create a band, link a Drive folder) with minimal friction, and never shows a blank screen.","tags":["navigation","dark-theme","onboarding","mobile-first","next.js","empty-states","bottom-tab-bar"],"successCriteria":"- Dark theme renders correctly everywhere; no light mode; high contrast readable in dim rehearsal room or car\n- System fonts only — no web font loading\n- Bottom tab bar: Sessions / Record / Clips / Band — always visible except timeline editor\n- Clips tab hidden when outside a session context (avoids duplicate tab destinations)\n- Record tab hidden for MEMBER-role users\n- All interactive elements have touch targets >= 44px\n- Unauthenticated users land on / and see sign-in only\n- First-run: new user with no bands sees 'Create band' wizard immediately after sign-in\n- /share/[token] is public — no auth required, no private data exposed\n- Back navigation is client-side (no full reload)\n- Content never hidden behind tab bar (correct safe-area + 56px clearance)\n- Empty states guide users to the next action at every dead end","domain":"app-shell","priority":1,"userGuide":"After signing in, users land on their bands list. The bottom tab bar (Sessions / Record / Clips / Band) is always visible. Tap Record to go directly to the recording screen from anywhere. The Clips tab appears once you're inside a session — it shows the current session's clips. On first sign-in with no bands, the app redirects to a setup wizard to create the first band."},{"featureKey":"odio-2026-048","title":"PageLayout — Standard Page Wrapper with Back Button","status":"active","problem":"Every deep-navigation page (clip detail, band settings, editor, band creation) needs a standard header with a back button and page title, plus correct bottom padding to clear the fixed tab bar and device safe area. Without a shared PageLayout, every page reimplements this boilerplate differently.","tags":["layout","navigation","back-button","page-wrapper","safe-area"],"successCriteria":"- Header renders with back button (chevron-left icon + back label) and page title\n- Back button navigates via Next.js Link (client-side, no reload)\n- Content scrollable, does not hide behind tab bar\n- pb-[calc(56px+env(safe-area-inset-bottom))] on content area\n- Optional right header slot rendered when provided\n- Compatible with AuthShell (does not add its own UploadBanner or BottomTabBar)","domain":"app-shell","priority":1,"userGuide":"Internal layout component. The back arrow at the top-left of each page uses this component to navigate back."},{"featureKey":"odio-2026-028","title":"StampRow — One-Tap Timestamp Annotation During Recording","status":"active","problem":"During a live recording, a band member wants to mark interesting moments (a great riff, an uncertain section, an idea) without interrupting the take. Any UI with confirmation dialogs or text input is too slow and disruptive mid-jam.","tags":["stamps","annotation","recording","haptic","touch","one-tap"],"successCriteria":"- Four stamp buttons rendered in equal horizontal distribution\n- Each button: minimum 72×72px touch target\n- Tap triggers light haptic (navigator.vibrate(50) where supported) + brief scale animation (0.95 → 1.0, 100ms)\n- Stamp saved with correct currentTimestampMs at moment of tap (not on release)\n- No confirmation step\n- First-use hint labels shown by StampHint (separate component) — StampRow itself has no hint logic","domain":"recording","priority":1,"userGuide":"Tap any of the four icons while recording to mark that moment — 🔥 for something hot, ⭐ to flag a keeper, ❓ for uncertainty, 💡 for an idea. Your marks appear as colored dots on the waveform later."},{"featureKey":"odio-2026-007","title":"Session Management — Sessions, Clips, Naming, Stages","status":"active","problem":"A jam night produces 3-8 clips. Band members need to find, name, and navigate them easily. The recorder needs to delete mistakes. After many sessions, the band needs to track which songs are developed vs. still just ideas.","tags":["sessions","clips","crud","naming","song-stage","postgres","death-metal-names"],"successCriteria":"- Session auto-created on first record of the night\n- Session name is editable inline by any member\n- Clip auto-named with a memorable death metal name (adjective + noun, e.g. 'Putrid Descent')\n- Any band member can rename a clip by tapping the clip name\n- Shuffle button next to clip name generates a new death metal name and saves immediately (only on non-frozen clips)\n- ClipCard shows animated spinner while transcodeStatus is PENDING\n- Delete clip via '···' button → confirmation sheet → delete (RECORDER only)\n- Clip list shows: name, raw duration, version count, frozen lock, stage chip, processing spinner\n- Stage chip shows on non-frozen clips: colored pill (idea=gray, sketch=blue, developing=amber, demo-ready=green)\n- Session has optional notes field (notes icon → bottom sheet editor)\n- Clip has song stage field: idea / sketch / developing / demo-ready (default: idea)\n- Last clip is never hidden behind the bottom tab bar\n- Storage indicator shows Drive quota used by this band's audio files","domain":"sessions","priority":1,"userGuide":"Sessions appear in the band's session list sorted by date. Tap a session to see its clips. Tap the session name to rename it. Tap the notes icon to add session notes. Tap the QR icon to show a QR code bandmates can scan to join. Each clip card shows its auto-generated name, duration, version count, stage, and current status. Tap the clip name to rename it inline. Tap the shuffle icon next to the name to roll a new death metal name — saves automatically. Tap the stage chip (idea / sketch / developing / demo-ready) to see the song's creative state; change it from the clip detail. Tap anywhere else on the card to open the clip detail. Tap '···' on a clip to delete it (Recorder-only — requires confirmation)."},{"featureKey":"odio-2026-021","title":"BottomSheet — Slide-Up Modal for Confirmations and Input","status":"frozen","problem":"Destructive and important actions (freeze, delete, unfreeze, leave band, stage change) need a deliberate user confirmation step. Inline buttons can be accidentally tapped; a slide-up sheet forces a conscious second action and provides space for consequence copy.","tags":["bottom-sheet","modal","confirmation","sheet","ui-primitive","accessibility"],"successCriteria":"- Sheet slides up from bottom on open, slides down on close\n- Backdrop tap dismisses sheet\n- Body scroll locked while sheet is open\n- Focus trapped inside sheet (Tab cycles within sheet children)\n- Cancel button always present at bottom of sheet content\n- Swipe-down gesture dismisses\n- z-index above all page content and tab bar","domain":"app-shell","priority":1,"userGuide":"Bottom sheets appear as a slide-up panel when you tap a destructive or important action. Tap outside the sheet or swipe it down to cancel. Tap Cancel inside the sheet to close without taking action."},{"featureKey":"odio-2026-022","title":"Button — Shared Interactive Button Component","status":"frozen","problem":"The app needs consistent interactive button styling across all screens with reliable touch targets (≥44px), accessible focus states, loading states, and semantic variants (primary, danger, ghost) that don't need to be reimplemented per screen.","tags":["button","ui-primitive","accessibility","interaction"],"successCriteria":"- All buttons ≥ 44px tall\n- Primary variant: amber bg (#f59e0b), dark text\n- Danger variant: danger red bg, white text\n- Ghost variant: transparent, text-secondary\n- disabled prop: opacity-60, pointer-events-none, aria-disabled\n- loading prop: spinner replaces label, button remains disabled\n- Full-width option via `fullWidth` prop\n- ButtonLink renders a Next.js Link with same styling","domain":"app-shell","priority":1,"userGuide":"Buttons throughout the app use a consistent amber (primary), red (danger), or subtle (ghost) style. All buttons are large enough to tap comfortably on mobile."},{"featureKey":"odio-2026-006","title":"Recording — Browser-Based Audio Capture","status":"frozen","problem":"The recorder needs to capture multiple songs during a live jam — from a phone browser, one hand, dim room. Between songs the transition to the next recording must be instant. Moments worth keeping must be stampable without interrupting the performance.","tags":["recording","mediarecorder","audio","wake-lock","stamps","ios","google-drive"],"successCriteria":"- Record button triggers microphone permission request on first use\n- Level meter visible and responsive during recording (horizontal amber bar, 8px tall, full-width)\n- Recording screen is full-screen (tab bar hidden); minimal chrome: timer, level meter, stamps, 'Add note', record/stop button only\n- Stamp buttons (fire/keep/uncertain/idea) always visible; one tap stamps current timestamp; haptic feedback on mobile; 72x72px touch targets\n- Quick text note button: 'Add note' text link → 1-line bottom sheet, submit adds annotation\n- Recording screen usable one-handed in portrait orientation\n- Stop → upload begins immediately; 'Next Song' button available without waiting for upload\n- Post-record screen shows: clip name (editable inline), duration, stamp count, upload progress\n- 'Next Song' opens new recording screen; previous clip uploads in background\n- 'Delete recording' option on post-record screen with confirmation sheet: 'Delete this recording? This cannot be undone.'\n- During upload: persistent top banner 'Uploading Song N… 47%' with amber progress bar visible on any screen\n- Banner dismisses only after upload + transcode confirmed complete\n- Wake Lock active during recording (screen stays on)\n- iOS warning shown if Wake Lock is unavailable\n- Clip appears in session as 'Processing…' until transcode done, then becomes fully interactive\n- All clips play back correctly in Chrome and Safari (AAC source)\n- Any Editor-role band member can initiate a recording (not just band creator/recorder)","domain":"recording","priority":1,"userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away."},{"featureKey":"odio-2026-014","title":"Render — Server-Side FFmpeg on Freeze + Public Share","status":"frozen","problem":"When a version is frozen, a real audio file must be produced — so the band can download it, share it outside the band, or export it. This cannot happen client-side. The frozen clip should also be shareable publicly without requiring sign-in.","tags":["ffmpeg","server-side","freeze","render","next.js-api","public-share"],"successCriteria":"- Freeze triggers render within 2s of user confirmation\n- Rendered file available within 10s for a typical 2-8 min output clip\n- Clip page shows lock icon and download button after successful render\n- Render failure shows clear error with retry option\n- Public share toggle: generates /share/[token] URL, shareable outside the band\n- Public page: waveform player + stamps + clip name + date — no other session data exposed\n- Public listener does not need a Google account\n- Download of rendered file available on clip page (authenticated) and public page","domain":"render","priority":2,"userGuide":"On a clip's detail page, tap 'Freeze' on any version to produce the final audio file. The page shows 'Rendering…' for a few seconds, then displays a lock icon and download button. To share publicly: tap the Share icon on a frozen clip and copy the /share/[token] link. Anyone with the link can listen without signing in. To revoke public access, tap Share again and toggle it off."},{"featureKey":"odio-2026-012","title":"Versioning — Version Chain, Waveform Editor, Waveform Player, Freeze","status":"active","problem":"A raw recording needs to evolve from v1 (messy, includes setup and dead air) to vFinal (clean, trimmed) through collaborative edits — with full history and a clear end state (freeze). The band needs to listen to any version, compare versions, and hear exactly what a cut sounds like before committing.","tags":["versioning","version-history","freeze","wavesurfer","waveform-editor","waveform-player","localstorage","skip-cuts","split"],"successCriteria":"- Version list shows full chain: v number, description, result duration, cut count\n- Selecting a version in the detail page updates the waveform player to skip that version's cuts\n- Click-to-seek works on the waveform — clicking anywhere moves the playhead, play starts from that position\n- Stamp chips in the player are tappable and seek to that timestamp\n- After playback ends, cursor resets to start (no amber pin at right edge)\n- Submit button is always active — description is optional\n- Any member can create a version from any existing version\n- Trim shortcut pre-seeds start+end cut marks\n- Split: marks a time position → FFmpeg trims two independent Drive files (Part A: 0→split, Part B: split→end) → creates two new clips each with their own driveFileId and correct sourceDurationMs → original clip unchanged → navigates to session page showing all three clips\n- Split children show correct durations (4 min / 5 min) in the clip list — not the full original duration\n- Split children are fully independent songs with no visible lineage to the original (no scissors icon, no provenance card)\n- Drag on the edit waveform creates a cut region\n- Freeze locks the version and triggers render (see feat-render)\n- In-progress edits survive browser crash via localStorage draft\n- Draft banner shown on editor reopen with Resume / Dismiss","domain":"versioning","priority":2,"userGuide":"From a clip's detail page, select a version in the Versions section to hear that version's cuts applied. Tapping stamp chips (🔥 ⭐ etc.) in the player seeks to that moment. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song at a chosen time position — mark the split point on the waveform, confirm, and Odio creates Part A and Part B as two fully independent new songs, each with their own trimmed audio file in Drive. The original song stays in the session unchanged. After confirming Part A and Part B are good, go to Settings → Manage files / sync to delete the original's source from Drive. Tap 'Start from' pills to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional."},{"featureKey":"odio-2026-008","title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","status":"frozen","problem":"On jam night, the person who created the band may not always be the one with a phone free to record. Any Editor-role band member should be able to hit Record and have the audio land in the band's shared Drive — without requiring each member to set up their own Drive folder or the band creator to be physically present.","tags":["recording","multi-recorder","roles","permissions","google-drive","upload"],"successCriteria":"- Any Editor-role band member sees the Record tab in the bottom nav and can start a recording\n- Member-only role does not see Record tab and cannot access /record\n- /api/upload/init: accepts requests from Editor+ roles; fetches and uses band creator's stored refresh_token to generate Drive upload session URL\n- Token refresh attempt before generating upload URL; returns clear error if creator's token is invalid: 'Band creator needs to re-authorize Drive access'\n- Audio lands in the correct band Drive folder regardless of which Editor recorded\n- Clip row stores both driveOwnerEmail (always the band creator) and recordedByEmail (actual recorder)\n- Activity feed and clip list show 'Recorded by [name]' when recorder differs from band creator\n- If multiple Editors record simultaneously: each gets their own upload session URL; clips created as separate Postgres rows with no conflict\n- Post-record screen and upload banner work identically for all recording members","domain":"recording","priority":2,"userGuide":"Any Editor-role band member can record — not just the band creator. Editors see the Record tab in the nav and can start a recording from their own device. The audio automatically lands in the band's Drive folder (owned by the band creator). If the creator's Drive connection expires, a banner appears: 'Drive connection needs renewal — ask [creator name] to re-authorize.' The clip card shows 'Recorded by X' when the recorder is not the band creator."},{"featureKey":"odio-2026-052","title":"BandShareButton — Invite Link and QR Code Generator","status":"active","problem":"Band creators need to bring bandmates into the app quickly — ideally by showing a QR code that others can scan, or by sharing a link. The invite mechanism must work in a rehearsal space (QR scan) and asynchronously (link via message).","tags":["band","invite","qr-code","share","settings","onboarding"],"successCriteria":"- Invite link copyable with 'Copied!' feedback (2s) on tap\n- QR code rendered in dark theme (white modules on dark bg)\n- QR code scannable on physical phone screen at arm's length\n- Token generated on band creation, persisted in Postgres\n- Token revoke option in Band Settings (generates a new token, old links stop working)\n- Large QR display mode for first-run (150x150px minimum)","domain":"band","priority":2,"userGuide":"In Band Settings, tap 'Copy link' to copy your band invite link and share it with bandmates. They can also scan the QR code directly from your screen to join instantly."},{"featureKey":"odio-2026-049","title":"MemberRow — Band Member List Row with Role Management","status":"active","problem":"Band Settings lists all members with their roles. The Recorder needs to change roles and remove members from within the same row — without navigating to a separate member-management screen.","tags":["band","members","role","settings","role-picker","remove-member"],"successCriteria":"- Avatar initials + name + email rendered per row\n- Role chip: interactive for Recorder (not self), static for all others\n- Tap role chip → BottomSheet with 3 role options, current highlighted\n- Select role → PATCH to Postgres, chip updates optimistically\n- Self-role chip: disabled, tooltip text\n- Delete: swipe-left (iOS) or long-press (Android/desktop) → confirm sheet → DELETE membership\n- After delete: member row removed from list immediately","domain":"band","priority":2,"userGuide":"In Band Settings, each member row shows their role. As the band creator (Recorder), you can tap a member's role chip to change it or swipe to remove them from the band."},{"featureKey":"odio-2026-013","title":"Clip Detail — Coordinator, Actions Panel, Freeze, Share, Stage, Cleanup","status":"active","problem":"The clip detail page must coordinate multiple independent concerns — playback, version selection, actions, and collaboration — without letting any one section own state that another needs. A band member should be able to select a version, hear exactly that version's cuts, vote on it, and trigger lifecycle actions (stage change, freeze, share, cleanup) all from one screen.","tags":["clip-detail","coordinator","freeze","share","stage","cleanup","actions","version-selection"],"successCriteria":"- Selecting a version updates WaveformPlayer to skip that version's cuts\n- Clicking the active version keeps it selected (no deselect to null state)\n- Actions section hidden when member role + non-frozen (no phantom whitespace)\n- Stage picker opens as bottom sheet with 4 options; current stage highlighted\n- Freeze picker shows version list; pre-selects latest version; on confirm: renders clip, updates UI\n- Freeze error shown inline in freeze sheet; dismiss-able\n- Post-freeze callout banner appears after a successful freeze in the same session\n- Frozen status row shows Unfreeze option for RECORDER, lock icon for non-Recorder\n- Share toggle generates /share/[token] URL and copies to clipboard\n- Copy feedback: button label changes to 'Copied!' for 2 seconds\n- Cleanup sheet shows exactly what gets deleted and what remains before confirming\n- Processing row visible while transcodeStatus is PENDING; disappears when DONE\n- All bottom sheets have consistent Cancel button\n- Edit cuts link visible when canEdit && !frozen — navigates to /edit page\n- Vote tab shows 'Voting on v{N}' context card with version description; tapping 'change' switches to Versions tab","domain":"versioning","priority":2,"userGuide":"Open a clip from the session list. The waveform player at the top always plays the selected version. The Edit tab is your main workspace: tap 'Edit cuts' at the top to open the full-screen editor; tap any version card to switch what you hear (latest version is listed first, original at the bottom). Once you're happy with a version, tap Freeze to lock it — you'll be prompted to generate a share link right away. The Team tab is for post-edit collaboration: it shows who voted for what on the current version and the full comment thread. Tap 'change' in the voting header to switch which version the band is voting on."},{"featureKey":"odio-2026-037","title":"ClipCard — Clip Row in Session Clip List","status":"active","problem":"The session clip list is the primary navigation surface for the editing workflow. Each row must communicate a clip's name, duration, version count, stage, and activity state at a glance — plus support quick-delete for the Recorder without leaving the list.","tags":["clip","clip-list","card","navigation","stage","activity-indicator","delete"],"successCriteria":"- Clip name editable inline (InlineEdit, max 60ch)\n- Duration shows source duration → result duration if versions exist\n- Version count badge visible\n- StageSelector chip tappable by Editor/Recorder, static for Member\n- Frozen lock icon visible when frozen\n- amber left border when new activity since last visit\n- Processing state: 60% opacity, spinner, no edit/stage controls, toast on tap\n- Swipe-left delete on iOS → danger button → BottomSheet confirm\n- Long-press delete on Android/desktop → context menu → BottomSheet confirm\n- Tap navigates to clip detail","domain":"sessions","priority":2,"userGuide":"Each row in a session's clip list shows a recording. Tap a clip to open it. Tap the stage chip to update where the song is at. Tap the clip name to rename it. Swipe left to delete (only if you're the recorder)."},{"featureKey":"odio-2026-041","title":"CutList — Cut Region List with Nudge Controls","status":"active","problem":"Dragging cut region handles on a waveform on mobile is imprecise for fine adjustments (±100ms range). Users need a fallback precision control for exact trimming without requiring zooming in and dragging handles at the pixel level.","tags":["editor","cut-list","nudge","precision","cut-regions","accessibility"],"successCriteria":"- All current cut regions listed in order (sorted by start time)\n- Each row: index, startMs formatted, endMs formatted, duration removed\n- Expand: shows ±10ms ±100ms nudge buttons for both start and end edges\n- Nudge: updates cut boundary, respects 1s minimum region size and overlap constraints\n- 'Remove' × button: removes this cut region, adds to undo stack\n- 'Zoom to cut': calls parent's applyZoom + scroll to position cut region full-width in viewport\n- ExpandedCutId prop (controlled) — parent manages which row is open","domain":"editing","priority":2,"userGuide":"The cut list below the waveform shows all your marked cuts. Tap any cut to expand it and fine-tune the start or end time with the nudge buttons. Tap the × to remove a cut."},{"featureKey":"odio-2026-042","title":"DraftRestoreBanner — Recover Unsaved Cuts After Browser Crash","status":"active","problem":"If a user's browser crashes or the page reloads mid-edit, all cut regions are lost — the editor opens blank. The user may not realise their work was saved in localStorage and abandon the session assuming the work is gone.","tags":["editor","draft","localstorage","resilience","recovery","banner"],"successCriteria":"- Banner visible only when hasDraft=true AND cutMarks.length === 0\n- 'Resume editing' button: calls onResume() which loads draft cutMarks into WaveformEditor state\n- 'Dismiss' button: calls onDismiss() which clears localStorage draft + hasDraft becomes false\n- Banner does not appear when editor already has cuts (user navigated back with live state)\n- Banner does not reappear after dismissal in same session","domain":"editing","priority":2,"userGuide":"If your browser closed unexpectedly while you were editing cuts, a banner appears when you return offering to restore your work. Tap 'Resume' to get your cuts back, or 'Dismiss' to start fresh."},{"featureKey":"odio-2026-040","title":"EditorToolbar — Trim / Clear All / Split Quick-Action Buttons","status":"active","problem":"Creating cut regions by dragging is precise but slow for the most common editing tasks: trimming dead air from the start and end (80% of edits), and splitting a clip at a specific time. Quick-action buttons accelerate these workflows without requiring manual dragging.","tags":["editor","toolbar","trim","split","cut-regions","quick-action"],"successCriteria":"- Trim button: adds start/end cuts at 20%/80% boundaries immediately\n- Clear All: removes all cuts, disabled when hasCuts=false\n- Split: enters split mode, shows WaveformSplitter panel, WaveformCanvas shows split marker\n- All buttons: minimum 44px touch target\n- Trim and Clear All do not require confirmation\n- Split requires confirmation (in WaveformSplitter sheet before API call)","domain":"editing","priority":2,"userGuide":"Tap Trim to automatically mark the start and end of the recording for trimming — then drag the region handles to adjust. Tap Clear All to start over. Tap Split to cut a song into two separate clips."},{"featureKey":"odio-2026-038","title":"StampJumpRow — Tappable Stamp Chips for Waveform Seek","status":"frozen","problem":"Waveform players and editors display stamps (🔥⭐❓💡) at their recorded timestamps. These stamps are most useful when tappable — jumping to the timestamp lets the band quickly find the moments that were marked during recording.","tags":["stamps","waveform","navigation","playback","accessibility","shared-component"],"successCriteria":"- Chips rendered as <button> elements (keyboard accessible, screen-reader compatible)\n- Each chip: aria-label='Jump to M:SS' (time formatted in human-readable minutes:seconds)\n- Tap calls onSeek with timestamp in seconds\n- Chip colors: fire=#ef4444, keep=#eab308, uncertain=#f97316, idea=#3b82f6\n- Hidden when stamps array is empty (returns null)\n- className prop accepted for layout context (WaveformPlayer vs. Editor vs. PublicPlayer)","domain":"editing","priority":2,"userGuide":"Colored dots along the bottom of the waveform mark moments stamped during recording. Tap any dot to jump to that moment in the audio."},{"featureKey":"odio-2026-011","title":"Timeline Editor — WaveformPlayer, WaveformEditor, Cut Regions, Version Submit","status":"active","problem":"Band members need to trim dead air and setup noise from a recording — visually, in a browser, on a phone in a car or on a laptop at home — and preview the result before committing it as a new version. The clip detail page needs a pure playback experience that skips cuts during listen; the edit page needs a full-screen editor for creating cut regions.","tags":["wavesurfer","waveform","cut-regions","preview","web","touch","localstorage","waveform-player","waveform-editor","skip-cuts","split","trim","stamps"],"successCriteria":"- Waveform renders within 3 seconds of opening on a typical 10-min clip\n- Audio plays via Drive proxied URL — seeking supported via Range requests\n- Click-to-seek works — clicking anywhere on the waveform moves the playhead; play starts from that position\n- Stamp chips in WaveformPlayer are tappable <button> elements that seek to their timestamp\n- Cut regions in WaveformPlayer are dark overlays with pointer-events:none — they display cuts but never block click-to-seek\n- Skip-cuts playback works in WaveformPlayer: entering a cut region during play immediately jumps to region end\n- Drag on the WaveformEditor waveform creates a red cut region\n- Dragging within 24px of an existing cut edge x), relative time, duration in one line\n- Description 2-line clamped with 'Show more' if > 2 lines\n- Mini-player play/pause button (40px) plays this version's audio from start\n- Only one mini-player active at a time (controlled by parent)\n- Vote row: Keep/Revise/Pass buttons, tally visible below\n- Votes are mutable (tapping another option replaces)\n- 'Edit from this version' links to /edit?fromVersionId={id}\n- On frozen clip: 'Edit from this version' hidden, vote buttons hidden, lock icon on frozen version\n- Selected card: amber left border (4px)\n- Tap outside mini-player selects card and notifies parent","domain":"versioning","priority":2,"userGuide":"Each row in the clip's version list represents one edit. Tap the row to hear that version in the waveform player above. Tap the play button to listen to just that version inline. Vote Keep, Revise, or Pass to share your opinion with the band."},{"featureKey":"odio-2026-034","title":"VotePanel — Keep / Revise / Pass Vote UI","status":"active","problem":"After editing, the band needs to converge on which version is ready. A lightweight vote (Keep/Revise/Pass) scoped per version gives structure to 'should we ship this cut?' without requiring a group call or a long comment thread.","tags":["votes","collaboration","polling","keep","revise","pass","clip-detail"],"successCriteria":"- Keep/Revise/Pass buttons rendered equally spaced\n- Current user's vote highlighted with amber border\n- Tapping another option: optimistic UI update immediately, PATCH to Postgres\n- Tally shows all vote counts in text-xs below buttons\n- Votes can be cast on any version (not just latest)\n- Hidden (returns null) when isFrozen\n- Disabled (aria-disabled) when offline (isOnline=false prop)","domain":"collaboration","priority":2,"userGuide":"Tap Keep, Revise, or Pass to vote on a version. You can change your vote anytime. The tally below shows what everyone thinks."},{"featureKey":"odio-2026-010","title":"Upload Banner — Persistent Upload Progress Across All Pages","status":"active","problem":"After stopping a recording, the band member needs to navigate away (to another song, to the session list, to collaborate) without losing visibility into whether the upload succeeded. The upload progress must persist across all pages — not just the record screen — as a fixed top banner.","tags":["upload","banner","progress","resilience","indexeddb","retry","fixed-ui"],"successCriteria":"- Banner visible on every authenticated page during any upload state\n- Active upload: amber background, spinner, clip name, progress bar at bottom of banner\n- Paused upload: shows 'Upload paused — waiting for connection' with Retry button\n- Token error: shows 'Drive connection needs renewal — ask band creator to re-authorize' with Retry + Save file buttons\n- Session error: shows 'Session expired — sign in again to resume upload' with Retry + Save file buttons\n- Multiple pending: shows primary (most urgent) with '+N more' count\n- Banner disappears when all uploads complete (uploads.length === 0)\n- 'Save file' triggers browser download of raw blob (.aac or .webm)","domain":"recording","priority":2,"userGuide":"After stopping a recording, a banner appears at the top of every screen showing upload progress. If the upload completes successfully, the banner disappears automatically. If the connection drops, the banner shows 'Upload paused' with a Retry button — tap it once reconnected. If the band creator's Drive connection expires, the banner shows an error with a 'Save file' button as a last resort to download the raw recording to your device."},{"featureKey":"odio-2026-029","title":"LiveWaveform — Real-Time Audio Level Meter During Recording","status":"active","problem":"The recorder needs immediate visual confirmation that their microphone is active and capturing audio. A static screen during recording creates anxiety — is it actually recording? Is the mic too quiet? Is anything happening?","tags":["recording","audio","level-meter","waveform","real-time","web-audio"],"successCriteria":"- Horizontal bar fills proportionally to microphone input level\n- Smooth animation — no jarring jumps, natural decay on silence\n- Updates at ~60fps\n- bar height: 8px, full width\n- Amber fill on dark background\n- Bar does not flicker to zero between frames on normal speech","domain":"recording","priority":2,"userGuide":"The amber bar at the top of the recording screen moves in response to sound. If it stays still while you're speaking, your microphone may not be working."},{"featureKey":"odio-2026-054","title":"SessionHeaderClient — Session Page Title with Inline Name Edit","status":"active","problem":"The session clip list needs a page title that shows the session name and allows inline rename (tap to edit). The rename must PATCH to Postgres immediately — no separate save button.","tags":["session","header","inline-edit","rename","navigation"],"successCriteria":"- Session name rendered as tappable InlineEdit (max 40ch)\n- Tap → keyboard opens, inline input\n- Save (Return) → PATCH /api/sessions/[sessionId] { name }, page title updates immediately\n- Cancel (blur/Escape) → reverts to original name\n- Header right slot: '+ New Clip' for Recorder/Editor, absent for Member","domain":"sessions","priority":2,"userGuide":"Tap the session name at the top of a session to rename it. Changes are saved automatically when you press Return."},{"featureKey":"odio-2026-027","title":"AudioBars — Animated Audio Level Indicator","status":"frozen","problem":"During recording, the user needs visual confirmation that the microphone is picking up sound. Without a level indicator, they cannot tell if the mic is connected, if it's recording silence, or if audio is clipping.","tags":["audio","level-meter","animation","recording","ui-primitive"],"successCriteria":"- Bars animate responsively to audio level input\n- Silent input: bars at minimum height (not zero — they should breathe slightly)\n- Loud input: bars reach near- ,"tags":["storage","google-drive","cleanup","archive","quota"],"successCriteria":"- Band settings shows Drive storage used by Odio files (MB / GB)\n- Post-freeze: 'Clean up source audio' button removes raw .aac from Drive, keeps frozen render\n- Confirmation dialog shows exactly what will be deleted and what will remain\n- Archive clip: removes Postgres records + Drive files; cannot be undone\n- Bulk cleanup: 'Clean up all frozen clips in session' removes source audio for all frozen clips at once\n- Storage indicator updates after cleanup\n- Cleaned-up clips remain playable via their frozen render file","domain":"storage","priority":3,"userGuide":"In the Band tab, tap Settings to see Drive storage usage. The bar shows how many MB/GB of Drive are used by this band's recordings. After a clip is frozen and the band is happy with it, tap 'Clean up source audio' on the clip detail page to delete the raw recording from Drive — the final rendered file is kept and the clip remains fully playable. Tap 'Delete clip' (Recorder only) to permanently remove a clip and all its files from Drive."},{"featureKey":"odio-2026-016","title":"Collaboration — Votes, Comments, Stamp Heat Map, Activity","status":"frozen","problem":"After editing, the band needs a lightweight way to converge on which version is final — without a group chat thread full of voice notes and confusion. Voting, timestamped comments, and stamp heat maps give structure without overhead.","tags":["votes","comments","stamps","heat-map","activity","polling","postgres"],"successCriteria":"- Vote (Keep/Revise/Pass) per member per version; tally visible to all; changeable\n- Votes and vote tally update within 5-10s via polling\n- Timestamped comments show as pins on waveform during playback\n- Stamp heat map overlay visible on waveform — denser where more stamps exist\n- Version list: inline mini-player on each version card\n- Activity feed: version creates + votes + comments in order\n- Notification dot on clip when all m
