<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odio · Support Reference — LAC Wiki</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #12100e;
  --bg-sidebar:  #0e0c0a;
  --bg-card:     #1a1714;
  --bg-hover:    #201d1a;
  --bg-active:   #251f18;
  --border:      #2a2420;
  --border-soft: #221e1b;
  --text:        #e8ddd4;
  --text-mid:    #b0a49c;
  --text-soft:   #7a6a5a;
  --accent:      #c4a255;
  --accent-warm: #e8b865;
  --mono:        'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

  --status-active:     #4aad72;
  --status-draft:      #c4a255;
  --status-frozen:     #5b82cc;
  --status-deprecated: #cc5b5b;

  --status-active-bg:     rgba(74,173,114,0.12);
  --status-draft-bg:      rgba(196,162,85,0.12);
  --status-frozen-bg:     rgba(91,130,204,0.12);
  --status-deprecated-bg: rgba(204,91,91,0.12);
}

html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; display: flex; flex-direction: column; }

/* ── Shell ──────────────────────────────────────────────── */

.shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
}
.topbar-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
.topbar-sep  { color: var(--border); }
.topbar-project { font-family: var(--mono); font-size: 12px; color: var(--text-mid); }
.topbar-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-soft); }

.body-row { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ────────────────────────────────────────────── */

.sidebar {
  width: 264px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-soft); }

.sidebar-sort {
  display: flex;
  gap: 4px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sort-btn {
  flex: 1;
  padding: 4px 6px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.sort-btn:hover { color: var(--text-mid); border-color: var(--text-soft); }
.sort-btn.active { background: var(--bg-card); color: var(--accent); border-color: var(--accent); }

.nav-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.nav-tree::-webkit-scrollbar { width: 4px; }
.nav-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Domain group */
.nav-group { margin-bottom: 2px; }

.nav-domain {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  cursor: pointer;
  user-select: none;
}
.nav-domain:hover { color: var(--text-mid); }
.nav-domain-arrow { transition: transform 0.15s; font-size: 8px; }
.nav-domain.collapsed .nav-domain-arrow { transform: rotate(-90deg); }
.nav-domain-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

.nav-group-items { overflow: hidden; }
.nav-group.collapsed .nav-group-items { display: none; }

/* Feature item */
.nav-item {
  display: flex;
  align-items: baseline;
  gap: 7px;
  padding: 5px 14px 5px 18px;
  cursor: pointer;
  user-select: none;
  border-left: 2px solid transparent;
  transition: background 0.1s;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active {
  background: var(--bg-active);
  border-left-color: var(--accent);
}
.nav-item[data-depth="1"] { padding-left: 30px; }
.nav-item[data-depth="2"] { padding-left: 42px; }
.nav-item[data-depth="3"] { padding-left: 54px; }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}
.nav-item[data-status="active"]     .nav-dot { background: var(--status-active); }
.nav-item[data-status="draft"]      .nav-dot { background: var(--status-draft); }
.nav-item[data-status="frozen"]     .nav-dot { background: var(--status-frozen); }
.nav-item[data-status="deprecated"] .nav-dot { background: var(--status-deprecated); opacity: 0.5; }

.nav-item-key {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  flex-shrink: 0;
}
.nav-item-title {
  font-size: 12px;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.nav-item:hover .nav-item-title,
.nav-item.active .nav-item-title { color: var(--text); }
.nav-item.active .nav-item-key { color: var(--accent); }

.nav-child-arrow {
  font-size: 9px;
  color: var(--text-soft);
  flex-shrink: 0;
  opacity: 0.5;
}

/* ── Content ────────────────────────────────────────────── */

.content {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Home / welcome */
.home-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 40px 80px;
}
.home-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}
.home-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}
.home-subtitle {
  font-size: 14px;
  color: var(--text-mid);
  margin-bottom: 40px;
}

.stat-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
}
.stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-pill-num { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-pill-label { color: var(--text-soft); }

.home-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.domain-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 40px;
}
.domain-chip {
  padding: 4px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.domain-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Feature page */
.feature-page {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

.feature-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.feature-key {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-active     { color: var(--status-active);     background: var(--status-active-bg);     border: 1px solid rgba(74,173,114,0.25); }
.badge-draft      { color: var(--status-draft);      background: var(--status-draft-bg);      border: 1px solid rgba(196,162,85,0.25); }
.badge-frozen     { color: var(--status-frozen);     background: var(--status-frozen-bg);     border: 1px solid rgba(91,130,204,0.25); }
.badge-deprecated { color: var(--status-deprecated); background: var(--status-deprecated-bg); border: 1px solid rgba(204,91,91,0.25); }

.badge-domain {
  color: var(--text-mid);
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.feature-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 6px;
}
.feature-completeness {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
  margin-bottom: 12px;
}
.guide-link {
  display: inline-block;
  margin-bottom: 28px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid rgba(196,162,85,0.3);
  border-radius: 4px;
  padding: 3px 10px;
}
.guide-link:hover { background: rgba(196,162,85,0.08); }
.completeness-bar {
  display: inline-block;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 6px;
  position: relative;
  top: -1px;
  overflow: hidden;
}
.completeness-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

/* Sections */
.section { margin-bottom: 36px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
}
.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border);
}

.section-body p { color: var(--text-mid); line-height: 1.75; margin-bottom: 10px; }
.section-body p:last-child { margin-bottom: 0; }
.section-body strong { color: var(--text); }
.section-body code {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
}
.section-body ul { padding-left: 20px; color: var(--text-mid); }
.section-body li { margin-bottom: 4px; line-height: 1.6; }

/* Decision cards */
.decisions-list { display: flex; flex-direction: column; gap: 12px; }

.decision-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 14px 16px;
}
.decision-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.decision-rationale {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 8px;
}
.decision-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.decision-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}
.decision-alts {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}

/* Limitations list */
.limitations-list { display: flex; flex-direction: column; gap: 6px; }
.limitation-item {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.55;
}
.limitation-bullet { color: var(--text-soft); flex-shrink: 0; margin-top: 1px; }

/* Tags row */
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 3px 9px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

/* Lineage */
.lineage-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.lineage-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  text-decoration: none;
}
.lineage-link:hover { border-color: var(--accent); color: var(--accent); }
.lineage-arrow { color: var(--text-soft); font-size: 10px; }

/* Empty states */
.empty { color: var(--text-soft); font-size: 13px; font-style: italic; }

/* No results */
.no-results {
  padding: 24px 18px;
  font-size: 12px;
  color: var(--text-soft);
  text-align: center;
  font-family: var(--mono);
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="topbar-logo">◈ lac</span>
    <span class="topbar-sep">|</span>
    <span class="topbar-project">Odio <span style="opacity:.55;font-weight:400">· Support Reference view</span></span>
    <span class="topbar-count">44 features · 10 domains</span>
  </div>
  <div class="body-row">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="filter-input" placeholder="Filter features…" autocomplete="off" spellcheck="false">
      </div>
      <div class="sidebar-sort">
        <button class="sort-btn active" id="sort-domain" onclick="setSortMode('domain')">Domain</button>
        <button class="sort-btn" id="sort-build" onclick="setSortMode('build-order')">Build Order</button>
      </div>
      <nav class="nav-tree" id="nav-tree"></nav>
    </aside>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
const FEATURES = [{"featureKey":"odio-2026-002","title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","status":"frozen","problem":"@ffmpeg-installer/ffmpeg bundles the FFmpeg binary at ~38MB compressed. Vercel's serverless function size limit is ~50MB (250MB uncompressed). This is the single highest-risk technical constraint in the project. If the bundle is too large or the render takes too long (Vercel function timeout: 10s on Hobby), the entire render architecture needs to change before feat-render can be built. This POC must validate or invalidate the approach before any production code is written.","knownLimitations":["Vercel Hobby function timeout is 10s — this may be too tight for long clips; Pro plan raises to 300s","If bundle size fails on Hobby, Vercel Pro ($20/month) is the simplest fix — breaks the $0/month cost target"],"tags":["ffmpeg","poc","vercel","bundle-size","spike","render"],"domain":"render","priority":1,"userGuide":"This is an internal validation endpoint, not a user-facing feature. To test: GET /api/render/poc?url=<public-audio-url>. The endpoint downloads the audio, applies a test cut (removes seconds 0-10), and returns the trimmed file. Used during development to confirm Vercel can run FFmpeg before building the real render pipeline."},{"featureKey":"odio-2026-003","title":"Auth — Google OAuth via NextAuth.js","status":"frozen","problem":"Band members need a shared identity layer — without creating yet another account. Google sign-in is universal in the target audience and doubles as the credential for Google Drive access.","knownLimitations":["drive.file scope only covers files the app created under that specific user's account — bandmates stream audio through the server-side proxy (which uses the recorder's stored token), so bandmates do not need Drive scope just to listen","Google OAuth tokens expire after 1 hour — NextAuth DB adapter stores refresh_token in Postgres and rotates on expiry; JWT-only strategy is insufficient and must not be used","If the recorder revokes Odio's Drive access (in Google account settings), all audio becomes inaccessible to the entire band until re-authorized"],"tags":["auth","google-oauth","nextauth","session","drive.file"],"domain":"auth","priority":1,"userGuide":"Users visit the app and click 'Sign in with Google'. They are prompted to grant Google Drive access (files created by Odio only). After sign-in, they are redirected to the bands home page. Sessions persist across browser restarts. Sign-out via the Band settings page. The /share/[token] public page requires no sign-in."},{"featureKey":"odio-2026-005","title":"Band Space — Band Creation, Invites, Drive Folder, Members","status":"active","problem":"Band members need a shared space where all sessions are visible and access is controlled. Joining must be frictionless. The recorder's Google Drive folder is the audio source of truth — the app needs to bridge from 'here is an invite link' to 'you now have access to the band's recordings'.","knownLimitations":["New members cannot hear audio until the recorder manually shares the Drive folder with their Google email","If the recorder loses access to their Google account, band audio becomes inaccessible — no recovery path without exporting files first","Drive sync checks file existence but does not verify file integrity or playback quality","Deleting a clip from the Drive page removes it globally — all band members lose access immediately"],"tags":["band","invite","members","google-drive","postgres","qr-code","role-management"],"domain":"band","priority":1,"userGuide":"Create a band from the home screen. Share the invite link or QR code with bandmates — they sign in with Google and join as Editors. After someone joins, their email appears in Settings → Members. Share the Drive folder with that email from Google Drive (one-time step). In Settings, use the pill buttons to switch a member between Editor and Member role. Tap Remove to remove a member (confirmation required). Non-Recorder members can Leave band from their own member row (confirmation required). Editors and Recorders can open 'Manage files / sync' from the Storage section to see all Drive files grouped by session. Hit 'Sync' to check which files still exist in Drive (green dot = ok, red dot = missing). Delete a source file to free Drive space while keeping the clip and its versions. Delete a clip to remove it entirely from Odio and Drive."},{"featureKey":"odio-2026-050","title":"JoinBandClient — Invite Link Band Join Flow","status":"active","problem":"Most users arrive in Odio as joiners — they received an invite link from a band creator. The join flow must be frictionless: one tap to join, then immediately into the band's session list. No Drive authorization needed for joiners (they don't upload).","knownLimitations":["Invite tokens are single-use or time-limited — expired tokens show an error with no way to request a new one from this screen"],"tags":["band","onboarding","invite","join","first-run"],"domain":"band","priority":1,"userGuide":"When you follow a band invite link, you'll see the band name and a Join button. Tap it to get immediate access to the band's sessions and clips."},{"featureKey":"odio-2026-043","title":"SubmitVersionSheet — Version Description and Submission Confirmation","status":"active","problem":"Submitting a new version is the final step of the editing workflow. The sheet provides one last chance to add a description ('removed setup noise', 'trimmed to 3:20') before committing. It also guards against submitting a version with no cuts.","knownLimitations":["Error messages from onSubmit() are shown raw — no user-friendly error mapping"],"tags":["editor","submit","version","bottom-sheet","description","zero-change-guard"],"domain":"editing","priority":1,"userGuide":"After marking your cuts, tap 'Submit edit' to save a new version. You can optionally describe what changed. Tap Submit to confirm — your version will be visible to the whole band within seconds."},{"featureKey":"odio-2026-039","title":"WaveformCanvas — Waveform Presenter with Cut Region Overlay","status":"active","problem":"The waveform display needs to show the audio waveform, cut regions (red or dark overlays), stamp dots, annotation pins, and a drag-interaction overlay — all layered correctly without WaveSurfer's built-in interactions (which conflict with custom cut region handling).","knownLimitations":["Cut band position calculation is scroll-synchronized but not zoom-animated — positions jump on zoom level change (no transition)","Suggested-cut overlays from collaboration are display-only — no apply/dismiss controls in WaveformCanvas itself"],"tags":["waveform","canvas","cut-regions","overlay","pointer-events","wavesurfer","css-divs"],"domain":"editing","priority":1,"userGuide":"The waveform display shows your audio as a wave. Red (or dark) bands show cut regions. Colored dots show moments stamped during recording. In the editor, drag on the waveform to add a cut."},{"featureKey":"odio-2026-047","title":"AuthShell — Authenticated Layout Wrapper","status":"active","problem":"All authenticated pages need shared layout elements: the BottomTabBar, the UploadBanner (persistent upload progress), and eventually the OfflineBanner (global offline indicator). These cannot live at the page level — they'd need to be duplicated on every route. A single client-side shell mounts them once.","knownLimitations":["bandId/sessionId extraction is regex-based on pathname — URL structure changes require updating the extraction logic"],"tags":["layout","auth","shell","upload-banner","offline-banner","bottom-tab-bar"],"domain":"app-shell","priority":1,"userGuide":"AuthShell is an internal layout component — users don't interact with it directly. It ensures the upload progress bar and tab navigation are always visible."},{"featureKey":"odio-2026-046","title":"BottomTabBar — Four-Tab Persistent Navigation","status":"active","problem":"The app has four distinct areas (Sessions, Record, Clips, Band) that need to be reachable in one tap from anywhere in the app. Hierarchical-only navigation (back buttons) would require 3+ taps to switch from editing a clip to starting a new recording mid-jam.","knownLimitations":["Clips tab disappears when navigating from session to band settings — the sessionId context is not preserved in the URL and is lost","Tab bar height is hardcoded at 56px — not responsive to font size settings"],"tags":["navigation","tab-bar","routing","bottom-nav","mobile-first","role-based"],"domain":"app-shell","priority":1,"userGuide":"The tab bar at the bottom of the screen lets you switch between Sessions, Record, Clips, and Band settings with a single tap from anywhere in the app."},{"featureKey":"odio-2026-004","title":"App Shell — Navigation, Dark Theme, Onboarding, Empty States","status":"active","problem":"The app needs a solid foundation: a responsive web app that works on any device, navigates between recording/editing/collaboration screens fluidly, enforces auth correctly, handles first-time setup (create a band, link a Drive folder) with minimal friction, and never shows a blank screen.","knownLimitations":["No add-to-home-screen in V1 — users must bookmark the app in their browser","Tab bar not animated — no transition effects between tabs"],"tags":["navigation","dark-theme","onboarding","mobile-first","next.js","empty-states","bottom-tab-bar"],"domain":"app-shell","priority":1,"userGuide":"After signing in, users land on their bands list. The bottom tab bar (Sessions / Record / Clips / Band) is always visible. Tap Record to go directly to the recording screen from anywhere. The Clips tab appears once you're inside a session — it shows the current session's clips. On first sign-in with no bands, the app redirects to a setup wizard to create the first band."},{"featureKey":"odio-2026-048","title":"PageLayout — Standard Page Wrapper with Back Button","status":"active","problem":"Every deep-navigation page (clip detail, band settings, editor, band creation) needs a standard header with a back button and page title, plus correct bottom padding to clear the fixed tab bar and device safe area. Without a shared PageLayout, every page reimplements this boilerplate differently.","knownLimitations":["pageTitle and backLabel are static — no dynamic updates after mount (e.g., updating the title as clip name is edited requires the caller to update props)"],"tags":["layout","navigation","back-button","page-wrapper","safe-area"],"domain":"app-shell","priority":1,"userGuide":"Internal layout component. The back arrow at the top-left of each page uses this component to navigate back."},{"featureKey":"odio-2026-028","title":"StampRow — One-Tap Timestamp Annotation During Recording","status":"active","problem":"During a live recording, a band member wants to mark interesting moments (a great riff, an uncertain section, an idea) without interrupting the take. Any UI with confirmation dialogs or text input is too slow and disruptive mid-jam.","knownLimitations":["navigator.vibrate() not supported on iOS — no haptic on Apple devices","Stamp timestamps are relative to recording start (elapsedMs) — if recording is paused (e.g., wake lock interruption), timestamps after the pause will be offset"],"tags":["stamps","annotation","recording","haptic","touch","one-tap"],"domain":"recording","priority":1,"userGuide":"Tap any of the four icons while recording to mark that moment — 🔥 for something hot, ⭐ to flag a keeper, ❓ for uncertainty, 💡 for an idea. Your marks appear as colored dots on the waveform later."},{"featureKey":"odio-2026-007","title":"Session Management — Sessions, Clips, Naming, Stages","status":"active","problem":"A jam night produces 3-8 clips. Band members need to find, name, and navigate them easily. The recorder needs to delete mistakes. After many sessions, the band needs to track which songs are developed vs. still just ideas.","knownLimitations":["Death metal names are random — two clips in a session could get the same name (rare, detectable, user can rename)","Drive storage is under the recorder's account — ~43MB per 30-min clip, 15GB Drive free tier supports ~350 raw clips before cleanup needed","Clip delete requires two steps: Postgres record deletion + Drive file deletion — if one fails, manual reconciliation may be needed"],"tags":["sessions","clips","crud","naming","song-stage","postgres","death-metal-names"],"domain":"sessions","priority":1,"userGuide":"Sessions appear in the band's session list sorted by date. Tap a session to see its clips. Tap the session name to rename it. Tap the notes icon to add session notes. Tap the QR icon to show a QR code bandmates can scan to join. Each clip card shows its auto-generated name, duration, version count, stage, and current status. Tap the clip name to rename it inline. Tap the shuffle icon next to the name to roll a new death metal name — saves automatically. Tap the stage chip (idea / sketch / developing / demo-ready) to see the song's creative state; change it from the clip detail. Tap anywhere else on the card to open the clip detail. Tap '···' on a clip to delete it (Recorder-only — requires confirmation)."},{"featureKey":"odio-2026-021","title":"BottomSheet — Slide-Up Modal for Confirmations and Input","status":"frozen","problem":"Destructive and important actions (freeze, delete, unfreeze, leave band, stage change) need a deliberate user confirmation step. Inline buttons can be accidentally tapped; a slide-up sheet forces a conscious second action and provides space for consequence copy.","knownLimitations":["Nested sheets are not supported — opening a sheet from within another sheet will break focus trap","Swipe-down gesture uses touch events only — no mouse drag to dismiss on desktop"],"tags":["bottom-sheet","modal","confirmation","sheet","ui-primitive","accessibility"],"domain":"app-shell","priority":1,"userGuide":"Bottom sheets appear as a slide-up panel when you tap a destructive or important action. Tap outside the sheet or swipe it down to cancel. Tap Cancel inside the sheet to close without taking action."},{"featureKey":"odio-2026-022","title":"Button — Shared Interactive Button Component","status":"frozen","problem":"The app needs consistent interactive button styling across all screens with reliable touch targets (≥44px), accessible focus states, loading states, and semantic variants (primary, danger, ghost) that don't need to be reimplemented per screen.","knownLimitations":["Loading spinner color is fixed (white on primary/danger, text-secondary on ghost) — not customizable per call"],"tags":["button","ui-primitive","accessibility","interaction"],"domain":"app-shell","priority":1,"userGuide":"Buttons throughout the app use a consistent amber (primary), red (danger), or subtle (ghost) style. All buttons are large enough to tap comfortably on mobile."},{"featureKey":"odio-2026-006","title":"Recording — Browser-Based Audio Capture","status":"frozen","problem":"The recorder needs to capture multiple songs during a live jam — from a phone browser, one hand, dim room. Between songs the transition to the next recording must be instant. Moments worth keeping must be stampable without interrupting the performance.","knownLimitations":["iOS Safari stops MediaRecorder if the screen locks or the user switches tabs — Wake Lock API (iOS 16.4+) mitigates accidental sleep; tab switching is user responsibility","If the browser tab is closed before the blob is written to IndexedDB (i.e., during the first few seconds after stop), the audio may be lost — mitigated by writing to IndexedDB immediately on stop before any upload attempt (see feat-recording-resilience)","Resumable upload requires two API round-trips before recording is saved — adds ~2-4s to the stop flow","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — members upload directly to the creator's Drive using the server-generated resumable upload session URL (which uses the creator's stored token)"],"tags":["recording","mediarecorder","audio","wake-lock","stamps","ios","google-drive"],"domain":"recording","priority":1,"userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away."},{"featureKey":"odio-2026-014","title":"Render — Server-Side FFmpeg on Freeze + Public Share","status":"frozen","problem":"When a version is frozen, a real audio file must be produced — so the band can download it, share it outside the band, or export it. This cannot happen client-side. The frozen clip should also be shareable publicly without requiring sign-in.","knownLimitations":["Vercel /tmp is ephemeral (512MB limit) — source download (~43MB) + FFmpeg output (~10MB) is within limits for typical clips","Render requires recorder's valid Drive token from Postgres — if token refresh fails (e.g., recorder revoked access), render fails with a clear error and re-auth prompt","@ffmpeg-installer/ffmpeg bundles ~38MB compressed — close to Vercel's function size limit; this is the highest-risk technical component and needs a spike before building","Any band Editor role can trigger freeze, but the render always uses the recorder's Drive token — recorder does not need to be signed in at the moment of freeze"],"tags":["ffmpeg","server-side","freeze","render","next.js-api","public-share"],"domain":"render","priority":2,"userGuide":"On a clip's detail page, tap 'Freeze' on any version to produce the final audio file. The page shows 'Rendering…' for a few seconds, then displays a lock icon and download button. To share publicly: tap the Share icon on a frozen clip and copy the /share/[token] link. Anyone with the link can listen without signing in. To revoke public access, tap Share again and toggle it off."},{"featureKey":"odio-2026-012","title":"Versioning — Version Chain, Waveform Editor, Waveform Player, Freeze","status":"active","problem":"A raw recording needs to evolve from v1 (messy, includes setup and dead air) to vFinal (clean, trimmed) through collaborative edits — with full history and a clear end state (freeze). The band needs to listen to any version, compare versions, and hear exactly what a cut sounds like before committing.","knownLimitations":["Split takes a few seconds on the server (FFmpeg download + trim + upload) — the UI shows a loading state on the confirm button but gives no progress indicator","After splitting, the original Song X remains in the session — the band must manually delete it from the Drive page once they've confirmed A and B are good","If two members edit the same version simultaneously they both produce the next version number — band sees two versions at the same level and must choose","Submit requires internet connection — cuts safe in localStorage but cannot be written to Postgres offline"],"tags":["versioning","version-history","freeze","wavesurfer","waveform-editor","waveform-player","localstorage","skip-cuts","split"],"domain":"versioning","priority":2,"userGuide":"From a clip's detail page, select a version in the Versions section to hear that version's cuts applied. Tapping stamp chips (🔥 ⭐ etc.) in the player seeks to that moment. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song at a chosen time position — mark the split point on the waveform, confirm, and Odio creates Part A and Part B as two fully independent new songs, each with their own trimmed audio file in Drive. The original song stays in the session unchanged. After confirming Part A and Part B are good, go to Settings → Manage files / sync to delete the original's source from Drive. Tap 'Start from' pills to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional."},{"featureKey":"odio-2026-008","title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","status":"frozen","problem":"On jam night, the person who created the band may not always be the one with a phone free to record. Any Editor-role band member should be able to hit Record and have the audio land in the band's shared Drive — without requiring each member to set up their own Drive folder or the band creator to be physically present.","knownLimitations":["If the band creator revokes Google Drive access, ALL recording attempts by any Editor fail until the creator re-authorizes — one token serves the whole band; there is no per-member fallback","Two Editors recording simultaneously produce two separate clip rows with overlapping timestamps — no merging or conflict detection; both appear in the session normally","The creator's refresh_token is stored server-side in the NextAuth accounts table — this security surface already exists for the audio proxy feature; multi-recorder adds no new exposure"],"tags":["recording","multi-recorder","roles","permissions","google-drive","upload"],"domain":"recording","priority":2,"userGuide":"Any Editor-role band member can record — not just the band creator. Editors see the Record tab in the nav and can start a recording from their own device. The audio automatically lands in the band's Drive folder (owned by the band creator). If the creator's Drive connection expires, a banner appears: 'Drive connection needs renewal — ask [creator name] to re-authorize.' The clip card shows 'Recorded by X' when the recorder is not the band creator."},{"featureKey":"odio-2026-052","title":"BandShareButton — Invite Link and QR Code Generator","status":"active","problem":"Band creators need to bring bandmates into the app quickly — ideally by showing a QR code that others can scan, or by sharing a link. The invite mechanism must work in a rehearsal space (QR scan) and asynchronously (link via message).","knownLimitations":["QR code is generated client-side — requires JavaScript to render; no SSR fallback","navigator.clipboard.writeText() requires HTTPS (standard for production, may fail in development without HTTPS)"],"tags":["band","invite","qr-code","share","settings","onboarding"],"domain":"band","priority":2,"userGuide":"In Band Settings, tap 'Copy link' to copy your band invite link and share it with bandmates. They can also scan the QR code directly from your screen to join instantly."},{"featureKey":"odio-2026-049","title":"MemberRow — Band Member List Row with Role Management","status":"active","problem":"Band Settings lists all members with their roles. The Recorder needs to change roles and remove members from within the same row — without navigating to a separate member-management screen.","knownLimitations":["Role change is immediate with no undo — if Recorder accidentally changes another member's role, they must manually change it back","Drive access (if any) is not revoked when a member is removed — audio files on Drive are unaffected"],"tags":["band","members","role","settings","role-picker","remove-member"],"domain":"band","priority":2,"userGuide":"In Band Settings, each member row shows their role. As the band creator (Recorder), you can tap a member's role chip to change it or swipe to remove them from the band."},{"featureKey":"odio-2026-013","title":"Clip Detail — Coordinator, Actions Panel, Freeze, Share, Stage, Cleanup","status":"active","problem":"The clip detail page must coordinate multiple independent concerns — playback, version selection, actions, and collaboration — without letting any one section own state that another needs. A band member should be able to select a version, hear exactly that version's cuts, vote on it, and trigger lifecycle actions (stage change, freeze, share, cleanup) all from one screen.","knownLimitations":["Share link generation requires clip to be frozen — members cannot share a clip-in-progress","publicToken is stored in Postgres; if the tokens table is cleared, existing share links break","Unfreeze does not delete the rendered Drive file — it simply sets frozen=false. The rendered file remains in Drive until cleanup or clip delete."],"tags":["clip-detail","coordinator","freeze","share","stage","cleanup","actions","version-selection"],"domain":"versioning","priority":2,"userGuide":"Open a clip from the session list. The waveform player at the top always plays the selected version. The Edit tab is your main workspace: tap 'Edit cuts' at the top to open the full-screen editor; tap any version card to switch what you hear (latest version is listed first, original at the bottom). Once you're happy with a version, tap Freeze to lock it — you'll be prompted to generate a share link right away. The Team tab is for post-edit collaboration: it shows who voted for what on the current version and the full comment thread. Tap 'change' in the voting header to switch which version the band is voting on."},{"featureKey":"odio-2026-037","title":"ClipCard — Clip Row in Session Clip List","status":"active","problem":"The session clip list is the primary navigation surface for the editing workflow. Each row must communicate a clip's name, duration, version count, stage, and activity state at a glance — plus support quick-delete for the Recorder without leaving the list.","knownLimitations":["Swipe-left gesture is iOS Safari native feel only — Android swipe-left has no gesture affordance","InlineEdit within a tappable card: tap on the name text must be captured by InlineEdit, not by the card's navigation handler — requires stopPropagation on the InlineEdit wrapper"],"tags":["clip","clip-list","card","navigation","stage","activity-indicator","delete"],"domain":"sessions","priority":2,"userGuide":"Each row in a session's clip list shows a recording. Tap a clip to open it. Tap the stage chip to update where the song is at. Tap the clip name to rename it. Swipe left to delete (only if you're the recorder)."},{"featureKey":"odio-2026-041","title":"CutList — Cut Region List with Nudge Controls","status":"active","problem":"Dragging cut region handles on a waveform on mobile is imprecise for fine adjustments (±100ms range). Users need a fallback precision control for exact trimming without requiring zooming in and dragging handles at the pixel level.","knownLimitations":["Long cut lists (>5 regions) push the submit button far down the page on mobile — consider a fixed submit button in future","Nudge does not debounce API calls — each tap writes to localStorage draft immediately but Postgres writes are batched at submit"],"tags":["editor","cut-list","nudge","precision","cut-regions","accessibility"],"domain":"editing","priority":2,"userGuide":"The cut list below the waveform shows all your marked cuts. Tap any cut to expand it and fine-tune the start or end time with the nudge buttons. Tap the × to remove a cut."},{"featureKey":"odio-2026-042","title":"DraftRestoreBanner — Recover Unsaved Cuts After Browser Crash","status":"active","problem":"If a user's browser crashes or the page reloads mid-edit, all cut regions are lost — the editor opens blank. The user may not realise their work was saved in localStorage and abandon the session assuming the work is gone.","knownLimitations":["Draft key is per-clipId, not per-clipId+versionId — if the user edits a different version, the same draft key is used and may restore mismatched cuts"],"tags":["editor","draft","localstorage","resilience","recovery","banner"],"domain":"editing","priority":2,"userGuide":"If your browser closed unexpectedly while you were editing cuts, a banner appears when you return offering to restore your work. Tap 'Resume' to get your cuts back, or 'Dismiss' to start fresh."},{"featureKey":"odio-2026-040","title":"EditorToolbar — Trim / Clear All / Split Quick-Action Buttons","status":"active","problem":"Creating cut regions by dragging is precise but slow for the most common editing tasks: trimming dead air from the start and end (80% of edits), and splitting a clip at a specific time. Quick-action buttons accelerate these workflows without requiring manual dragging.","knownLimitations":["Trim percentages (20%/80%) are hardcoded — not configurable per clip"],"tags":["editor","toolbar","trim","split","cut-regions","quick-action"],"domain":"editing","priority":2,"userGuide":"Tap Trim to automatically mark the start and end of the recording for trimming — then drag the region handles to adjust. Tap Clear All to start over. Tap Split to cut a song into two separate clips."},{"featureKey":"odio-2026-038","title":"StampJumpRow — Tappable Stamp Chips for Waveform Seek","status":"frozen","problem":"Waveform players and editors display stamps (🔥⭐❓💡) at their recorded timestamps. These stamps are most useful when tappable — jumping to the timestamp lets the band quickly find the moments that were marked during recording.","knownLimitations":["Stamp chips are ordered by creation (recording order), not by timestamp — if a user stamped out of order, chips appear out of sequence relative to the waveform"],"tags":["stamps","waveform","navigation","playback","accessibility","shared-component"],"domain":"editing","priority":2,"userGuide":"Colored dots along the bottom of the waveform mark moments stamped during recording. Tap any dot to jump to that moment in the audio."},{"featureKey":"odio-2026-011","title":"Timeline Editor — WaveformPlayer, WaveformEditor, Cut Regions, Version Submit","status":"active","problem":"Band members need to trim dead air and setup noise from a recording — visually, in a browser, on a phone in a car or on a laptop at home — and preview the result before committing it as a new version. The clip detail page needs a pure playback experience that skips cuts during listen; the edit page needs a full-screen editor for creating cut regions.","knownLimitations":["Audio proxy route adds latency vs direct URL — mitigated by the server having fast egress to Google's CDN","If the clip's Drive file is unavailable (recorder revoked share, Drive outage), editor shows an error with Reconnect Drive option","Zoom level resets to 1x when entering split mode — by design, split mode always shows the full waveform for context"],"tags":["wavesurfer","waveform","cut-regions","preview","web","touch","localstorage","waveform-player","waveform-editor","skip-cuts","split","trim","stamps"],"domain":"editing","priority":2,"userGuide":"From a clip's detail page, the waveform player shows cuts as dark overlays. Tap any stamp chip to jump to that moment. Click-to-seek works anywhere on the waveform — even on cut overlays. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; drag the edge of an existing region to resize it; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song into two clips at a chosen time position. Tap 'Start from vN' to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional. Draft cuts survive browser crashes and are recovered on reopen."},{"featureKey":"odio-2026-033","title":"VersionCard — Version Row in Clip Detail Version List","status":"active","problem":"The clip detail page lists all versions of a clip newest-first. Each row must communicate: which version it is, who made it, when, and how long the result is — plus allow selecting it for playback and jumping into the editor. This is the highest-frequency interaction on the clip detail screen.","knownLimitations":["Relative time ('5 min ago') uses client-side date computation — may be stale between polls","Description 'Show more' expands in-place — no animation"],"tags":["version","clip-detail","mini-player","playback","selection","truncation"],"domain":"versioning","priority":2,"userGuide":"Each row in the clip's version list represents one edit. Tap the row to hear that version in the waveform player above. Tap the play button to listen to just that version inline. Vote Keep, Revise, or Pass to share your opinion with the band."},{"featureKey":"odio-2026-034","title":"VotePanel — Keep / Revise / Pass Vote UI","status":"active","problem":"After editing, the band needs to converge on which version is ready. A lightweight vote (Keep/Revise/Pass) scoped per version gives structure to 'should we ship this cut?' without requiring a group call or a long comment thread.","knownLimitations":["Vote button layout is cramped on narrow screens when all three labels are shown — consider icon-only mode below 320px"],"tags":["votes","collaboration","polling","keep","revise","pass","clip-detail"],"domain":"collaboration","priority":2,"userGuide":"Tap Keep, Revise, or Pass to vote on a version. You can change your vote anytime. The tally below shows what everyone thinks."},{"featureKey":"odio-2026-010","title":"Upload Banner — Persistent Upload Progress Across All Pages","status":"active","problem":"After stopping a recording, the band member needs to navigate away (to another song, to the session list, to collaborate) without losing visibility into whether the upload succeeded. The upload progress must persist across all pages — not just the record screen — as a fixed top banner.","knownLimitations":["Banner occupies top space — sticky headers below must consume --upload-banner-h CSS variable; new pages with their own sticky headers need to adopt this pattern","On desktop the banner is offset md:left-[220px] to avoid the sidebar; if the sidebar width changes, this value must be updated manually","Progress bar accuracy depends on IndexedDB byteOffset being updated frequently during upload; if updates are sparse, the bar may jump","'Save file' downloads the raw browser-recorded blob (WebM on Chrome, AAC/MP4 on Safari) — not the transcoded AAC that would normally be stored in Drive"],"tags":["upload","banner","progress","resilience","indexeddb","retry","fixed-ui"],"domain":"recording","priority":2,"userGuide":"After stopping a recording, a banner appears at the top of every screen showing upload progress. If the upload completes successfully, the banner disappears automatically. If the connection drops, the banner shows 'Upload paused' with a Retry button — tap it once reconnected. If the band creator's Drive connection expires, the banner shows an error with a 'Save file' button as a last resort to download the raw recording to your device."},{"featureKey":"odio-2026-029","title":"LiveWaveform — Real-Time Audio Level Meter During Recording","status":"active","problem":"The recorder needs immediate visual confirmation that their microphone is active and capturing audio. A static screen during recording creates anxiety — is it actually recording? Is the mic too quiet? Is anything happening?","knownLimitations":["AudioContext is suspended on iOS until a user gesture — level meter may start at 0 even after mic permission is granted; parent must call audioContext.resume() on first user tap","Decay rate is hardcoded to 0.8x per frame — not configurable"],"tags":["recording","audio","level-meter","waveform","real-time","web-audio"],"domain":"recording","priority":2,"userGuide":"The amber bar at the top of the recording screen moves in response to sound. If it stays still while you're speaking, your microphone may not be working."},{"featureKey":"odio-2026-054","title":"SessionHeaderClient — Session Page Title with Inline Name Edit","status":"active","problem":"The session clip list needs a page title that shows the session name and allows inline rename (tap to edit). The rename must PATCH to Postgres immediately — no separate save button.","knownLimitations":[],"tags":["session","header","inline-edit","rename","navigation"],"domain":"sessions","priority":2,"userGuide":"Tap the session name at the top of a session to rename it. Changes are saved automatically when you press Return."},{"featureKey":"odio-2026-027","title":"AudioBars — Animated Audio Level Indicator","status":"frozen","problem":"During recording, the user needs visual confirmation that the microphone is picking up sound. Without a level indicator, they cannot tell if the mic is connected, if it's recording silence, or if audio is clipping.","knownLimitations":["Level computation is frequency-averaged — clipping (levels > 1.0 from Web Audio) is clamped to 1.0 without a visual warning","Bar count is fixed at construction — responsive reflow not supported"],"tags":["audio","level-meter","animation","recording","ui-primitive"],"domain":"recording","priority":2,"userGuide":"The animated bars on the recording screen show that your microphone is working. If they don't move when you speak, check your mic permissions."},{"featureKey":"odio-2026-023","title":"EmptyState — Zero-Content Placeholder with Action","status":"active","problem":"Several screens (Session List, Clip List, Band Members) can be empty on first visit or after deletes. A blank screen gives no guidance on what to do next — users need a visual cue that emptiness is intentional plus a clear next action.","knownLimitations":["Only supports a single CTA — multi-action empty states (e.g., 'Create band' or 'Join band') must be handled with custom layouts"],"tags":["empty-state","onboarding","zero-state","ui-primitive","accessibility"],"domain":"app-shell","priority":2,"userGuide":"When a list has no items, a helpful message appears explaining the empty state and offering the next action to take."},{"featureKey":"odio-2026-024","title":"InlineEdit — Tap-to-Edit Text Field","status":"active","problem":"Session names, clip names, and band name are all editable. Adding a separate 'Edit' i // ── Helpers ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function md(text) {
  if (!text) return '';
  const lines = esc(text).split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.match(/^[-*] /)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + inline(t.slice(2)) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n').split(/\n{2,}/).map(block => {
    const b = block.trim();
    if (!b) return '';
    if (b.startsWith('<ul>') || b.startsWith('<li>')) return b;
    return '<p>' + inline(b.replace(/\n/g, '<br>')) + '</p>';
  }).filter(Boolean).join('\n');
}

function inline(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

function completeness(f) {
  const checks = [
    !!f.analysis, !!f.implementation,
    !!(f.decisions && f.decisions.length),
    !!f.successCriteria,
    !!(f.knownLimitations && f.knownLimitations.length),
    !!(f.tags && f.tags.length),
    !!f.domain,
  ];
  return Math.round(checks.filter(Boolean).length / checks.length * 100);
}

function statusColor(s) {
  return { active: '#4aad72', draft: '#c4a255', frozen: '#5b82cc', deprecated: '#cc5b5b' }[s] || '#c4a255';
}

// ── Tree building ────────────────────────────────────────────────────────────

const VIEW = 'support';
const byKey = new Map(FEATURES.map(f => [f.featureKey, f]));

function getChildren(key) {
  return FEATURES.filter(f => f.lineage && f.lineage.parent === key);
}

function isRoot(f) {
  const p = f.lineage && f.lineage.parent;
  return !p || !byKey.has(p);
}

/** Flatten feature + its descendants with depth info */
function flatten(f, depth) {
  const result = [{ feature: f, depth }];
  for (const child of getChildren(f.featureKey)) {
    result.push(...flatten(child, depth + 1));
  }
  return result;
}

// Group root features by domain
function buildGroups(features) {
  const roots = features.filter(isRoot);
  const groups = new Map();

  for (const f of roots) {
    const domain = f.domain || '(no domain)';
    if (!groups.has(domain)) groups.set(domain, []);
    groups.get(domain).push(...flatten(f, 0));
  }
  return groups;
}

// ── Nav rendering ────────────────────────────────────────────────────────────

let activeKey = null;
let sortMode = 'domain';
const collapsedDomains = new Set();

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sort-domain').classList.toggle('active', mode === 'domain');
  document.getElementById('sort-build').classList.toggle('active', mode === 'build-order');
  renderNav(document.getElementById('filter-input').value);
}

function renderNavItem(f, depth) {
  const isChild = depth > 0;
  const hasChildren = getChildren(f.featureKey).length > 0;
  return `<div class="nav-item${f.featureKey === activeKey ? ' active' : ''}"
    data-key="${esc(f.featureKey)}"
    data-status="${esc(f.status)}"
    data-depth="${depth}"
    onclick="navigate('${esc(f.featureKey)}')">
    ${isChild ? '<span class="nav-child-arrow">↳</span>' : '<span class="nav-dot"></span>'}
    ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
    <span class="nav-item-title">${esc(f.title)}</span>
    ${hasChildren ? '<span class="nav-child-arrow" style="margin-left:auto;opacity:0.4">⊕</span>' : ''}
  </div>`;
}

function renderNav(filterText) {
  const nav = document.getElementById('nav-tree');
  const q = (filterText || '').toLowerCase().trim();

  const matchFn = f =>
    f.featureKey.toLowerCase().includes(q) ||
    f.title.toLowerCase().includes(q) ||
    (f.domain && f.domain.toLowerCase().includes(q)) ||
    (f.tags && f.tags.some(t => t.toLowerCase().includes(q)));

  const features = q ? FEATURES.filter(matchFn) : FEATURES;

  if (features.length === 0) {
    nav.innerHTML = '<div class="no-results">No features match</div>';
    return;
  }

  // ── Build Order: flat list sorted by featureKey ───────────────────────────
  if (sortMode === 'build-order' && !q) {
    const sorted = [...FEATURES].sort((a, b) => a.featureKey.localeCompare(b.featureKey));
    nav.innerHTML = sorted.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Search results: flat list ─────────────────────────────────────────────
  if (q) {
    nav.innerHTML = features.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Domain grouping (default) ─────────────────────────────────────────────
  const groups = buildGroups(FEATURES);
  const sortedDomains = [...groups.keys()].sort((a, b) => {
    if (a === '(no domain)') return 1;
    if (b === '(no domain)') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  for (const domain of sortedDomains) {
    const items = groups.get(domain);
    if (!items || items.length === 0) continue;

    const isCollapsed = collapsedDomains.has(domain);

    html += `<div class="nav-group${isCollapsed ? ' collapsed' : ''}" data-domain="${esc(domain)}">
  <div class="nav-domain${isCollapsed ? ' collapsed' : ''}" onclick="toggleDomain(this)">
    <span class="nav-domain-arrow">▾</span>
    <span>${esc(domain)}</span>
    <span class="nav-domain-count">${items.length}</span>
  </div>
  <div class="nav-group-items">`;

    for (const { feature: f, depth } of items) {
      html += renderNavItem(f, depth);
    }

    html += '</div></div>';
  }

  nav.innerHTML = html;
}

function toggleDomain(el) {
  const group = el.closest('.nav-group');
  const domain = group.dataset.domain;
  if (collapsedDomains.has(domain)) {
    collapsedDomains.delete(domain);
    group.classList.remove('collapsed');
    el.classList.remove('collapsed');
  } else {
    collapsedDomains.add(domain);
    group.classList.add('collapsed');
    el.classList.add('collapsed');
  }
}

function renderFeature(key) {
  const f = byKey.get(key);
  if (!f) { renderHome(); return; }

  const pct = completeness(f);
  const barFill = `<span class="completeness-bar"><span class="completeness-fill" style="width:${pct}%"></span></span>`;

  const children = getChildren(f.featureKey);
  const parent = f.lineage && f.lineage.parent && byKey.get(f.lineage.parent);

  let html = `<div class="feature-page">
  ${VIEW !== 'user' ? `<div class="feature-meta">
    <span class="feature-key">${esc(f.featureKey)}</span>
    <span class="badge badge-${esc(f.status)}"><span class="badge-dot" style="background:${statusColor(f.status)}"></span>${esc(f.status)}</span>
    ${f.domain ? `<span class="badge badge-domain">${esc(f.domain)}</span>` : ''}
  </div>` : ''}
  <div class="feature-title">${esc(f.title)}</div>
  ${VIEW !== 'user' ? `<div class="feature-completeness">${barFill}${pct}% complete</div>` : ''}
  ${f.userGuide ? `<a class="guide-link" href="./lac-guide.html#${esc(f.featureKey)}" target="_self">📖 View User Guide →</a>` : ''}`;

  // Problem
  html += section(VIEW === 'user' ? 'About this feature' : 'Problem', f.problem ? `<div class="section-body">${md(f.problem)}</div>` : '<span class="empty">Not documented.</span>');

  // Analysis
  if (f.analysis)
    html += section('Analysis', `<div class="section-body">${md(f.analysis)}</div>`);

  // Implementation
  if (f.implementation)
    html += section('Implementation', `<div class="section-body">${md(f.implementation)}</div>`);

  // User Guide / Success Criteria
  if (VIEW === 'user') {
    const guideContent = f.userGuide || f.successCriteria;
    if (guideContent)
      html += section('What you can do', `<div class="section-body">${md(guideContent)}</div>`);
  } else {
    if (f.userGuide)
      html += section('User Guide', `<div class="section-body">${md(f.userGuide)}</div>`);
    if (f.successCriteria)
      html += section('Success Criteria', `<div class="section-body">${md(f.successCriteria)}</div>`);
  }

  // Decisions
  if (f.decisions && f.decisions.length) {
    const cards = f.decisions.map(d => `<div class="decision-card">
      <div class="decision-title">${esc(d.decision)}</div>
      <div class="decision-rationale">${md(d.rationale)}</div>
      ${d.date || (d.alternativesConsidered && d.alternativesConsidered.length) ? `<div class="decision-meta">
        ${d.date ? `<span class="decision-date">📅 ${esc(d.date)}</span>` : ''}
        ${d.alternativesConsidered && d.alternativesConsidered.length ? `<span class="decision-alts">Considered: ${d.alternativesConsidered.map(esc).join(', ')}</span>` : ''}
      </div>` : ''}
    </div>`).join('');
    html += section('Decisions', `<div class="decisions-list">${cards}</div>`, f.decisions.length);
  }

  // Known Limitations
  if (f.knownLimitations && f.knownLimitations.length) {
    const items = f.knownLimitations.map(l =>
      `<div class="limitation-item"><span class="limitation-bullet">—</span><span>${md(l)}</span></div>`
    ).join('');
    html += section('Known Limitations', `<div class="limitations-list">${items}</div>`, f.knownLimitations.length);
  }

  // Tags
  if (f.tags && f.tags.length) {
    const chips = f.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
    html += section(VIEW === 'user' ? 'Topics' : 'Tags', `<div class="tags-row">${chips}</div>`);
  }

  // Lineage
  if (parent || children.length) {
    let lineage = '<div class="lineage-row">';
    if (VIEW === 'user') {
      if (parent) {
        lineage += `<span class="lineage-arrow">Part of</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">${esc(parent.title)}</a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">Related</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">${esc(c.title)}</a>`;
        }
      }
    } else {
      if (parent) {
        lineage += `<span class="lineage-arrow">parent ↑</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">
            ${esc(parent.featureKey)} — ${esc(parent.title)}
          </a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">children ↓</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">
            ${esc(c.featureKey)} — ${esc(c.title)}
          </a>`;
        }
      }
    }
    lineage += '</div>';
    html += section(VIEW === 'user' ? 'Related' : 'Lineage', lineage);
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

function section(label, body, count) {
  const countHtml = count != null ? `<span class="section-count">(${count})</span>` : '';
  return `<div class="section">
  <div class="section-header">
    <span class="section-label">${label}</span>${countHtml}
  </div>
  ${body}
</div>`;
}

// ── Navigation ───────────────────────────────────────────────────────────────

function navigate(key) {
  activeKey = key;
  location.hash = key ? '#' + key : '';
  renderNav(document.getElementById('filter-input').value);
  if (key) {
    renderFeature(key);
    // Scroll nav item into view
    const el = document.querySelector(`.nav-item[data-key="${key}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  } else {
    renderHome();
  }
}

function filterByDomain(domain) {
  const input = document.getElementById('filter-input');
  input.value = domain;
  renderNav(domain);
}

// Filter input
document.getElementById('filter-input').addEventListener('input', e => {
  renderNav(e.target.value);
});

// ── Boot ─────────────────────────────────────────────────────────────────────

const hashKey = location.hash.slice(1);
if (hashKey && byKey.has(hashKey)) {
  activeKey = hashKey;
  renderNav('');
  renderFeature(hashKey);
  setTimeout(() => {
    const el = document.querySelector(`.nav-item[data-key="${hashKey}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, 0);
} else {
  renderNav('');
  renderHome();
}

window.navigate = navigate;
window.toggleDomain = toggleDomain;
window.filterByDomain = filterByDomain;
window.setSortMode = setSortMode;
</script>
</body>
</html>
