<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odio · Dev Onboarding — LAC Wiki</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #12100e;
  --bg-sidebar:  #0e0c0a;
  --bg-card:     #1a1714;
  --bg-hover:    #201d1a;
  --bg-active:   #251f18;
  --border:      #2a2420;
  --border-soft: #221e1b;
  --text:        #e8ddd4;
  --text-mid:    #b0a49c;
  --text-soft:   #7a6a5a;
  --accent:      #c4a255;
  --accent-warm: #e8b865;
  --mono:        'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

  --status-active:     #4aad72;
  --status-draft:      #c4a255;
  --status-frozen:     #5b82cc;
  --status-deprecated: #cc5b5b;

  --status-active-bg:     rgba(74,173,114,0.12);
  --status-draft-bg:      rgba(196,162,85,0.12);
  --status-frozen-bg:     rgba(91,130,204,0.12);
  --status-deprecated-bg: rgba(204,91,91,0.12);
}

html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; display: flex; flex-direction: column; }

/* ── Shell ──────────────────────────────────────────────── */

.shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
}
.topbar-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
.topbar-sep  { color: var(--border); }
.topbar-project { font-family: var(--mono); font-size: 12px; color: var(--text-mid); }
.topbar-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-soft); }

.body-row { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ────────────────────────────────────────────── */

.sidebar {
  width: 264px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-soft); }

.sidebar-sort {
  display: flex;
  gap: 4px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sort-btn {
  flex: 1;
  padding: 4px 6px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.sort-btn:hover { color: var(--text-mid); border-color: var(--text-soft); }
.sort-btn.active { background: var(--bg-card); color: var(--accent); border-color: var(--accent); }

.nav-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.nav-tree::-webkit-scrollbar { width: 4px; }
.nav-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Domain group */
.nav-group { margin-bottom: 2px; }

.nav-domain {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  cursor: pointer;
  user-select: none;
}
.nav-domain:hover { color: var(--text-mid); }
.nav-domain-arrow { transition: transform 0.15s; font-size: 8px; }
.nav-domain.collapsed .nav-domain-arrow { transform: rotate(-90deg); }
.nav-domain-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

.nav-group-items { overflow: hidden; }
.nav-group.collapsed .nav-group-items { display: none; }

/* Feature item */
.nav-item {
  display: flex;
  align-items: baseline;
  gap: 7px;
  padding: 5px 14px 5px 18px;
  cursor: pointer;
  user-select: none;
  border-left: 2px solid transparent;
  transition: background 0.1s;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active {
  background: var(--bg-active);
  border-left-color: var(--accent);
}
.nav-item[data-depth="1"] { padding-left: 30px; }
.nav-item[data-depth="2"] { padding-left: 42px; }
.nav-item[data-depth="3"] { padding-left: 54px; }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}
.nav-item[data-status="active"]     .nav-dot { background: var(--status-active); }
.nav-item[data-status="draft"]      .nav-dot { background: var(--status-draft); }
.nav-item[data-status="frozen"]     .nav-dot { background: var(--status-frozen); }
.nav-item[data-status="deprecated"] .nav-dot { background: var(--status-deprecated); opacity: 0.5; }

.nav-item-key {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  flex-shrink: 0;
}
.nav-item-title {
  font-size: 12px;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.nav-item:hover .nav-item-title,
.nav-item.active .nav-item-title { color: var(--text); }
.nav-item.active .nav-item-key { color: var(--accent); }

.nav-child-arrow {
  font-size: 9px;
  color: var(--text-soft);
  flex-shrink: 0;
  opacity: 0.5;
}

/* ── Content ────────────────────────────────────────────── */

.content {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Home / welcome */
.home-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 40px 80px;
}
.home-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}
.home-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}
.home-subtitle {
  font-size: 14px;
  color: var(--text-mid);
  margin-bottom: 40px;
}

.stat-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
}
.stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-pill-num { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-pill-label { color: var(--text-soft); }

.home-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.domain-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 40px;
}
.domain-chip {
  padding: 4px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.domain-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Feature page */
.feature-page {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

.feature-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.feature-key {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-active     { color: var(--status-active);     background: var(--status-active-bg);     border: 1px solid rgba(74,173,114,0.25); }
.badge-draft      { color: var(--status-draft);      background: var(--status-draft-bg);      border: 1px solid rgba(196,162,85,0.25); }
.badge-frozen     { color: var(--status-frozen);     background: var(--status-frozen-bg);     border: 1px solid rgba(91,130,204,0.25); }
.badge-deprecated { color: var(--status-deprecated); background: var(--status-deprecated-bg); border: 1px solid rgba(204,91,91,0.25); }

.badge-domain {
  color: var(--text-mid);
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.feature-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 6px;
}
.feature-completeness {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
  margin-bottom: 12px;
}
.guide-link {
  display: inline-block;
  margin-bottom: 28px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid rgba(196,162,85,0.3);
  border-radius: 4px;
  padding: 3px 10px;
}
.guide-link:hover { background: rgba(196,162,85,0.08); }
.completeness-bar {
  display: inline-block;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 6px;
  position: relative;
  top: -1px;
  overflow: hidden;
}
.completeness-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

/* Sections */
.section { margin-bottom: 36px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
}
.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border);
}

.section-body p { color: var(--text-mid); line-height: 1.75; margin-bottom: 10px; }
.section-body p:last-child { margin-bottom: 0; }
.section-body strong { color: var(--text); }
.section-body code {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
}
.section-body ul { padding-left: 20px; color: var(--text-mid); }
.section-body li { margin-bottom: 4px; line-height: 1.6; }

/* Decision cards */
.decisions-list { display: flex; flex-direction: column; gap: 12px; }

.decision-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 14px 16px;
}
.decision-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.decision-rationale {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 8px;
}
.decision-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.decision-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}
.decision-alts {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}

/* Limitations list */
.limitations-list { display: flex; flex-direction: column; gap: 6px; }
.limitation-item {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.55;
}
.limitation-bullet { color: var(--text-soft); flex-shrink: 0; margin-top: 1px; }

/* Tags row */
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 3px 9px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

/* Lineage */
.lineage-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.lineage-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  text-decoration: none;
}
.lineage-link:hover { border-color: var(--accent); color: var(--accent); }
.lineage-arrow { color: var(--text-soft); font-size: 10px; }

/* Empty states */
.empty { color: var(--text-soft); font-size: 13px; font-style: italic; }

/* No results */
.no-results {
  padding: 24px 18px;
  font-size: 12px;
  color: var(--text-soft);
  text-align: center;
  font-family: var(--mono);
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="topbar-logo">◈ lac</span>
    <span class="topbar-sep">|</span>
    <span class="topbar-project">Odio <span style="opacity:.55;font-weight:400">· Dev Onboarding view</span></span>
    <span class="topbar-count">44 features · 10 domains</span>
  </div>
  <div class="body-row">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="filter-input" placeholder="Filter features…" autocomplete="off" spellcheck="false">
      </div>
      <div class="sidebar-sort">
        <button class="sort-btn active" id="sort-domain" onclick="setSortMode('domain')">Domain</button>
        <button class="sort-btn" id="sort-build" onclick="setSortMode('build-order')">Build Order</button>
      </div>
      <nav class="nav-tree" id="nav-tree"></nav>
    </aside>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
const FEATURES = [{"featureKey":"odio-2026-002","title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","status":"frozen","problem":"@ffmpeg-installer/ffmpeg bundles the FFmpeg binary at ~38MB compressed. Vercel's serverless function size limit is ~50MB (250MB uncompressed). This is the single highest-risk technical constraint in the project. If the bundle is too large or the render takes too long (Vercel function timeout: 10s on Hobby), the entire render architecture needs to change before feat-render can be built. This POC must validate or invalidate the approach before any production code is written.","analysis":"The POC validates three things in isolation:\n\n1. **Bundle size:** Does a Next.js API route that imports @ffmpeg-installer/ffmpeg + fluent-ffmpeg deploy successfully to Vercel Hobby without hitting the 50MB compressed / 250MB uncompressed limit? The binary alone is ~38MB compressed — leaving ~12MB for the rest of the function bundle.\n\n2. **Cold start:** Vercel serverless functions have a cold start on first invocation. A 38MB binary means a large cold start. Is the first render under 30 seconds? Subsequent renders (warm function) should be under 10s for a typical 2–8 min clip output.\n\n3. **Render correctness:** Does a fluent-ffmpeg atrim+concat command correctly produce a trimmed AAC file from a source AAC file on Vercel's runtime environment?\n\nIf bundle size fails: alternatives are (a) Vercel Pro (1GB function size limit, $20/month — viable), (b) a dedicated render worker (Railway, Fly.io free tier), (c) client-side WASM FFmpeg (slow on mobile, acceptable for desktop-only), or (d) a cloud transcoding service (AWS MediaConvert — adds cost and complexity).\n\nIf timeout fails: the 10s Vercel Hobby limit may be too tight for longer clips. Vercel Pro raises the limit to 300s. The POC should test with a worst-case 30-min source clip.\n\nThe POC is a standalone Next.js route — not integrated into the app — that accepts a test audio file and returns the trimmed output.","decisions":[{"decision":"POC before any production render code","rationale":"@ffmpeg-installer/ffmpeg is the highest-risk dependency in the entire project. If it fails on Vercel Hobby, the render feature needs a completely different architecture. Building feat-render on top of an unvalidated assumption would waste significant implementation work. The POC is a 2-4 hour investment that prevents a potential full architectural rethink later.","date":"2026-04-10"}],"implementation":"1. Created GET /api/render/poc route that accepts ?url= param pointing to a source audio file.\n2. Installed @ffmpeg-installer/ffmpeg + fluent-ffmpeg as production dependencies.\n3. Route downloads source audio to /tmp, runs fluent-ffmpeg atrim+aconcat filter with a hard-coded test cut (0-10s removed), outputs trimmed .aac.\n4. Returns rendered file as application/octet-stream response.\n5. Result: bundle deploys on Vercel Hobby within size limit. Cold start ~8s, warm render ~3s for a 5-min clip. Architecture validated.\nComponentFile: app/api/render/poc/route.ts","knownLimitations":["Vercel Hobby function timeout is 10s — this may be too tight for long clips; Pro plan raises to 300s","If bundle size fails on Hobby, Vercel Pro ($20/month) is the simplest fix — breaks the $0/month cost target"],"tags":["ffmpeg","poc","vercel","bundle-size","spike","render"],"successCriteria":"- Next.js project with @ffmpeg-installer/ffmpeg + fluent-ffmpeg deploys to Vercel Hobby without bundle size error\n- Deployed function executes an atrim+concat operation on a test .aac file\n- Output file is a valid .aac file playable in browser\n- Cold start + render time for a 2-8 min clip is under 30s total (10s preferred)\n- Render time for a 30-min source clip with multiple cut regions is measured and documented\n- If any constraint fails: document exactly which limit was hit and the recommended alternative with cost/complexity trade-off","domain":"render","priority":1,"userGuide":"This is an internal validation endpoint, not a user-facing feature. To test: GET /api/render/poc?url=<public-audio-url>. The endpoint downloads the audio, applies a test cut (removes seconds 0-10), and returns the trimmed file. Used during development to confirm Vercel can run FFmpeg before building the real render pipeline.","componentFile":"app/api/render/poc/route.ts"},{"featureKey":"odio-2026-003","title":"Auth — Google OAuth via NextAuth.js","status":"frozen","problem":"Band members need a shared identity layer — without creating yet another account. Google sign-in is universal in the target audience and doubles as the credential for Google Drive access.","analysis":"NextAuth.js with Google provider. Scopes requested at sign-in: openid, email, profile, https://www.googleapis.com/auth/drive.file (access only to files Odio creates in the user's Drive). No Supabase. The access_token and refresh_token are stored server-side in the NextAuth session (encrypted cookie or database adapter). All Drive API calls are proxied through Next.js API routes — the token is never exposed to the client. Auth state (user email, displayName, avatar) held in Zustand. The public frozen clip page (/share/[token]) is the only unauthenticated route.","decisions":[{"decision":"drive.file scope at sign-in, not deferred","rationale":"drive.file is needed for all core features (upload recording, read session/clip data, write meta). Deferring it to a later step would require a second OAuth flow and would break the first recording attempt. Request it upfront with a clear explanation in the sign-in screen: 'Odio only accesses files it creates in your Drive.'","date":"2026-04-10"},{"decision":"NextAuth.js with Prisma DB adapter — required from day one, not deferred","rationale":"Supabase Auth adds a paid service. NextAuth.js is open-source and integrates directly with Next.js. The DB adapter (Prisma + Neon) is not optional: it is required to persist the recorder's refresh_token in the accounts table, which is the only way the audio proxy route can stream Drive audio to all band members. JWT-only session strategy is explicitly rejected — it cannot store the refresh_token server-side.","date":"2026-04-10"}],"implementation":"1. lib/auth.ts: NextAuth.js config with GoogleProvider (scopes: openid + email + profile + drive.file). PrismaAdapter with Neon Postgres. Session strategy: database.\n2. app/api/auth/[...nextauth]/route.ts: standard NextAuth route handler.\n3. middleware.ts: protects all routes except /, /login, /share/[token]. Redirects unauthenticated requests to /login.\n4. lib/prisma.ts: singleton Prisma client.\n5. Prisma schema: User, Account (NextAuth tables), Band, BandMember, JamSession, Clip, ClipVersion, Vote, Comment tables.\n6. app/(auth) route group: all authenticated pages wrapped in a layout that verifies session.\n7. app/login/page.tsx: sign-in page with Google OAuth button.\n8. The accounts table managed by PrismaAdapter stores access_token + refresh_token per user — required for server-side Drive API calls.","knownLimitations":["drive.file scope only covers files the app created under that specific user's account — bandmates stream audio through the server-side proxy (which uses the recorder's stored token), so bandmates do not need Drive scope just to listen","Google OAuth tokens expire after 1 hour — NextAuth DB adapter stores refresh_token in Postgres and rotates on expiry; JWT-only strategy is insufficient and must not be used","If the recorder revokes Odio's Drive access (in Google account settings), all audio becomes inaccessible to the entire band until re-authorized"],"tags":["auth","google-oauth","nextauth","session","drive.file"],"successCriteria":"- Sign in with Google works on iOS Safari, Android Chrome, and desktop\n- Session persists across browser restarts (refresh token handled by NextAuth)\n- All private routes redirect to /login if unauthenticated\n- Sign-out clears session and redirects to landing\n- drive.file scope requested at initial sign-in (needed for audio upload and clip access)\n- Token refreshed automatically by NextAuth before expiry\n- Auth state available synchronously on client via Zustand (no flicker)","domain":"auth","priority":1,"userGuide":"Users visit the app and click 'Sign in with Google'. They are prompted to grant Google Drive access (files created by Odio only). After sign-in, they are redirected to the bands home page. Sessions persist across browser restarts. Sign-out via the Band settings page. The /share/[token] public page requires no sign-in.","componentFile":"lib/auth.ts"},{"featureKey":"odio-2026-005","title":"Band Space — Band Creation, Invites, Drive Folder, Members","status":"active","problem":"Band members need a shared space where all sessions are visible and access is controlled. Joining must be frictionless. The recorder's Google Drive folder is the audio source of truth — the app needs to bridge from 'here is an invite link' to 'you now have access to the band's recordings'.","analysis":"Band metadata (name, members, Drive folder ID, invite code) stored in Postgres. Sessions and clips are stored in Postgres (not in Drive JSON files), so session/clip data is readable by all band members immediately after joining. Audio files live in the recorder's Drive folder. A user can belong to multiple bands. Band Settings page: member list with role management (pill buttons, not native select), invite link copy, storage quota bar. Remove member / Leave band both require confirmation via a bottom sheet before executing — prevents accidental destructive actions.","decisions":[{"decision":"Pill buttons for role change instead of native <select>","rationale":"Native <select> is styled by the OS and looks visually inconsistent with the dark app design. Pill buttons (Editor | Member) are always visible, immediately tappable, and make the current role and the available roles obvious at a glance without opening a dropdown.","date":"2026-04-11"},{"decision":"Remove/Leave actions require confirmation sheet before executing","rationale":"Text underline links ('Remove', 'Leave band') have no visual weight — they look like navigation links, not destructive actions. A tap mis-aimed at the email text could accidentally trigger removal. A confirmation bottom sheet with a red danger button adds the right friction for an irreversible action.","date":"2026-04-11"},{"decision":"Postgres for band membership, Drive for audio access","rationale":"Drive's drive.file scope prevents one user from reading files created by another. Band membership and session/clip metadata live in Postgres. Audio files live in the recorder's Drive, shared at the folder level via standard Drive sharing.","date":"2026-04-10"},{"decision":"Manual Drive folder sharing — no programmatic share","rationale":"Programmatic sharing requires storing and using the recorder's refresh token for Drive Permissions API calls — sensitive security surface. Manual sharing (recorder shares via Drive UI, one time per member) avoids this.","date":"2026-04-10"}],"implementation":"1. app/(auth)/bands/page.tsx: lists all bands for current user.\n2. app/(auth)/bands/[bandId]/page.tsx: session list for a band.\n3. app/api/bands/route.ts: POST creates a new band.\n4. app/api/bands/[bandId]/members/route.ts: PATCH updates member role; DELETE removes member.\n5. components/bands/BandSettingsClient.tsx: member list with inline pill buttons for role change (Editor/Member — active pill highlighted, tap other pill to switch), Remove and Leave band buttons both open a BottomSheet confirmation before executing, storage quota bar, invite link copy, \"Manage files / sync\" link to /bands/[bandId]/drive (Editor+ only).\n6. app/(auth)/bands/[bandId]/settings/page.tsx: server component — loads band + membership, renders BandSettingsClient.\n7. QR code for session URL rendered via react-qr-code in SessionHeaderClient.\n8. app/(auth)/bands/[bandId]/drive/page.tsx: Drive file management server component — loads all clips with Drive file IDs across all sessions, redirects MEMBER role, renders DriveFilesClient.\n9. components/bands/DriveFilesClient.tsx: Drive management UI — clips grouped by session with source/final status dots (grey=unchecked, green=ok, red=missing). Sync button checks all file IDs via /api/drive/check-file in batches of 5. Per-clip actions: Delete source (removes Drive file + clears driveFileId), Delete clip (removes entire clip record + both Drive files). Both actions require confirmation via BottomSheet with distinct destructive copy.\n10. app/api/drive/check-file/route.ts: GET — checks if a Drive file exists (id,trashed fields). Verifies caller is a band member first.\n11. app/api/clips/[clipId]/delete-source/route.ts: DELETE — removes source Drive file (best-effort), nulls driveFileId in DB. Editor+ only.","knownLimitations":["New members cannot hear audio until the recorder manually shares the Drive folder with their Google email","If the recorder loses access to their Google account, band audio becomes inaccessible — no recovery path without exporting files first","Drive sync checks file existence but does not verify file integrity or playback quality","Deleting a clip from the Drive page removes it globally — all band members lose access immediately"],"tags":["band","invite","members","google-drive","postgres","qr-code","role-management"],"successCriteria":"- Create band: enter name → band record created in Postgres → invite link generated\n- Invite link opens a join page: shows band name, prompts Google sign-in\n- After joining, app shows member's Google email with clear instruction to recorder to share Drive folder\n- Session screen shows QR code of current session URL\n- Band member list: display name + email, role badge, join date\n- Recorder can change member roles using styled pill buttons (Editor / Member) — no native select\n- Remove member: visible button → confirmation sheet → delete from Postgres\n- Leave band: visible button → confirmation sheet → redirect to /bands\n- Multiple bands: user sees all their bands on the home screen\n- Band roles: Recorder (full access + unfreeze), Editor (create versions + freeze + record), Member (vote + comment only)\n- Default role for new members: Editor","domain":"band","priority":1,"userGuide":"Create a band from the home screen. Share the invite link or QR code with bandmates — they sign in with Google and join as Editors. After someone joins, their email appears in Settings → Members. Share the Drive folder with that email from Google Drive (one-time step). In Settings, use the pill buttons to switch a member between Editor and Member role. Tap Remove to remove a member (confirmation required). Non-Recorder members can Leave band from their own member row (confirmation required). Editors and Recorders can open 'Manage files / sync' from the Storage section to see all Drive files grouped by session. Hit 'Sync' to check which files still exist in Drive (green dot = ok, red dot = missing). Delete a source file to free Drive space while keeping the clip and its versions. Delete a clip to remove it entirely from Odio and Drive.","componentFile":"components/bands/DriveFilesClient.tsx"},{"featureKey":"odio-2026-050","title":"JoinBandClient — Invite Link Band Join Flow","status":"active","problem":"Most users arrive in Odio as joiners — they received an invite link from a band creator. The join flow must be frictionless: one tap to join, then immediately into the band's session list. No Drive authorization needed for joiners (they don't upload).","analysis":"JoinBandClient renders the joiner first-run screen: band name at top, 'Join [Band Name]' amber primary button, brief description 'You've been invited to join this band's recording sessions.'\n\nOn 'Join': POST /api/bands/[bandId]/join with the invite token. On success: router.push to band session list. On error (invalid token, already a member, token expired): error message inline.\n\nThe invite token is in the URL (/invite/[token]) and was stored in a session cookie through the OAuth redirect flow. JoinBandClient reads the token from the URL or cookie.","decisions":[{"decision":"Joiners are not prompted for Drive scope","rationale":"Audio upload and Drive access belong to the Recorder's account only. Joiners (Editor/Member) never upload audio. Requesting drive.file from joiners is unnecessary and increases friction — it adds an extra OAuth consent screen for a permission they'll never use.","date":"2026-04-15"}],"implementation":"components/bands/JoinBandClient.tsx: 'use client'. Props { bandName, bandId, inviteToken }. Internal: joining (bool), error (string|null). On join: POST /api/bands/[bandId]/members { inviteToken } → router.push(/bands/[bandId]).","knownLimitations":["Invite tokens are single-use or time-limited — expired tokens show an error with no way to request a new one from this screen"],"tags":["band","onboarding","invite","join","first-run"],"successCriteria":"- Renders band name and 'Join [Band Name]' button\n- Button tap: POST to join endpoint, navigates to session list on success\n- Error states: 'Invalid invite link', 'Already a member', 'Invite has expired'\n- No Drive authorization step (joiners are MEMBER or EDITOR role — no drive.file scope requested)\n- Loading state on join button while POST in-flight","domain":"band","priority":1,"userGuide":"When you follow a band invite link, you'll see the band name and a Join button. Tap it to get immediate access to the band's sessions and clips.","componentFile":"components/bands/JoinBandClient.tsx"},{"featureKey":"odio-2026-043","title":"SubmitVersionSheet — Version Description and Submission Confirmation","status":"active","problem":"Submitting a new version is the final step of the editing workflow. The sheet provides one last chance to add a description ('removed setup noise', 'trimmed to 3:20') before committing. It also guards against submitting a version with no cuts.","analysis":"SubmitVersionSheet is a BottomSheet opened from the 'Submit as v[N]' button in WaveformEditor. Content:\n- Description textarea (optional): placeholder 'What changed? (optional)'\n- Character count (max 200ch)\n- Submit button (amber primary) labeled 'Submit as v[N]'\n- Cancel button (ghost)\n- Zero-change guard: if no cut regions exist, Submit button shows inline message 'No cuts made — add a cut region to submit' and is blocked\n\nSubmit calls onSubmit(description): Promise<void> passed by parent. Sheet owns submitting/error state — shows spinner on submit, inline error text if the promise throws. Does not navigate on success — parent (WaveformEditor) handles navigation.","decisions":[{"decision":"Description is optional — submit allowed with empty description","rationale":"Forcing a description adds friction to the most common case (quick trim edit where 'what changed?' is obvious from the cut marks). The description field exists for when the editor wants to explain a non-obvious choice. It should never block submission.","date":"2026-04-15"},{"decision":"Sheet owns submitting/error state, not WaveformEditor","rationale":"The submission spinner and error state are only relevant during the sheet interaction. WaveformEditor should not need to know about these transient UI states. The sheet is a contained async flow.","date":"2026-04-15"}],"implementation":"components/clips/SubmitVersionSheet.tsx: props { open, onClose, onSubmit: (desc: string) => Promise<void>, nextVersionNumber: number, hasCuts: boolean }. Internal state: description, submitting, error. Submit button disabled when submitting or !hasCuts. Shows inline error message when error is set. Calls onSubmit(description.trim()) on submit tap — throws = shows error inline; resolves = parent closes sheet + navigates.","knownLimitations":["Error messages from onSubmit() are shown raw — no user-friendly error mapping"],"tags":["editor","submit","version","bottom-sheet","description","zero-change-guard"],"successCriteria":"- Opens as BottomSheet from 'Submit as v[N]' button\n- Description field: optional textarea, max 200ch, placeholder 'What changed? (optional)'\n- Zero-change guard: Submit blocked (inline message shown) when no cut regions exist\n- Submit with cuts: calls onSubmit(description), shows spinner, error inline on failure\n- Cancel button: closes sheet, returns to editor with cuts intact\n- 'v[N]' in the button label correctly reflects next version number","domain":"editing","priority":1,"userGuide":"After marking your cuts, tap 'Submit edit' to save a new version. You can optionally describe what changed. Tap Submit to confirm — your version will be visible to the whole band within seconds.","componentFile":"components/clips/SubmitVersionSheet.tsx"},{"featureKey":"odio-2026-039","title":"WaveformCanvas — Waveform Presenter with Cut Region Overlay","status":"active","problem":"The waveform display needs to show the audio waveform, cut regions (red or dark overlays), stamp dots, annotation pins, and a drag-interaction overlay — all layered correctly without WaveSurfer's built-in interactions (which conflict with custom cut region handling).","analysis":"WaveformCanvas is a pure presenter with no internal state and no WaveSurfer API access. It receives all data via props and renders the layered canvas area:\n\n1. WaveSurfer mount div (interact:false — all built-in pointer events disabled)\n2. Cut band CSS divs (absolute positioned, pointer-events:none — display cuts but never block seek)\n3. Preview cut band during drag-create (semi-transparent, not yet committed)\n4. Edge grip indicators (24px zones as visual markers for resize hit detection)\n5. Single overlay div (absolute inset-0, z-20) — intercepts all pointer events, delegates to the caller's hook via passed event handlers\n6. Split marker (cyan vertical line + drag handle) — visible only in split mode\n7. Suggested-cut overlays (orange dashed) from collaborator suggestions\n\nTwo variants: `variant='edit'` (red cut bands, edge handles, overlay div active) and `variant='player'` (dark masking bands, no handles, no overlay — pointer events fall through to WaveSurfer seek).\n\nCut band positions are computed from `(ms / effectiveDurationMs) * waveTotalWidth - waveScrollLeft` to account for zoom and scroll. Props update when waveScrollLeft or waveTotalWidth change.","decisions":[{"decision":"Cut bands are pure CSS absolute divs, not WaveSurfer RegionsPlugin","rationale":"RegionsPlugin creates DOM nodes inside the waveform container that intercept pointer events even with pointer-events:none on individual regions because the Plugin wrapper div captures them. Pure CSS divs with pointer-events:none have no such interference. See timeline-editor/feature.json for full rationale.","date":"2026-04-15"}],"implementation":"components/clips/WaveformCanvas.tsx: props { containerRef, scrollContainerRef, cutMarks, previewCut, suggestedCuts, stamps, splitMarkerMs, mode: 'edit'|'player', waveTotalWidth, waveScrollLeft, effectiveDurationMs, pointerHandlers? }. Pure function component. All positions computed inline: `left = (ms / effectiveDurationMs) * waveTotalWidth - waveScrollLeft`.","knownLimitations":["Cut band position calculation is scroll-synchronized but not zoom-animated — positions jump on zoom level change (no transition)","Suggested-cut overlays from collaboration are display-only — no apply/dismiss controls in WaveformCanvas itself"],"tags":["waveform","canvas","cut-regions","overlay","pointer-events","wavesurfer","css-divs"],"successCriteria":"- WaveSurfer mounts in container div with interact:false\n- Cut bands (CSS divs) render at correct positions for given cutMarks, zoom, scroll\n- pointer-events:none on cut bands — click-to-seek works through them\n- Overlay div at z-20 intercepts all pointer events in edit variant\n- Player variant: no overlay, no handles, dark masking bands (not red)\n- Suggested-cut overlays render in orange dashed style, distinct from user cuts\n- Edge grip indicators visible as visual affordance at 24px from each cut edge\n- Preview cut band renders during drag-create (before release)\n- Stamp dots render at computed timestamp positions\n- Waveform loads progressively — shimmer shown on unrendered segments","domain":"editing","priority":1,"userGuide":"The waveform display shows your audio as a wave. Red (or dark) bands show cut regions. Colored dots show moments stamped during recording. In the editor, drag on the waveform to add a cut.","componentFile":"components/clips/WaveformCanvas.tsx"},{"featureKey":"odio-2026-047","title":"AuthShell — Authenticated Layout Wrapper","status":"active","problem":"All authenticated pages need shared layout elements: the BottomTabBar, the UploadBanner (persistent upload progress), and eventually the OfflineBanner (global offline indicator). These cannot live at the page level — they'd need to be duplicated on every route. A single client-side shell mounts them once.","analysis":"AuthShell is a client component mounted in the `app/(auth)/layout.tsx` server layout (which handles auth checks). AuthShell renders:\n1. UploadBanner (fixed top, always present when uploads are active)\n2. OfflineBanner (fixed top, when offline) — planned\n3. Main content slot (`{children}`)\n4. BottomTabBar (fixed bottom)\n\nAuthShell extracts `bandId` and `sessionId` from `usePathname()` to pass to BottomTabBar (for Clips tab visibility logic) and to other global components that need routing context.\n\nDoes not handle auth redirect itself — that's the responsibility of the server layout using `getServerSession`.","decisions":[{"decision":"AuthShell is a client component even though most of its content is static","rationale":"usePathname() requires a client component. Without usePathname(), BottomTabBar cannot determine which tabs to show or hide, and routing context cannot be passed down. The cost of a client boundary here is minimal — AuthShell itself renders no heavy content.","date":"2026-04-11"}],"implementation":"components/layout/AuthShell.tsx: 'use client'. Uses usePathname() to extract bandId/sessionId from URL segments. Renders: <UploadBanner />, <OfflineBanner /> (when ready), <div className='flex-1'>{children}</div>, <BottomTabBar bandId={...} sessionId={...} />.","knownLimitations":["bandId/sessionId extraction is regex-based on pathname — URL structure changes require updating the extraction logic"],"tags":["layout","auth","shell","upload-banner","offline-banner","bottom-tab-bar"],"successCriteria":"- UploadBanner mounted and visible on all authenticated pages\n- BottomTabBar mounted at bottom of viewport\n- bandId and sessionId correctly extracted from pathname and passed to BottomTabBar\n- OfflineBanner slot ready for mounting (even if component not yet implemented)\n- Children content renders between top (banners) and bottom (tab bar) sections","domain":"app-shell","priority":1,"userGuide":"AuthShell is an internal layout component — users don't interact with it directly. It ensures the upload progress bar and tab navigation are always visible.","componentFile":"components/layout/AuthShell.tsx"},{"featureKey":"odio-2026-046","title":"BottomTabBar — Four-Tab Persistent Navigation","status":"active","problem":"The app has four distinct areas (Sessions, Record, Clips, Band) that need to be reachable in one tap from anywhere in the app. Hierarchical-only navigation (back buttons) would require 3+ taps to switch from editing a clip to starting a new recording mid-jam.","analysis":"BottomTabBar renders four tabs fixed at the bottom of the viewport: Sessions (calendar icon), Record (mic icon), Clips (music-note icon), Band (users icon). 56px tall + safe-area-inset-bottom.\n\nActive tab: amber text + icon, label visible. Inactive tabs: text-muted, label hidden on tight viewports.\n\nHiding rules:\n- Tab bar hidden entirely on /edit routes (full-screen editor)\n- Record tab hidden for MEMBER-role users (members cannot initiate recording)\n- Clips tab hidden when no sessionId context (prevents duplicate tab pointing to same URL as Sessions)\n\nRecord tab accent ring pulses amber when a recording is actively in progress (detects via global recording state from Zustand).","decisions":[{"decision":"Tab bar hidden during editor, not just partially visible","rationale":"The timeline editor is near-full-screen — the waveform, cut list, and submit button need all available vertical space. A partial tab bar would either cover content or require the editor to shrink. Full hide keeps the editing surface clean.","date":"2026-04-10"}],"implementation":"components/layout/BottomTabBar.tsx: client component. usePathname() to detect /edit routes + extract sessionId. useBandRole() hook for role check. useRecordingStore() for active-recording ring. Renders fixed bottom-0 flex-row nav with 4 items.","knownLimitations":["Clips tab disappears when navigating from session to band settings — the sessionId context is not preserved in the URL and is lost","Tab bar height is hardcoded at 56px — not responsive to font size settings"],"tags":["navigation","tab-bar","routing","bottom-nav","mobile-first","role-based"],"successCriteria":"- Four tabs visible on all non-editor routes\n- Active tab: amber icon + label\n- Hidden on /bands/.../clips/.../edit routes\n- Record tab hidden for MEMBER role\n- Clips tab hidden when !sessionId\n- Record tab shows pulsing amber ring when recording is active\n- 44×56px touch target per tab\n- Content never hidden behind tab bar (pb-[calc(56px+env(safe-area-inset-bottom))] on pages)","domain":"app-shell","priority":1,"userGuide":"The tab bar at the bottom of the screen lets you switch between Sessions, Record, Clips, and Band settings with a single tap from anywhere in the app.","componentFile":"components/layout/BottomTabBar.tsx"},{"featureKey":"odio-2026-004","title":"App Shell — Navigation, Dark Theme, Onboarding, Empty States","status":"active","problem":"The app needs a solid foundation: a responsive web app that works on any device, navigates between recording/editing/collaboration screens fluidly, enforces auth correctly, handles first-time setup (create a band, link a Drive folder) with minimal friction, and never shows a blank screen.","analysis":"Next.js App Router. Dark theme only — no light mode in V1 (background #0a0a0a, accent amber #f59e0b). System fonts only. Bottom tab bar (Sessions / Record / Clips / Band) with route hierarchy. Tab bar is hidden during the timeline editor (/edit routes). The 'Clips' tab is only shown when a sessionId context is available — outside a session it would duplicate the Sessions tab destination. Record tab is hidden for MEMBER-role users. Back navigation uses Next.js <Link> (not <a href>) for client-side transitions — prevents full page reload on every back tap. Pages use pb-[calc(56px+env(safe-area-inset-bottom))] to clear the fixed tab bar on all devices including those with home indicators.","decisions":[{"decision":"No PWA in V1 — standard responsive web app only","rationale":"PWA manifest + service worker caching adds complexity without a compelling V1 benefit. The app is used on a browser in the car or at home — bookmarking is sufficient.","date":"2026-04-10"},{"decision":"Dark-only, no light/dark toggle","rationale":"Primary use context is dim rehearsal rooms and cars at night. Background #0a0a0a, accent amber #f59e0b.","date":"2026-04-10"},{"decision":"Bottom tab bar navigation (not hierarchical-only)","rationale":"Record needs to be reachable from anywhere in one tap during a live jam. Tab bar hidden only on /edit (full-screen waveform editor).","date":"2026-04-10"},{"decision":"PageLayout back button uses Next.js <Link>, not <a href>","rationale":"Using <a href> for in-app navigation triggers a full page reload on every back tap — visible flash, loses scroll position, re-runs server components. <Link> performs a client-side transition via the Next.js router.","date":"2026-04-11"},{"decision":"Session page uses pb-[calc(56px+env(safe-area-inset-bottom))] not pb-safe","rationale":"pb-safe only accounts for the device's safe area inset (home indicator bar). The fixed 56px tab bar sits on top of that. Without adding 56px, the last clip card could be hidden behind the tab bar on short viewports.","date":"2026-04-11"},{"decision":"Hide 'Clips' tab when no sessionId context","rationale":"When the user is on the band home page or any page without a session context, the Clips tab linked to /bands/[bandId] — identical to the Sessions tab. Having two tabs going to the same URL is confusing and clutters the navigation.","date":"2026-04-11"},{"decision":"System fonts only — no custom font loading","rationale":"App is used in dark, low-bandwidth settings. Custom fonts add bundle size, FOUT risk, and load time for zero perceptible benefit.","date":"2026-04-10"}],"implementation":"1. app/layout.tsx: root layout with dark theme CSS variables, system font stack.\n2. components/layout/BottomTabBar.tsx: client component — 4 tabs. Hidden on /edit routes via usePathname(). Clips tab hidden when !sessionId (avoids same-URL duplicate). Record tab hidden for MEMBER role via bandMe API query.\n3. components/layout/PageLayout.tsx: standard page wrapper. Back button uses Next.js <Link> not <a href> for client-side navigation. Bottom padding: pb-[calc(56px+env(safe-area-inset-bottom))].\n4. components/layout/AuthShell.tsx: client shell — mounts BottomTabBar + UploadBanner. Extracts bandId/sessionId from pathname.\n5. app/(auth)/layout.tsx: server layout — auth guard, renders AuthShell.\n6. components/ui/EmptyState.tsx: reusable empty state with icon, title, description, action.\n7. components/ui/Button.tsx, ButtonLink.tsx: shared button components.\n8. components/ui/BottomSheet.tsx: slide-up modal for confirmations and input sheets.\n9. components/ui/InlineEdit.tsx: in-place editable text field.\n10. tailwind.config.ts: dark theme color tokens.","knownLimitations":["No add-to-home-screen in V1 — users must bookmark the app in their browser","Tab bar not animated — no transition effects between tabs"],"tags":["navigation","dark-theme","onboarding","mobile-first","next.js","empty-states","bottom-tab-bar"],"successCriteria":"- Dark theme renders correctly everywhere; no light mode; high contrast readable in dim rehearsal room or car\n- System fonts only — no web font loading\n- Bottom tab bar: Sessions / Record / Clips / Band — always visible except timeline editor\n- Clips tab hidden when outside a session context (avoids duplicate tab destinations)\n- Record tab hidden for MEMBER-role users\n- All interactive elements have touch targets >= 44px\n- Unauthenticated users land on / and see sign-in only\n- First-run: new user with no bands sees 'Create band' wizard immediately after sign-in\n- /share/[token] is public — no auth required, no private data exposed\n- Back navigation is client-side (no full reload)\n- Content never hidden behind tab bar (correct safe-area + 56px clearance)\n- Empty states guide users to the next action at every dead end","domain":"app-shell","priority":1,"userGuide":"After signing in, users land on their bands list. The bottom tab bar (Sessions / Record / Clips / Band) is always visible. Tap Record to go directly to the recording screen from anywhere. The Clips tab appears once you're inside a session — it shows the current session's clips. On first sign-in with no bands, the app redirects to a setup wizard to create the first band.","componentFile":"components/layout/BottomTabBar.tsx"},{"featureKey":"odio-2026-048","title":"PageLayout — Standard Page Wrapper with Back Button","status":"active","problem":"Every deep-navigation page (clip detail, band settings, editor, band creation) needs a standard header with a back button and page title, plus correct bottom padding to clear the fixed tab bar and device safe area. Without a shared PageLayout, every page reimplements this boilerplate differently.","analysis":"PageLayout renders a standard page structure:\n- Fixed header: back button (← + screen name as a Next.js `<Link>`, not `<a>`), page title\n- Scrollable content area with `pb-[calc(56px+env(safe-area-inset-bottom))]` to clear tab bar + home indicator\n- Optional right-side header action slot (e.g., '+ New Session' button)\n\nBack button uses Next.js `<Link href={backHref}>` for client-side navigation — no full page reload on back tap.","decisions":[{"decision":"Back button uses Next.js Link, not <a href> or router.back()","rationale":"<a href> triggers full page reload. router.back() goes to the previous history entry which may not be the intended parent page. An explicit backHref with <Link> is predictable and SSR-compatible.","date":"2026-04-11"}],"implementation":"components/layout/PageLayout.tsx: props { title, backHref, backLabel?: string, headerRight?: ReactNode, children }. Renders <header> (sticky top-0 bg-elevated z-10), <main className='pb-[calc(56px+env(safe-area-inset-bottom))]'>{children}</main>.","knownLimitations":["pageTitle and backLabel are static — no dynamic updates after mount (e.g., updating the title as clip name is edited requires the caller to update props)"],"tags":["layout","navigation","back-button","page-wrapper","safe-area"],"successCriteria":"- Header renders with back button (chevron-left icon + back label) and page title\n- Back button navigates via Next.js Link (client-side, no reload)\n- Content scrollable, does not hide behind tab bar\n- pb-[calc(56px+env(safe-area-inset-bottom))] on content area\n- Optional right header slot rendered when provided\n- Compatible with AuthShell (does not add its own UploadBanner or BottomTabBar)","domain":"app-shell","priority":1,"userGuide":"Internal layout component. The back arrow at the top-left of each page uses this component to navigate back.","componentFile":"components/layout/PageLayout.tsx"},{"featureKey":"odio-2026-028","title":"StampRow — One-Tap Timestamp Annotation During Recording","status":"active","problem":"During a live recording, a band member wants to mark interesting moments (a great riff, an uncertain section, an idea) without interrupting the take. Any UI with confirmation dialogs or text input is too slow and disruptive mid-jam.","analysis":"Four large buttons equally spaced across the recording screen: 🔥 (fire/hot, stamp-fire red), ⭐ (keep, stamp-keep yellow), ❓ (uncertain, stamp-uncertain orange), 💡 (idea, stamp-idea blue). Each button is 72px minimum tap target. One tap:\n1. Triggers light haptic feedback\n2. Records the current `recordingElapsedMs` as a timestamp\n3. Saves a `{ stampType, timestampMs }` to local state (flushed to Postgres on recording stop)\n\nNo confirmation, no text, no visual feedback beyond a brief button scale animation. Zero friction is the goal.\n\nFirst-use: the StampHint component (sibling) shows labels beneath the buttons for 5s on first visit.","decisions":[{"decision":"onPointerDown instead of onClick for minimum latency","rationale":"onClick fires after both pointerdown + pointerup (adds ~100-150ms vs pointerdown). For a live musical timestamp, 100ms earlier capture is meaningful — the beat has moved on. StampType annotation is written on pointerdown.","date":"2026-04-15"},{"decision":"Stamps flushed to Postgres on recording stop, not per-stamp","rationale":"One Postgres write per stamp during recording creates N roundtrips mid-take, each competing with the audio recording thread. Batch write on stop: one POST /api/clips/[clipId]/stamps with all stamps collected during the session.","date":"2026-04-15"}],"implementation":"components/recording/StampRow.tsx: props { onStamp: (type: StampType, timestampMs: number) => void }. StampType = 'FIRE' | 'KEEP' | 'UNCERTAIN' | 'IDEA'. Renders 4 buttons in flex-row gap-4. Each button: rounded-full, 72px, emoji centered, colored ring. onPointerDown (not onClick) fires for minimum tap latency. Scale animation via CSS class toggle.","knownLimitations":["navigator.vibrate() not supported on iOS — no haptic on Apple devices","Stamp timestamps are relative to recording start (elapsedMs) — if recording is paused (e.g., wake lock interruption), timestamps after the pause will be offset"],"tags":["stamps","annotation","recording","haptic","touch","one-tap"],"successCriteria":"- Four stamp buttons rendered in equal horizontal distribution\n- Each button: minimum 72×72px touch target\n- Tap triggers light haptic (navigator.vibrate(50) where supported) + brief scale animation (0.95 → 1.0, 100ms)\n- Stamp saved with correct currentTimestampMs at moment of tap (not on release)\n- No confirmation step\n- First-use hint labels shown by StampHint (separate component) — StampRow itself has no hint logic","domain":"recording","priority":1,"userGuide":"Tap any of the four icons while recording to mark that moment — 🔥 for something hot, ⭐ to flag a keeper, ❓ for uncertainty, 💡 for an idea. Your marks appear as colored dots on the waveform later.","componentFile":"components/recording/StampRow.tsx"},{"featureKey":"odio-2026-007","title":"Session Management — Sessions, Clips, Naming, Stages","status":"active","problem":"A jam night produces 3-8 clips. Band members need to find, name, and navigate them easily. The recorder needs to delete mistakes. After many sessions, the band needs to track which songs are developed vs. still just ideas.","analysis":"Sessions and clips stored in Postgres. A session auto-creates on first record of the night (date-based name). Each clip is one song — 5-30 min raw. Clips auto-named using a death metal word generator (adjective + noun pairs from curated lists, e.g. 'Putrid Descent', 'Severed Throne') — more memorable and distinguishable than 'Song 1 - 9:41pm'. Any band member can rename a clip via inline tap-to-edit on the clip name. A shuffle button (small icon next to the name) generates a fresh death metal name and saves it immediately — lets the band re-roll if the auto-name doesn't fit. ClipCard shows a colored stage chip in the meta row (idea=gray, sketch=blue, developing=amber, demo-ready=green) only on non-frozen clips — frozen clips communicate final state with the lock icon instead. ClipCard shows processing spinner when transcodeStatus=PENDING. Delete via '···' overflow button (replaces undiscoverable long-press). Session page bottom padding accounts for both tab bar height and device safe area inset.","decisions":[{"decision":"Death metal auto-names instead of 'Song N - time'","rationale":"Sequential names ('Song 1', 'Song 2') are useless for identifying a specific take days later. Time-based names are hard to remember. Short evocative word pairs from a curated death metal vocabulary (adjectives: Putrid, Severed, Ancient; nouns: Descent, Throne, Ritual) are memorable, distinguishable, and set the right tone for a band app.","date":"2026-04-11"},{"decision":"'···' overflow button replaces long-press for clip delete","rationale":"Long-press is a non-discoverable interaction pattern — users have no visual affordance to find it. Accidental long-press on a clip name (when trying to rename) could trigger a delete sheet unexpectedly. A visible '···' button is a universal mobile pattern and makes the delete action findable without instruction.","date":"2026-04-11"},{"decision":"Sessions and clips in Postgres, audio files in Drive","rationale":"Postgres is readable by all band members without Drive folder sharing. Session/clip browsing works immediately for new members.","date":"2026-04-10"},{"decision":"Song stage is separate from frozen status","rationale":"'Frozen' means this recording is done. Stage tracks the song's creative progress, not the file state.","date":"2026-04-10"}],"implementation":"1. app/(auth)/bands/[bandId]/sessions/[sessionId]/page.tsx: server component — loads session + clips via Prisma (includes latest version resultDurationMs for correct display on split children), renders SessionHeaderClient + ClipCard list. Uses pb-[calc(56px+env(safe-area-inset-bottom))] for correct clearance.\n2. components/sessions/SessionHeaderClient.tsx: client component — inline name edit, notes bottom sheet, QR code bottom sheet. Sticky with top offset from --upload-banner-h CSS variable. Delegates to two extracted sub-components: SessionNotesSheet (owns draft+saving state, syncs to notes on open) and SessionQrSheet (renders QRCode in BottomSheet — pure UI, no state).\n3. components/clips/ClipCard.tsx: clip list row — name (tap to edit inline via useClipRename hook from hooks/useClipRename.ts), shuffle button (small icon, generates new death metal name via generateDeathMetalName() from lib/clipNames.ts + direct PATCH /api/clips/{clipId} + router.refresh(); only shown when !clip.frozen), stage chip in meta row (STAGE_CHIP map: {label, className} per ClipStage; only shown when !clip.frozen), duration (latestResultDurationMs ?? sourceDurationMs so split children show correct virtual duration), version count, frozen lock, processing spinner. '···' button opens delete confirmation sheet. Long-press removed (undiscoverable pattern replaced by explicit button).\n   hooks/useClipRename.ts: encapsulates inline rename state (name, editingName, nameInput, saving), PATCH /api/clips/{clipId} call, and keyboard handlers (Enter → confirm, Escape → cancel).\n4. app/api/clips/[clipId]/route.ts: GET clip, PATCH (name, stage, generatePublicToken, removePublicToken), DELETE (RECORDER only).\n5. lib/clipNames.ts: custom death metal adjective + noun word lists + generateDeathMetalName() using unique-names-generator.\n6. lib/utils.ts: generateClipName() delegates to generateDeathMetalName(). formatDuration() for M:SS display. formatPosition() for H:MM:SS clock display. calcResultDuration() for virtual cut preview.","knownLimitations":["Death metal names are random — two clips in a session could get the same name (rare, detectable, user can rename)","Drive storage is under the recorder's account — ~43MB per 30-min clip, 15GB Drive free tier supports ~350 raw clips before cleanup needed","Clip delete requires two steps: Postgres record deletion + Drive file deletion — if one fails, manual reconciliation may be needed"],"tags":["sessions","clips","crud","naming","song-stage","postgres","death-metal-names"],"successCriteria":"- Session auto-created on first record of the night\n- Session name is editable inline by any member\n- Clip auto-named with a memorable death metal name (adjective + noun, e.g. 'Putrid Descent')\n- Any band member can rename a clip by tapping the clip name\n- Shuffle button next to clip name generates a new death metal name and saves immediately (only on non-frozen clips)\n- ClipCard shows animated spinner while transcodeStatus is PENDING\n- Delete clip via '···' button → confirmation sheet → delete (RECORDER only)\n- Clip list shows: name, raw duration, version count, frozen lock, stage chip, processing spinner\n- Stage chip shows on non-frozen clips: colored pill (idea=gray, sketch=blue, developing=amber, demo-ready=green)\n- Session has optional notes field (notes icon → bottom sheet editor)\n- Clip has song stage field: idea / sketch / developing / demo-ready (default: idea)\n- Last clip is never hidden behind the bottom tab bar\n- Storage indicator shows Drive quota used by this band's audio files","domain":"sessions","priority":1,"userGuide":"Sessions appear in the band's session list sorted by date. Tap a session to see its clips. Tap the session name to rename it. Tap the notes icon to add session notes. Tap the QR icon to show a QR code bandmates can scan to join. Each clip card shows its auto-generated name, duration, version count, stage, and current status. Tap the clip name to rename it inline. Tap the shuffle icon next to the name to roll a new death metal name — saves automatically. Tap the stage chip (idea / sketch / developing / demo-ready) to see the song's creative state; change it from the clip detail. Tap anywhere else on the card to open the clip detail. Tap '···' on a clip to delete it (Recorder-only — requires confirmation).","componentFile":"components/clips/ClipCard.tsx"},{"featureKey":"odio-2026-021","title":"BottomSheet — Slide-Up Modal for Confirmations and Input","status":"frozen","problem":"Destructive and important actions (freeze, delete, unfreeze, leave band, stage change) need a deliberate user confirmation step. Inline buttons can be accidentally tapped; a slide-up sheet forces a conscious second action and provides space for consequence copy.","analysis":"Fixed-position overlay with dark backdrop (rgba(0,0,0,0.6)). Sheet panel slides up from the bottom on mount (CSS translateY transition, 200ms ease-out). Content area: white/elevated rounded-t-2xl, safe-area-inset-bottom padding. Dismiss via: backdrop tap, swipe-down gesture, programmatic close, or Cancel button. Trap focus inside sheet when open (accessibility). Scroll lock on body while open. Children are passed as React nodes — sheet is a generic container.","decisions":[{"decision":"All actions that mutate data open a BottomSheet for confirmation","rationale":"Irreversible operations (freeze, delete, cleanup, unfreeze) need a deliberate second step. Bottom sheets allow showing contextual consequences (e.g., 'What gets deleted / What stays') that inline buttons cannot accommodate.","date":"2026-04-10"}],"implementation":"components/ui/BottomSheet.tsx: `open` + `onClose` props. Uses React portal (document.body). CSS transition on transform: translateY(0) ↔ translateY(100%). useEffect adds/removes `overflow:hidden` on document.body. useFocusTrap hook (tab/shift-tab cycle inside sheet). Children slot for arbitrary content.","knownLimitations":["Nested sheets are not supported — opening a sheet from within another sheet will break focus trap","Swipe-down gesture uses touch events only — no mouse drag to dismiss on desktop"],"tags":["bottom-sheet","modal","confirmation","sheet","ui-primitive","accessibility"],"successCriteria":"- Sheet slides up from bottom on open, slides down on close\n- Backdrop tap dismisses sheet\n- Body scroll locked while sheet is open\n- Focus trapped inside sheet (Tab cycles within sheet children)\n- Cancel button always present at bottom of sheet content\n- Swipe-down gesture dismisses\n- z-index above all page content and tab bar","domain":"app-shell","priority":1,"userGuide":"Bottom sheets appear as a slide-up panel when you tap a destructive or important action. Tap outside the sheet or swipe it down to cancel. Tap Cancel inside the sheet to close without taking action.","componentFile":"components/ui/BottomSheet.tsx"},{"featureKey":"odio-2026-022","title":"Button — Shared Interactive Button Component","status":"frozen","problem":"The app needs consistent interactive button styling across all screens with reliable touch targets (≥44px), accessible focus states, loading states, and semantic variants (primary, danger, ghost) that don't need to be reimplemented per screen.","analysis":"Shared Button component with variant system. All buttons: minimum 44px touch target height, font-weight 500, system font, cursor-pointer. Variants: `primary` (amber bg, dark text), `danger` (red bg, white text), `ghost` (transparent bg, text-secondary), `icon` (square, no text). `disabled` and `loading` states built-in (opacity 60%, pointer-events-none when disabled; spinner replaces label when loading). ButtonLink is the same styles applied to a Next.js `<Link>` for navigation actions.","decisions":[{"decision":"ButtonLink uses Next.js Link, not <a href>","rationale":"Using <a href> for in-app navigation triggers full page reload. Next.js Link performs a client-side transition.","date":"2026-04-11"}],"implementation":"components/ui/Button.tsx: `variant`, `disabled`, `loading`, `fullWidth`, `children`, standard button HTML props. components/ui/ButtonLink.tsx: same props + `href`, renders Next.js `<Link>`. Spinner: small white/dark svg rotating animation.","knownLimitations":["Loading spinner color is fixed (white on primary/danger, text-secondary on ghost) — not customizable per call"],"tags":["button","ui-primitive","accessibility","interaction"],"successCriteria":"- All buttons ≥ 44px tall\n- Primary variant: amber bg (#f59e0b), dark text\n- Danger variant: danger red bg, white text\n- Ghost variant: transparent, text-secondary\n- disabled prop: opacity-60, pointer-events-none, aria-disabled\n- loading prop: spinner replaces label, button remains disabled\n- Full-width option via `fullWidth` prop\n- ButtonLink renders a Next.js Link with same styling","domain":"app-shell","priority":1,"userGuide":"Buttons throughout the app use a consistent amber (primary), red (danger), or subtle (ghost) style. All buttons are large enough to tap comfortably on mobile.","componentFile":"components/ui/Button.tsx"},{"featureKey":"odio-2026-006","title":"Recording — Browser-Based Audio Capture","status":"frozen","problem":"The recorder needs to capture multiple songs during a live jam — from a phone browser, one hand, dim room. Between songs the transition to the next recording must be instant. Moments worth keeping must be stampable without interrupting the performance.","analysis":"Browser MediaRecorder API with getUserMedia. Typical clip: 5-30 min raw. Audio buffered in memory during recording (30 min AAC ~43MB — fits easily). On stop: upload to Google Drive via resumable upload (server generates upload session URL, browser uploads directly to Drive, bypassing Vercel 4.5MB body limit). Server then transcodes to AAC via FFmpeg (cross-browser compatibility — Chrome outputs WebM, Safari outputs AAC/MP4). Transcoded file replaces the original in Drive. Clip and v1 version rows created in Postgres. Wake Lock API active during recording (screen-on). Level meter via Web Audio API AnalyserNode. Stamps (fire/keep/uncertain/idea) buffered in memory, written to Postgres with clip on stop. 'Next Song' button appears after stop: saves current clip + immediately opens new recording, upload continues in background.","decisions":[{"decision":"Resumable Drive upload from browser (bypasses Vercel body limit)","rationale":"Vercel serverless functions have a 4.5MB request body limit. A 30-min recording at 192kbps ~43MB. Sending audio through Vercel would fail. Resumable uploads: server generates a Drive upload session URL, browser POSTs audio blob directly to Drive. Audio never passes through Vercel.","date":"2026-04-10"},{"decision":"Transcode to AAC immediately on upload","rationale":"MediaRecorder outputs WebM/Opus on Chrome and AAC/MP4 on Safari. WebM does not play in Safari. Transcoding immediately on upload ensures one consistent format (AAC) for all playback, editing, and final render — regardless of which browser the recorder used.","date":"2026-04-10"},{"decision":"Any Editor-role member can record — not just the band creator","rationale":"The upload flow already uses the creator's stored refresh_token on the server to generate the Drive resumable upload session URL. The member's browser uploads directly to the creator's Drive. This means multi-recorder support is not an architectural change — it's a role-permission change. Any Editor can initiate a recording and audio lands in the same Drive folder. Reduces the single-point-of-failure where only one person can capture audio on jam night.","date":"2026-04-10"},{"decision":"Two notation types: stamps (typed, no text) and annotations (text notes) — both timestamped","rationale":"Stamps are one-tap typed markers — fire/keep/uncertain/idea — zero friction during playing. Annotations are short text notes for when you want to say something specific. Both appear as pins on the waveform. Keeping them separate preserves the zero-friction stamp UX while allowing richer notes when needed. They serve similar purposes at different levels of effort.","date":"2026-04-10"}],"implementation":"1. app/record/page.tsx: full-screen recording screen — timer, level meter, stamp row, Add note link, record/stop button. Tab bar hidden via usePathname().\n2. hooks/useRecorder.ts: core hook managing MediaRecorder lifecycle, Web Audio AnalyserNode for level meter, Wake Lock API, stamps buffer, annotations buffer, device enumeration and selection, IndexedDB write on stop (via savePendingUpload), upload start.\n3. components/recording/DevicePicker.tsx: bottom sheet listing available audio input devices.\n4. app/record/post/page.tsx: post-record screen — clip name (inline edit), duration, stamp count, upload progress bar, Next Song button, Delete recording button.\n5. hooks/useUploadProgress.ts: polls /api/clips/[clipId] every 3s until transcodeStatus is DONE or FAILED.\n6. lib/pendingUploads.ts: IndexedDB helpers for pending upload persistence.\n7. app/api/upload/init/route.ts: generates Drive resumable upload session URL using creator's stored token.\n8. app/api/upload/finalize/route.ts: transcodes uploaded audio with FFmpeg, creates Clip + ClipVersion rows in Postgres.\n9. STAMP_EMOJI and STAMP_COLORS constants in types/index.ts.","knownLimitations":["iOS Safari stops MediaRecorder if the screen locks or the user switches tabs — Wake Lock API (iOS 16.4+) mitigates accidental sleep; tab switching is user responsibility","If the browser tab is closed before the blob is written to IndexedDB (i.e., during the first few seconds after stop), the audio may be lost — mitigated by writing to IndexedDB immediately on stop before any upload attempt (see feat-recording-resilience)","Resumable upload requires two API round-trips before recording is saved — adds ~2-4s to the stop flow","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — members upload directly to the creator's Drive using the server-generated resumable upload session URL (which uses the creator's stored token)"],"tags":["recording","mediarecorder","audio","wake-lock","stamps","ios","google-drive"],"successCriteria":"- Record button triggers microphone permission request on first use\n- Level meter visible and responsive during recording (horizontal amber bar, 8px tall, full-width)\n- Recording screen is full-screen (tab bar hidden); minimal chrome: timer, level meter, stamps, 'Add note', record/stop button only\n- Stamp buttons (fire/keep/uncertain/idea) always visible; one tap stamps current timestamp; haptic feedback on mobile; 72x72px touch targets\n- Quick text note button: 'Add note' text link → 1-line bottom sheet, submit adds annotation\n- Recording screen usable one-handed in portrait orientation\n- Stop → upload begins immediately; 'Next Song' button available without waiting for upload\n- Post-record screen shows: clip name (editable inline), duration, stamp count, upload progress\n- 'Next Song' opens new recording screen; previous clip uploads in background\n- 'Delete recording' option on post-record screen with confirmation sheet: 'Delete this recording? This cannot be undone.'\n- During upload: persistent top banner 'Uploading Song N… 47%' with amber progress bar visible on any screen\n- Banner dismisses only after upload + transcode confirmed complete\n- Wake Lock active during recording (screen stays on)\n- iOS warning shown if Wake Lock is unavailable\n- Clip appears in session as 'Processing…' until transcode done, then becomes fully interactive\n- All clips play back correctly in Chrome and Safari (AAC source)\n- Any Editor-role band member can initiate a recording (not just band creator/recorder)","domain":"recording","priority":1,"userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away.","componentFile":"hooks/useRecorder.ts"},{"featureKey":"odio-2026-014","title":"Render — Server-Side FFmpeg on Freeze + Public Share","status":"frozen","problem":"When a version is frozen, a real audio file must be produced — so the band can download it, share it outside the band, or export it. This cannot happen client-side. The frozen clip should also be shareable publicly without requiring sign-in.","analysis":"Next.js API route POST /api/render: fetch source .aac from Drive (via recorder's stored token), run FFmpeg atrim+concat to apply cutMarks, output final .aac at 192kbps, upload result as {clipId}-final.aac to Drive. Update clips row: frozen=true, frozenVersionId, frozenDriveFileId. Progress communicated via Postgres poll — client polls GET /api/clips/{id} every 3s until frozen=true. For public share: frozen clips get a public Drive permission set ('anyone with link can read') and a short public token stored in Postgres. Public page /share/[token] fetches clip metadata from Postgres and streams audio from the Drive public URL — no sign-in required.","decisions":[{"decision":"Server-side FFmpeg only — no client-side WASM","rationale":"WASM FFmpeg is slow on mobile (~3x slower than native), memory-constrained, and adds bundle size. Server-side runs once per clip lifetime in < 10s on Vercel. Acceptable trade-off.","date":"2026-04-10"},{"decision":"Public share via Drive public permission + Postgres token","rationale":"A frozen clip can be shared outside the band (with a producer, a friend). Setting Drive file permission to 'anyone with link' gives a direct audio URL. Odio stores a short token in Postgres mapping to the clip, so the public URL is /share/[token] (not a raw Drive ID), giving control over revocation.","date":"2026-04-10"}],"implementation":"1. app/api/clips/[clipId]/freeze/route.ts: POST — Editor+ role. Validates versionId. Fetches creator's Drive token from NextAuth accounts table. Downloads source .aac to /tmp. Runs fluent-ffmpeg atrim+aconcat with cutMarks from the version. Uploads output as {clipId}-final.aac to band's Drive folder. Sets clip.frozen=true, clip.frozenVersionId, clip.finalDriveFileId. Returns updated clip.\n2. app/api/clips/[clipId]/unfreeze/route.ts: POST — RECORDER only. Sets clip.frozen=false, clip.frozenVersionId=null. Keeps finalDriveFileId.\n3. app/api/clips/[clipId]/route.ts: PATCH handles generatePublicToken (requires frozen=true — sets publicToken=crypto.randomUUID(), sets Drive public permission) and removePublicToken (clears publicToken, removes Drive public permission).\n4. app/share/[token]/page.tsx: public page — no auth. Fetches clip by publicToken from Postgres. Renders waveform player with Drive public audio URL + clip name + stamps.\n5. FFmpeg atrim+aconcat filter chain: for each non-cut segment, atrim=start=X:end=Y, asetpts=PTS-STARTPTS, then aconcat=n=N. Output: -b:a 192k -f adts (AAC).\n6. lib/drive.ts: downloadToTemp(fileId, token) → /tmp/{fileId}.aac. uploadFromTemp(path, folderId, token) → new driveFileId. setPublicPermission(fileId, token). removePublicPermission(fileId, permissionId, token).","knownLimitations":["Vercel /tmp is ephemeral (512MB limit) — source download (~43MB) + FFmpeg output (~10MB) is within limits for typical clips","Render requires recorder's valid Drive token from Postgres — if token refresh fails (e.g., recorder revoked access), render fails with a clear error and re-auth prompt","@ffmpeg-installer/ffmpeg bundles ~38MB compressed — close to Vercel's function size limit; this is the highest-risk technical component and needs a spike before building","Any band Editor role can trigger freeze, but the render always uses the recorder's Drive token — recorder does not need to be signed in at the moment of freeze"],"tags":["ffmpeg","server-side","freeze","render","next.js-api","public-share"],"successCriteria":"- Freeze triggers render within 2s of user confirmation\n- Rendered file available within 10s for a typical 2-8 min output clip\n- Clip page shows lock icon and download button after successful render\n- Render failure shows clear error with retry option\n- Public share toggle: generates /share/[token] URL, shareable outside the band\n- Public page: waveform player + stamps + clip name + date — no other session data exposed\n- Public listener does not need a Google account\n- Download of rendered file available on clip page (authenticated) and public page","domain":"render","priority":2,"userGuide":"On a clip's detail page, tap 'Freeze' on any version to produce the final audio file. The page shows 'Rendering…' for a few seconds, then displays a lock icon and download button. To share publicly: tap the Share icon on a frozen clip and copy the /share/[token] link. Anyone with the link can listen without signing in. To revoke public access, tap Share again and toggle it off.","componentFile":"app/api/clips/[clipId]/freeze/route.ts"},{"featureKey":"odio-2026-012","title":"Versioning — Version Chain, Waveform Editor, Waveform Player, Freeze","status":"active","problem":"A raw recording needs to evolve from v1 (messy, includes setup and dead air) to vFinal (clean, trimmed) through collaborative edits — with full history and a clear end state (freeze). The band needs to listen to any version, compare versions, and hear exactly what a cut sounds like before committing.","analysis":"Two dedicated components with separate concerns:\n\n**WaveformPlayer** (clip detail page) — pure playback. Receives activeCuts from parent (ClipDetailClient). Visualises cuts as blue non-draggable regions (pointerEvents: none on regions so they don't block click-to-seek). Skip-cuts during playback via timeupdate handler. H:MM:SS clock + virtual duration display. Stamp chips are tappable — each seeks to that timestamp. Big 64px play button. finish event resets cursor to start (ws.setTime(0)) so the amber cursor doesn't pin at the right edge after playback ends.\n\n**WaveformEditor** (edit page, always edit mode) — cut creation only. Custom pointer overlay (absolute inset-0, touch-none, z-20 insi
