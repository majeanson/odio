e: string, onSave: (newValue: string) => Promise<void>, maxLength?: number, className?: string }. Internal state: editing (bool) + draft (string). On tap → setEditing(true), autofocus input. On submit/blur: if draft !== value && draft.trim() !== '' → call onSave → setEditing(false) on success. Input styled to match the parent text class via `className` prop passthrough.","knownLimitations":["No multi-line support — clip names limited to single line","On iOS, tapping away on certain screen areas may not reliably fire blur — user must tap Return to save"],"tags":["inline-edit","rename","input","ui-primitive","accessibility"],"successCriteria":"- Tap name text → input appears with same styling, keyboard opens\n- Return/Done → calls onSave(value), transitions back to text mode\n- Tap away (blur) → discards, reverts to original value\n- Escape → discards, reverts to original value\n- Empty string not saveable — reverts to previous on submit\n- maxLength enforced (no characters beyond limit accepted)\n- Loading state while onSave is in-flight (input disabled, subtle spinner)\n- Error state if onSave throws (brief inline error text, reverts to text mode after 2s)","domain":"app-shell","priority":2,"userGuide":"Tap any session name, clip name, or band name to rename it directly. Type the new name and press Done or Return to save. Tap anywhere else to cancel without saving.","componentFile":"components/ui/InlineEdit.tsx"},{"featureKey":"odio-2026-009","title":"Recording Resilience — IndexedDB Safety Net, Upload Retry, Save-to-Device Fallback","status":"frozen","problem":"A recording is a one-time, irreplaceable event. Currently, if the internet drops during upload or the band creator's Drive token is invalid, the audio blob — which only exists in memory — is permanently lost when the user navigates away or the tab closes. A live jam session cannot be re-played. The recording must survive any upload failure and remain recoverable until it reaches Drive.","analysis":"The audio blob lives in RAM from record-start until upload completes. If anything breaks during the upload window — network drop, Drive token expiry, browser crash, tab close — the blob is gone. This is the highest-risk data loss scenario in the app.\n\nThe fix is a two-layer safety net:\n\nLayer 1 — IndexedDB persistence (immediate): The moment recording stops and the blob is assembled, write it to IndexedDB before starting the upload. IndexedDB stores binary blobs up to the device's available storage (typically several GB on modern phones), survives page refresh and browser restarts, and is cleared only explicitly. Key: odio-pending-upload-{tempId}. Also store: tempId, recordedAt, durationMs, bandId, sessionId, blob.\n\nLayer 2 — Resumable upload retry: Google Drive resumable uploads natively support resume from a byte offset. If the upload is interrupted mid-transfer, the server stores the upload session URL in the pending record. On retry, the client queries Drive for the current byte offset and resumes from there — no re-upload of already-transferred bytes.","decisions":[{"decision":"IndexedDB as the primary persistence layer for unuploaded audio blobs","rationale":"localStorage cannot store binary blobs. The File System Access API requires explicit user permission. IndexedDB is the only browser-native store that (a) handles large binary data, (b) persists across sessions without user action, and (c) is available in all browsers including iOS Safari 10.3+. A 43MB blob fits easily — IndexedDB storage limits are typically 50-80% of available disk space.","date":"2026-04-10"},{"decision":"Resumable upload — save session URL to IndexedDB for byte-accurate retry","rationale":"A naive retry re-uploads the entire blob from byte 0. For a 43MB file on a slow mobile connection, this could fail again at the same spot. Google Drive resumable uploads let you query the committed offset and resume from there. Storing the uploadSessionUrl in IndexedDB alongside the blob enables true resume, not restart.","date":"2026-04-10"},{"decision":"'Save to device' as the last-resort fallback — never lose the audio","rationale":"If Drive is permanently unavailable (creator deleted their account, Drive quota exceeded, token irrecoverable), the band should still get their recording. A browser download gives them the raw file. They lose the Odio versioning workflow but not the audio. The guarantee is: if you recorded it, you can get the file.","date":"2026-04-10"},{"decision":"Check IndexedDB for pending recordings on every app mount","rationale":"Background Sync is not reliable on iOS Safari. The safest recovery path is: when the app is opened, check for stranded blobs and surface them immediately. This catches the crash-during-upload, tab-closed-early, and came-back-later scenarios without relying on service worker scheduling.","date":"2026-04-10"}],"implementation":"1. lib/pendingUploads.ts: IndexedDB helpers using idb library. Database 'odio-recordings', object store 'pending-uploads'. Functions: savePendingUpload(upload), getPendingUploads(), deletePendingUpload(tempId), updatePendingUpload(tempId, patch).\n2. hooks/useRecorder.ts: calls savePendingUpload immediately on MediaRecorder onstop before any network request.\n3. hooks/usePendingUploads.ts: checks IndexedDB on mount, drives retry logic, manages upload state machine (idle/uploading/paused/error), listens to window 'online' event for auto-retry.\n4. components/recording/PendingUploadsBanner.tsx: recovery banner shown when usePendingUploads reports pending items. Shows count, retry button, save-to-device button, discard button with confirmation.\n5. app/(auth)/layout.tsx: renders PendingUploadsBanner at top of all authenticated pages.\n6. lib/uploadAudio.ts: manages the Drive resumable upload from browser — tracks byte offset, handles chunking, updates IndexedDB with uploadSessionUrl on each successful chunk.\n7. 'Save to device': URL.createObjectURL(blob) + programmatic anchor download. Extension .aac or .webm based on mimeType.","knownLimitations":["IndexedDB is cleared when the user clears browser storage ('Clear site data') — the blob would be lost; this is unavoidable without server-side buffering and is an edge case the user controls","Background Sync (automatic retry when tab is closed and connection restored) is not available on iOS Safari — recovery on iOS requires opening the app manually","Drive resumable upload session URLs expire after 7 days — a blob stranded for > 7 days will need a fresh upload session, not a resume; the implementation must detect this (404 on session URL) and fall back to a new session","Storage pressure on low-end devices: a 43MB blob may trigger the browser's storage eviction policy on devices with < 1GB free — 'Save to device' should be surfaced proactively for large recordings","PostRecordScreen.doUpload() is a standalone async function that writes to IndexedDB directly without going through the Zustand store's action methods — fixed by calling usePendingUploadsStore.getState().refresh() on every status-changing path so the in-memory store stays in sync with IndexedDB and the banner dismisses immediately"],"tags":["recording","indexeddb","resilience","offline","retry","upload","fallback"],"successCriteria":"- Audio blob written to IndexedDB immediately on recording stop, before upload begins\n- IndexedDB entry keyed by tempId; stores blob + recordedAt + durationMs + bandId + sessionId + uploadSessionUrl (if partially started)\n- If upload succeeds: IndexedDB entry cleared; no other change\n- If network drops during upload: banner shows 'Upload paused — waiting for connection'; auto-retries on window 'online' event; resumable upload continues from last committed byte\n- If creator's Drive token is invalid: banner shows 'Drive connection needs renewal — ask [creator name] to re-authorize'; IndexedDB blob retained; retry button enabled once token is refreshed\n- If recording member's own session token expires mid-upload: client silently calls getSession() to refresh; if refresh succeeds, upload resumes automatically; if refresh fails, banner shows 'Session expired — sign in again to resume'; after re-sign-in, IndexedDB blob is still present and recovery banner activates\n- On app reopen: check IndexedDB for pending recordings on mount; if found, show recovery banner: 'You have [N] recording(s) waiting to upload'\n- Recovery banner persists until all pending recordings are uploaded or manually discarded\n- 'Save to device' fallback button available on any failed upload: triggers browser download of blob (.webm or .aac depending on browser)\n- User can discard a pending recording from the recovery UI (with confirmation: 'Discard this recording? It cannot be recovered.')\n- 'Pending uploads' count visible in the Record tab (badge) and on the session screen\n- Successful retry creates the clip in Postgres and Drive exactly as a normal upload would","domain":"recording","priority":2,"userGuide":"Recording resilience is automatic and invisible when things work. If an upload fails (network drops, Drive token expires), a banner appears at the top of the screen: 'You have [N] recording(s) waiting to upload'. Tap 'Retry' to resume when reconnected. Tap 'Save to device' to download the raw audio file to your phone or computer if Drive is permanently unavailable. Tap 'Discard' (with confirmation) to remove a pending recording from recovery. When the app reopens after a crash, pending recordings are detected automatically.","componentFile":"hooks/usePendingUploads.ts"},{"featureKey":"odio-2026-017","title":"Storage Management — Drive Quota, Cleanup, Archive","status":"frozen","problem":"Audio files in Google Drive grow over time (~43MB per raw clip, ~10MB per frozen render). The recorder's free Drive tier (15GB) supports roughly 350 raw clips before action is needed. The app must surface this, and provide a clean way to free space after songs are finalized.","analysis":"Storage indicator shown in band settings and session list: total Drive storage used by Odio files for this band (queried via Drive API quotas endpoint). Post-freeze cleanup: once a clip is frozen and the band is satisfied, the source .aac (raw recording) can be deleted from Drive — the frozen render and Postgres metadata remain. Archive: delete all versions of a clip from Postgres + Drive (both source and render). Bulk cleanup: session-level 'Archive all frozen clips' removes source audio for all frozen clips in a session at once.","decisions":[{"decision":"Cleanup is explicit and manual — no automatic deletion","rationale":"Automatic deletion after freeze could destroy recordings the band wanted to keep. Storage cleanup is a deliberate action. The app nudges (shows quota, shows how much can be freed) but never deletes automatically.","date":"2026-04-10"}],"implementation":"1. app/api/bands/[bandId]/storage/route.ts: GET — fetches Drive API about endpoint using creator's token (returns storageQuota.usage). Also queries Postgres for all driveFileId + finalDriveFileId for this band's clips. Returns { usedBytes, limitBytes, fileCount }. Cached in memory for 5 minutes.\n2. app/api/clips/[clipId]/cleanup/route.ts: POST — deletes clip.driveFileId from Drive (source .aac). Sets clip.driveFileId=null. Requires clip.frozen=true.\n3. app/api/clips/[clipId]/route.ts DELETE: RECORDER only. Deletes clip from Postgres (cascades to versions, votes, comments). Deletes both driveFileId and finalDriveFileId from Drive via lib/drive.ts deleteFile.\n4. components/bands/BandSettingsClient.tsx: fetches /api/bands/[bandId]/storage on mount. Renders storage bar (used / total). Lists members with role management. formatBytes helper: converts bytes to human-readable MB/GB string.\n5. components/clips/ClipActionsClient.tsx: shows 'Clean up source audio' button when clip.frozen=true and clip.driveFileId is not null. Shows 'Delete clip' button (RECORDER only). Confirmation bottom sheets for both.","knownLimitations":["Drive API quota query may not reflect real-time usage — cache with 5-minute TTL","After cleanup, v1 source audio is gone — if the frozen render was also deleted and the band wants to re-edit, they would need to re-record","Drive storage is the recorder's personal quota — shared with all their other Drive content"],"tags":["storage","google-drive","cleanup","archive","quota"],"successCriteria":"- Band settings shows Drive storage used by Odio files (MB / GB)\n- Post-freeze: 'Clean up source audio' button removes raw .aac from Drive, keeps frozen render\n- Confirmation dialog shows exactly what will be deleted and what will remain\n- Archive clip: removes Postgres records + Drive files; cannot be undone\n- Bulk cleanup: 'Clean up all frozen clips in session' removes source audio for all frozen clips at once\n- Storage indicator updates after cleanup\n- Cleaned-up clips remain playable via their frozen render file","domain":"storage","priority":3,"userGuide":"In the Band tab, tap Settings to see Drive storage usage. The bar shows how many MB/GB of Drive are used by this band's recordings. After a clip is frozen and the band is happy with it, tap 'Clean up source audio' on the clip detail page to delete the raw recording from Drive — the final rendered file is kept and the clip remains fully playable. Tap 'Delete clip' (Recorder only) to permanently remove a clip and all its files from Drive.","componentFile":"app/api/bands/[bandId]/storage/route.ts"},{"featureKey":"odio-2026-016","title":"Collaboration — Votes, Comments, Stamp Heat Map, Activity","status":"frozen","problem":"After editing, the band needs a lightweight way to converge on which version is final — without a group chat thread full of voice notes and confusion. Voting, timestamped comments, and stamp heat maps give structure without overhead.","analysis":"All collaboration data stored in Postgres (votes, comments). Polling (5-10s when clip page is open) surfaces new activity. Per clip: one vote per member per version (Keep / Revise / Pass), changeable. Vote tally visible to all. Comments: general or timestamped (shown as pins on waveform). Waveform also shows stamps (fire/keep/uncertain/idea, created during recording) and annotations (text notes, created during recording or in editor) — both as pins. Stamp heat map: multiple stamps near the same timestamp aggregate into a denser marker. Version list has an inline mini-player: play/pause directly from the version card. Activity feed per clip. In-app notification dot when all members have voted Keep on the same version. UX priority: during active versioning, version list is the primary view and comments are secondary (collapsed behind a tab). After a clip is frozen, comments/activity becomes the primary view — the collaborative discussion is most valuable once the cut is finalized. Comment authors can edit or delete their own comments.","decisions":[{"decision":"Votes scoped to version, not clip","rationale":"Voting on a clip as a whole ('is this song good?') is separate from voting on a specific edit ('is this cut right?'). Scoping votes to a version makes it clear what the band is approving — the specific cut. A member can vote Keep on v2 and Revise on v3 if they think v3 overcorrected.","date":"2026-04-10"},{"decision":"No suggest-a-cut feature — comments are text only","rationale":"Suggest-a-cut adds a structured comment type with startMs/endMs that renders as a shaded waveform region with an 'Apply' button. The complexity (schema columns, waveform rendering, editor integration) is not justified for V1. Bandmates who want to suggest a cut can just create a new version themselves — that's what the versioning system is for.","date":"2026-04-10"}],"implementation":"1. app/api/clips/[clipId]/votes/route.ts: POST upserts a vote (clipId, userEmail unique). PATCH changes vote value. GET returns all votes for clip.\n2. app/api/clips/[clipId]/comments/route.ts: POST creates a comment (text, optional timestampMs). GET returns comments ordered by createdAt.\n3. app/api/clips/[clipId]/comments/[commentId]/route.ts: PATCH edits own comment (checks authorEmail === currentUser). DELETE removes own comment.\n4. components/clips/CollaborationSection.tsx: client component. Tabs: Versions (default when not frozen) / Comments (default when frozen). VoteBar sub-component shows Keep/Revise/Pass buttons and tally. CommentThread sub-component lists comments with edit/delete for own. Polls GET /api/clips/[clipId]/votes and /comments every 8s while page is open.\n5. usePolling hook: generic hook — takes async fetch fn + intervalMs, calls fn on mount and on interval.\n6. Prisma schema Vote: {clipId, versionId, userEmail, value (KEEP/REVISE/PASS), updatedAt}. Unique on (clipId, userEmail). Schema Comment: {id, clipId, versionId?, userEmail, text, timestampMs?, createdAt, updatedAt, editedAt?}.\n7. All-voted-Keep notification: CollaborationSection checks if all band members have a KEEP vote pointing to the same versionId. If true, shows a 'All members voted Keep on v[N]' banner with 'Freeze this version' button.","knownLimitations":["No push notifications — members need to open the app to see new votes/comments","Polling at 5-10s means activity is not instant — acceptable for post-jam async workflow","Stamp heat map is derived from recording-time stamps only (not from member actions during review)"],"tags":["votes","comments","stamps","heat-map","activity","polling","postgres"],"successCriteria":"- Vote (Keep/Revise/Pass) per member per version; tally visible to all; changeable\n- Votes and vote tally update within 5-10s via polling\n- Timestamped comments show as pins on waveform during playback\n- Stamp heat map overlay visible on waveform — denser where more stamps exist\n- Version list: inline mini-player on each version card\n- Activity feed: version creates + votes + comments in order\n- Notification dot on clip when all members have voted Keep on same version\n- Private annotation toggle: any annotation can be marked private (visible only to author)\n- Comment author can edit their comment (shows 'edited' label after edit)\n- Comment author can delete their comment (confirmation required; removes from feed)\n- Clip detail layout: during active versioning, version list is default open tab; after freeze, comments/activity is default open tab","domain":"collaboration","priority":3,"userGuide":"On a clip's detail page, the Versions tab shows all edits; the Comments tab shows the discussion. Vote on any version by tapping Keep, Revise, or Pass — the tally updates for all band members within seconds. Leave a comment in the text field (optionally tap the waveform first to attach a timestamp). When everyone has voted Keep on the same version, a banner appears prompting the Recorder or an Editor to freeze it. Comments can be edited or deleted by their author (long-press or tap the '...' menu).","componentFile":"components/clips/CollaborationSection.tsx"},{"featureKey":"odio-2026-035","title":"StageSelector — Clip Development Stage Picker","status":"active","problem":"A band tracks each clip's creative stage (idea / sketch / developing / demo-ready) to know which songs are close to done vs. just started. This needs to be changeable from both the clip list (quick update inline) and the clip detail page without navigating.","analysis":"StageSelector renders the current stage as a tappable badge/chip. On tap → opens a BottomSheet with four stage options (idea, sketch, developing, demo-ready), current stage highlighted in amber. Tapping a stage saves via PATCH /api/sessions/[sessionId]/clips/[clipId] and dismisses the sheet.\n\nAvailable to Recorder and Editor roles. Member role sees a static badge (same visual, no tap response).\n\nUsed in: ClipCard (compact chip), ClipDetailClient (in Team tab or actions section).","decisions":[{"decision":"Stage change happens in a bottom sheet, not an inline dropdown","rationale":"An inline dropdown (select element) on a dark mobile UI is hard to style consistently across browsers. A BottomSheet provides native-feeling interaction with full control over appearance, matching the app's bottom-sheet-for-all-choices pattern.","date":"2026-04-15"}],"implementation":"components/clips/StageSelector.tsx: props { clipId, sessionId, currentStage, canEdit, onStageChange? }. Internal state: sheetOpen. Renders badge-button if canEdit; static Badge if not. BottomSheet contains 4 option rows. On select: call PATCH API → update state → onStageChange callback for parent to refresh.","knownLimitations":["Stage change is not versioned — no history of stage transitions stored"],"tags":["stage","clip-detail","clip-list","picker","bottom-sheet","metadata"],"successCriteria":"- Stage badge tappable by Recorder/Editor, static for Member\n- Tap → BottomSheet with 4 options, current highlighted in amber\n- Select → optimistic update + PATCH to Postgres + sheet dismiss\n- Stage chip colors: idea (muted), sketch (blue-dim), developing (amber-dim), demo-ready (green-dim)\n- Accessible: aria-label 'Change stage' on button, aria-checked on active option","domain":"versioning","priority":3,"userGuide":"Tap the stage chip (Idea, Sketch, Developing, Demo-Ready) on any clip to update where the song is in the creative process. Changes are visible to all band members immediately.","componentFile":"components/clips/StageSelector.tsx"},{"featureKey":"odio-2026-053","title":"SessionNotesSheet — Session-Level Notes Editor","status":"active","problem":"A band may want to capture session-level context — 'rehearsal at Marco's place, trying the new bridge section' — that doesn't belong on any individual clip. Session notes give the band a shared scratchpad for each jam night.","analysis":"SessionNotesSheet is a BottomSheet that opens from a 'Notes' action on the session list card (or session header). Contains a multi-line textarea (no character limit shown, but reasonable max ~1000ch enforced on input). Save: PATCH /api/sessions/[sessionId] { notes: text }. Cancel: dismisses without saving. Notes are displayed as a 1-line preview on the Session List card (truncated).","decisions":[],"implementation":"components/sessions/SessionNotesSheet.tsx: props { open, onClose, sessionId, initialNotes }. Internal state: notes (string), saving (bool). Textarea with defaultValue=initialNotes. Save: PATCH → onClose(). Cancel: onClose() directly. No character counter (notes are low-frequency).","knownLimitations":["Notes field is not collaborative — last save wins (no conflict resolution for simultaneous edits)"],"tags":["session","notes","bottom-sheet","metadata","text-input"],"successCriteria":"- BottomSheet opens with current session notes pre-filled in textarea\n- Multi-line textarea, vertical resize, min-height 4 lines\n- Save: PATCH to Postgres, sheet dismisses, session card preview updates\n- Cancel: discards changes, sheet dismisses\n- Empty notes: allowed (blanks the notes field)\n- Loading state on Save button while PATCH in-flight","domain":"sessions","priority":3,"userGuide":"Tap the notes icon on a session to add shared notes for the whole band — 'great energy on song 3', 'fix the chorus next time'. Notes are visible to everyone in the band.","componentFile":"components/sessions/SessionNotesSheet.tsx"},{"featureKey":"odio-2026-015","title":"Public Share Player — Unauthenticated Clip Playback","status":"active","problem":"A frozen clip should be shareable outside the band — with a producer, a friend, or social media. The listener should not need a Google account or any signup. Only the frozen render is exposed; no session metadata, band data, or version history leaks through the public page.","analysis":"The public share page (/share/[token]) fetches clip metadata by publicToken from Postgres. Audio is served via /api/audio/public/[token] — a separate proxy route that looks up the clip by token and streams the finalDriveFileId from Drive using the recorder's stored token. No user auth is required on either the page or the audio route.\n\nPublicPlayer.tsx uses WaveSurfer.js (interact: false) to render the waveform and play the frozen audio. Stamp chips are rendered via StampJumpRow — tappable buttons that seek to their timestamp on tap, consistent with WaveformPlayer and WaveformEditor. WaveformPlayButton renders the shared amber play/pause button. A download button triggers the /api/audio/public/[token] route with a download intent, giving the user the .aac file.\n\nThe public page shows: clip name, band name (optional), clip duration, waveform player with stamps, play/pause, download. No version list, no vote buttons, no comments, no edit actions — nothing that reveals internal band structure.","decisions":[{"decision":"Audio served via server-side proxy even on public pages","rationale":"Even with Drive public permission enabled on the final file, the Drive URL format includes the file ID which reveals internal structure. Proxying via /api/audio/public/[token] keeps the only public identifier as the opaque token, allows revocation (clear token → proxy returns 404), and avoids exposing file IDs in the page source.","date":"2026-04-10"},{"decision":"No version history, no collaboration data on the public page","rationale":"The public page is for external listeners — producers, fans, collaborators outside the band. Exposing version numbers, vote tallies, or comments reveals internal band workflow details. The public page is intentionally minimal: name, waveform, stamps, download.","date":"2026-04-10"}],"implementation":"1. components/share/PublicPlayer.tsx: client component. Props: token, sourceDurationMs, stamps[]. Uses useWaveSurfer({ url: /api/audio/public/{token}, interact: false — no cutMarksRef, no patchDurationUrl, public read-only }). Uses WaveformPlayButton for play/pause. Uses StampJumpRow for stamp chips (tappable, seek on tap) with custom className for layout. No WaveformCanvas overlay — no editing or seeking via waveform drag needed (play-only).\n2. app/share/[token]/page.tsx: server component. Fetches clip by publicToken from Postgres (clips table). If not found or clip.frozen=false: returns 404 page. Renders clip name, duration, PublicPlayer with stamps.\n3. app/api/audio/public/[token]/route.ts: streams audio from Drive. Looks up clip by publicToken, gets finalDriveFileId, fetches recorder's token from NextAuth accounts table, proxies Drive stream with Range header support. No auth middleware — open to public traffic.","knownLimitations":["Public audio proxy uses the recorder's Drive token — if the recorder revokes access, public links break even for frozen clips","No view analytics — there's no way to know how many people have listened to a shared clip","PublicPlayer renders the waveform but the overlay div is not present — users cannot seek by clicking on the waveform (play/pause only). Seeking via stamps is available."],"tags":["public-share","wavesurfer","unauthenticated","frozen","stamps","download"],"successCriteria":"- /share/[token] loads without authentication\n- Waveform renders and plays the frozen render audio\n- Stamp chips displayed with correct emoji and timestamp\n- Play/pause 64px button — large touch target\n- Download button downloads the .aac file\n- Page shows clip name and duration\n- Error state shown if token is invalid or clip has been un-shared\n- Audio not exposed if publicToken is null or clip is not frozen","domain":"render","priority":3,"userGuide":"After freezing a clip, tap 'Enable public share' on the clip detail page to generate a /share/[token] link. Share this URL with anyone — they can open it in any browser without signing in. They'll see the clip name, a waveform player, and stamp markers. They can play, seek, and download the audio. To revoke access, tap 'Enable public share' again to disable — the link immediately stops working.","componentFile":"components/share/PublicPlayer.tsx"},{"featureKey":"odio-2026-025","title":"Badge — Count and Status Label Pill","status":"frozen","problem":"Clip cards need to display version count, frozen status, and activity state as compact labels without consuming layout space. A shared badge component prevents inconsistent pill styling across the app.","analysis":"Small pill component: rounded-full, text-xs, px-2 py-0.5, font-medium. Variants: `default` (bg-elevated, text-secondary), `amber` (amber-tinted bg, amber text), `success` (green-tinted), `danger` (red-tinted). Used for: version count ('v3'), frozen status (🔒 Frozen), processing status, stage chips on clip cards.","decisions":[{"decision":"Badge is purely presentational — no click handling","rationale":"Interactive badges (e.g., stage chip that opens a picker) are handled by the caller wrapping Badge in a <button>. Badge itself never manages interaction state.","date":"2026-04-15"}],"implementation":"components/ui/Badge.tsx: props { variant?: 'default'|'amber'|'success'|'danger', children }. Pure presentational — no state.","knownLimitations":[],"tags":["badge","pill","label","ui-primitive"],"successCriteria":"- Renders as a rounded pill at text-xs\n- All four variants render with correct color scheme\n- Does not break layout when text is long (clips at max-w)","domain":"app-shell","priority":3,"userGuide":"Small labels on clip cards show version count, frozen status, and processing state.","componentFile":"components/ui/Badge.tsx"},{"featureKey":"odio-2026-026","title":"Skeleton — Loading Placeholder Shimmer","status":"frozen","problem":"Pages that fetch data from Postgres (session list, clip list, waveform) need to show a loading state that communicates structure before content arrives. A blank screen or spinner gives no sense of what's coming.","analysis":"Skeleton is a div with animate-pulse and bg-surface. Callers control width, height, and border-radius. Used for: session card skeletons, clip card skeletons, waveform loading shimmer (full-width), member row skeletons, storage indicator skeleton.","decisions":[],"implementation":"components/ui/Skeleton.tsx: `className` prop + optional `width`/`height`. Renders `<div className={cn('animate-pulse bg-surface rounded', className)} style={{ width, height }} />`.","knownLimitations":["Caller is responsible for matching Skeleton dimensions to actual content — no auto-sizing"],"tags":["skeleton","loading","shimmer","ui-primitive","performance"],"successCriteria":"- Renders as a grey animated shimmer div\n- animate-pulse (Tailwind) runs on mount\n- Accepts width/height/className props for flexible sizing\n- Does not shift layout when swapped for real content (caller must match dimensions)","domain":"app-shell","priority":3,"userGuide":"Grey shimmer placeholders appear while content is loading.","componentFile":"components/ui/Skeleton.tsx"},{"featureKey":"odio-2026-018","title":"Audio Input Selection — External Mic, USB Interface, Headset","status":"frozen","problem":"The recording always uses the device's default microphone. Bands that record with an external condenser mic, USB audio interface, or headset mic plugged in cannot select it — the app always captures from the built-in mic. This limits recording quality for bands that bring audio gear.","analysis":"MediaDevices.enumerateDevices() returns all available audio input devices. A device picker shown before recording starts (or in band settings) lets the user select their preferred input. The selected deviceId is passed to getUserMedia({ audio: { deviceId: { exact: selectedId } } }).\n\nV1 behavior (current): always uses the browser's default audio input. This is correct for most users (phone built-in mic) and has no UX overhead.\n\nThis feature adds a device picker — shown only when more than one audio input is available. If the device has only one input, nothing changes. The selected input is remembered in localStorage per device.\n\nNote: USB audio interfaces appear as separate audio input devices in most browsers. iOS Safari may not enumerate all Bluetooth audio inputs consistently — this is a known iOS // ── Helpers ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function md(text) {
  if (!text) return '';
  const lines = esc(text).split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.match(/^[-*] /)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + inline(t.slice(2)) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n').split(/\n{2,}/).map(block => {
    const b = block.trim();
    if (!b) return '';
    if (b.startsWith('<ul>') || b.startsWith('<li>')) return b;
    return '<p>' + inline(b.replace(/\n/g, '<br>')) + '</p>';
  }).filter(Boolean).join('\n');
}

function inline(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

function completeness(f) {
  const checks = [
    !!f.analysis, !!f.implementation,
    !!(f.decisions && f.decisions.length),
    !!f.successCriteria,
    !!(f.knownLimitations && f.knownLimitations.length),
    !!(f.tags && f.tags.length),
    !!f.domain,
  ];
  return Math.round(checks.filter(Boolean).length / checks.length * 100);
}

function statusColor(s) {
  return { active: '#4aad72', draft: '#c4a255', frozen: '#5b82cc', deprecated: '#cc5b5b' }[s] || '#c4a255';
}

// ── Tree building ────────────────────────────────────────────────────────────

const VIEW = 'onboarding';
const byKey = new Map(FEATURES.map(f => [f.featureKey, f]));

function getChildren(key) {
  return FEATURES.filter(f => f.lineage && f.lineage.parent === key);
}

function isRoot(f) {
  const p = f.lineage && f.lineage.parent;
  return !p || !byKey.has(p);
}

/** Flatten feature + its descendants with depth info */
function flatten(f, depth) {
  const result = [{ feature: f, depth }];
  for (const child of getChildren(f.featureKey)) {
    result.push(...flatten(child, depth + 1));
  }
  return result;
}

// Group root features by domain
function buildGroups(features) {
  const roots = features.filter(isRoot);
  const groups = new Map();

  for (const f of roots) {
    const domain = f.domain || '(no domain)';
    if (!groups.has(domain)) groups.set(domain, []);
    groups.get(domain).push(...flatten(f, 0));
  }
  return groups;
}

// ── Nav rendering ────────────────────────────────────────────────────────────

let activeKey = null;
let sortMode = 'domain';
const collapsedDomains = new Set();

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sort-domain').classList.toggle('active', mode === 'domain');
  document.getElementById('sort-build').classList.toggle('active', mode === 'build-order');
  renderNav(document.getElementById('filter-input').value);
}

function renderNavItem(f, depth) {
  const isChild = depth > 0;
  const hasChildren = getChildren(f.featureKey).length > 0;
  return `<div class="nav-item${f.featureKey === activeKey ? ' active' : ''}"
    data-key="${esc(f.featureKey)}"
    data-status="${esc(f.status)}"
    data-depth="${depth}"
    onclick="navigate('${esc(f.featureKey)}')">
    ${isChild ? '<span class="nav-child-arrow">↳</span>' : '<span class="nav-dot"></span>'}
    ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
    <span class="nav-item-title">${esc(f.title)}</span>
    ${hasChildren ? '<span class="nav-child-arrow" style="margin-left:auto;opacity:0.4">⊕</span>' : ''}
  </div>`;
}

function renderNav(filterText) {
  const nav = document.getElementById('nav-tree');
  const q = (filterText || '').toLowerCase().trim();

  const matchFn = f =>
    f.featureKey.toLowerCase().includes(q) ||
    f.title.toLowerCase().includes(q) ||
    (f.domain && f.domain.toLowerCase().includes(q)) ||
    (f.tags && f.tags.some(t => t.toLowerCase().includes(q)));

  const features = q ? FEATURES.filter(matchFn) : FEATURES;

  if (features.length === 0) {
    nav.innerHTML = '<div class="no-results">No features match</div>';
    return;
  }

  // ── Build Order: flat list sorted by featureKey ───────────────────────────
  if (sortMode === 'build-order' && !q) {
    const sorted = [...FEATURES].sort((a, b) => a.featureKey.localeCompare(b.featureKey));
    nav.innerHTML = sorted.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Search results: flat list ─────────────────────────────────────────────
  if (q) {
    nav.innerHTML = features.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Domain grouping (default) ─────────────────────────────────────────────
  const groups = buildGroups(FEATURES);
  const sortedDomains = [...groups.keys()].sort((a, b) => {
    if (a === '(no domain)') return 1;
    if (b === '(no domain)') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  for (const domain of sortedDomains) {
    const items = groups.get(domain);
    if (!items || items.length === 0) continue;

    const isCollapsed = collapsedDomains.has(domain);

    html += `<div class="nav-group${isCollapsed ? ' collapsed' : ''}" data-domain="${esc(domain)}">
  <div class="nav-domain${isCollapsed ? ' collapsed' : ''}" onclick="toggleDomain(this)">
    <span class="nav-domain-arrow">▾</span>
    <span>${esc(domain)}</span>
    <span class="nav-domain-count">${items.length}</span>
  </div>
  <div class="nav-group-items">`;

    for (const { feature: f, depth } of items) {
      html += renderNavItem(f, depth);
    }

    html += '</div></div>';
  }

  nav.innerHTML = html;
}

function toggleDomain(el) {
  const group = el.closest('.nav-group');
  const domain = group.dataset.domain;
  if (collapsedDomains.has(domain)) {
    collapsedDomains.delete(domain);
    group.classList.remove('collapsed');
    el.classList.remove('collapsed');
  } else {
    collapsedDomains.add(domain);
    group.classList.add('collapsed');
    el.classList.add('collapsed');
  }
}

// ── Content rendering ────────────────────────────────────────────────────────

function renderHome() {
  const content = document.getElementById('content');
  const total = FEATURES.length;

  if (VIEW === 'user') {
    content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">User Guide</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki','').replace(/ · [^·]+ view$/,'').trim())}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'}</div>
  <div class="home-section-title">Features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;padding:10px 14px;">
      <span class="nav-dot"></span>
      <span class="nav-item-title" style="font-size:13px;">${esc(f.title)}</span>
    </div>`).join('')}
  </div>
</div>`;
    return;
  }

  const frozen = FEATURES.filter(f => f.status === 'frozen').length;
  const active = FEATURES.filter(f => f.status === 'active').length;
  const draft  = FEATURES.filter(f => f.status === 'draft').length;
  const depr   = FEATURES.filter(f => f.status === 'deprecated').length;

  const domains = [...new Set(FEATURES.map(f => f.domain).filter(Boolean))].sort();

  const avgCompleteness = FEATURES.length
    ? Math.round(FEATURES.reduce((s, f) => s + completeness(f), 0) / FEATURES.length)
    : 0;

  content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">◈ life-as-code wiki</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki', ''))}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'} · avg ${avgCompleteness}% complete</div>

  <div class="stat-row">
    ${active ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#4aad72"></span><span class="stat-pill-num">${active}</span><span class="stat-pill-label">active</span></div>` : ''}
    ${frozen ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#5b82cc"></span><span class="stat-pill-num">${frozen}</span><span class="stat-pill-label">frozen</span></div>` : ''}
    ${draft  ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#c4a255"></span><span class="stat-pill-num">${draft}</span><span class="stat-pill-label">draft</span></div>` : ''}
    ${depr   ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#cc5b5b"></span><span class="stat-pill-num">${depr}</span><span class="stat-pill-label">deprecated</span></div>` : ''}
  </div>

  ${domains.length ? `<div class="home-section-title">Domains</div>
  <div class="domain-chips">
    ${domains.map(d => `<span class="domain-chip" onclick="filterByDomain('${esc(d)}')">${esc(d)}</span>`).join('')}
  </div>` : ''}

  <div class="home-section-title">All features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;">
      <span class="nav-dot"></span>
      ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
      <span class="nav-item-title">${esc(f.title)}</span>
      ${VIEW !== 'user' ? '<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-soft);">' + completeness(f) + '%</span>' : ''}
    </div>`).join('')}
  </div>
</div>`;
}

function renderFeature(key) {
  const f = byKey.get(key);
  if (!f) { renderHome(); return; }

  const pct = completeness(f);
  const barFill = `<span class="completeness-bar"><span class="completeness-fill" style="width:${pct}%"></span></span>`;

  const children = getChildren(f.featureKey);
  const parent = f.lineage && f.lineage.parent && byKey.get(f.lineage.parent);

  let html = `<div class="feature-page">
  ${VIEW !== 'user' ? `<div class="feature-meta">
    <span class="feature-key">${esc(f.featureKey)}</span>
    <span class="badge badge-${esc(f.status)}"><span class="badge-dot" style="background:${statusColor(f.status)}"></span>${esc(f.status)}</span>
    ${f.domain ? `<span class="badge badge-domain">${esc(f.domain)}</span>` : ''}
  </div>` : ''}
  <div class="feature-title">${esc(f.title)}</div>
  ${VIEW !== 'user' ? `<div class="feature-completeness">${barFill}${pct}% complete</div>` : ''}
  ${f.userGuide ? `<a class="guide-link" href="./lac-guide.html#${esc(f.featureKey)}" target="_self">📖 View User Guide →</a>` : ''}`;

  // Problem
  html += section(VIEW === 'user' ? 'About this feature' : 'Problem', f.problem ? `<div class="section-body">${md(f.problem)}</div>` : '<span class="empty">Not documented.</span>');

  // Analysis
  if (f.analysis)
    html += section('Analysis', `<div class="section-body">${md(f.analysis)}</div>`);

  // Implementation
  if (f.implementation)
    html += section('Implementation', `<div class="section-body">${md(f.implementation)}</div>`);

  // User Guide / Success Criteria
  if (VIEW === 'user') {
    const guideContent = f.userGuide || f.successCriteria;
    if (guideContent)
      html += section('What you can do', `<div class="section-body">${md(guideContent)}</div>`);
  } else {
    if (f.userGuide)
      html += section('User Guide', `<div class="section-body">${md(f.userGuide)}</div>`);
    if (f.successCriteria)
      html += section('Success Criteria', `<div class="section-body">${md(f.successCriteria)}</div>`);
  }

  // Decisions
  if (f.decisions && f.decisions.length) {
    const cards = f.decisions.map(d => `<div class="decision-card">
      <div class="decision-title">${esc(d.decision)}</div>
      <div class="decision-rationale">${md(d.rationale)}</div>
      ${d.date || (d.alternativesConsidered && d.alternativesConsidered.length) ? `<div class="decision-meta">
        ${d.date ? `<span class="decision-date">📅 ${esc(d.date)}</span>` : ''}
        ${d.alternativesConsidered && d.alternativesConsidered.length ? `<span class="decision-alts">Considered: ${d.alternativesConsidered.map(esc).join(', ')}</span>` : ''}
      </div>` : ''}
    </div>`).join('');
    html += section('Decisions', `<div class="decisions-list">${cards}</div>`, f.decisions.length);
  }

  // Known Limitations
  if (f.knownLimitations && f.knownLimitations.length) {
    const items = f.knownLimitations.map(l =>
      `<div class="limitation-item"><span class="limitation-bullet">—</span><span>${md(l)}</span></div>`
    ).join('');
    html += section('Known Limitations', `<div class="limitations-list">${items}</div>`, f.knownLimitations.length);
  }

  // Tags
  if (f.tags && f.tags.length) {
    const chips = f.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
    html += section(VIEW === 'user' ? 'Topics' : 'Tags', `<div class="tags-row">${chips}</div>`);
  }

  // Lineage
  if (parent || children.length) {
    let lineage = '<div class="lineage-row">';
    if (VIEW === 'user') {
      if (parent) {
        lineage += `<span class="lineage-arrow">Part of</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">${esc(parent.title)}</a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">Related</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">${esc(c.title)}</a>`;
        }
      }
    } else {
      if (parent) {
        lineage += `<span class="lineage-arrow">parent ↑</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">
            ${esc(parent.featureKey)} — ${esc(parent.title)}
          </a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">children ↓</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">
            ${esc(c.featureKey)} — ${esc(c.title)}
          </a>`;
        }
      }
    }
    lineage += '</div>';
    html += section(VIEW === 'user' ? 'Related' : 'Lineage', lineage);
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

function section(label, body, count) {
  const countHtml = count != null ? `<span class="section-count">(${count})</span>` : '';
  return `<div class="section">
  <div class="section-header">
    <span class="section-label">${label}</span>${countHtml}
  </div>
  ${body}
</div>`;
}

// ── Navigation ───────────────────────────────────────────────────────────────

function navigate(key) {
  activeKey = key;
  location.hash = key ? '#' + key : '';
  renderNav(document.getElementById('filter-input').value);
  if (key) {
    renderFeature(key);
    // Scroll nav item into view
    const el = document.querySelector(`.nav-item[data-key="${key}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  } else {
    renderHome();
  }
}

function filterByDomain(domain) {
  const input = document.getElementById('filter-input');
  input.value = domain;
  renderNav(domain);
}

// Filter input
document.getElementById('filter-input').addEventListener('input', e => {
  renderNav(e.target.value);
});

// ── Boot ─────────────────────────────────────────────────────────────────────

const hashKey = location.hash.slice(1);
if (hashKey && byKey.has(hashKey)) {
  activeKey = hashKey;
  renderNav('');
  renderFeature(hashKey);
  setTimeout(() => {
    const el = document.querySelector(`.nav-item[data-key="${hashKey}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, 0);
} else {
  renderNav('');
  renderHome();
}

window.navigate = navigate;
window.toggleDomain = toggleDomain;
window.filterByDomain = filterByDomain;
window.setSortMode = setSortMode;
</script>
