de WaveformCanvas) handles tap-to-seek and drag-to-create. Cut bands are pure CSS divs (no RegionsPlugin). useCutInteraction manages the drag state machine; edge drag resizes existing cuts. Trim shortcut (pre-seeds start+end cuts). Split mode (mark a time position, confirm → creates TWO new clips: Part A (0→splitMs) and Part B (splitMs→end); original clip left completely unchanged as a reference; navigates to session page showing all three clips). Submit → new version in Postgres, router.back().\n\n**Non-destructive split with immediate Drive files**: original clip is never mutated. Splitting Song X into Part A and Part B: the split API downloads X's source once, runs FFmpeg twice in parallel to produce two trimmed files (A: 0→splitMs, B: splitMs→end), uploads both to Drive with their own names, and creates two new Clip rows with their own driveFileId + correct sourceDurationMs + empty v1 cutMarks (the trimmed file is their raw). The original clip is untouched. After confirming that A and B are good, X's source can be deleted from Drive to free space. No provenance UI is shown on split children (no scissors icon, no 'Split into' card) — they are fully independent songs from the user's perspective. sourceClipId exists in the DB for data integrity but is not surfaced in the UI.\n\n**ClipDetailClient** — owns selectedVersionId state. Feeds activeCuts to WaveformPlayer. Feeds activeVersionId to CollaborationSection for version-aware voting. Version list as large tappable cards. Clicking active version keeps it selected (no deselect/null state). Edit link to /edit page.\n\nVersions are metadata only (cutMarks JSON) pointing at the same source audio. Source audio never mutated. Linear chain. localStorage safety net for in-progress edits.","decisions":[{"decision":"WaveformPlayer and WaveformEditor are separate components","rationale":"A single component that handles both playback and editing requires mode-switching logic, conditional overlays, and competing event handlers. Separate components have clear single responsibilities: Player = listen, Editor = cut. The edit page is always in edit mode; no toggle needed. The detail page never needs editing. Each component can be reasoned about and tested independently.","date":"2026-04-11"},{"decision":"interact:false + single overlay div for all pointer handling (no enableDragSelection, no RegionsPlugin)","rationale":"WaveSurfer's enableDragSelection registers a permanent pointer overlay that consumes all pointer events — including click-to-seek. Once called, seeking by clicking is broken. interact:false disables WaveSurfer's built-in event handling entirely. A single overlay div (absolute inset-0, touch-none) inside WaveformCanvas intercepts all pointer events and forwards them to useCutInteraction (trim mode) or useSplitInteraction (split mode).","date":"2026-04-15"},{"decision":"Split produces independent trimmed Drive files immediately (not virtual clips sharing source)","rationale":"Original model: Part A and Part B shared Song X's Drive file and applied cuts virtually — correct waveform, wrong duration in clip list (both showed full 9-min duration instead of 4 min and 5 min). Trimmed files fix duration display without special-casing. They also make Part A and Part B genuinely independent: they can be frozen separately without needing X's file, and X's source can be safely deleted from Drive once A and B are confirmed. FFmpeg at split time costs a few seconds of processing but eliminates a class of edge cases.","date":"2026-04-11"},{"decision":"No provenance UI on split children","rationale":"Showing scissors icons and a 'Split into' provenance card on Song X implied that Song X was consumed or changed by the split. The correct mental model is: X exists unchanged, A and B are new songs. Their name might hint at their origin (e.g. 'Groove - Part A') but they are first-class independent songs from the moment they're created. Provenance exists in the DB (sourceClipId) for integrity but is not surfaced in the UI.","date":"2026-04-11"},{"decision":"Split navigates to session page, not back to clip detail","rationale":"After a split, three clips exist (original + Part A + Part B). router.back() would return to the original clip's detail — neither Part A nor Part B would be visible. router.push(sessionHref) lands on the session clip list where all three are visible and accessible.","date":"2026-04-11"},{"decision":"No version deselect — clicking active version keeps it selected","rationale":"Deselecting a version set selectedVersionId to null, which caused the player to show 'no cuts' (raw audio). This 'null = raw audio' state had no UI label and was visually identical to a version with no cuts. Confusing. Clicking the active version now keeps it selected — the player always reflects a known version.","date":"2026-04-11"},{"decision":"Versions are metadata only — not audio files","rationale":"Audio duplication per version is prohibitively expensive (43MB+ per clip). Versions are cut instructions (cutMarks JSON). Source audio stored once in Drive. Real audio file produced only on freeze.","date":"2026-04-10"},{"decision":"localStorage for in-progress edit safety","rationale":"Full offline sync adds complexity. The real risk is a browser crash mid-edit. localStorage persists cut marks across crashes. Key: odio:draft:{clipId}. Cleared on successful submit.","date":"2026-04-10"}],"implementation":"1. components/clips/WaveformPlayer.tsx: pure player component. Props: clipId, sourceDurationMs, activeCuts[], stamps[]. Regions rendered with pointerEvents:none (display only, don't intercept seek clicks). timeupdate handler: position tracking (currentTimeMsRef + setCurrentTimeMs) runs unconditionally — isPlaying() guard wraps only the cut-skip section so currentTimeMs updates correctly even while paused (needed for re-seek before play). finish event: ws.setTime(0) resets cursor to start. Stamp chips are <button> elements that call ws.setTime(). No enableDragSelection.\n2. components/clips/WaveformEditor.tsx: edit-only component. Props: clipId, sourceDurationMs, frozenVersionId, initialVersions, stamps, sessionHref. Custom pointer overlay (onPointerDown/Move/Up + setPointerCapture, touch-action:none) handles tap-to-seek + drag-to-create. Trim/Clear all/Split tool buttons. Split confirmation sheet updated to reflect Drive file creation ('Each part gets its own audio file in Drive. Takes a few seconds — hang tight.'). Split navigates to sessionHref after success. Auto-saves draft on every cut change. router.back() after version submit. No provenance UI (splitInto prop removed, scissors icon removed from 'Start from' version buttons).\n3. components/clips/ClipDetailClient.tsx: coordinator. Owns selectedVersionId state (auto-selects latest, no deselect). Passes activeCuts to WaveformPlayer. Passes activeVersionId to CollaborationSection. Actions section hidden when !canEdit && !frozen.\n4. app/(auth)/.../clips/[clipId]/page.tsx: server component — loads clip, versions, stamps, votes, comments, membership. Renders ClipDetailClient.\n5. app/(auth)/.../clips/[clipId]/edit/page.tsx: server component — loads clip, versions, stamps, splitInto (select id, name). Auth guard (MEMBER redirect + frozen redirect). Maps splitInto and passes to WaveformEditor.\n6. app/api/clips/[clipId]/versions/route.ts: POST creates a new version.\n7. app/api/clips/[clipId]/split/route.ts: POST { splitMs } — downloads X's source audio once, runs renderAudioWithCuts twice in parallel (Part A: atrim tail, Part B: atrim head), uploads both trimmed files to Drive with distinct names, creates two Clip rows with own driveFileId + correct sourceDurationMs + empty v1 cutMarks. Both have sourceClipId pointing to the original. Original clip is completely unchanged. Returns { clipA: {id, name}, clipB: {id, name} }. Vercel runtime: nodejs, maxDuration: 300.\n8. lib/utils.ts: formatPosition(ms) → H:MM:SS always. formatDuration(ms) → M:SS. calcResultDuration(sourceDurationMs, cuts) → virtual duration after removing cut segments.\n9. prisma/schema.prisma: Clip.sourceClipId String? (nullable) + SplitFrom self-relation (sourceClip / splitInto) with onDelete: SetNull — deleting a child clip does not cascade to the original.","knownLimitations":["Split takes a few seconds on the server (FFmpeg download + trim + upload) — the UI shows a loading state on the confirm button but gives no progress indicator","After splitting, the original Song X remains in the session — the band must manually delete it from the Drive page once they've confirmed A and B are good","If two members edit the same version simultaneously they both produce the next version number — band sees two versions at the same level and must choose","Submit requires internet connection — cuts safe in localStorage but cannot be written to Postgres offline"],"tags":["versioning","version-history","freeze","wavesurfer","waveform-editor","waveform-player","localstorage","skip-cuts","split"],"successCriteria":"- Version list shows full chain: v number, description, result duration, cut count\n- Selecting a version in the detail page updates the waveform player to skip that version's cuts\n- Click-to-seek works on the waveform — clicking anywhere moves the playhead, play starts from that position\n- Stamp chips in the player are tappable and seek to that timestamp\n- After playback ends, cursor resets to start (no amber pin at right edge)\n- Submit button is always active — description is optional\n- Any member can create a version from any existing version\n- Trim shortcut pre-seeds start+end cut marks\n- Split: marks a time position → FFmpeg trims two independent Drive files (Part A: 0→split, Part B: split→end) → creates two new clips each with their own driveFileId and correct sourceDurationMs → original clip unchanged → navigates to session page showing all three clips\n- Split children show correct durations (4 min / 5 min) in the clip list — not the full original duration\n- Split children are fully independent songs with no visible lineage to the original (no scissors icon, no provenance card)\n- Drag on the edit waveform creates a cut region\n- Freeze locks the version and triggers render (see feat-render)\n- In-progress edits survive browser crash via localStorage draft\n- Draft banner shown on editor reopen with Resume / Dismiss","domain":"versioning","priority":2,"userGuide":"From a clip's detail page, select a version in the Versions section to hear that version's cuts applied. Tapping stamp chips (🔥 ⭐ etc.) in the player seeks to that moment. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song at a chosen time position — mark the split point on the waveform, confirm, and Odio creates Part A and Part B as two fully independent new songs, each with their own trimmed audio file in Drive. The original song stays in the session unchanged. After confirming Part A and Part B are good, go to Settings → Manage files / sync to delete the original's source from Drive. Tap 'Start from' pills to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional.","componentFile":"components/clips/WaveformEditor.tsx"},{"featureKey":"odio-2026-008","title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","status":"frozen","problem":"On jam night, the person who created the band may not always be the one with a phone free to record. Any Editor-role band member should be able to hit Record and have the audio land in the band's shared Drive — without requiring each member to set up their own Drive folder or the band creator to be physically present.","analysis":"The existing recording upload flow already makes multi-recorder architecturally trivial: when a member hits Record, the server's /api/upload/init route generates a Google Drive resumable upload session URL using the band creator's stored refresh_token (saved via NextAuth DB adapter). The member's browser then uploads the audio blob directly to the creator's Drive — the member's own Drive is never involved. The audio lands in the correct band Drive folder regardless of who recorded it.\n\nWhat needs to change is a role-permission gate: currently /api/upload/init checks that the caller is the band creator (Recorder role). Expanding this to allow Editor-role members is the full scope of the server-side change.\n\nOn the client: the Record tab in the bottom nav is shown only to Recorder and Editor roles. Member-only users do not see the Record tab.\n\nOne critical edge case: the creator's Drive token can expire. The server must attempt a token refresh before generating the upload session URL. If the refresh fails (e.g., creator revoked app access), the error must be surfaced clearly — 'Band creator needs to re-authorize Drive access' — with a notification mechanism to alert the creator.\n\nThe resulting clip row in Postgres records both the band creator (driveOwnerEmail) and the actual recording member (recordedByEmail) so the activity feed can correctly show 'Recorded by [member]'.","decisions":[{"decision":"Reuse creator's stored token — no per-member Drive setup","rationale":"drive.file OAuth scope only grants access to files the app created under that specific user's account. A member's token cannot write to the creator's Drive folder. The creator's refresh_token (already stored by NextAuth DB adapter for the audio proxy feature) solves this: the server uses the creator's token to generate the Drive upload session URL, and the member's browser uploads directly to Drive using that URL. No additional OAuth consent or per-member Drive setup needed.","date":"2026-04-10"},{"decision":"Editor role can record — Member role cannot","rationale":"Member-only users are passive collaborators (vote, comment). Giving them recording rights would require explaining Drive ownership semantics to every casual invitee. Editors are already trusted with version creation and freeze — recording is a natural extension. The default role for new band invites is Editor, so most band members get recording rights automatically without any explicit configuration.","date":"2026-04-10"},{"decision":"Track recordedByEmail separately from driveOwnerEmail","rationale":"The clip always lives in the creator's Drive (driveOwnerEmail is always the band creator). The person who pressed Record may be someone else entirely. These are distinct facts: one describes file ownership for Drive API operations, the other describes recording attribution for the activity feed and session history. Conflating them would make it impossible to correctly display 'Recorded by X' or debug Drive issues per-clip.","date":"2026-04-10"}],"implementation":"1. app/api/upload/init/route.ts: POST — role check `['RECORDER', 'EDITOR'].includes(membership.role)`. Fetches band creator's email from bands table. Queries NextAuth accounts table for creator's access_token + refresh_token. Attempts token refresh via Google OAuth token endpoint if expires_at < now. Generates Drive resumable upload session URL using creator's token. Returns { uploadUrl, clipId, sessionId }.\n2. app/api/upload/finalize/route.ts: POST — same role check. Runs FFmpeg transcode on uploaded file. Creates Clip row with recordedByEmail = currentUser.email. Creates v1 ClipVersion row. Updates clip transcodeStatus to DONE.\n3. Error handling: if creator token refresh fails, returns 503 with { error: 'CREATOR_TOKEN_INVALID', creatorEmail }. Client shows 'Drive connection needs renewal — ask [creator name] to re-authorize'.\n4. components/layout/BottomTabBar.tsx: Record tab hidden when `membership.role === 'MEMBER'`.\n5. Prisma schema Clip: recordedByEmail TEXT nullable. clips table stores both fields.\n6. components/clips/ClipCard.tsx: shows 'Recorded by X' when recordedByEmail differs from band creator.","knownLimitations":["If the band creator revokes Google Drive access, ALL recording attempts by any Editor fail until the creator re-authorizes — one token serves the whole band; there is no per-member fallback","Two Editors recording simultaneously produce two separate clip rows with overlapping timestamps — no merging or conflict detection; both appear in the session normally","The creator's refresh_token is stored server-side in the NextAuth accounts table — this security surface already exists for the audio proxy feature; multi-recorder adds no new exposure"],"tags":["recording","multi-recorder","roles","permissions","google-drive","upload"],"successCriteria":"- Any Editor-role band member sees the Record tab in the bottom nav and can start a recording\n- Member-only role does not see Record tab and cannot access /record\n- /api/upload/init: accepts requests from Editor+ roles; fetches and uses band creator's stored refresh_token to generate Drive upload session URL\n- Token refresh attempt before generating upload URL; returns clear error if creator's token is invalid: 'Band creator needs to re-authorize Drive access'\n- Audio lands in the correct band Drive folder regardless of which Editor recorded\n- Clip row stores both driveOwnerEmail (always the band creator) and recordedByEmail (actual recorder)\n- Activity feed and clip list show 'Recorded by [name]' when recorder differs from band creator\n- If multiple Editors record simultaneously: each gets their own upload session URL; clips created as separate Postgres rows with no conflict\n- Post-record screen and upload banner work identically for all recording members","domain":"recording","priority":2,"userGuide":"Any Editor-role band member can record — not just the band creator. Editors see the Record tab in the nav and can start a recording from their own device. The audio automatically lands in the band's Drive folder (owned by the band creator). If the creator's Drive connection expires, a banner appears: 'Drive connection needs renewal — ask [creator name] to re-authorize.' The clip card shows 'Recorded by X' when the recorder is not the band creator.","componentFile":"app/api/upload/init/route.ts"},{"featureKey":"odio-2026-052","title":"BandShareButton — Invite Link and QR Code Generator","status":"active","problem":"Band creators need to bring bandmates into the app quickly — ideally by showing a QR code that others can scan, or by sharing a link. The invite mechanism must work in a rehearsal space (QR scan) and asynchronously (link via message).","analysis":"BandShareButton renders in two contexts:\n1. **First-run success screen** — large QR code + copyable link, prominent, after band creation\n2. **Band Settings** — invite link + QR code in a collapsed section\n\nTap 'Copy link' → copies /invite/[token] URL to clipboard → button label changes to 'Copied!' for 2 seconds.\nQR code: generated client-side from the invite URL using a QR library (qrcode.react). Dark bg with white QR modules to match dark theme.\n\nInvite tokens are stored in Postgres (invite_tokens table). Token is scoped to the band but not single-use by default (Recorder can revoke via Band Settings to invalidate all pending invites).","decisions":[{"decision":"Invite tokens are band-scoped (not single-use or per-person)","rationale":"A single-use token breaks the 'show the QR code in a rehearsal room and everyone scans it' use case. A band-scoped token allows unlimited joins from the same link until the Recorder revokes it. Revocation is explicit and requires a deliberate action.","date":"2026-04-15"}],"implementation":"components/bands/BandShareButton.tsx: props { inviteUrl, onRevoke? }. Renders QR (qrcode.react) + copy button. Copy: navigator.clipboard.writeText(inviteUrl) → setCopied(true) → setTimeout 2s → setCopied(false). Revoke: calls onRevoke() which POSTs to /api/bands/[bandId]/invite/revoke.","knownLimitations":["QR code is generated client-side — requires JavaScript to render; no SSR fallback","navigator.clipboard.writeText() requires HTTPS (standard for production, may fail in development without HTTPS)"],"tags":["band","invite","qr-code","share","settings","onboarding"],"successCriteria":"- Invite link copyable with 'Copied!' feedback (2s) on tap\n- QR code rendered in dark theme (white modules on dark bg)\n- QR code scannable on physical phone screen at arm's length\n- Token generated on band creation, persisted in Postgres\n- Token revoke option in Band Settings (generates a new token, old links stop working)\n- Large QR display mode for first-run (150x150px minimum)","domain":"band","priority":2,"userGuide":"In Band Settings, tap 'Copy link' to copy your band invite link and share it with bandmates. They can also scan the QR code directly from your screen to join instantly.","componentFile":"components/bands/BandShareButton.tsx"},{"featureKey":"odio-2026-049","title":"MemberRow — Band Member List Row with Role Management","status":"active","problem":"Band Settings lists all members with their roles. The Recorder needs to change roles and remove members from within the same row — without navigating to a separate member-management screen.","analysis":"MemberRow renders one member: avatar (initials, colored circle), display name, email (text-secondary), role chip (Badge).\n\nRole chip behavior:\n- **Recorder**: chip is a `<button>` → taps to open a BottomSheet picker with Recorder/Editor/Member options (current highlighted in amber). Saves via PATCH.\n- **Members/Editors**: chip is a static Badge — no tap response.\n- **Self-role chip**: always disabled (tooltip 'Can't change your own role'), regardless of role.\n\nDelete (Recorder only): iOS swipe-left → 'Remove' danger button. Android/desktop: long-press → context menu. Both → BottomSheet confirmation: 'Remove [Name]? They'll lose access immediately.' Cancel / Remove (danger).","decisions":[{"decision":"Self-role is always non-editable","rationale":"A Recorder downgrading themselves to Member with no other Recorder would leave the band with no one able to create sessions or freeze clips. Blocking self-role change prevents accidental lockout.","date":"2026-04-15"}],"implementation":"components/bands/MemberRow.tsx: props { member, isSelf, canManage (=isRecorder), onRoleChange, onRemove }. Role chip: Button (canManage && !isSelf) or Badge (others). Delete: touch event handling for swipe/long-press. Both delete paths call onRemove(memberId) after confirmation.","knownLimitations":["Role change is immediate with no undo — if Recorder accidentally changes another member's role, they must manually change it back","Drive access (if any) is not revoked when a member is removed — audio files on Drive are unaffected"],"tags":["band","members","role","settings","role-picker","remove-member"],"successCriteria":"- Avatar initials + name + email rendered per row\n- Role chip: interactive for Recorder (not self), static for all others\n- Tap role chip → BottomSheet with 3 role options, current highlighted\n- Select role → PATCH to Postgres, chip updates optimistically\n- Self-role chip: disabled, tooltip text\n- Delete: swipe-left (iOS) or long-press (Android/desktop) → confirm sheet → DELETE membership\n- After delete: member row removed from list immediately","domain":"band","priority":2,"userGuide":"In Band Settings, each member row shows their role. As the band creator (Recorder), you can tap a member's role chip to change it or swipe to remove them from the band.","componentFile":"components/bands/MemberRow.tsx"},{"featureKey":"odio-2026-013","title":"Clip Detail — Coordinator, Actions Panel, Freeze, Share, Stage, Cleanup","status":"active","problem":"The clip detail page must coordinate multiple independent concerns — playback, version selection, actions, and collaboration — without letting any one section own state that another needs. A band member should be able to select a version, hear exactly that version's cuts, vote on it, and trigger lifecycle actions (stage change, freeze, share, cleanup) all from one screen.","analysis":"**ClipDetailClient** is the coordinator. Two-tab layout — Edit and Team — with the waveform player always pinned above the tab bar.\n\n**Edit tab (default):** Concerns are ordered by workflow priority: (1) Edit cuts CTA at top (canEdit && !frozen only); (2) version chain newest-first (vN → … → v1 'Original'), each card is tappable and syncs the player to that version's cuts; (3) lifecycle actions (ClipActionsClient: freeze/share/cleanup) at the bottom. This order means the band's first tap is always 'Edit' or the latest version — the most common actions.\n\n**Team tab:** Collaboration features in a single view — voting context card ('Voting on v{N}' with 'change' link back to Edit tab), VotePanel + StageSelector, then a divider and the comments thread. This tab is secondary; it becomes relevant once editing is done and the band is reviewing for approval or freeze. CollaborationSection handles scope='full' to render both vote and comments from one hook instance.\n\n**ClipActionsClient** renders action rows with bottom-sheet confirmations:\n- **Freeze** — tap to open freeze picker (version selector). Sets justFrozen=true on success — triggers a post-freeze callout banner directing the user to generate a share link.\n- **Frozen status + Unfreeze** — shown when clip.frozen. Recorder only can unfreeze.\n- **Share link** — shown when frozen. Toggle public share via PATCH /api/clips/[clipId]. Copies /share/[token] URL to clipboard.\n- **Clean up source audio** — shown when frozen && driveFileId exists.\n- **Processing** — shown when transcodeStatus === 'PENDING'.","decisions":[{"decision":"No version deselect — clicking active version keeps it selected","rationale":"Deselecting a version set selectedVersionId to null, which caused the player to show 'no cuts' (raw audio). This 'null = raw audio' state had no UI label and was visually identical to a version with no cuts. Confusing. Clicking the active version now keeps it selected — the player always reflects a known version.","date":"2026-04-11"},{"decision":"Actions section hidden when !canEdit && !frozen","rationale":"MEMBER-role users on non-frozen clips have no available actions (they can't edit, can't freeze, can't share, can't clean up). Rendering an empty Actions section produces phantom whitespace between the Versions section and the Collaboration section. Hiding it entirely keeps the layout clean.","date":"2026-04-11"},{"decision":"Freeze picker lets user select which version to freeze, not locked to latest","rationale":"The band may have decided version 3 was better than version 4 (which went too far). Locking to 'latest version only' would force them to create a v5 that reverts v4 just to freeze it. The picker lets any Editor choose any version as the final render.","date":"2026-04-11"},{"decision":"All actions use bottom-sheet confirmation, not inline destructive buttons","rationale":"Freeze, cleanup, and unfreeze are irreversible or hard-to-reverse operations. A confirmation sheet with clear consequence text (what gets deleted, what stays) gives the user one more mental checkpoint before committing. Bottom sheets also allow showing contextual info (e.g., the cleanup sheet's 'Will be deleted / Will remain' info boxes).","date":"2026-04-11"}],"implementation":"1. components/clips/ClipDetailClient.tsx: coordinator. TabId = 'edit' | 'team'. Owns selectedVersionId (useState: auto-selects versions[last].id). Derives activeCuts from selectedVersion.cutMarks → WaveformPlayer. Edit tab: Edit cuts <Link> first (canEdit && !frozen), then versionsNewestFirst ([...versions].reverse()).map(VersionCard), then ClipActionsClient at bottom. Team tab: 'Voting on v{N}' context card (version number + description, 'change' button → setTab('edit')), then CollaborationSection scope='full'. No chat badge (comments merged into Team tab).\n2. components/clips/CollaborationSection.tsx: added scope='full' — renders both vote-stage and comments sections from a single hook instance, separated by a divider (h-px bg-white/10).\n3. components/clips/ClipActionsClient.tsx: actions panel. justFrozen state set on successful freeze → shows post-freeze callout banner. Share, cleanup, unfreeze unchanged.\n4. app/(auth)/bands/[bandId]/sessions/[sessionId]/clips/[clipId]/page.tsx: server component — loads clip, versions (ordered), stamps, votes, comments, membership via Prisma. Passes canEdit (role !== 'MEMBER' && !frozen), currentUserRole, editHref. Renders PageLayout + ClipDetailClient.","knownLimitations":["Share link generation requires clip to be frozen — members cannot share a clip-in-progress","publicToken is stored in Postgres; if the tokens table is cleared, existing share links break","Unfreeze does not delete the rendered Drive file — it simply sets frozen=false. The rendered file remains in Drive until cleanup or clip delete."],"tags":["clip-detail","coordinator","freeze","share","stage","cleanup","actions","version-selection"],"successCriteria":"- Selecting a version updates WaveformPlayer to skip that version's cuts\n- Clicking the active version keeps it selected (no deselect to null state)\n- Actions section hidden when member role + non-frozen (no phantom whitespace)\n- Stage picker opens as bottom sheet with 4 options; current stage highlighted\n- Freeze picker shows version list; pre-selects latest version; on confirm: renders clip, updates UI\n- Freeze error shown inline in freeze sheet; dismiss-able\n- Post-freeze callout banner appears after a successful freeze in the same session\n- Frozen status row shows Unfreeze option for RECORDER, lock icon for non-Recorder\n- Share toggle generates /share/[token] URL and copies to clipboard\n- Copy feedback: button label changes to 'Copied!' for 2 seconds\n- Cleanup sheet shows exactly what gets deleted and what remains before confirming\n- Processing row visible while transcodeStatus is PENDING; disappears when DONE\n- All bottom sheets have consistent Cancel button\n- Edit cuts link visible when canEdit && !frozen — navigates to /edit page\n- Vote tab shows 'Voting on v{N}' context card with version description; tapping 'change' switches to Versions tab","domain":"versioning","priority":2,"userGuide":"Open a clip from the session list. The waveform player at the top always plays the selected version. The Edit tab is your main workspace: tap 'Edit cuts' at the top to open the full-screen editor; tap any version card to switch what you hear (latest version is listed first, original at the bottom). Once you're happy with a version, tap Freeze to lock it — you'll be prompted to generate a share link right away. The Team tab is for post-edit collaboration: it shows who voted for what on the current version and the full comment thread. Tap 'change' in the voting header to switch which version the band is voting on.","componentFile":"components/clips/ClipDetailClient.tsx"},{"featureKey":"odio-2026-037","title":"ClipCard — Clip Row in Session Clip List","status":"active","problem":"The session clip list is the primary navigation surface for the editing workflow. Each row must communicate a clip's name, duration, version count, stage, and activity state at a glance — plus support quick-delete for the Recorder without leaving the list.","analysis":"ClipCard renders one row in the clip list. Layout: clip name (InlineEdit), duration (raw → result if versions exist), version badge, StageSelector chip, frozen lock icon, activity indicator (amber left border if new activity), 'Processing…' state.\n\nProcessing state: card at 60% opacity, spinner replaces duration, no version badge, no stage chip. Tapping a processing card shows a Toast.\n\nActivity indicator: amber 4px left border when new votes/comments exist since last viewed. Clears when clip detail is opened.\n\nDelete (Recorder only): iOS swipe-left → 'Delete' button. Android/desktop: long-press → context menu. Both → BottomSheet confirmation.\n\nTap navigates to /bands/[bandId]/sessions/[sessionId]/clips/[clipId].","decisions":[{"decision":"Activity indicator is amber left border, not a dot or badge","rationale":"A dot badge competes visually with the version count badge and stage chip. An amber left border draws the eye subtly to the card without cluttering the metadata display. Border clears on clip detail visit (server marks as viewed or client tracks in sessionStorage).","date":"2026-04-15"}],"implementation":"components/clips/ClipCard.tsx: props { clip, sessionId, bandId, canEdit, canDelete, hasNewActivity, onDelete }. Uses InlineEdit for clip name. StageSelector for stage chip. Badge for version count. Handles touch events for swipe-left (iOS) and long-press (Android/desktop) delete. Tap handler: router.push(clipDetailHref). Processing check: clip.transcodeStatus === 'PENDING'.","knownLimitations":["Swipe-left gesture is iOS Safari native feel only — Android swipe-left has no gesture affordance","InlineEdit within a tappable card: tap on the name text must be captured by InlineEdit, not by the card's navigation handler — requires stopPropagation on the InlineEdit wrapper"],"tags":["clip","clip-list","card","navigation","stage","activity-indicator","delete"],"successCriteria":"- Clip name editable inline (InlineEdit, max 60ch)\n- Duration shows source duration → result duration if versions exist\n- Version count badge visible\n- StageSelector chip tappable by Editor/Recorder, static for Member\n- Frozen lock icon visible when frozen\n- amber left border when new activity since last visit\n- Processing state: 60% opacity, spinner, no edit/stage controls, toast on tap\n- Swipe-left delete on iOS → danger button → BottomSheet confirm\n- Long-press delete on Android/desktop → context menu → BottomSheet confirm\n- Tap navigates to clip detail","domain":"sessions","priority":2,"userGuide":"Each row in a session's clip list shows a recording. Tap a clip to open it. Tap the stage chip to update where the song is at. Tap the clip name to rename it. Swipe left to delete (only if you're the recorder).","componentFile":"components/clips/ClipCard.tsx"},{"featureKey":"odio-2026-041","title":"CutList — Cut Region List with Nudge Controls","status":"active","problem":"Dragging cut region handles on a waveform on mobile is imprecise for fine adjustments (±100ms range). Users need a fallback precision control for exact trimming without requiring zooming in and dragging handles at the pixel level.","analysis":"CutList renders a collapsible list of all current cut regions below the EditorToolbar. Each cut row shows: cut index (Cut 1, Cut 2…), start time, end time, duration removed (`–M:SS`), and four nudge buttons (±10ms, ±100ms for each edge).\n\nExpand/collapse per row: tapping a row header expands it to show the nudge controls. Expanded row also provides: 'Zoom to cut' (scrolls+zooms the waveform to show the cut region full-screen), 'Jump to start' (seeks playhead to cut start), remove button (×).\n\nExpandedCutId is controlled externally by WaveformEditor (not local state) so WaveformEditor can also programmatically expand a cut on drag-select.","decisions":[{"decision":"Nudge increments are ±10ms and ±100ms","rationale":"10ms is fine-grained enough for frame-accurate trimming. 100ms is fast-traverse for larger adjustments. 1ms would require many taps; 1s steps would be too coarse for precise trimming. Two levels cover the full range of use cases.","date":"2026-04-15"}],"implementation":"components/clips/CutList.tsx: props { cutMarks, expandedCutId, onExpandChange, onNudge, onRemove, onZoomToCut, onJumpToStart }. Renders one expandable row per cutMark. Nudge: onNudge(cutId, edge: 'start'|'end', deltaMs) — parent applies delta with constraint checks. No local state except animation helpers.","knownLimitations":["Long cut lists (>5 regions) push the submit button far down the page on mobile — consider a fixed submit button in future","Nudge does not debounce API calls — each tap writes to localStorage draft immediately but Postgres writes are batched at submit"],"tags":["editor","cut-list","nudge","precision","cut-regions","accessibility"],"successCriteria":"- All current cut regions listed in order (sorted by start time)\n- Each row: index, startMs formatted, endMs formatted, duration removed\n- Expand: shows ±10ms ±100ms nudge buttons for both start and end edges\n- Nudge: updates cut boundary, respects 1s minimum region size and overlap constraints\n- 'Remove' × button: removes this cut region, adds to undo stack\n- 'Zoom to cut': calls parent's applyZoom + scroll to position cut region full-width in viewport\n- ExpandedCutId prop (controlled) — parent manages which row is open","domain":"editing","priority":2,"userGuide":"The cut list below the waveform shows all your marked cuts. Tap any cut to expand it and fine-tune the start or end time with the nudge buttons. Tap the × to remove a cut.","componentFile":"components/clips/CutList.tsx"},{"featureKey":"odio-2026-042","title":"DraftRestoreBanner — Recover Unsaved Cuts After Browser Crash","status":"active","problem":"If a user's browser crashes or the page reloads mid-edit, all cut regions are lost — the editor opens blank. The user may not realise their work was saved in localStorage and abandon the session assuming the work is gone.","analysis":"DraftRestoreBanner appears at the top of the editor when two conditions are true:\n1. `hasDraft` from useCutDraft (localStorage key `odio:draft:{clipId}` exists and has content)\n2. `cutMarks.length === 0` (editor currently has no cuts — so draft isn't already loaded)\n\nWhen both are true: shows a banner — 'You have unsaved edits from a previous session.' with two buttons: 'Resume editing' (loads saved cuts into editor) and 'Dismiss' (clears localStorage draft).\n\nOnce the user taps 'Resume' or 'Dismiss', banner unmounts and doesn't reappear (hasDraft becomes false).","decisions":[{"decision":"Show=false when cutMarks.length > 0","rationale":"If the editor already has cuts (e.g., user navigated Edit from a version that had cuts), the draft is irrelevant — the current state IS the working set. Showing the draft banner when cuts already exist would confuse the user and potentially overwrite valid in-flight edits.","date":"2026-04-15"}],"implementation":"components/clips/DraftRestoreBanner.tsx: props { show: boolean, onResume: () => void, onDismiss: () => void }. show = hasDraft && cutMarks.length === 0 (computed in WaveformEditor). Renders an amber-bordered info banner with two buttons. Returns null when show=false.","knownLimitations":["Draft key is per-clipId, not per-clipId+versionId — if the user edits a different version, the same draft key is used and may restore mismatched cuts"],"tags":["editor","draft","localstorage","resilience","recovery","banner"],"successCriteria":"- Banner visible only when hasDraft=true AND cutMarks.length === 0\n- 'Resume editing' button: calls onResume() which loads draft cutMarks into WaveformEditor state\n- 'Dismiss' button: calls onDismiss() which clears localStorage draft + hasDraft becomes false\n- Banner does not appear when editor already has cuts (user navigated back with live state)\n- Banner does not reappear after dismissal in same session","domain":"editing","priority":2,"userGuide":"If your browser closed unexpectedly while you were editing cuts, a banner appears when you return offering to restore your work. Tap 'Resume' to get your cuts back, or 'Dismiss' to start fresh.","componentFile":"components/clips/DraftRestoreBanner.tsx"},{"featureKey":"odio-2026-040","title":"EditorToolbar — Trim / Clear All / Split Quick-Action Buttons","status":"active","problem":"Creating cut regions by dragging is precise but slow for the most common editing tasks: trimming dead air from the start and end (80% of edits), and splitting a clip at a specific time. Quick-action buttons accelerate these workflows without requiring manual dragging.","analysis":"EditorToolbar renders three action buttons: Trim, Clear All, Split.\n\n- **Trim:** pre-seeds start cut (0 → 20% of duration) + end cut (80% → 100%). Replaces any existing start/end cuts. Gives immediate region handles the user can then drag to fine-tune. No dialog.\n- **Clear All:** removes all cut regions. Button disabled when no cuts exist (hasCuts=false prop). Immediate — no confirmation (operation is undoable via undo stack).\n- **Split:** enters split mode. Opens WaveformSplitter controls. The waveform enters split mode — a cyan split marker appears that the user positions. Confirm splits the clip into Part A and Part B via API.\n\nPosition: below the waveform area, above the cut list.","decisions":[{"decision":"Trim pre-seeds at 20% boundaries without confirmation","rationale":"The 20% default gives enough buffer for typical dead air at the start and end of a jam recording. Pre-seeding without confirmation means the user can immediately see and drag the handles — this is faster than showing a dialog asking 'how much to trim'. The undo stack captures this operation.","date":"2026-04-15"}],"implementation":"components/clips/EditorToolbar.tsx: props { hasCuts, duration, onTrim, onClearAll, onEnterSplitMode }. Three Button components (ghost or secondary variant). Trim: calls onTrim() which adds [{ startMs: 0, endMs: dur*0.2 }, { startMs: dur*0.8, endMs: dur }] to cutMarks. Clear All: calls onClearAll(). Split: calls onEnterSplitMode().","knownLimitations":["Trim percentages (20%/80%) are hardcoded — not configurable per clip"],"tags":["editor","toolbar","trim","split","cut-regions","quick-action"],"successCriteria":"- Trim button: adds start/end cuts at 20%/80% boundaries immediately\n- Clear All: removes all cuts, disabled when hasCuts=false\n- Split: enters split mode, shows WaveformSplitter panel, WaveformCanvas shows split marker\n- All buttons: minimum 44px touch target\n- Trim and Clear All do not require confirmation\n- Split requires confirmation (in WaveformSplitter sheet before API call)","domain":"editing","priority":2,"userGuide":"Tap Trim to automatically mark the start and end of the recording for trimming — then drag the region handles to adjust. Tap Clear All to start over. Tap Split to cut a song into two separate clips.","componentFile":"components/clips/EditorToolbar.tsx"},{"featureKey":"odio-2026-038","title":"StampJumpRow — Tappable Stamp Chips for Waveform Seek","status":"frozen","problem":"Waveform players and editors display stamps (🔥⭐❓💡) at their recorded timestamps. These stamps are most useful when tappable — jumping to the timestamp lets the band quickly find the moments that were marked during recording.","analysis":"StampJumpRow renders a horizontal row of tappable stamp chips. Each chip is a `<button>` element (not a div) with aria-label='Jump to M:SS'. On tap: calls `onSeek(stamp.timestampMs / 1000)` which is passed in from the parent (WaveformPlayer, WaveformEditor, PublicPlayer). Chip colors match stamp type (fire=red, keep=yellow, uncertain=orange, idea=blue). The row accepts an optional `className` prop for layout customisation across its three usage contexts.","decisions":[{"decision":"Stamp chips are <button> elements, not styled divs","rationale":"Div elements are not keyboard-accessible and do not reliably receive touch events on all browsers. <button> is semantically correct for interactive elements and gets keyboard focus, Enter/Space activation, and proper touch event handling for free.","date":"2026-04-11"}],"implementation":"components/clips/StampJumpRow.tsx: props { stamps: Stamp[], onSeek: (timeSecs: number) => void, className?: string }. Maps stamps to button elements. formatTime(ms) → 'M:SS' helper. Returns null when stamps.length === 0.","knownLimitations":["Stamp chips are ordered by creation (recording order), not by timestamp — if a user stamped out of order, chips appear out of sequence relative to the waveform"],"tags":["stamps","waveform","navigation","playback","accessibility","shared-component"],"successCriteria":"- Chips rendered as <button> elements (keyboard accessible, screen-reader compatible)\n- Each chip: aria-label='Jump to M:SS' (time formatted in human-readable minutes:seconds)\n- Tap calls onSeek with timestamp in seconds\n- Chip colors: fire=#ef4444, keep=#eab308, uncertain=#f97316, idea=#3b82f6\n- Hidden when stamps array is empty (returns null)\n- className prop accepted for layout context (WaveformPlayer vs. Editor vs. PublicPlayer)","domain":"editing","priority":2,"userGuide":"Colored dots along the bottom of the waveform mark moments stamped during recording. Tap any dot to jump to that moment in the audio.","componentFile":"components/clips/StampJumpRow.tsx"},{"featureKey":"odio-2026-011","title":"Timeline Editor — WaveformPlayer, WaveformEditor, Cut Regions, Version Submit","status":"active","problem":"Band members need to trim dead air and setup noise from a recording — visually, in a browser, on a phone in a car or on a laptop at home — and preview the result before committing it as a new version. The clip detail page needs a pure playback experience that skips cuts during listen; the edit page needs a full-screen editor for creating cut regions.","analysis":"Two dedicated components with separate concerns:\n\n**WaveformPlayer** (clip detail page) — pure playback. Receives activeCuts from parent (ClipDetailClient). Visualises cuts as near-opaque dark bands (pure CSS divs with pointer-events:none) — they display cuts but never block click-to-seek. Skip-cuts during playback via timeupdate handler inside useWaveSurfer. H:MM:SS clock + virtual duration display. Stamp chips rendered via StampJumpRow (tappable button per chip, seeks to timestamp on tap). WaveformPlayButton for play/pause.\n\n**WaveformEditor** (edit page, always edit mode) — cut creation, trimming, and split. WaveSurfer.create({ interact: false }) throughout — no built-in click/drag handling. All pointer events are captured by a single overlay div inside WaveformCanvas (absolute inset-0, touch-none, z-index 20). useCutInteraction handles the drag state machine for trim mode: tap (<8px movement delta) → seek; drag → create new cut region; drag within 24px of an existing cut boundary → resize that edge. useSplitInteraction handles split mode: tap → seek; drag → move split marker live. Cut bands are pure CSS divs rendered by WaveformCanvas — no WaveSurfer RegionsPlugin is used anywhere. WaveformEditor is a thin coordinator; all sub-features are in dedicated modules (see implementation).\n\nAudio for both is served from /api/audio/[clipId] — a Next.js route that proxies Drive with Range request support, forwarding the user's stored token server-side.","decisions":[{"decision":"WaveformPlayer and WaveformEditor are separate components","rationale":"A single component handling both playback and editing requires mode-switching logic, conditional overlays, and competing event handlers. Separate components have clear single responsibilities: Player = listen, Editor = cut. The edit page is always in edit mode; no toggle needed. The detail page never needs editing. Each component can be reasoned about and tested independently.","date":"2026-04-11"},{"decision":"interact:false + single overlay div for all pointer handling (no enableDragSelection)","rationale":"WaveSurfer's enableDragSelection registers a permanent pointer overlay that consumes all pointer events — including click-to-seek. Once called, seeking by clicking is broken. interact:false disables WaveSurfer's built-in event handling entirely. A single custom overlay div (absolute inset-0, touch-none, z-20) inside WaveformCanvas intercepts all pointer events and delegates to useCutInteraction (trim mode) or useSplitInteraction (split mode). Both hooks implement the tap-vs-drag state machine and setPointerCapture for mobile.","alternativesConsidered":["interact:true + WaveSurfer's built-in seek — breaks once enableDragSelection is called","RegionsPlugin for cut visualization — adds DOM weight, region resize handles conflict with overlay"],"date":"2026-04-15"},{"decision":"Cut bands are pure CSS divs, not WaveSurfer regions","rationale":"WaveSurfer RegionsPlugin creates DOM nodes inside the waveform container that sit above the waveform canvas. These nodes intercept pointer events even with pointerEvents:none on individual regions because the RegionsPlugin wrapper div captures them first. Pure CSS absolute-positioned divs with pointer-events:none do not interfere with the overlay div at all, and their position can be computed from millisecond values without any WaveSurfer API calls.","alternativesConsidered":["WaveSurfer RegionsPlugin — conflicts with custom overlay, harder to scroll-correct positions","Canvas overlay — requires repainting on every animation frame; CSS divs reflow only on prop change"],"date":"2026-04-15"},{"decision":"Stamp chips in WaveformPlayer/WaveformEditor/PublicPlayer are tappable buttons via StampJumpRow","rationale":"Divs are not keyboard-accessible and do not receive touch events reliably on all browsers. Using <button> elements makes stamp chips proper interactive controls. StampJumpRow is a shared component used by all three players — one source of truth for chip styling and seek behavior.","date":"2026-04-11"},{"decision":"Split navigates to session page, not back to clip detail","rationale":"After a split, two clips exist. router.back() would go back to the original clip's detail page — the user would not see Part B at all without manually navigating. router.push(sessionHref) lands on the session clip list where both Part A and Part B are visible and accessible.","date":"2026-04-11"},{"decision":"Virtual cut preview via seek — no re-encode","rationale":"Re-encoding for preview requires server round-trip or WASM FFmpeg. WaveSurfer can seek to any position — skip cut regions during playback by intercepting timeupdate events in useWaveSurfer. Zero server cost, instant response.","date":"2026-04-10"},{"decision":"Drive audio proxied through Next.js API route","rationale":"Drive API download URLs require an Authorization header with the user's access token. Browsers cannot add auth headers to an <audio> src or WaveSurfer source URL. Proxying through a Next.js API route (which has the token server-side) solves this without exposing the token to the client.","date":"2026-04-10"},{"decision":"localStorage for in-progress edit safety","rationale":"Full offline sync adds complexity. The real risk is a browser crash mid-edit. localStorage persists cut marks across crashes. Key: odio:draft:{clipId}. Cleared on successful submit.","date":"2026-04-10"}],"implementation":"1. components/clips/WaveformEditor.tsx: thin coordinator. Owns: cutMarks[] state + ref, zoom level + ref, submit/split async flows, sheet open states. Delegates all UI and interaction to the 15 sub-modules below. Architecture note: the waveform card is never conditionally unmounted — unmounting WaveSurfer's containerRef div at 0px breaks the canvas.\n2. components/clips/useWaveSurfer.ts: WaveSurfer 7.x lifecycle (create, load, destroy, retry). interact:false — no built-in click/drag. Exposes: containerRef, scrollContainerRef, basePxPerSecRef, effectiveDurMsRef, wsState, isPlaying, currentTimeMs, effectiveDurationMs, seek, togglePlay, applyZoom, retry, waveScrollLeft, waveTotalWidth, audioDurationMismatch, audioErrorStatus.\n3. components/clips/useCutInteraction.ts: pointer state machine for trim mode. Reads cutMarksRef + basePxPerSecRef for hit detection. Tap (<8px delta) → seek; drag start → create new cut; drag within 24px of a cut edge → resize that edge. setPointerCapture on pointerDown for mobile reliability. Returns { pointerHandlers, cursorStyle, previewCut }.\n4. components/clips/useSplitInteraction.ts: pointer state machine for split mode. Tap → seek; drag → call onSetSplitMs live. setPointerCapture pattern. Returns { pointerHandlers, cursorStyle }.\n5. components/clips/useCutDraft.ts: localStorage auto-save on every cutMarks change. Key: odio:draft:{clipId}. Reads on mount, clears on submit. Returns { hasDraft, resume, dismiss, clear }.\n6. components/clips/WaveformCanvas.tsx: pure presenter — no state, no WaveSurfer access. Renders: WaveSurfer mount div (interact:false), cut bands (CSS divs, pointer-events:none), preview cut band (during drag-create), edge grip indicators (24px hit zones as visual markers), drag overlay div (single div at z-20 that intercepts all pointer events), split marker (cyan vertical line with drag handle). variant='edit' uses red bands + edge handles; variant='player' uses dark masking bands with no handles.\n7. components/clips/WaveformSplitter.tsx: split mode controls panel — Part A duration / split marker time / Part B duration + Mark Here / Confirm / Cancel buttons.\n8. components/clips/WaveformZoomControls.tsx: zoom in/out buttons + visible-duration label. ZOOM_LEVELS = [1, 2, 4, 8, 16, 32, 64]x.\n9. components/clips/WaveformPlayButton.tsx: shared amber circular play/pause button (80px). Used by WaveformEditor, WaveformPlayer, PublicPlayer.\n10. components/clips/StampJumpRow.tsx: row of tappable stamp chips that seek to timestamp on tap. Used by WaveformEditor, WaveformPlayer, PublicPlayer. Accepts optional className for layout customisation.\n11. components/clips/EditorToolbar.tsx: Trim / Clear all / Split quick-action buttons. hasCuts prop enables/disables Clear all.\n12. components/clips/CutList.tsx: cut list rows with expand/collapse, nudge controls (±10ms, ±100ms), remove button, zoom-to-cut, jump-to-start. expandedCutId controlled externally by WaveformEditor.\n13. components/clips/DraftRestoreBanner.tsx: banner offering to resume a saved draft. Only shown when show=true (controlled by hasDraft && cutMarks.length === 0).\n14. components/clips/VersionStartPicker.tsx: 'Start from vN' shortcut buttons that load a version's cutMarks into the editor. Returns null when versions.length === 0.\n15. components/clips/SubmitVersionSheet.tsx: bottom sheet — description input + submit button. Owns description/submitting/error state. Parent passes onSubmit(description): Promise<void> that throws on error; sheet catches and displays error inline.\n16. components/clips/SplitConfirmSheet.tsx: bottom sheet — split confirmation with splitMs display. Owns splitting/error state. Parent passes onConfirm(): Promise<void> that throws on error.\n17. app/api/audio/[clipId]/route.ts: proxies Drive audio with Range header forwarding. Fetches band member's token from NextAuth accounts table.\n18. lib/utils.ts: formatPosition(ms) → H:MM:SS. formatDuration(ms) → M:SS. calcResultDuration(sourceDurationMs, cuts[]) → virtual result duration. formatDurationDiff(ms, cuts[]) → result duration string with diff indicator.","knownLimitations":["Audio proxy route adds latency vs direct URL — mitigated by the server having fast egress to Google's CDN","If the clip's Drive file is unavailable (recorder revoked share, Drive outage), editor shows an error with Reconnect Drive option","Zoom level resets to 1x when entering split mode — by design, split mode always shows the full waveform for context"],"tags":["wavesurfer","waveform","cut-regions","preview","web","touch","localstorage","waveform-player","waveform-editor","skip-cuts","split","trim","stamps"],"successCriteria":"- Waveform renders within 3 seconds of opening on a typical 10-min clip\n- Audio plays via Drive proxied URL — seeking supported via Range requests\n- Click-to-seek works — clicking anywhere on the waveform moves the playhead; play starts from that position\n- Stamp chips in WaveformPlayer are tappable <button> elements that seek to their timestamp\n- Cut regions in WaveformPlayer are dark overlays with pointer-events:none — they display cuts but never block click-to-seek\n- Skip-cuts playback works in WaveformPlayer: entering a cut region during play immediately jumps to region end\n- Drag on the WaveformEditor waveform creates a red cut region\n- Dragging within 24px of an existing cut edge resizes that edge (no remove-and-redraw needed)\n- Tap (< 8px movement) in WaveformEditor seeks without creating a region\n- Trim button pre-seeds start cut + end cut at 20% from each boundary\n- Clear All button removes all cuts\n- Split: marks a time → creates Part B clip + v2 on original → navigates to session page showing both\n- 'Start from vN' pills load a previous version's cuts as starting point\n- Submit button active when cuts exist — description optional\n- Draft auto-saved on every cut change; Resume/Dismiss banner shown on reopen after crash\n- Tab bar hidden during editing (edit page is near full-screen)\n- Virtual result duration updates in real time in WaveformEditor top bar","domain":"editing","priority":2,"userGuide":"From a clip's detail page, the waveform player shows cuts as dark overlays. Tap any stamp chip to jump to that moment. Click-to-seek works anywhere on the waveform — even on cut overlays. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; drag the edge of an existing region to resize it; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song into two clips at a chosen time position. Tap 'Start from vN' to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional. Draft cuts survive browser crashes and are recovered on reopen.","componentFile":"components/clips/WaveformEditor.tsx"},{"featureKey":"odio-2026-033","title":"VersionCard — Version Row in Clip Detail Version List","status":"active","problem":"The clip detail page lists all versions of a clip newest-first. Each row must communicate: which version it is, who made it, when, and how long the result is — plus allow selecting it for playback and jumping into the editor. This is the highest-frequency interaction on the clip detail screen.","analysis":"VersionCard renders one version row. Layout: single-line header `v{N} · {name} · {relativeTime} · {duration}`, description line (2-line clamp, 'Show more' if long), mini-player (play/pause 40px circle + elapsed timer), vote row (Keep/Revise/Pass + tally), 'Edit from this version' link.\n\nTruncation: display name max 12ch + ellipsis. Timestamp and duration always visible. Result duration in ui-monospace.\n\nSelection: tapping the card (outside mini-player) sets this version as the selected version in ClipDetailClient → syncs WaveformPlayer's activeCuts. Selected card: amber left border.\n\nFrozen state: 'Edit from this version' hidden entirely (not greyed). Vote buttons hidden entirely. Lock icon (🔒) visible on the version header if this version is the frozen one.","decisions":[{"decision":"Vote buttons hidden (not disabled) on frozen clips","rationale":"A frozen clip is decided — voting UI has no purpose and adds visual noise. Hiding it entirely keeps the frozen version card clean. Non-frozen versions on a frozen clip should also not show vote buttons — the versioning workflow is over.","date":"2026-04-15"},{"decision":"Mini-player controlled by parent (isPlaying, onPlayToggle props)","rationale":"Only one mini-player can be active at a time. If each VersionCard owned its own audio element, multiple could play simultaneously. Parent ClipDetailClient tracks activePlayingVersionId and passes isPlaying=true to the correct card only.","date":"2026-04-15"}],"implementation":"components/clips/VersionCard.tsx: props { version, isSelected, isFrozen, isTheFrozenVersion, isPlaying, onSelect, onPlayToggle, onVote, currentUserVote, voteTally, canEdit }. Renders in flex-col. Tap handler on wrapping div calls onSelect. Mini-player calls onPlayToggle. Vote buttons call onVote(value). 'Edit from this version': <Link href={editHref} /> hidden when isFrozen.","knownLimitations":["Relative time ('5 min ago') uses client-side date computation — may be stale between polls","Description 'Show more' expands in-place — no animation"],"tags":["version","clip-detail","mini-player","playback","selection","truncation"],"successCriteria":"- Renders v{N}, truncated name (12ch max), relative time, duration in one line\n- Description 2-line clamped with 'Show more' if > 2 lines\n- Mini-player play/pause button (40px) plays this version's audio from start\n- Only one mini-player active at a time (controlled by parent)\n- Vote row: Keep/Revise/Pass buttons, tally visible below\n- Votes are mutable (tapping another option replaces)\n- 'Edit from this version' links to /edit?fromVersionId={id}\n- On frozen clip: 'Edit from this version' hidden, vote buttons hidden, lock icon on frozen version\n- Selected card: amber left border (4px)\n- Tap outside mini-player selects card and notifies parent","domain":"versioning","priority":2,"userGuide":"Each row in the clip's version list represents one edit. Tap the row to hear that version in the waveform player above. Tap the play button to listen to just that version inline. Vote Keep, Revise, or Pass to share your opinion with the band.","componentFile":"components/clips/VersionCard.tsx"},{"featureKey":"odio-2026-034","title":"VotePanel — Keep / Revise / Pass Vote UI","status":"active","problem":"After editing, the band needs to converge on which version is ready. A lightweight vote (Keep/Revise/Pass) scoped per version gives structure to 'should we ship this cut?' without requiring a group call or a long comment thread.","analysis":"VotePanel renders three vote buttons (Keep / Revise / Pass) and the current vote tally. It appears both in VersionCard rows (compact inline layout) and in the CollaborationSection Team tab (full-width layout).\n\nVotes are per-version per-member. The current user's active vote is highlighted (amber border on selected button). Tapping a different option immediately replaces the previous vote (optimistic update via PATCH /api/clips/[clipId]/votes). Tally shown as `2 Keep · 1 Revise` in text-xs text-secondary.\n\nFrozen clips: VotePanel hidden entirely (isFrozen prop).\n\nAll-voted-Keep detection: CollaborationSection (not VotePanel) checks if all members have voted Keep on the same version and shows the auto-freeze prompt.","decisions":[{"decision":"Votes are mutable — tapping a different option replaces current vote","rationale":"Band opinions evolve as new versions are submitted. A member who voted Revise on v2 should be able to change to Keep on v3 without a delete-then-create flow. PATCH endpoint upserts on (clipId, userEmail) unique constraint.","date":"2026-04-15"}],"implementation":"components/clips/VotePanel.tsx: props { versionId, currentUserVote: VoteValue|null, tallies: {KEEP:n, REVISE:n, PASS:n}, onVote: (value: VoteValue) => void, isFrozen: boolean, isOnline?: boolean }. Three button elements, aria-pressed on active. Tally below. Calls onVote on tap (parent handles optimistic update + API call).","knownLimitations":["Vote button layout is cramped on narrow screens when all three labels are shown — consider icon-only mode below 320px"],"tags":["votes","collaboration","polling","keep","revise","pass","clip-detail"],"successCriteria":"- Keep/Revise/Pass buttons rendered equally spaced\n- Current user's vote highlighted with amber border\n- Tapping another option: optimistic UI update immediately, PATCH to Postgres\n- Tally shows all vote counts in text-xs below buttons\n- Votes can be cast on any version (not just latest)\n- Hidden (returns null) when isFrozen\n- Disabled (aria-disabled) when offline (isOnline=false prop)","domain":"collaboration","priority":2,"userGuide":"Tap Keep, Revise, or Pass to vote on a version. You can change your vote anytime. The tally below shows what everyone thinks.","componentFile":"components/clips/VotePanel.tsx"},{"featureKey":"odio-2026-010","title":"Upload Banner — Persistent Upload Progress Across All Pages","status":"active","problem":"After stopping a recording, the band member needs to navigate away (to another song, to the session list, to collaborate) without losing visibility into whether the upload succeeded. The upload progress must persist across all pages — not just the record screen — as a fixed top banner.","analysis":"UploadBanner.tsx is a fixed-position (top-0, z-50) client component mounted in AuthShell, making it visible on every authenticated page. It receives the list of active pending uploads from usePendingUploads and renders the most actionable one prominently.\n\nStatus priority order: token-error > session-error > paused > uploading. The most actionable upload is shown first — an error that requires human action is more urgent than an active upload or a paused one.\n\nThree visual variants:\n- **uploading**: amber background, spinner icon, progress bar below text (byteOffset / blob.size)\n- **paused**: elevated background, no spinner, Retry button\n- **error**: danger/10 background, red text, Retry + 'Save file' buttons\n\nProgress bar is shown for active uploads only, using byteOffset from IndexedDB to compute percentage. When multiple uploads are pending, the banner shows the primary one with '+N more' count.\n\nThe banner auto-dismisses (returns null) when uploads.length === 0 — no manual close button for active uploads, since closing it would hide critical progress state.","decisions":[{"decision":"Most actionable upload shown first — errors before paused before active","rationale":"A token error requires a human action (band creator re-authorizes). A session error requires sign-in. These block recovery and are more urgent than an active upload silently progressing. Showing errors first ensures the user notices and acts on the blocker rather than assuming uploads are fine.","date":"2026-04-10"},{"decision":"No close button on active/paused uploads; dismiss button only on error states","rationale":"Closing an active or paused upload banner hides critical progress state and gives false confidence. But permanently blocking the UI for an unresolvable error (token-error, session-error) that the user cannot fix immediately is hostile — they may need to navigate while waiting for the creator to re-authorize. Error states have an ✕ dismiss button that hides the banner without discarding the upload (it can still be retried from any page).","date":"2026-04-11"}],"implementation":"1. components/common/UploadBanner.tsx: client component. Fixed position top-0, full-width, z-50. On desktop (md+) offset right to avoid sidebar: md:left-[220px]. Progress percentage computed as a dedicated numeric variable (not inline JSX short-circuit, which renders literal '0' when byteOffset is 0): progressPercent = blob.size > 0 && byteOffset != null ? Math.round(byteOffset / blob.size * 100) : 0. Progress bar is absolute bottom-0 (2px strip, stable height). Error states (token-error, session-error) include a dismiss ✕ button — active/paused uploads do not. Uses ResizeObserver to write its height to --upload-banner-h CSS variable so sticky headers below can offset correctly. Returns null when uploads.length === 0.\n2. components/layout/AuthShell.tsx: mounts UploadBanner + BottomTabBar at auth layout level. Passes upload state from usePendingUploads hook.\n3. hooks/usePendingUploads.ts: reads IndexedDB on mount, drives retry state machine, exposes uploads[], retry/discard/saveToDevice handlers to AuthShell.\n4. app/record/post/page.tsx: PostRecordScreen.doUpload() calls usePendingUploadsStore.getState().refresh() on every status-changing path (success, session-error, token-error, paused, catch) so the Zustand store stays in sync with IndexedDB and the banner dismisses immediately after upload completes without requiring a page refresh.","knownLimitations":["Banner occupies top space — sticky headers below must consume --upload-banner-h CSS variable; new pages with their own sticky headers need to adopt this pattern","On desktop the banner is offset md:left-[220px] to avoid the sidebar; if the sidebar width changes, this value must be updated manually","Progress bar accuracy depends on IndexedDB byteOffset being updated frequently during upload; if updates are sparse, the bar may jump","'Save file' downloads the raw browser-recorded blob (WebM on Chrome, AAC/MP4 on Safari) — not the transcoded AAC that would normally be stored in Drive"],"tags":["upload","banner","progress","resilience","indexeddb","retry","fixed-ui"],"successCriteria":"- Banner visible on every authenticated page during any upload state\n- Active upload: amber background, spinner, clip name, progress bar at bottom of banner\n- Paused upload: shows 'Upload paused — waiting for connection' with Retry button\n- Token error: shows 'Drive connection needs renewal — ask band creator to re-authorize' with Retry + Save file buttons\n- Session error: shows 'Session expired — sign in again to resume upload' with Retry + Save file buttons\n- Multiple pending: shows primary (most urgent) with '+N more' count\n- Banner disappears when all uploads complete (uploads.length === 0)\n- 'Save file' triggers browser download of raw blob (.aac or .webm)","domain":"recording","priority":2,"userGuide":"After stopping a recording, a banner appears at the top of every screen showing upload progress. If the upload completes successfully, the banner disappears automatically. If the connection drops, the banner shows 'Upload paused' with a Retry button — tap it once reconnected. If the band creator's Drive connection expires, the banner shows an error with a 'Save file' button as a last resort to download the raw recording to your device.","componentFile":"components/common/UploadBanner.tsx"},{"featureKey":"odio-2026-029","title":"LiveWaveform — Real-Time Audio Level Meter During Recording","status":"active","problem":"The recorder needs immediate visual confirmation that their microphone is active and capturing audio. A static screen during recording creates anxiety — is it actually recording? Is the mic too quiet? Is anything happening?","analysis":"LiveWaveform renders a horizontal level meter bar (8px tall, full-width) that responds to real-time audio input level. Uses the Web Audio API: `getUserMedia` → `AudioContext` → `AnalyserNode` → `getByteFrequencyData` → RMS level computation → bar fill width as percentage.\n\nBar colors: amber fill (`bg-accent`) on dark background (`bg-surface`). Updates at ~60fps via `requestAnimationFrame` loop. Smooth trailing: current displayed level decays to actual level at ~80% per frame (prevents jarring jumps on silence).\n\nDistinct from AudioBars: LiveWaveform is a horizontal bar (level meter convention on recording screens), AudioBars is a vertical bars decoration for other contexts.","decisions":[{"decision":"LiveWaveform receives analyserNode as a prop — does not own getUserMedia","rationale":"A single MediaStream and AudioContext must be shared between LiveWaveform (for visualization) and MediaRecorder (for recording). If LiveWaveform owned getUserMedia, there would be two mic permission requests and two separate streams. The parent recording page owns the stream and passes the analyserNode down.","date":"2026-04-15"}],"implementation":"components/recording/LiveWaveform.tsx: receives `analyserNode: AnalyserNode | null` prop. Internal requestAnimationFrame loop reads frequency data, computes RMS → sets level state with decay. Renders a div with `width: ${level * 100}%` inline style. When analyserNode is null (mic not yet acquired): bar stays at 0.","knownLimitations":["AudioContext is suspended on iOS until a user gesture — level meter may start at 0 even after mic permission is granted; parent must call audioContext.resume() on first user tap","Decay rate is hardcoded to 0.8x per frame — not configurable"],"tags":["recording","audio","level-meter","waveform","real-time","web-audio"],"successCriteria":"- Horizontal bar fills proportionally to microphone input level\n- Smooth animation — no jarring jumps, natural decay on silence\n- Updates at ~60fps\n- bar height: 8px, full width\n- Amber fill on dark background\n- Bar does not flicker to zero between frames on normal speech","domain":"recording","priority":2,"userGuide":"The amber bar at the top of the recording screen moves in response to sound. If it stays still while you're speaking, your microphone may not be working.","componentFile":"components/recording/LiveWaveform.tsx"},{"featureKey":"odio-2026-054","title":"SessionHeaderClient — Session Page Title with Inline Name Edit","status":"active","problem":"The session clip list needs a page title that shows the session name and allows inline rename (tap to edit). The rename must PATCH to Postgres immediately — no separate save button.","analysis":"SessionHeaderClient renders the page header for the session clip list page. Uses InlineEdit component for the session name. Session name is the h1/page title. Renders as a client component because InlineEdit requires interactivity.\n\nAlso renders the '+ New Clip' or session-level action buttons in the header right slot (passed to PageLayout's headerRight prop).","decisions":[],"implementation":"components/sessions/SessionHeaderClient.tsx: 'use client'. Props { session, canEdit }. Uses InlineEdit for session.name with onSave calling PATCH API.","knownLimitations":[],"tags":["session","header","inline-edit","rename","navigation"],"successCriteria":"- Session name rendered as tappable InlineEdit (max 40ch)\n- Tap → keyboard opens, inline input\n- Save (Return) → PATCH /api/sessions/[sessionId] { name }, page title updates immediately\n- Cancel (blur/Escape) → reverts to original name\n- Header right slot: '+ New Clip' for Recorder/Editor, absent for Member","domain":"sessions","priority":2,"userGuide":"Tap the session name at the top of a session to rename it. Changes are saved automatically when you press Return.","componentFile":"components/sessions/SessionHeaderClient.tsx"},{"featureKey":"odio-2026-027","title":"AudioBars — Animated Audio Level Indicator","status":"frozen","problem":"During recording, the user needs visual confirmation that the microphone is picking up sound. Without a level indicator, they cannot tell if the mic is connected, if it's recording silence, or if audio is clipping.","analysis":"AnimatedAudioBars renders a row of N vertical bars (default 5) that animate in height proportional to the current audio level (0.0–1.0). Used as the level meter on the Recording Screen. Receives a `level` prop (0–1, updated from Web Audio API AnalyserNode at ~60fps). Bar heights computed from `level` with some randomization per bar for a natural look. Colors: amber (#f59e0b) when level > 0, muted when silent.","decisions":[{"decision":"AudioBars is purely presentational — receives level as a prop","rationale":"Audio level computation (Web Audio API AnalyserNode, getByteFrequencyData) belongs in a hook, not a UI component. The component stays pure and reusable; the hook handles the browser API.","date":"2026-04-15"}],"implementation":"components/ui/AudioBars.tsx: props { level: number (0-1), barCount?: number }. Pure visual component — no audio API. Level is passed in from the parent recording hook (useAudioLevel or equivalent). Bars rendered as inline flex divs with height computed as `min + (level * range) + noise`.","knownLimitations":["Level computation is frequency-averaged — clipping (levels > 1.0 from Web Audio) is clamped to 1.0 without a visual warning","Bar count is fixed at construction — responsive reflow not supported"],"tags":["audio","level-meter","animation","recording","ui-primitive"],"successCriteria":"- Bars animate responsively to audio level input\n- Silent input: bars at minimum height (not zero — they should breathe slightly)\n- Loud input: bars reach near-maximum height\n- Smooth animation (requestAnimationFrame update from parent, no internal interval)\n- Amber color when active, text-muted when silent\n- Accessible: aria-hidden (purely decorative, level confirmed by text elsewhere)","domain":"recording","priority":2,"userGuide":"The animated bars on the recording screen show that your microphone is working. If they don't move when you speak, check your mic permissions.","componentFile":"components/ui/AudioBars.tsx"},{"featureKey":"odio-2026-023","title":"EmptyState — Zero-Content Placeholder with Action","status":"active","problem":"Several screens (Session List, Clip List, Band Members) can be empty on first visit or after deletes. A blank screen gives no guidance on what to do next — users need a visual cue that emptiness is intentional plus a clear next action.","analysis":"Centered layout: icon (large, text-muted), heading (text-xl text-primary), subtext (text-sm text-secondary), optional primary CTA button. Used by:\n- Session List empty: icon=mic, heading='No sessions yet', subtext='Tap Record to capture your first jam', CTA='Record'\n- Clip List empty: icon=music-note, heading='No clips', subtext='Start a new session to record'\n- Member list empty: icon=users, heading='Just you', subtext='Share the invite link to bring your bandmates'\nThe `actionHref` prop uses ButtonLink for client-side navigation. `onAction` callback prop available for non-navigation actions (e.g., opening the tab).","decisions":[{"decision":"Role-based CTA filtering is the caller's responsibility, not EmptyState's","rationale":"EmptyState is a generic UI primitive — it should not know about band roles. The caller (Session List page) passes actionLabel only when the current user is allowed to take that action. EmptyState renders whatever it receives.","date":"2026-04-15"}],"implementation":"components/ui/EmptyState.tsx: props { icon: LucideIcon, heading: string, subtext?: string, actionLabel?: string, actionHref?: string, onAction?: () => void }. Renders icon via `<Icon className='w-12 h-12 text-muted' />`. ButtonLink if actionHref provided; Button with onClick if onAction provided. Neither if no actionLabel.","knownLimitations":["Only supports a single CTA — multi-action empty states (e.g., 'Create band' or 'Join band') must be handled with custom layouts"],"tags":["empty-state","onboarding","zero-state","ui-primitive","accessibility"],"successCriteria":"- Renders in center of available space (flex col, items-center, justify-center, min-h set by caller)\n- Icon: lucide icon name passed as prop, rendered at 48px, text-muted color\n- Heading: text-xl text-primary font-semibold\n- Subtext: text-sm text-secondary mt-2\n- CTA button: amber primary variant, shown only when actionLabel prop is provided\n- Role-conditional CTA: Record button hidden for MEMBER-role users on Session List empty state (caller handles role check before passing actionLabel prop)","domain":"app-shell","priority":2,"userGuide":"When a list has no items, a helpful message appears explaining the empty state and offering the next action to take.","componentFile":"components/ui/EmptyState.tsx"},{"featureKey":"odio-2026-024","title":"InlineEdit — Tap-to-Edit Text Field","status":"active","problem":"Session names, clip names, and band name are all editable. Adding a separate 'Edit' icon/button next to each name clutters the UI, especially on small-screen cards. The standard pattern in mobile UIs is tap-the-text-to-edit.","analysis":"InlineEdit renders as text in view mode. On tap: transitions to an `<input>` with the same text styling (no visual reflow — same font size, weight, color). Keyboard opens. Return/Done key saves to Postgres via `onSave(value)` callback (async). Tap away (blur) discards. Escape discards. Character limit enforced via `maxLength`. Empty value is not saved — reverts to previous value.\n\nUsed by: session name (max 40ch), clip name (max 60ch), band name (max 40ch).","decisions":[{"decision":"Tap away (blur) discards rather than saves","rationale":"On mobile, the keyboard dismiss gesture triggers a blur event. If blur = save, accidentally dismissing the keyboard would commit an incomplete name. Explicit Return/Done is the save gesture — blur is always a cancel.","date":"2026-04-15"}],"implementation":"components/ui/InlineEdit.tsx: props { valu
