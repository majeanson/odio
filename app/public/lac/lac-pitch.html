<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Odio — Pitch Deck</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0b09; color: #e8e0d4; font-family: system-ui, -apple-system, sans-serif; }

.deck { position: fixed; inset: 0; }

/* Slide */
.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 48px 64px;
  transform: translateX(100%);
  transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}
.slide.active  { transform: translateX(0); }
.slide.prev    { transform: translateX(-100%); }

/* Cover */
.cover { background: radial-gradient(ellipse at 30% 30%, #1a1508 0%, #0d0b09 65%); }
.cover-eyebrow { font-size: 13px; color: #d4a853; font-family: monospace; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 20px; }
.cover-title { font-size: clamp(36px, 6vw, 72px); font-weight: 800; text-align: center; line-height: 1.1; letter-spacing: -.02em; margin-bottom: 20px; }
.cover-tagline { font-size: clamp(14px, 2vw, 20px); color: #8a7f74; text-align: center; max-width: 640px; line-height: 1.55; margin-bottom: 40px; }
.cover-pills { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
.cover-pill { font-size: 13px; padding: 6px 16px; border-radius: 20px; border: 1px solid #2a2724; color: #8a7f74; font-family: monospace; }
.cover-pill span { color: #d4a853; font-weight: 700; }

/* Overview */
.overview { background: #0d0b09; }
.slide-title { font-size: clamp(24px, 4vw, 48px); font-weight: 700; text-align: center; margin-bottom: 40px; letter-spacing: -.01em; }
.overview-stats { display: flex; gap: 40px; margin-bottom: 48px; flex-wrap: wrap; justify-content: center; }
.stat-block { text-align: center; }
.stat-num { font-size: clamp(48px, 7vw, 88px); font-weight: 800; font-family: monospace; }
.stat-label { font-size: 14px; color: #8a7f74; margin-top: 4px; }
.domain-cloud { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
.domain-chip { font-size: 13px; padding: 6px 14px; border-radius: 14px; background: #1a1714; border: 1px solid #2a2724; color: #8a7f74; }

/* Domain slide */
.domain-slide { text-align: left; align-items: flex-start; }
.domain-eyebrow { font-size: 11px; color: #d4a853; font-family: monospace; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 16px; }
.domain-title { font-size: clamp(32px, 5vw, 64px); font-weight: 800; letter-spacing: -.02em; margin-bottom: 32px; }
.domain-features { display: flex; flex-direction: column; gap: 10px; max-width: 640px; }
.domain-feat { display: flex; align-items: center; gap: 12px; }
.feat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.feat-title { font-size: clamp(13px, 1.8vw, 18px); color: #c8c0b4; line-height: 1.3; }
.domain-stat { margin-top: 32px; font-size: 13px; color: #8a7f74; font-family: monospace; }

/* Feature slide */
.feature-slide { align-items: flex-start; text-align: left; }
.feature-domain { font-size: 11px; color: #d4a853; font-family: monospace; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 16px; }
.feature-title { font-size: clamp(24px, 4vw, 48px); font-weight: 700; line-height: 1.2; letter-spacing: -.01em; margin-bottom: 24px; max-width: 800px; }
.feature-guide-label { font-size: 11px; color: #4aad72; font-family: monospace; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.feature-guide { font-size: clamp(15px, 2vw, 20px); color: #c8c0b4; line-height: 1.65; max-width: 680px; margin-bottom: 28px; }
.feature-decision { font-size: 13px; color: #8a7f74; border-left: 2px solid #d4a853; padding-left: 12px; max-width: 600px; line-height: 1.5; }
.feature-key { font-size: 10px; color: #3a3530; font-family: monospace; position: absolute; bottom: 60px; right: 64px; }

/* Decisions slide */
.decisions-grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; max-width: 960px; }
.decision-card {
  flex: 1; min-width: 240px; max-width: 280px;
  background: #1a1714; border: 1px solid #2a2724; border-radius: 12px;
  padding: 20px 18px;
}
.decision-meta { font-size: 10px; color: #8a7f74; font-family: monospace; margin-bottom: 10px; }
.decision-text { font-size: 14px; font-weight: 600; color: #e8e0d4; line-height: 1.4; margin-bottom: 10px; }
.decision-rationale { font-size: 12px; color: #8a7f74; line-height: 1.55; }

/* Roadmap */
.roadmap-grid { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; max-width: 960px; }
.roadmap-card {
  background: #1a1714; border: 1px solid #2a2724; border-radius: 10px;
  padding: 16px 16px 14px; min-width: 200px; max-width: 240px; flex: 1;
}
.roadmap-domain { font-size: 10px; color: #d4a853; font-family: monospace; margin-bottom: 6px; }
.roadmap-title { font-size: 13px; font-weight: 600; line-height: 1.35; margin-bottom: 6px; }
.roadmap-problem { font-size: 11px; color: #8a7f74; line-height: 1.4; }

/* Outro */
.outro { background: radial-gradient(ellipse at 70% 60%, #0f1008 0%, #0d0b09 65%); }
.outro-title { font-size: clamp(28px, 5vw, 56px); font-weight: 800; margin-bottom: 12px; letter-spacing: -.01em; }
.outro-sub { font-size: 16px; color: #8a7f74; margin-bottom: 40px; }
.outro-stats { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
.outro-stat { text-align: center; }
.outro-num { font-size: 40px; font-weight: 800; font-family: monospace; color: #d4a853; }
.outro-label { font-size: 12px; color: #8a7f74; }
.lac-badge { font-size: 12px; color: #4a4540; font-family: monospace; }

/* Nav */
.nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; align-items: center; padding: 0 32px; height: 52px; background: rgba(13,11,9,.85); backdrop-filter: blur(8px); z-index: 100; gap: 16px; }
.progress-track { flex: 1; height: 2px; background: #2a2724; border-radius: 1px; overflow: hidden; }
.progress-bar { height: 100%; background: #d4a853; border-radius: 1px; transition: width .3s ease; }
.slide-counter { font-size: 12px; color: #8a7f74; font-family: monospace; min-width: 48px; text-align: right; }
.nav-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid #2a2724; background: transparent; color: #8a7f74; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.nav-btn:hover { border-color: #d4a853; color: #d4a853; }
.key-hint { font-size: 10px; color: #3a3530; font-family: monospace; }

/* Grid overview */
.grid-overlay {
  position: fixed; inset: 0; background: rgba(13,11,9,.96); z-index: 200;
  display: none; overflow-y: auto; padding: 24px;
}
.grid-overlay.visible { display: block; }
.grid-title { font-size: 14px; color: #8a7f74; font-family: monospace; margin-bottom: 16px; letter-spacing: .05em; }
.grid-slides { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.grid-thumb {
  aspect-ratio: 16/9; border: 1px solid #2a2724; border-radius: 6px; background: #1a1714;
  cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 10px; text-align: center; transition: border-color .15s; overflow: hidden;
}
.grid-thumb:hover { border-color: #d4a853; }
.grid-thumb.active-thumb { border-color: #d4a853; border-width: 2px; }
.grid-num { font-size: 9px; color: #4a4540; font-family: monospace; margin-bottom: 4px; }
.grid-thumb-title { font-size: 10px; color: #8a7f74; line-height: 1.3; }
.grid-thumb-type { font-size: 9px; color: #4a4540; font-family: monospace; margin-top: 3px; }
</style>
</head>
<body>
<div class="deck" id="deck"></div>

<div class="nav">
  <button class="nav-btn" onclick="prev()" title="Previous (←)">‹</button>
  <div class="progress-track"><div class="progress-bar" id="prog"></div></div>
  <div class="slide-counter" id="counter">1 / 28</div>
  <button class="nav-btn" onclick="next()" title="Next (→ or Space)">›</button>
  <span class="key-hint">G=grid P=notes</span>
</div>

<div class="grid-overlay" id="grid-overlay">
  <div class="grid-title">◈ SLIDE OVERVIEW — click to jump · G or Esc to close</div>
  <div class="grid-slides" id="grid-slides"></div>
</div>

itle":"JoinBandClient — Invite Link Band Join Flow","status":"active","key":"odio-2026-050"},{"title":"BandShareButton — Invite Link and QR Code Generator","status":"active","key":"odio-2026-052"},{"title":"MemberRow — Band Member List Row with Role Management","status":"active","key":"odio-2026-049"}],"total":5,"frozen":0},{"type":"domain","domain":"collaboration","title":"Collaboration","features":[{"title":"VotePanel — Keep / Revise / Pass Vote UI","status":"active","key":"odio-2026-034"},{"title":"Collaboration — Votes, Comments, Stamp Heat Map, Activity","status":"frozen","key":"odio-2026-016"}],"total":2,"frozen":1},{"type":"domain","domain":"editing","title":"Editing","features":[{"title":"SubmitVersionSheet — Version Description and Submission Confirmation","status":"active","key":"odio-2026-043"},{"title":"WaveformCanvas — Waveform Presenter with Cut Region Overlay","status":"active","key":"odio-2026-039"},{"title":"BackNavSheet — Discard Confirmation When Leaving Editor with Unsaved Cuts","status":"draft","key":"odio-2026-045"},{"title":"CutList — Cut Region List with Nudge Controls","status":"active","key":"odio-2026-041"},{"title":"DraftRestoreBanner — Recover Unsaved Cuts After Browser Crash","status":"active","key":"odio-2026-042"},{"title":"EditorToolbar — Trim / Clear All / Split Quick-Action Buttons","status":"active","key":"odio-2026-040"},{"title":"StampJumpRow — Tappable Stamp Chips for Waveform Seek","status":"frozen","key":"odio-2026-038"},{"title":"Timeline Editor — WaveformPlayer, WaveformEditor, Cut Regions, Version Submit","status":"active","key":"odio-2026-011"}],"total":9,"frozen":1},{"type":"domain","domain":"recording","title":"Recording","features":[{"title":"StampRow — One-Tap Timestamp Annotation During Recording","status":"active","key":"odio-2026-028"},{"title":"Recording — Browser-Based Audio Capture","status":"frozen","key":"odio-2026-006"},{"title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","status":"frozen","key":"odio-2026-008"},{"title":"Upload Banner — Persistent Upload Progress Across All Pages","status":"active","key":"odio-2026-010"},{"title":"AddNoteSheet — Inline Note Capture During Recording","status":"draft","key":"odio-2026-031"},{"title":"LiveWaveform — Real-Time Audio Level Meter During Recording","status":"active","key":"odio-2026-029"},{"title":"WakeLockWarning — Screen-Lock Risk Banner Before Recording","status":"draft","key":"odio-2026-032"},{"title":"AudioBars — Animated Audio Level Indicator","status":"frozen","key":"odio-2026-027"}],"total":11,"frozen":5},{"type":"domain","domain":"render","title":"Render","features":[{"title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","status":"frozen","key":"odio-2026-002"},{"title":"Render — Server-Side FFmpeg on Freeze + Public Share","status":"frozen","key":"odio-2026-014"},{"title":"Public Share Player — Unauthenticated Clip Playback","status":"active","key":"odio-2026-015"}],"total":3,"frozen":2},{"type":"domain","domain":"sessions","title":"Sessions","features":[{"title":"Session Management — Sessions, Clips, Naming, Stages","status":"active","key":"odio-2026-007"},{"title":"ClipCard — Clip Row in Session Clip List","status":"active","key":"odio-2026-037"},{"title":"SessionHeaderClient — Session Page Title with Inline Name Edit","status":"active","key":"odio-2026-054"},{"title":"SessionNotesSheet — Session-Level Notes Editor","status":"active","key":"odio-2026-053"}],"total":4,"frozen":0},{"type":"domain","domain":"storage","title":"Storage","features":[{"title":"Storage Management — Drive Quota, Cleanup, Archive","status":"frozen","key":"odio-2026-017"}],"total":1,"frozen":1},{"type":"domain","domain":"versioning","title":"Versioning","features":[{"title":"Versioning — Version Chain, Waveform Editor, Waveform Player, Freeze","status":"active","key":"odio-2026-012"},{"title":"Clip Detail — Coordinator, Actions Panel, Freeze, Share, Stage, Cleanup","status":"active","key":"odio-2026-013"},{"title":"MiniPlayer — Inline Audio Playback on Version Cards","status":"draft","key":"odio-2026-036"},{"title":"VersionCard — Version Row in Clip Detail Version List","status":"active","key":"odio-2026-033"},{"title":"StageSelector — Clip Development Stage Picker","status":"active","key":"odio-2026-035"}],"total":5,"frozen":0},{"type":"feature","domain":"render","title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","userGuide":"This is an internal validation endpoint, not a user-facing feature. To test: GET /api/render/poc?url=<public-audio-url>. The endpoint downloads the audio, applies a test cut (removes seconds 0-10), and returns the trimmed file. Used during development to confirm Vercel can run FFmpeg before building the real render pipeline.","keyDecision":"@ffmpeg-installer/ffmpeg is the highest-risk dependency in the entire project.","key":"odio-2026-002"},{"type":"feature","domain":"auth","title":"Auth — Google OAuth via NextAuth.js","userGuide":"Users visit the app and click 'Sign in with Google'. They are prompted to grant Google Drive access (files created by Odio only). After sign-in, they are redirected to the bands home page. Sessions persist across browser restarts. Sign-out via the Band settings page. The /share/[token] public page requires no sign-in.","keyDecision":"drive.","key":"odio-2026-003"},{"type":"feature","domain":"app-shell","title":"BottomSheet — Slide-Up Modal for Confirmations and Input","userGuide":"Bottom sheets appear as a slide-up panel when you tap a destructive or important action. Tap outside the sheet or swipe it down to cancel. Tap Cancel inside the sheet to close without taking action.","keyDecision":"Irreversible operations (freeze, delete, cleanup, unfreeze) need a deliberate second step.","key":"odio-2026-021"},{"type":"feature","domain":"app-shell","title":"Button — Shared Interactive Button Component","userGuide":"Buttons throughout the app use a consistent amber (primary), red (danger), or subtle (ghost) style. All buttons are large enough to tap comfortably on mobile.","keyDecision":"Using <a href> for in-app navigation triggers full page reload.","key":"odio-2026-022"},{"type":"feature","domain":"recording","title":"Recording — Browser-Based Audio Capture","userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away.","keyDecision":"Vercel serverless functions have a 4.","key":"odio-2026-006"},{"type":"feature","domain":"render","title":"Render — Server-Side FFmpeg on Freeze + Public Share","userGuide":"On a clip's detail page, tap 'Freeze' on any version to produce the final audio file. The page shows 'Rendering…' for a few seconds, then displays a lock icon and download button. To share publicly: tap the Share icon on a frozen clip and copy the /share/[token] link. Anyone with the link can listen without signing in. To revoke public access, tap Share again and toggle it off.","keyDecision":"WASM FFmpeg is slow on mobile (~3x slower than native), memory-constrained, and adds bundle size.","key":"odio-2026-014"},{"type":"feature","domain":"recording","title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","userGuide":"Any Editor-role band member can record — not just the band creator. Editors see the Record tab in the nav and can start a recording from their own device. The audio automatically lands in the band's Drive folder (owned by the band creator). If the creator's Drive connection expires, a banner appears: 'Drive connection needs renewal — ask [creator name] to re-authorize.' The clip card shows 'Recorded by X' when the recorder is not the band creator.","keyDecision":"drive.","key":"odio-2026-008"},{"type":"feature","domain":"editing","title":"StampJumpRow — Tappable Stamp Chips for Waveform Seek","userGuide":"Colored dots along the bottom of the waveform mark moments stamped during recording. Tap any dot to jump to that moment in the audio.","keyDecision":"Div elements are not keyboard-accessible and do not reliably receive touch events on all browsers.","key":"odio-2026-038"},{"type":"feature","domain":"recording","title":"AudioBars — Animated Audio Level Indicator","userGuide":"The animated bars on the recording screen show that your microphone is working. If they don't move when you speak, check your mic permissions.","keyDecision":"Audio level computation (Web Audio API AnalyserNode, getByteFrequencyData) belongs in a hook, not a UI component.","key":"odio-2026-027"},{"type":"feature","domain":"recording","title":"Recording Resilience — IndexedDB Safety Net, Upload Retry, Save-to-Device Fallback","userGuide":"Recording resilience is automatic and invisible when things work. If an upload fails (network drops, Drive token expires), a banner appears at the top of the screen: 'You have [N] recording(s) waiting to upload'. Tap 'Retry' to resume when reconnected. Tap 'Save to device' to download the raw audio file to your phone or computer if Drive is permanently unavailable. Tap 'Discard' (with confirmation) to remove a pending recording from recovery. When the app reopens after a crash, pending recordings are detected automatically.","keyDecision":"localStorage cannot store binary blobs.","key":"odio-2026-009"},{"type":"feature","domain":"storage","title":"Storage Management — Drive Quota, Cleanup, Archive","userGuide":"In the Band tab, tap Settings to see Drive storage usage. The bar shows how many MB/GB of Drive are used by this band's recordings. After a clip is frozen and the band is happy with it, tap 'Clean up source audio' on the clip detail page to delete the raw recording from Drive — the final rendered file is kept and the clip remains fully playable. Tap 'Delete clip' (Recorder only) to permanently remove a clip and all its files from Drive.","keyDecision":"Automatic deletion after freeze could destroy recordings the band wanted to keep.","key":"odio-2026-017"},{"type":"feature","domain":"collaboration","title":"Collaboration — Votes, Comments, Stamp Heat Map, Activity","userGuide":"On a clip's detail page, the Versions tab shows all edits; the Comments tab shows the discussion. Vote on any version by tapping Keep, Revise, or Pass — the tally updates for all band members within seconds. Leave a comment in the text field (optionally tap the waveform first to attach a timestamp). When everyone has voted Keep on the same version, a banner appears prompting the Recorder or an Editor to freeze it. Comments can be edited or deleted by their author (long-press or tap the '...' menu).","keyDecision":"Voting on a clip as a whole ('is this song good?","key":"odio-2026-016"},{"type":"decisions","title":"What We Decided","decisions":[{"decision":"Split produces independent trimmed Drive files immediately (not virtual clips sharing source)","rationale":"Original model: Part A and Part B shared Song X's Drive file and applied cuts virtually — correct waveform, wrong duration in clip list (both showed full 9-min duration instead of 4 min and 5 min).","domain":"versioning","feature":"Versioning — Version Chain, Waveform Editor, Waveform Player, Freeze"},{"decision":"interact:false + single overlay div for all pointer handling (no enableDragSelection)","rationale":"WaveSurfer's enableDragSelection registers a permanent pointer overlay that consumes all pointer events — including click-to-seek.","domain":"editing","feature":"Timeline Editor — WaveformPlayer, WaveformEditor, Cut Regions, Version Submit"},{"decision":"Reuse creator's stored token — no per-member Drive setup","rationale":"drive.","domain":"recording","feature":"Multi-Recorder — Any Editor Can Record Into the Band's Drive"}]},{"type":"roadmap","title":"What's Next","features":[{"title":"Band Space — Band Creation, Invites, Drive Folder, Members","domain":"band","priority":1,"problem":"Band members need a shared space where all sessions are visible and access is controlled."},{"title":"JoinBandClient — Invite Link Band Join Flow","domain":"band","priority":1,"problem":"Most users arrive in Odio as joiners — they received an invite link from a band creator."},{"title":"SubmitVersionSheet — Version Description and Submission Confirmation","domain":"editing","priority":1,"problem":"Submitting a new version is the final step of the editing workflow."},{"title":"WaveformCanvas — Waveform Presenter with Cut Region Overlay","domain":"editing","priority":1,"problem":"The waveform display needs to show the audio waveform, cut regions (red or dark overlays), stamp dots, annotation pins, and a drag-interaction overlay — all layered correctly without WaveSurfer's built-in interactions (which conflict with custom cut region handling)."},{"title":"AuthShell — Authenticated Layout Wrapper","domain":"app-shell","priority":1,"problem":"All authenticated pages need shared layout elements: the BottomTabBar, the UploadBanner (persistent upload progress), and eventually the OfflineBanner (global offline indicator)."},{"title":"BottomTabBar — Four-Tab Persistent Navigation","domain":"app-shell","priority":1,"problem":"The app has four distinct areas (Sessions, Record, Clips, Band) that need to be reachable in one tap from anywhere in the app."},{"title":"App Shell — Navigation, Dark Theme, Onboarding, Empty States","domain":"app-shell","priority":1,"problem":"The app needs a solid foundation: a responsive web app that works on any device, navigates between recording/editing/collaboration screens fluidly, enforces auth correctly, handles first-time setup (create a band, link a Drive folder) with minimal friction, and never shows a blank screen     const s = slide.stats;
    return `<div class="slide cover ${cls}" data-idx="${idx}">
      <div class="cover-eyebrow">◈ life-as-code</div>
      <div class="cover-title">${esc(slide.title)}</div>
      ${slide.tagline ? `<div class="cover-tagline">${esc(slide.tagline)}</div>` : ''}
      <div class="cover-pills">
        <div class="cover-pill"><span>${s.frozen}</span> shipped</div>
        <div class="cover-pill"><span>${s.active}</span> active</div>
        <div class="cover-pill"><span>${s.draft}</span> planned</div>
        <div class="cover-pill"><span>${s.domains}</span> domains</div>
        <div class="cover-pill"><span>${s.total}</span> features</div>
      </div>
    </div>`;
  }

  if (slide.type === 'overview') {
    const s = slide.stats;
    return `<div class="slide ${cls}" data-idx="${idx}" style="background:#0d0b09">
      <div class="slide-title">${esc(slide.title)}</div>
      <div class="overview-stats">
        <div class="stat-block"><div class="stat-num" style="color:#5b82cc">${s.frozen}</div><div class="stat-label">shipped features</div></div>
        <div class="stat-block"><div class="stat-num" style="color:#4aad72">${s.active}</div><div class="stat-label">in progress</div></div>
        <div class="stat-block"><div class="stat-num" style="color:#c4a255">${s.draft}</div><div class="stat-label">planned</div></div>
      </div>
      <div class="domain-cloud">
        ${slide.domains.map(d => `<span class="domain-chip">${esc(d)}</span>`).join('')}
      </div>
    </div>`;
  }

  if (slide.type === 'domain') {
    const bg = DOMAIN_BG[slide.domain] || 'radial-gradient(ellipse at 30% 40%, #181410 0%, #0d0b09 70%)';
    return `<div class="slide domain-slide ${cls}" data-idx="${idx}" style="background:${bg}">
      <div class="domain-eyebrow">domain</div>
      <div class="domain-title">${esc(slide.title)}</div>
      <div class="domain-features">
        ${slide.features.map(f => `<div class="domain-feat">
          <span class="feat-dot" style="background:${STATUS_COLOR[f.status]||'#888'}"></span>
          <span class="feat-title">${esc(f.title)}</span>
        </div>`).join('')}
      </div>
      <div class="domain-stat">${slide.total} feature${slide.total!==1?'s':''} · ${slide.frozen} shipped</div>
    </div>`;
  }

  if (slide.type === 'feature') {
    const bg = DOMAIN_BG[slide.domain] || 'radial-gradient(ellipse at 30% 40%, #181410 0%, #0d0b09 70%)';
    return `<div class="slide feature-slide ${cls}" data-idx="${idx}" style="background:${bg}">
      <div class="feature-domain">${esc(slide.domain)}</div>
      <div class="feature-title">${esc(slide.title)}</div>
      <div class="feature-guide-label">what you can do</div>
      <div class="feature-guide">${esc(String(slide.userGuide||''))}</div>
      ${slide.keyDecision && presenterMode ? `<div class="feature-decision">💡 ${esc(slide.keyDecision)}</div>` : ''}
      <div class="feature-key">${esc(slide.key)}</div>
    </div>`;
  }

  if (slide.type === 'decisions') {
    return `<div class="slide ${cls}" data-idx="${idx}" style="background:#0d0b09">
      <div class="slide-title">${esc(slide.title)}</div>
      <div class="decisions-grid">
        ${slide.decisions.map(d => `<div class="decision-card">
          <div class="decision-meta">${esc(d.domain)} · ${esc(d.feature.slice(0,40))}</div>
          <div class="decision-text">${esc(d.decision)}</div>
          <div class="decision-rationale">${esc(d.rationale)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  if (slide.type === 'roadmap') {
    return `<div class="slide ${cls}" data-idx="${idx}" style="background:#0d0b09">
      <div class="slide-title">${esc(slide.title)}</div>
      <div class="roadmap-grid">
        ${slide.features.map(f => `<div class="roadmap-card">
          ${f.domain ? `<div class="roadmap-domain">${esc(f.domain)}</div>` : ''}
          <div class="roadmap-title">${esc(f.title)}</div>
          ${f.problem ? `<div class="roadmap-problem">${esc(f.problem)}</div>` : ''}
        </div>`).join('')}
      </div>
    </div>`;
  }

  if (slide.type === 'outro') {
    const s = slide.stats;
    return `<div class="slide outro ${cls}" data-idx="${idx}">
      <div class="outro-title">${esc(SLIDES[0].title)}</div>
      <div class="outro-sub">Built with life-as-code</div>
      <div class="outro-stats">
        <div class="outro-stat"><div class="outro-num">${s.frozen}</div><div class="outro-label">features shipped</div></div>
        <div class="outro-stat"><div class="outro-num">${s.domains}</div><div class="outro-label">domains</div></div>
        <div class="outro-stat"><div class="outro-num">${s.total}</div><div class="outro-label">total features</div></div>
      </div>
      <div class="lac-badge">◈ lac · /lac/</div>
    </div>`;
  }

  return `<div class="slide ${cls}" data-idx="${idx}" style="background:#0d0b09">
    <div class="slide-title">${esc(slide.title||slide.type)}</div>
  </div>`;
}

function render() {
  const deck = document.getElementById('deck');
  const start = Math.max(0, current - 1);
  const end = Math.min(SLIDES.length - 1, current + 1);

  // Remove stale slides
  deck.querySelectorAll('.slide').forEach(el => {
    const idx = parseInt(el.dataset.idx, 10);
    if (idx < start || idx > end) el.remove();
  });

  // Render/update visible slides
  for (let i = start; i <= end; i++) {
    const existing = deck.querySelector(`.slide[data-idx="${i}"]`);
    const html = renderSlide(SLIDES[i], i);
    if (existing) {
      const cls = i === current ? 'active' : i < current ? 'prev' : '';
      existing.className = existing.className.replace(/\b(active|prev)\b/g, '').trim() + (cls ? ' ' + cls : '');
    } else {
      deck.insertAdjacentHTML('beforeend', html);
    }
  }

  // Progress
  const pct = SLIDES.length > 1 ? (current / (SLIDES.length - 1)) * 100 : 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('counter').textContent = (current + 1) + ' / ' + SLIDES.length;

  // Grid thumbs
  document.querySelectorAll('.grid-thumb').forEach(el => {
    const idx = parseInt(el.dataset.idx, 10);
    el.classList.toggle('active-thumb', idx === current);
  });
}

function next() { if (current < SLIDES.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }

function toggleGrid() {
  gridVisible = !gridVisible;
  const overlay = document.getElementById('grid-overlay');
  overlay.classList.toggle('visible', gridVisible);
  if (gridVisible && !document.getElementById('grid-slides').children.length) {
    document.getElementById('grid-slides').innerHTML = SLIDES.map((s, i) =>
      `<div class="grid-thumb${i===current?' active-thumb':''}" data-idx="${i}" onclick="jumpTo(${i})">
        <div class="grid-num">${i+1}</div>
        <div class="grid-thumb-title">${esc(s.title||s.type)}</div>
        <div class="grid-thumb-type">${esc(s.type)}</div>
      </div>`
    ).join('');
  }
}

function jumpTo(idx) {
  current = idx;
  gridVisible = false;
  document.getElementById('grid-overlay').classList.remove('visible');
  render();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'g' || e.key === 'G') toggleGrid();
  else if (e.key === 'Escape' && gridVisible) { gridVisible = false; document.getElementById('grid-overlay').classList.remove('visible'); }
  else if (e.key === 'p' || e.key === 'P') { presenterMode = !presenterMode; render(); }
});

// Touch swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
});

// Init
render();
</script>
</body>
</html>
