<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>odio · Feature Graph</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#12100e;--bg-card:#1a1714;--bg-hover:#201d1a;--bg-sidebar:#0e0c0a;
  --border:#2a2420;--border-soft:#221e1b;
  --text:#e8ddd4;--text-mid:#b0a49c;--text-soft:#7a6a5a;
  --accent:#c4a255;
  --mono:'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --status-active:#4aad72;--status-draft:#c4a255;--status-frozen:#5b82cc;--status-deprecated:#cc5b5b;
  --status-active-bg:rgba(74,173,114,0.12);--status-draft-bg:rgba(196,162,85,0.12);
  --status-frozen-bg:rgba(91,130,204,0.12);--status-deprecated-bg:rgba(204,91,91,0.12);
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--sans);-webkit-font-smoothing:antialiased;
}
#canvas-wrap{
  position:absolute;inset:0;
}
canvas{
  display:block;width:100%;height:100%;cursor:grab;
}
canvas.dragging{cursor:grabbing;}

/* Topbar */
#topbar{
  position:fixed;top:0;left:0;right:0;
  height:48px;
  background:rgba(14,12,10,0.92);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;
  gap:16px;
  z-index:100;
  user-select:none;
}
#topbar-brand{
  font-family:var(--mono);font-size:0.8rem;color:var(--accent);letter-spacing:0.05em;
  white-space:nowrap;
}
#topbar-sep{color:var(--border);font-size:1rem;}
#topbar-project{
  font-size:0.88rem;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;
}
#topbar-count{
  font-family:var(--mono);font-size:0.7rem;color:var(--text-soft);
}
#btn-reset{
  margin-left:auto;
  padding:5px 14px;
  border-radius:6px;
  background:var(--bg-card);
  border:1px solid var(--border);
  color:var(--text-mid);
  font-family:var(--mono);font-size:0.72rem;
  cursor:pointer;
  transition:background 0.15s,color 0.15s,border-color 0.15s;
}
#btn-reset:hover{background:var(--bg-hover);color:var(--accent);border-color:var(--accent);}

/* Detail panel */
#detail-panel{
  position:fixed;
  top:48px;right:0;bottom:0;
  width:300px;
  background:var(--bg-sidebar);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
  z-index:90;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#detail-panel.open{transform:translateX(0);}
#detail-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
  border-bottom:1px solid var(--border-soft);
  flex-shrink:0;
}
#detail-key{
  font-family:var(--mono);font-size:0.78rem;color:var(--accent);letter-spacing:0.04em;
}
#detail-close{
  width:28px;height:28px;
  border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-soft);
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,color 0.15s;
  flex-shrink:0;
}
#detail-close:hover{background:var(--bg-hover);color:var(--text);}
#detail-body{
  flex:1;overflow-y:auto;padding:16px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#detail-body::-webkit-scrollbar{width:4px;}
#detail-body::-webkit-scrollbar-track{background:transparent;}
#detail-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#detail-title{
  font-size:1.05rem;font-weight:700;color:var(--text);
  line-height:1.3;margin-bottom:10px;
}
.detail-badge{
  display:inline-block;padding:2px 9px;border-radius:999px;
  font-family:var(--mono);font-size:0.68rem;margin-bottom:12px;
}
#detail-problem{
  font-size:0.82rem;color:var(--text-mid);line-height:1.55;
  margin-bottom:14px;
  padding-left:10px;border-left:2px solid var(--accent);
}
.detail-meta-row{
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:0.72rem;color:var(--text-soft);
  margin-bottom:8px;
}
.detail-meta-label{color:var(--text-soft);}
.detail-meta-val{color:var(--text-mid);}
.detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.detail-tag{
  display:inline-block;padding:2px 8px;border-radius:999px;
  background:var(--bg-hover);border:1px solid var(--border);
  font-family:var(--mono);font-size:0.65rem;color:var(--text-soft);
}
.detail-lineage-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);}
.detail-lineage-title{
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--text-soft);margin-bottom:8px;
}
.detail-chip{
  display:inline-block;padding:3px 10px;border-radius:6px;
  background:var(--bg-hover);border:1px solid var(--border);
  font-family:var(--mono);font-size:0.7rem;color:var(--text-mid);
  cursor:pointer;margin:3px 3px 3px 0;
  transition:background 0.15s,border-color 0.15s,color 0.15s;
}
.detail-chip:hover{background:var(--bg-card);border-color:var(--accent);color:var(--accent);}
.comp-bar-wrap{margin-top:12px;}
.comp-bar-label{font-family:var(--mono);font-size:0.65rem;color:var(--text-soft);margin-bottom:5px;}
.comp-bar-track{width:100%;height:4px;border-radius:2px;background:var(--border);overflow:hidden;}
.comp-bar-fill{height:100%;background:var(--accent);border-radius:2px;}

/* Instructions overlay */
#instructions{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:0.68rem;color:var(--text-soft);
  background:rgba(14,12,10,0.7);
  padding:6px 16px;border-radius:999px;
  border:1px solid var(--border);
  pointer-events:none;
  z-index:80;
  white-space:nowrap;
  opacity:1;
  transition:opacity 0.5s;
}
#instructions.hidden{opacity:0;}

/* Group-by pills */
#group-wrap{
  display:flex;align-items:center;gap:7px;margin-left:10px;
  border-left:1px solid var(--border);padding-left:14px;
}
.group-label{
  font-family:var(--mono);font-size:0.62rem;color:var(--text-soft);
  white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase;
}
#group-pills{display:flex;gap:3px;flex-wrap:nowrap;}
.group-pill{
  padding:3px 10px;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-soft);font-family:var(--mono);font-size:0.66rem;
  cursor:pointer;transition:background 0.13s,color 0.13s,border-color 0.13s;
  white-space:nowrap;
}
.group-pill:hover{border-color:var(--accent);color:var(--accent);}
.group-pill.active{
  background:rgba(196,162,85,0.13);
  border-color:var(--accent);color:var(--accent);
}

/* Lane label overlay */
#lane-labels{
  position:fixed;top:48px;left:0;bottom:0;
  width:110px;pointer-events:none;z-index:50;
  display:flex;flex-direction:column;
}
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-brand">◈ lac · graph</span>
  <span id="topbar-sep">|</span>
  <span id="topbar-project">odio</span>
  <span id="topbar-count"></span>
  <div id="group-wrap">
    <span class="group-label">Group</span>
    <div id="group-pills">
      <button class="group-pill active" data-mode="lineage">Lineage</button>
      <button class="group-pill" data-mode="domain">Domain</button>
      <button class="group-pill" data-mode="status">Status</button>
      <button class="group-pill" data-mode="timeline">Timeline</button>
      <button class="group-pill" data-mode="completeness">Completeness</button>
    </div>
  </div>
  <button id="btn-reset">Fit view</button>
</div>

<div id="canvas-wrap">
  <canvas id="graph-canvas"></canvas>
</div>

<!-- Detail panel -->
<div id="detail-panel">
  <div id="detail-header">
    <span id="detail-key"></span>
    <button id="detail-close" title="Close">×</button>
  </div>
  <div id="detail-body">
    <div id="detail-title"></div>
    <span id="detail-badge" class="detail-badge"></span>
    <div id="detail-problem"></div>
    <div id="detail-decisions" class="detail-meta-row"></div>
    <div id="detail-domain" class="detail-meta-row"></div>
    <div id="detail-comp" class="comp-bar-wrap"></div>
    <div id="detail-tags" class="detail-tags"></div>
    <div id="detail-lineage"></div>
  </div>
</div>

<div id="instructions">Scroll to zoom · Drag to pan · Click node to inspect</div>

<script>
(function(){
  // ── Data ─────────────────────────────────────────────────────────────────
  var features = [{"featureKey":"odio-2026-017","title":"Storage Management — Drive Quota, Cleanup, Archive","status":"frozen","problem":"Audio files in Google Drive grow over time (~43MB per raw clip, ~10MB per frozen render). The recorder's free Drive tier (15GB) supports roughly 350 raw clips before action is needed. The app must surface this, and provide a clean way to free space after songs are finalized.","schemaVersion":1,"analysis":"Storage indicator shown in band settings and session list: total Drive storage used by Odio files for this band (queried via Drive API quotas endpoint). Post-freeze cleanup: once a clip is frozen and the band is satisfied, the source .aac (raw recording) can be deleted from Drive — the frozen render and Postgres metadata remain. Archive: delete all versions of a clip from Postgres + Drive (both source and render). Bulk cleanup: session-level 'Archive all frozen clips' removes source audio for all frozen clips in a session at once.","decisions":[{"decision":"Cleanup is explicit and manual — no automatic deletion","rationale":"Automatic deletion after freeze could destroy recordings the band wanted to keep. Storage cleanup is a deliberate action. The app nudges (shows quota, shows how much can be freed) but never deletes automatically.","date":"2026-04-10"}],"implementation":"1. app/api/bands/[bandId]/storage/route.ts: GET — fetches Drive API about endpoint using creator's token (returns storageQuota.usage). Also queries Postgres for all driveFileId + finalDriveFileId for this band's clips. Returns { usedBytes, limitBytes, fileCount }. Cached in memory for 5 minutes.\n2. app/api/clips/[clipId]/cleanup/route.ts: POST — deletes clip.driveFileId from Drive (source .aac). Sets clip.driveFileId=null. Requires clip.frozen=true.\n3. app/api/clips/[clipId]/route.ts DELETE: RECORDER only. Deletes clip from Postgres (cascades to versions, votes, comments). Deletes both driveFileId and finalDriveFileId from Drive via lib/drive.ts deleteFile.\n4. components/bands/BandSettingsClient.tsx: fetches /api/bands/[bandId]/storage on mount. Renders storage bar (used / total). Lists members with role management. formatBytes helper: converts bytes to human-readable MB/GB string.\n5. components/clips/ClipActionsClient.tsx: shows 'Clean up source audio' button when clip.frozen=true and clip.driveFileId is not null. Shows 'Delete clip' button (RECORDER only). Confirmation bottom sheets for both.","knownLimitations":["Drive API quota query may not reflect real-time usage — cache with 5-minute TTL","After cleanup, v1 source audio is gone — if the frozen render was also deleted and the band wants to re-edit, they would need to re-record","Drive storage is the recorder's personal quota — shared with all their other Drive content"],"tags":["storage","google-drive","cleanup","archive","quota"],"successCriteria":"- Band settings shows Drive storage used by Odio files (MB / GB)\n- Post-freeze: 'Clean up source audio' button removes raw .aac from Drive, keeps frozen render\n- Confirmation dialog shows exactly what will be deleted and what will remain\n- Archive clip: removes Postgres records + Drive files; cannot be undone\n- Bulk cleanup: 'Clean up all frozen clips in session' removes source audio for all frozen clips at once\n- Storage indicator updates after cleanup\n- Cleaned-up clips remain playable via their frozen render file","domain":"storage","priority":3,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"In the Band tab, tap Settings to see Drive storage usage. The bar shows how many MB/GB of Drive are used by this band's recordings. After a clip is frozen and the band is happy with it, tap 'Clean up source audio' on the clip detail page to delete the raw recording from Drive — the final rendered file is kept and the clip remains fully playable. Tap 'Delete clip' (Recorder only) to permanently remove a clip and all its files from Drive.","componentFile":"app/api/bands/[bandId]/storage/route.ts"},{"featureKey":"odio-2026-014","title":"Render — Server-Side FFmpeg on Freeze + Public Share","status":"frozen","problem":"When a version is frozen, a real audio file must be produced — so the band can download it, share it outside the band, or export it. This cannot happen client-side. The frozen clip should also be shareable publicly without requiring sign-in.","schemaVersion":1,"analysis":"Next.js API route POST /api/render: fetch source .aac from Drive (via recorder's stored token), run FFmpeg atrim+concat to apply cutMarks, output final .aac at 192kbps, upload result as {clipId}-final.aac to Drive. Update clips row: frozen=true, frozenVersionId, frozenDriveFileId. Progress communicated via Postgres poll — client polls GET /api/clips/{id} every 3s until frozen=true. For public share: frozen clips get a public Drive permission set ('anyone with link can read') and a short public token stored in Postgres. Public page /share/[token] fetches clip metadata from Postgres and streams audio from the Drive public URL — no sign-in required.","decisions":[{"decision":"Server-side FFmpeg only — no client-side WASM","rationale":"WASM FFmpeg is slow on mobile (~3x slower than native), memory-constrained, and adds bundle size. Server-side runs once per clip lifetime in < 10s on Vercel. Acceptable trade-off.","date":"2026-04-10"},{"decision":"Public share via Drive public permission + Postgres token","rationale":"A frozen clip can be shared outside the band (with a producer, a friend). Setting Drive file permission to 'anyone with link' gives a direct audio URL. Odio stores a short token in Postgres mapping to the clip, so the public URL is /share/[token] (not a raw Drive ID), giving control over revocation.","date":"2026-04-10"}],"implementation":"1. app/api/clips/[clipId]/freeze/route.ts: POST — Editor+ role. Validates versionId. Fetches creator's Drive token from NextAuth accounts table. Downloads source .aac to /tmp. Runs fluent-ffmpeg atrim+aconcat with cutMarks from the version. Uploads output as {clipId}-final.aac to band's Drive folder. Sets clip.frozen=true, clip.frozenVersionId, clip.finalDriveFileId. Returns updated clip.\n2. app/api/clips/[clipId]/unfreeze/route.ts: POST — RECORDER only. Sets clip.frozen=false, clip.frozenVersionId=null. Keeps finalDriveFileId.\n3. app/api/clips/[clipId]/route.ts: PATCH handles generatePublicToken (requires frozen=true — sets publicToken=crypto.randomUUID(), sets Drive public permission) and removePublicToken (clears publicToken, removes Drive public permission).\n4. app/share/[token]/page.tsx: public page — no auth. Fetches clip by publicToken from Postgres. Renders waveform player with Drive public audio URL + clip name + stamps.\n5. FFmpeg atrim+aconcat filter chain: for each non-cut segment, atrim=start=X:end=Y, asetpts=PTS-STARTPTS, then aconcat=n=N. Output: -b:a 192k -f adts (AAC).\n6. lib/drive.ts: downloadToTemp(fileId, token) → /tmp/{fileId}.aac. uploadFromTemp(path, folderId, token) → new driveFileId. setPublicPermission(fileId, token). removePublicPermission(fileId, permissionId, token).","knownLimitations":["Vercel /tmp is ephemeral (512MB limit) — source download (~43MB) + FFmpeg output (~10MB) is within limits for typical clips","Render requires recorder's valid Drive token from Postgres — if token refresh fails (e.g., recorder revoked access), render fails with a clear error and re-auth prompt","@ffmpeg-installer/ffmpeg bundles ~38MB compressed — close to Vercel's function size limit; this is the highest-risk technical component and needs a spike before building","Any band Editor role can trigger freeze, but the render always uses the recorder's Drive token — recorder does not need to be signed in at the moment of freeze"],"tags":["ffmpeg","server-side","freeze","render","next.js-api","public-share"],"successCriteria":"- Freeze triggers render within 2s of user confirmation\n- Rendered file available within 10s for a typical 2-8 min output clip\n- Clip page shows lock icon and download button after successful render\n- Render failure shows clear error with retry option\n- Public share toggle: generates /share/[token] URL, shareable outside the band\n- Public page: waveform player + stamps + clip name + date — no other session data exposed\n- Public listener does not need a Google account\n- Download of rendered file available on clip page (authenticated) and public page","domain":"render","priority":2,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"On a clip's detail page, tap 'Freeze' on any version to produce the final audio file. The page shows 'Rendering…' for a few seconds, then displays a lock icon and download button. To share publicly: tap the Share icon on a frozen clip and copy the /share/[token] link. Anyone with the link can listen without signing in. To revoke public access, tap Share again and toggle it off.","componentFile":"app/api/clips/[clipId]/freeze/route.ts"},{"featureKey":"odio-2026-012","title":"Versioning — Version Chain, Waveform Editor, Waveform Player, Freeze","status":"active","problem":"A raw recording needs to evolve from v1 (messy, includes setup and dead air) to vFinal (clean, trimmed) through collaborative edits — with full history and a clear end state (freeze). The band needs to listen to any version, compare versions, and hear exactly what a cut sounds like before committing.","schemaVersion":1,"analysis":"Two dedicated components with separate concerns:\n\n**WaveformPlayer** (clip detail page) — pure playback. Receives activeCuts from parent (ClipDetailClient). Visualises cuts as blue non-draggable regions (pointerEvents: none on regions so they don't block click-to-seek). Skip-cuts during playback via timeupdate handler. H:MM:SS clock + virtual duration display. Stamp chips are tappable — each seeks to that timestamp. Big 64px play button. finish event resets cursor to start (ws.setTime(0)) so the amber cursor doesn't pin at the right edge after playback ends.\n\n**WaveformEditor** (edit page, always edit mode) — cut creation only. Custom pointer overlay (absolute inset-0, touch-none, z-20 inside WaveformCanvas) handles tap-to-seek and drag-to-create. Cut bands are pure CSS divs (no RegionsPlugin). useCutInteraction manages the drag state machine; edge drag resizes existing cuts. Trim shortcut (pre-seeds start+end cuts). Split mode (mark a time position, confirm → creates TWO new clips: Part A (0→splitMs) and Part B (splitMs→end); original clip left completely unchanged as a reference; navigates to session page showing all three clips). Submit → new version in Postgres, router.back().\n\n**Non-destructive split with immediate Drive files**: original clip is never mutated. Splitting Song X into Part A and Part B: the split API downloads X's source once, runs FFmpeg twice in parallel to produce two trimmed files (A: 0→splitMs, B: splitMs→end), uploads both to Drive with their own names, and creates two new Clip rows with their own driveFileId + correct sourceDurationMs + empty v1 cutMarks (the trimmed file is their raw). The original clip is untouched. After confirming that A and B are good, X's source can be deleted from Drive to free space. No provenance UI is shown on split children (no scissors icon, no 'Split into' card) — they are fully independent songs from the user's perspective. sourceClipId exists in the DB for data integrity but is not surfaced in the UI.\n\n**ClipDetailClient** — owns selectedVersionId state. Feeds activeCuts to WaveformPlayer. Feeds activeVersionId to CollaborationSection for version-aware voting. Version list as large tappable cards. Clicking active version keeps it selected (no deselect/null state). Edit link to /edit page.\n\nVersions are metadata only (cutMarks JSON) pointing at the same source audio. Source audio never mutated. Linear chain. localStorage safety net for in-progress edits.","decisions":[{"decision":"WaveformPlayer and WaveformEditor are separate components","rationale":"A single component that handles both playback and editing requires mode-switching logic, conditional overlays, and competing event handlers. Separate components have clear single responsibilities: Player = listen, Editor = cut. The edit page is always in edit mode; no toggle needed. The detail page never needs editing. Each component can be reasoned about and tested independently.","date":"2026-04-11"},{"decision":"interact:false + single overlay div for all pointer handling (no enableDragSelection, no RegionsPlugin)","rationale":"WaveSurfer's enableDragSelection registers a permanent pointer overlay that consumes all pointer events — including click-to-seek. Once called, seeking by clicking is broken. interact:false disables WaveSurfer's built-in event handling entirely. A single overlay div (absolute inset-0, touch-none) inside WaveformCanvas intercepts all pointer events and forwards them to useCutInteraction (trim mode) or useSplitInteraction (split mode).","date":"2026-04-15"},{"decision":"Split produces independent trimmed Drive files immediately (not virtual clips sharing source)","rationale":"Original model: Part A and Part B shared Song X's Drive file and applied cuts virtually — correct waveform, wrong duration in clip list (both showed full 9-min duration instead of 4 min and 5 min). Trimmed files fix duration display without special-casing. They also make Part A and Part B genuinely independent: they can be frozen separately without needing X's file, and X's source can be safely deleted from Drive once A and B are confirmed. FFmpeg at split time costs a few seconds of processing but eliminates a class of edge cases.","date":"2026-04-11"},{"decision":"No provenance UI on split children","rationale":"Showing scissors icons and a 'Split into' provenance card on Song X implied that Song X was consumed or changed by the split. The correct mental model is: X exists unchanged, A and B are new songs. Their name might hint at their origin (e.g. 'Groove - Part A') but they are first-class independent songs from the moment they're created. Provenance exists in the DB (sourceClipId) for integrity but is not surfaced in the UI.","date":"2026-04-11"},{"decision":"Split navigates to session page, not back to clip detail","rationale":"After a split, three clips exist (original + Part A + Part B). router.back() would return to the original clip's detail — neither Part A nor Part B would be visible. router.push(sessionHref) lands on the session clip list where all three are visible and accessible.","date":"2026-04-11"},{"decision":"No version deselect — clicking active version keeps it selected","rationale":"Deselecting a version set selectedVersionId to null, which caused the player to show 'no cuts' (raw audio). This 'null = raw audio' state had no UI label and was visually identical to a version with no cuts. Confusing. Clicking the active version now keeps it selected — the player always reflects a known version.","date":"2026-04-11"},{"decision":"Versions are metadata only — not audio files","rationale":"Audio duplication per version is prohibitively expensive (43MB+ per clip). Versions are cut instructions (cutMarks JSON). Source audio stored once in Drive. Real audio file produced only on freeze.","date":"2026-04-10"},{"decision":"localStorage for in-progress edit safety","rationale":"Full offline sync adds complexity. The real risk is a browser crash mid-edit. localStorage persists cut marks across crashes. Key: odio:draft:{clipId}. Cleared on successful submit.","date":"2026-04-10"}],"implementation":"1. components/clips/WaveformPlayer.tsx: pure player component. Props: clipId, sourceDurationMs, activeCuts[], stamps[]. Regions rendered with pointerEvents:none (display only, don't intercept seek clicks). timeupdate handler: position tracking (currentTimeMsRef + setCurrentTimeMs) runs unconditionally — isPlaying() guard wraps only the cut-skip section so currentTimeMs updates correctly even while paused (needed for re-seek before play). finish event: ws.setTime(0) resets cursor to start. Stamp chips are <button> elements that call ws.setTime(). No enableDragSelection.\n2. components/clips/WaveformEditor.tsx: edit-only component. Props: clipId, sourceDurationMs, frozenVersionId, initialVersions, stamps, sessionHref. Custom pointer overlay (onPointerDown/Move/Up + setPointerCapture, touch-action:none) handles tap-to-seek + drag-to-create. Trim/Clear all/Split tool buttons. Split confirmation sheet updated to reflect Drive file creation ('Each part gets its own audio file in Drive. Takes a few seconds — hang tight.'). Split navigates to sessionHref after success. Auto-saves draft on every cut change. router.back() after version submit. No provenance UI (splitInto prop removed, scissors icon removed from 'Start from' version buttons).\n3. components/clips/ClipDetailClient.tsx: coordinator. Owns selectedVersionId state (auto-selects latest, no deselect). Passes activeCuts to WaveformPlayer. Passes activeVersionId to CollaborationSection. Actions section hidden when !canEdit && !frozen.\n4. app/(auth)/.../clips/[clipId]/page.tsx: server component — loads clip, versions, stamps, votes, comments, membership. Renders ClipDetailClient.\n5. app/(auth)/.../clips/[clipId]/edit/page.tsx: server component — loads clip, versions, stamps, splitInto (select id, name). Auth guard (MEMBER redirect + frozen redirect). Maps splitInto and passes to WaveformEditor.\n6. app/api/clips/[clipId]/versions/route.ts: POST creates a new version.\n7. app/api/clips/[clipId]/split/route.ts: POST { splitMs } — downloads X's source audio once, runs renderAudioWithCuts twice in parallel (Part A: atrim tail, Part B: atrim head), uploads both trimmed files to Drive with distinct names, creates two Clip rows with own driveFileId + correct sourceDurationMs + empty v1 cutMarks. Both have sourceClipId pointing to the original. Original clip is completely unchanged. Returns { clipA: {id, name}, clipB: {id, name} }. Vercel runtime: nodejs, maxDuration: 300.\n8. lib/utils.ts: formatPosition(ms) → H:MM:SS always. formatDuration(ms) → M:SS. calcResultDuration(sourceDurationMs, cuts) → virtual duration after removing cut segments.\n9. prisma/schema.prisma: Clip.sourceClipId String? (nullable) + SplitFrom self-relation (sourceClip / splitInto) with onDelete: SetNull — deleting a child clip does not cascade to the original.","knownLimitations":["Split takes a few seconds on the server (FFmpeg download + trim + upload) — the UI shows a loading state on the confirm button but gives no progress indicator","After splitting, the original Song X remains in the session — the band must manually delete it from the Drive page once they've confirmed A and B are good","If two members edit the same version simultaneously they both produce the next version number — band sees two versions at the same level and must choose","Submit requires internet connection — cuts safe in localStorage but cannot be written to Postgres offline"],"tags":["versioning","version-history","freeze","wavesurfer","waveform-editor","waveform-player","localstorage","skip-cuts","split"],"successCriteria":"- Version list shows full chain: v number, description, result duration, cut count\n- Selecting a version in the detail page updates the waveform player to skip that version's cuts\n- Click-to-seek works on the waveform — clicking anywhere moves the playhead, play starts from that position\n- Stamp chips in the player are tappable and seek to that timestamp\n- After playback ends, cursor resets to start (no amber pin at right edge)\n- Submit button is always active — description is optional\n- Any member can create a version from any existing version\n- Trim shortcut pre-seeds start+end cut marks\n- Split: marks a time position → FFmpeg trims two independent Drive files (Part A: 0→split, Part B: split→end) → creates two new clips each with their own driveFileId and correct sourceDurationMs → original clip unchanged → navigates to session page showing all three clips\n- Split children show correct durations (4 min / 5 min) in the clip list — not the full original duration\n- Split children are fully independent songs with no visible lineage to the original (no scissors icon, no provenance card)\n- Drag on the edit waveform creates a cut region\n- Freeze locks the version and triggers render (see feat-render)\n- In-progress edits survive browser crash via localStorage draft\n- Draft banner shown on editor reopen with Resume / Dismiss","domain":"versioning","priority":2,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"},{"from":"frozen","to":"active","date":"2026-04-11","reason":"Major architectural redesign: WaveformPlayer + WaveformEditor split, ClipDetailClient coordinator, version deselect fix, split navigation, click-to-seek fix"}],"revisions":[{"date":"2026-04-11","author":"marc+claude","fields_changed":["title","analysis","implementation","decisions","knownLimitations","successCriteria","userGuide","tags"],"reason":"Separated WaveformPlayer (pure play) from WaveformEditor (pure edit). ClipDetailClient owns selectedVersionId. Click-to-seek fixed via pointerEvents:none on regions. Split navigates to session page. Stamp chips are tappable. Version deselect removed."},{"date":"2026-04-11","author":"marc+claude","fields_changed":["analysis","implementation","decisions","successCriteria","userGuide"],"reason":"Non-destructive split: original clip unchanged, creates two independent new clips (Part A + Part B) with sourceClipId provenance. (Note: scissors icon + description on split-origin version buttons and splitInto provenance card were later removed — see subsequent revision.) Scissors icon + description on split-origin version buttons. 'Split into' provenance card on original clip editor. WaveformPlayer finish event resets cursor to start. timeupdate guard scope fix (position tracking unconditional, isPlaying gate wraps only cut-skip section). Schema: sourceClipId self-relation added to Clip."},{"date":"2026-04-11","author":"marc+claude","fields_changed":["analysis","implementation","decisions","knownLimitations","successCriteria","userGuide"],"reason":"Split redesign: FFmpeg trims independent Drive files at split time (not virtual clips sharing source). Correct durations shown in clip list (latestResultDurationMs). No provenance UI on split children — fully independent songs. splitInto prop removed from WaveformEditor. HEAD 502 fix: explicit HEAD handler for /api/audio/[clipId] uses getDriveFileMeta (no streaming)."},{"date":"2026-04-15","author":"marc+claude","fields_changed":["analysis","decisions","knownLimitations"],"reason":"Corrected stale waveform architecture: interact:false (not true), RegionsPlugin removed (CSS divs via WaveformCanvas), useCutInteraction handles drag/resize. Removed stale limitation about edge handles blocking resize. Merged duplicate pointerEvents:none decision into single interact:false decision."}],"userGuide":"From a clip's detail page, select a version in the Versions section to hear that version's cuts applied. Tapping stamp chips (🔥 ⭐ etc.) in the player seeks to that moment. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song at a chosen time position — mark the split point on the waveform, confirm, and Odio creates Part A and Part B as two fully independent new songs, each with their own trimmed audio file in Drive. The original song stays in the session unchanged. After confirming Part A and Part B are good, go to Settings → Manage files / sync to delete the original's source from Drive. Tap 'Start from' pills to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional.","componentFile":"components/clips/WaveformEditor.tsx"},{"featureKey":"odio-2026-002","title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","status":"frozen","problem":"@ffmpeg-installer/ffmpeg bundles the FFmpeg binary at ~38MB compressed. Vercel's serverless function size limit is ~50MB (250MB uncompressed). This is the single highest-risk technical constraint in the project. If the bundle is too large or the render takes too long (Vercel function timeout: 10s on Hobby), the entire render architecture needs to change before feat-render can be built. This POC must validate or invalidate the approach before any production code is written.","schemaVersion":1,"analysis":"The POC validates three things in isolation:\n\n1. **Bundle size:** Does a Next.js API route that imports @ffmpeg-installer/ffmpeg + fluent-ffmpeg deploy successfully to Vercel Hobby without hitting the 50MB compressed / 250MB uncompressed limit? The binary alone is ~38MB compressed — leaving ~12MB for the rest of the function bundle.\n\n2. **Cold start:** Vercel serverless functions have a cold start on first invocation. A 38MB binary means a large cold start. Is the first render under 30 seconds? Subsequent renders (warm function) should be under 10s for a typical 2–8 min clip output.\n\n3. **Render correctness:** Does a fluent-ffmpeg atrim+concat command correctly produce a trimmed AAC file from a source AAC file on Vercel's runtime environment?\n\nIf bundle size fails: alternatives are (a) Vercel Pro (1GB function size limit, $20/month — viable), (b) a dedicated render worker (Railway, Fly.io free tier), (c) client-side WASM FFmpeg (slow on mobile, acceptable for desktop-only), or (d) a cloud transcoding service (AWS MediaConvert — adds cost and complexity).\n\nIf timeout fails: the 10s Vercel Hobby limit may be too tight for longer clips. Vercel Pro raises the limit to 300s. The POC should test with a worst-case 30-min source clip.\n\nThe POC is a standalone Next.js route — not integrated into the app — that accepts a test audio file and returns the trimmed output.","decisions":[{"decision":"POC before any production render code","rationale":"@ffmpeg-installer/ffmpeg is the highest-risk dependency in the entire project. If it fails on Vercel Hobby, the render feature needs a completely different architecture. Building feat-render on top of an unvalidated assumption would waste significant implementation work. The POC is a 2-4 hour investment that prevents a potential full architectural rethink later.","date":"2026-04-10"}],"implementation":"1. Created GET /api/render/poc route that accepts ?url= param pointing to a source audio file.\n2. Installed @ffmpeg-installer/ffmpeg + fluent-ffmpeg as production dependencies.\n3. Route downloads source audio to /tmp, runs fluent-ffmpeg atrim+aconcat filter with a hard-coded test cut (0-10s removed), outputs trimmed .aac.\n4. Returns rendered file as application/octet-stream response.\n5. Result: bundle deploys on Vercel Hobby within size limit. Cold start ~8s, warm render ~3s for a 5-min clip. Architecture validated.\nComponentFile: app/api/render/poc/route.ts","knownLimitations":["Vercel Hobby function timeout is 10s — this may be too tight for long clips; Pro plan raises to 300s","If bundle size fails on Hobby, Vercel Pro ($20/month) is the simplest fix — breaks the $0/month cost target"],"tags":["ffmpeg","poc","vercel","bundle-size","spike","render"],"successCriteria":"- Next.js project with @ffmpeg-installer/ffmpeg + fluent-ffmpeg deploys to Vercel Hobby without bundle size error\n- Deployed function executes an atrim+concat operation on a test .aac file\n- Output file is a valid .aac file playable in browser\n- Cold start + render time for a 2-8 min clip is under 30s total (10s preferred)\n- Render time for a 30-min source clip with multiple cut regions is measured and documented\n- If any constraint fails: document exactly which limit was hit and the recommended alternative with cost/complexity trade-off","domain":"render","priority":1,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"This is an internal validation endpoint, not a user-facing feature. To test: GET /api/render/poc?url=<public-audio-url>. The endpoint downloads the audio, applies a test cut (removes seconds 0-10), and returns the trimmed file. Used during development to confirm Vercel can run FFmpeg before building the real render pipeline.","componentFile":"app/api/render/poc/route.ts"},{"featureKey":"odio-2026-008","title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","status":"frozen","problem":"On jam night, the person who created the band may not always be the one with a phone free to record. Any Editor-role band member should be able to hit Record and have the audio land in the band's shared Drive — without requiring each member to set up their own Drive folder or the band creator to be physically present.","schemaVersion":1,"analysis":"The existing recording upload flow already makes multi-recorder architecturally trivial: when a member hits Record, the server's /api/upload/init route generates a Google Drive resumable upload session URL using the band creator's stored refresh_token (saved via NextAuth DB adapter). The member's browser then uploads the audio blob directly to the creator's Drive — the member's own Drive is never involved. The audio lands in the correct band Drive folder regardless of who recorded it.\n\nWhat needs to change is a role-permission gate: currently /api/upload/init checks that the caller is the band creator (Recorder role). Expanding this to allow Editor-role members is the full scope of the server-side change.\n\nOn the client: the Record tab in the bottom nav is shown only to Recorder and Editor roles. Member-only users do not see the Record tab.\n\nOne critical edge case: the creator's Drive token can expire. The server must attempt a token refresh before generating the upload session URL. If the refresh fails (e.g., creator revoked app access), the error must be surfaced clearly — 'Band creator needs to re-authorize Drive access' — with a notification mechanism to alert the creator.\n\nThe resulting clip row in Postgres records both the band creator (driveOwnerEmail) and the actual recording member (recordedByEmail) so the activity feed can correctly show 'Recorded by [member]'.","decisions":[{"decision":"Reuse creator's stored token — no per-member Drive setup","rationale":"drive.file OAuth scope only grants access to files the app created under that specific user's account. A member's token cannot write to the creator's Drive folder. The creator's refresh_token (already stored by NextAuth DB adapter for the audio proxy feature) solves this: the server uses the creator's token to generate the Drive upload session URL, and the member's browser uploads directly to Drive using that URL. No additional OAuth consent or per-member Drive setup needed.","date":"2026-04-10"},{"decision":"Editor role can record — Member role cannot","rationale":"Member-only users are passive collaborators (vote, comment). Giving them recording rights would require explaining Drive ownership semantics to every casual invitee. Editors are already trusted with version creation and freeze — recording is a natural extension. The default role for new band invites is Editor, so most band members get recording rights automatically without any explicit configuration.","date":"2026-04-10"},{"decision":"Track recordedByEmail separately from driveOwnerEmail","rationale":"The clip always lives in the creator's Drive (driveOwnerEmail is always the band creator). The person who pressed Record may be someone else entirely. These are distinct facts: one describes file ownership for Drive API operations, the other describes recording attribution for the activity feed and session history. Conflating them would make it impossible to correctly display 'Recorded by X' or debug Drive issues per-clip.","date":"2026-04-10"}],"implementation":"1. app/api/upload/init/route.ts: POST — role check `['RECORDER', 'EDITOR'].includes(membership.role)`. Fetches band creator's email from bands table. Queries NextAuth accounts table for creator's access_token + refresh_token. Attempts token refresh via Google OAuth token endpoint if expires_at < now. Generates Drive resumable upload session URL using creator's token. Returns { uploadUrl, clipId, sessionId }.\n2. app/api/upload/finalize/route.ts: POST — same role check. Runs FFmpeg transcode on uploaded file. Creates Clip row with recordedByEmail = currentUser.email. Creates v1 ClipVersion row. Updates clip transcodeStatus to DONE.\n3. Error handling: if creator token refresh fails, returns 503 with { error: 'CREATOR_TOKEN_INVALID', creatorEmail }. Client shows 'Drive connection needs renewal — ask [creator name] to re-authorize'.\n4. components/layout/BottomTabBar.tsx: Record tab hidden when `membership.role === 'MEMBER'`.\n5. Prisma schema Clip: recordedByEmail TEXT nullable. clips table stores both fields.\n6. components/clips/ClipCard.tsx: shows 'Recorded by X' when recordedByEmail differs from band creator.","knownLimitations":["If the band creator revokes Google Drive access, ALL recording attempts by any Editor fail until the creator re-authorizes — one token serves the whole band; there is no per-member fallback","Two Editors recording simultaneously produce two separate clip rows with overlapping timestamps — no merging or conflict detection; both appear in the session normally","The creator's refresh_token is stored server-side in the NextAuth accounts table — this security surface already exists for the audio proxy feature; multi-recorder adds no new exposure"],"tags":["recording","multi-recorder","roles","permissions","google-drive","upload"],"successCriteria":"- Any Editor-role band member sees the Record tab in the bottom nav and can start a recording\n- Member-only role does not see Record tab and cannot access /record\n- /api/upload/init: accepts requests from Editor+ roles; fetches and uses band creator's stored refresh_token to generate Drive upload session URL\n- Token refresh attempt before generating upload URL; returns clear error if creator's token is invalid: 'Band creator needs to re-authorize Drive access'\n- Audio lands in the correct band Drive folder regardless of which Editor recorded\n- Clip row stores both driveOwnerEmail (always the band creator) and recordedByEmail (actual recorder)\n- Activity feed and clip list show 'Recorded by [name]' when recorder differs from band creator\n- If multiple Editors record simultaneously: each gets their own upload session URL; clips created as separate Postgres rows with no conflict\n- Post-record screen and upload banner work identically for all recording members","domain":"recording","priority":2,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"Any Editor-role band member can record — not just the band creator. Editors see the Record tab in the nav and can start a recording from their own device. The audio automatically lands in the band's Drive folder (owned by the band creator). If the creator's Drive connection expires, a banner appears: 'Drive connection needs renewal — ask [creator name] to re-authorize.' The clip card shows 'Recorded by X' when the recorder is not the band creator.","componentFile":"app/api/upload/init/route.ts"},{"featureKey":"odio-2026-003","title":"Auth — Google OAuth via NextAuth.js","status":"frozen","problem":"Band members need a shared identity layer — without creating yet another account. Google sign-in is universal in the target audience and doubles as the credential for Google Drive access.","schemaVersion":1,"analysis":"NextAuth.js with Google provider. Scopes requested at sign-in: openid, email, profile, https://www.googleapis.com/auth/drive.file (access only to files Odio creates in the user's Drive). No Supabase. The access_token and refresh_token are stored server-side in the NextAuth session (encrypted cookie or database adapter). All Drive API calls are proxied through Next.js API routes — the token is never exposed to the client. Auth state (user email, displayName, avatar) held in Zustand. The public frozen clip page (/share/[token]) is the only unauthenticated route.","decisions":[{"decision":"drive.file scope at sign-in, not deferred","rationale":"drive.file is needed for all core features (upload recording, read session/clip data, write meta). Deferring it to a later step would require a second OAuth flow and would break the first recording attempt. Request it upfront with a clear explanation in the sign-in screen: 'Odio only accesses files it creates in your Drive.'","date":"2026-04-10"},{"decision":"NextAuth.js with Prisma DB adapter — required from day one, not deferred","rationale":"Supabase Auth adds a paid service. NextAuth.js is open-source and integrates directly with Next.js. The DB adapter (Prisma + Neon) is not optional: it is required to persist the recorder's refresh_token in the accounts table, which is the only way the audio proxy route can stream Drive audio to all band members. JWT-only session strategy is explicitly rejected — it cannot store the refresh_token server-side.","date":"2026-04-10"}],"implementation":"1. lib/auth.ts: NextAuth.js config with GoogleProvider (scopes: openid + email + profile + drive.file). PrismaAdapter with Neon Postgres. Session strategy: database.\n2. app/api/auth/[...nextauth]/route.ts: standard NextAuth route handler.\n3. middleware.ts: protects all routes except /, /login, /share/[token]. Redirects unauthenticated requests to /login.\n4. lib/prisma.ts: singleton Prisma client.\n5. Prisma schema: User, Account (NextAuth tables), Band, BandMember, JamSession, Clip, ClipVersion, Vote, Comment tables.\n6. app/(auth) route group: all authenticated pages wrapped in a layout that verifies session.\n7. app/login/page.tsx: sign-in page with Google OAuth button.\n8. The accounts table managed by PrismaAdapter stores access_token + refresh_token per user — required for server-side Drive API calls.","knownLimitations":["drive.file scope only covers files the app created under that specific user's account — bandmates stream audio through the server-side proxy (which uses the recorder's stored token), so bandmates do not need Drive scope just to listen","Google OAuth tokens expire after 1 hour — NextAuth DB adapter stores refresh_token in Postgres and rotates on expiry; JWT-only strategy is insufficient and must not be used","If the recorder revokes Odio's Drive access (in Google account settings), all audio becomes inaccessible to the entire band until re-authorized"],"tags":["auth","google-oauth","nextauth","session","drive.file"],"successCriteria":"- Sign in with Google works on iOS Safari, Android Chrome, and desktop\n- Session persists across browser restarts (refresh token handled by NextAuth)\n- All private routes redirect to /login if unauthenticated\n- Sign-out clears session and redirects to landing\n- drive.file scope requested at initial sign-in (needed for audio upload and clip access)\n- Token refreshed automatically by NextAuth before expiry\n- Auth state available synchronously on client via Zustand (no flicker)","domain":"auth","priority":1,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"Users visit the app and click 'Sign in with Google'. They are prompted to grant Google Drive access (files created by Odio only). After sign-in, they are redirected to the bands home page. Sessions persist across browser restarts. Sign-out via the Band settings page. The /share/[token] public page requires no sign-in.","componentFile":"lib/auth.ts"},{"featureKey":"odio-2026-005","title":"Band Space — Band Creation, Invites, Drive Folder, Members","status":"active","problem":"Band members need a shared space where all sessions are visible and access is controlled. Joining must be frictionless. The recorder's Google Drive folder is the audio source of truth — the app needs to bridge from 'here is an invite link' to 'you now have access to the band's recordings'.","schemaVersion":1,"analysis":"Band metadata (name, members, Drive folder ID, invite code) stored in Postgres. Sessions and clips are stored in Postgres (not in Drive JSON files), so session/clip data is readable by all band members immediately after joining. Audio files live in the recorder's Drive folder. A user can belong to multiple bands. Band Settings page: member list with role management (pill buttons, not native select), invite link copy, storage quota bar. Remove member / Leave band both require confirmation via a bottom sheet before executing — prevents accidental destructive actions.","decisions":[{"decision":"Pill buttons for role change instead of native <select>","rationale":"Native <select> is styled by the OS and looks visually inconsistent with the dark app design. Pill buttons (Editor | Member) are always visible, immediately tappable, and make the current role and the available roles obvious at a glance without opening a dropdown.","date":"2026-04-11"},{"decision":"Remove/Leave actions require confirmation sheet before executing","rationale":"Text underline links ('Remove', 'Leave band') have no visual weight — they look like navigation links, not destructive actions. A tap mis-aimed at the email text could accidentally trigger removal. A confirmation bottom sheet with a red danger button adds the right friction for an irreversible action.","date":"2026-04-11"},{"decision":"Postgres for band membership, Drive for audio access","rationale":"Drive's drive.file scope prevents one user from reading files created by another. Band membership and session/clip metadata live in Postgres. Audio files live in the recorder's Drive, shared at the folder level via standard Drive sharing.","date":"2026-04-10"},{"decision":"Manual Drive folder sharing — no programmatic share","rationale":"Programmatic sharing requires storing and using the recorder's refresh token for Drive Permissions API calls — sensitive security surface. Manual sharing (recorder shares via Drive UI, one time per member) avoids this.","date":"2026-04-10"}],"implementation":"1. app/(auth)/bands/page.tsx: lists all bands for current user.\n2. app/(auth)/bands/[bandId]/page.tsx: session list for a band.\n3. app/api/bands/route.ts: POST creates a new band.\n4. app/api/bands/[bandId]/members/route.ts: PATCH updates member role; DELETE removes member.\n5. components/bands/BandSettingsClient.tsx: member list with inline pill buttons for role change (Editor/Member — active pill highlighted, tap other pill to switch), Remove and Leave band buttons both open a BottomSheet confirmation before executing, storage quota bar, invite link copy, \"Manage files / sync\" link to /bands/[bandId]/drive (Editor+ only).\n6. app/(auth)/bands/[bandId]/settings/page.tsx: server component — loads band + membership, renders BandSettingsClient.\n7. QR code for session URL rendered via react-qr-code in SessionHeaderClient.\n8. app/(auth)/bands/[bandId]/drive/page.tsx: Drive file management server component — loads all clips with Drive file IDs across all sessions, redirects MEMBER role, renders DriveFilesClient.\n9. components/bands/DriveFilesClient.tsx: Drive management UI — clips grouped by session with source/final status dots (grey=unchecked, green=ok, red=missing). Sync button checks all file IDs via /api/drive/check-file in batches of 5. Per-clip actions: Delete source (removes Drive file + clears driveFileId), Delete clip (removes entire clip record + both Drive files). Both actions require confirmation via BottomSheet with distinct destructive copy.\n10. app/api/drive/check-file/route.ts: GET — checks if a Drive file exists (id,trashed fields). Verifies caller is a band member first.\n11. app/api/clips/[clipId]/delete-source/route.ts: DELETE — removes source Drive file (best-effort), nulls driveFileId in DB. Editor+ only.","knownLimitations":["New members cannot hear audio until the recorder manually shares the Drive folder with their Google email","If the recorder loses access to their Google account, band audio becomes inaccessible — no recovery path without exporting files first","Drive sync checks file existence but does not verify file integrity or playback quality","Deleting a clip from the Drive page removes it globally — all band members lose access immediately"],"tags":["band","invite","members","google-drive","postgres","qr-code","role-management"],"successCriteria":"- Create band: enter name → band record created in Postgres → invite link generated\n- Invite link opens a join page: shows band name, prompts Google sign-in\n- After joining, app shows member's Google email with clear instruction to recorder to share Drive folder\n- Session screen shows QR code of current session URL\n- Band member list: display name + email, role badge, join date\n- Recorder can change member roles using styled pill buttons (Editor / Member) — no native select\n- Remove member: visible button → confirmation sheet → delete from Postgres\n- Leave band: visible button → confirmation sheet → redirect to /bands\n- Multiple bands: user sees all their bands on the home screen\n- Band roles: Recorder (full access + unfreeze), Editor (create versions + freeze + record), Member (vote + comment only)\n- Default role for new members: Editor","domain":"band","priority":1,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"},{"from":"frozen","to":"active","date":"2026-04-11","reason":"Role change: pill buttons replace native select. Remove/Leave: confirmation sheet replaces plain text links."}],"revisions":[{"date":"2026-04-11","author":"marc+claude","fields_changed":["implementation","decisions","successCriteria","userGuide"],"reason":"BandSettingsClient: pill buttons for role change, BottomSheet confirmation for remove/leave actions"},{"date":"2026-04-11","author":"marc+claude","fields_changed":["implementation","knownLimitations","componentFile","userGuide"],"reason":"Drive management page: DriveFilesClient with sync, delete-source, and delete-clip actions. check-file and delete-source API routes added."}],"userGuide":"Create a band from the home screen. Share the invite link or QR code with bandmates — they sign in with Google and join as Editors. After someone joins, their email appears in Settings → Members. Share the Drive folder with that email from Google Drive (one-time step). In Settings, use the pill buttons to switch a member between Editor and Member role. Tap Remove to remove a member (confirmation required). Non-Recorder members can Leave band from their own member row (confirmation required). Editors and Recorders can open 'Manage files / sync' from the Storage section to see all Drive files grouped by session. Hit 'Sync' to check which files still exist in Drive (green dot = ok, red dot = missing). Delete a source file to free Drive space while keeping the clip and its versions. Delete a clip to remove it entirely from Odio and Drive.","componentFile":"components/bands/DriveFilesClient.tsx"},{"featureKey":"odio-2026-010","title":"Upload Banner — Persistent Upload Progress Across All Pages","status":"active","problem":"After stopping a recording, the band member needs to navigate away (to another song, to the session list, to collaborate) without losing visibility into whether the upload succeeded. The upload progress must persist across all pages — not just the record screen — as a fixed top banner.","schemaVersion":1,"analysis":"UploadBanner.tsx is a fixed-position (top-0, z-50) client component mounted in AuthShell, making it visible on every authenticated page. It receives the list of active pending uploads from usePendingUploads and renders the most actionable one prominently.\n\nStatus priority order: token-error > session-error > paused > uploading. The most actionable upload is shown first — an error that requires human action is more urgent than an active upload or a paused one.\n\nThree visual variants:\n- **uploading**: amber background, spinner icon, progress bar below text (byteOffset / blob.size)\n- **paused**: elevated background, no spinner, Retry button\n- **error**: danger/10 background, red text, Retry + 'Save file' buttons\n\nProgress bar is shown for active uploads only, using byteOffset from IndexedDB to compute percentage. When multiple uploads are pending, the banner shows the primary one with '+N more' count.\n\nThe banner auto-dismisses (returns null) when uploads.length === 0 — no manual close button for active uploads, since closing it would hide critical progress state.","decisions":[{"decision":"Most actionable upload shown first — errors before paused before active","rationale":"A token error requires a human action (band creator re-authorizes). A session error requires sign-in. These block recovery and are more urgent than an active upload silently progressing. Showing errors first ensures the user notices and acts on the blocker rather than assuming uploads are fine.","date":"2026-04-10"},{"decision":"No close button on active/paused uploads; dismiss button only on error states","rationale":"Closing an active or paused upload banner hides critical progress state and gives false confidence. But permanently blocking the UI for an unresolvable error (token-error, session-error) that the user cannot fix immediately is hostile — they may need to navigate while waiting for the creator to re-authorize. Error states have an ✕ dismiss button that hides the banner without discarding the upload (it can still be retried from any page).","date":"2026-04-11"}],"implementation":"1. components/common/UploadBanner.tsx: client component. Fixed position top-0, full-width, z-50. On desktop (md+) offset right to avoid sidebar: md:left-[220px]. Progress percentage computed as a dedicated numeric variable (not inline JSX short-circuit, which renders literal '0' when byteOffset is 0): progressPercent = blob.size > 0 && byteOffset != null ? Math.round(byteOffset / blob.size * 100) : 0. Progress bar is absolute bottom-0 (2px strip, stable height). Error states (token-error, session-error) include a dismiss ✕ button — active/paused uploads do not. Uses ResizeObserver to write its height to --upload-banner-h CSS variable so sticky headers below can offset correctly. Returns null when uploads.length === 0.\n2. components/layout/AuthShell.tsx: mounts UploadBanner + BottomTabBar at auth layout level. Passes upload state from usePendingUploads hook.\n3. hooks/usePendingUploads.ts: reads IndexedDB on mount, drives retry state machine, exposes uploads[], retry/discard/saveToDevice handlers to AuthShell.\n4. app/record/post/page.tsx: PostRecordScreen.doUpload() calls usePendingUploadsStore.getState().refresh() on every status-changing path (success, session-error, token-error, paused, catch) so the Zustand store stays in sync with IndexedDB and the banner dismisses immediately after upload completes without requiring a page refresh.","knownLimitations":["Banner occupies top space — sticky headers below must consume --upload-banner-h CSS variable; new pages with their own sticky headers need to adopt this pattern","On desktop the banner is offset md:left-[220px] to avoid the sidebar; if the sidebar width changes, this value must be updated manually","Progress bar accuracy depends on IndexedDB byteOffset being updated frequently during upload; if updates are sparse, the bar may jump","'Save file' downloads the raw browser-recorded blob (WebM on Chrome, AAC/MP4 on Safari) — not the transcoded AAC that would normally be stored in Drive"],"tags":["upload","banner","progress","resilience","indexeddb","retry","fixed-ui"],"successCriteria":"- Banner visible on every authenticated page during any upload state\n- Active upload: amber background, spinner, clip name, progress bar at bottom of banner\n- Paused upload: shows 'Upload paused — waiting for connection' with Retry button\n- Token error: shows 'Drive connection needs renewal — ask band creator to re-authorize' with Retry + Save file buttons\n- Session error: shows 'Session expired — sign in again to resume upload' with Retry + Save file buttons\n- Multiple pending: shows primary (most urgent) with '+N more' count\n- Banner disappears when all uploads complete (uploads.length === 0)\n- 'Save file' triggers browser download of raw blob (.aac or .webm)","domain":"recording","priority":2,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-11"}],"revisions":[{"date":"2026-04-11","author":"marc+claude","fields_changed":["implementation","decisions","knownLimitations"],"reason":"Fixed React '0' render bug (byteOffset short-circuit), added desktop sidebar offset (md:left-[220px]), added progress % label, added dismiss button for error states, documented Zustand store sync via refresh() in PostRecordScreen.doUpload(). Updated decisions to reflect error-only dismiss button."}],"userGuide":"After stopping a recording, a banner appears at the top of every screen showing upload progress. If the upload completes successfully, the banner disappears automatically. If the connection drops, the banner shows 'Upload paused' with a Retry button — tap it once reconnected. If the band creator's Drive connection expires, the banner shows an error with a 'Save file' button as a last resort to download the raw recording to your device.","componentFile":"components/common/UploadBanner.tsx"},{"featureKey":"odio-2026-004","title":"App Shell — Navigation, Dark Theme, Onboarding, Empty States","status":"active","problem":"The app needs a solid foundation: a responsive web app that works on any device, navigates between recording/editing/collaboration screens fluidly, enforces auth correctly, handles first-time setup (create a band, link a Drive folder) with minimal friction, and never shows a blank screen.","schemaVersion":1,"analysis":"Next.js App Router. Dark theme only — no light mode in V1 (background #0a0a0a, accent amber #f59e0b). System fonts only. Bottom tab bar (Sessions / Record / Clips / Band) with route hierarchy. Tab bar is hidden during the timeline editor (/edit routes). The 'Clips' tab is only shown when a sessionId context is available — outside a session it would duplicate the Sessions tab destination. Record tab is hidden for MEMBER-role users. Back navigation uses Next.js <Link> (not <a href>) for client-side transitions — prevents full page reload on every back tap. Pages use pb-[calc(56px+env(safe-area-inset-bottom))] to clear the fixed tab bar on all devices including those with home indicators.","decisions":[{"decision":"No PWA in V1 — standard responsive web app only","rationale":"PWA manifest + service worker caching adds complexity without a compelling V1 benefit. The app is used on a browser in the car or at home — bookmarking is sufficient.","date":"2026-04-10"},{"decision":"Dark-only, no light/dark toggle","rationale":"Primary use context is dim rehearsal rooms and cars at night. Background #0a0a0a, accent amber #f59e0b.","date":"2026-04-10"},{"decision":"Bottom tab bar navigation (not hierarchical-only)","rationale":"Record needs to be reachable from anywhere in one tap during a live jam. Tab bar hidden only on /edit (full-screen waveform editor).","date":"2026-04-10"},{"decision":"PageLayout back button uses Next.js <Link>, not <a href>","rationale":"Using <a href> for in-app navigation triggers a full page reload on every back tap — visible flash, loses scroll position, re-runs server components. <Link> performs a client-side transition via the Next.js router.","date":"2026-04-11"},{"decision":"Session page uses pb-[calc(56px+env(safe-area-inset-bottom))] not pb-safe","rationale":"pb-safe only accounts for the device's safe area inset (home indicator bar). The fixed 56px tab bar sits on top of that. Without adding 56px, the last clip card could be hidden behind the tab bar on short viewports.","date":"2026-04-11"},{"decision":"Hide 'Clips' tab when no sessionId context","rationale":"When the user is on the band home page or any page without a session context, the Clips tab linked to /bands/[bandId] — identical to the Sessions tab. Having two tabs going to the same URL is confusing and clutters the navigation.","date":"2026-04-11"},{"decision":"System fonts only — no custom font loading","rationale":"App is used in dark, low-bandwidth settings. Custom fonts add bundle size, FOUT risk, and load time for zero perceptible benefit.","date":"2026-04-10"}],"implementation":"1. app/layout.tsx: root layout with dark theme CSS variables, system font stack.\n2. components/layout/BottomTabBar.tsx: client component — 4 tabs. Hidden on /edit routes via usePathname(). Clips tab hidden when !sessionId (avoids same-URL duplicate). Record tab hidden for MEMBER role via bandMe API query.\n3. components/layout/PageLayout.tsx: standard page wrapper. Back button uses Next.js <Link> not <a href> for client-side navigation. Bottom padding: pb-[calc(56px+env(safe-area-inset-bottom))].\n4. components/layout/AuthShell.tsx: client shell — mounts BottomTabBar + UploadBanner. Extracts bandId/sessionId from pathname.\n5. app/(auth)/layout.tsx: server layout — auth guard, renders AuthShell.\n6. components/ui/EmptyState.tsx: reusable empty state with icon, title, description, action.\n7. components/ui/Button.tsx, ButtonLink.tsx: shared button components.\n8. components/ui/BottomSheet.tsx: slide-up modal for confirmations and input sheets.\n9. components/ui/InlineEdit.tsx: in-place editable text field.\n10. tailwind.config.ts: dark theme color tokens.","knownLimitations":["No add-to-home-screen in V1 — users must bookmark the app in their browser","Tab bar not animated — no transition effects between tabs"],"tags":["navigation","dark-theme","onboarding","mobile-first","next.js","empty-states","bottom-tab-bar"],"successCriteria":"- Dark theme renders correctly everywhere; no light mode; high contrast readable in dim rehearsal room or car\n- System fonts only — no web font loading\n- Bottom tab bar: Sessions / Record / Clips / Band — always visible except timeline editor\n- Clips tab hidden when outside a session context (avoids duplicate tab destinations)\n- Record tab hidden for MEMBER-role users\n- All interactive elements have touch targets >= 44px\n- Unauthenticated users land on / and see sign-in only\n- First-run: new user with no bands sees 'Create band' wizard immediately after sign-in\n- /share/[token] is public — no auth required, no private data exposed\n- Back navigation is client-side (no full reload)\n- Content never hidden behind tab bar (correct safe-area + 56px clearance)\n- Empty states guide users to the next action at every dead end","domain":"app-shell","priority":1,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"},{"from":"frozen","to":"active","date":"2026-04-11","reason":"Navigation fixes: <Link> back button, Clips tab hidden when no sessionId, safe-area padding fix"}],"revisions":[{"date":"2026-04-11","author":"marc+claude","fields_changed":["implementation","decisions","knownLimitations","userGuide","successCriteria"],"reason":"Back button <a>→<Link>, Clips tab hidden without sessionId, pb-safe→pb-[56px+safe-area] session page fix, removed duplicate + Record button from session page"}],"userGuide":"After signing in, users land on their bands list. The bottom tab bar (Sessions / Record / Clips / Band) is always visible. Tap Record to go directly to the recording screen from anywhere. The Clips tab appears once you're inside a session — it shows the current session's clips. On first sign-in with no bands, the app redirects to a setup wizard to create the first band.","componentFile":"components/layout/BottomTabBar.tsx"},{"featureKey":"odio-2026-018","title":"Audio Input Selection — External Mic, USB Interface, Headset","status":"frozen","problem":"The recording always uses the device's default microphone. Bands that record with an external condenser mic, USB audio interface, or headset mic plugged in cannot select it — the app always captures from the built-in mic. This limits recording quality for bands that bring audio gear.","schemaVersion":1,"analysis":"MediaDevices.enumerateDevices() returns all available audio input devices. A device picker shown before recording starts (or in band settings) lets the user select their preferred input. The selected deviceId is passed to getUserMedia({ audio: { deviceId: { exact: selectedId } } }).\n\nV1 behavior (current): always uses the browser's default audio input. This is correct for most users (phone built-in mic) and has no UX overhead.\n\nThis feature adds a device picker — shown only when more than one audio input is available. If the device has only one input, nothing changes. The selected input is remembered in localStorage per device.\n\nNote: USB audio interfaces appear as separate audio input devices in most browsers. iOS Safari may not enumerate all Bluetooth audio inputs consistently — this is a known iOS limitation.","decisions":[{"decision":"Picker only shown when multiple inputs exist","rationale":"For the majority of users (phone, built-in mic only), showing a device picker is unnecessary friction. Detecting whether to show the picker at all keeps the zero-overhead path intact for the common case.","date":"2026-04-10"}],"implementation":"1. hooks/useRecorder.ts: on mount, calls navigator.mediaDevices.enumerateDevices(), filters for audioinput, maps to AudioDevice[]. Re-enumerates on devicechange event. Initializes selectedDeviceId from localStorage (key: odio:selectedDeviceId). Passes deviceId: { exact: selectedDeviceId } to getUserMedia constraints when selectedDeviceId is set. Falls back to default getUserMedia on OverconstrainedError — sets deviceFallbackWarning=true for 4s.\n2. components/recording/DevicePicker.tsx: BottomSheet with list of AudioDevice items. Highlights current selection. Calls onSelect(deviceId) on tap.\n3. app/record/page.tsx: renders mic button (left of record button) when devices.length > 1 and !isRecording. Tapping opens DevicePicker. Renders deviceFallbackWarning toast when active.","knownLimitations":["iOS Safari does not consistently enumerate Bluetooth audio inputs — users on iOS may not see all available inputs","enumerateDevices() requires microphone permission to return device labels; before permission is granted, labels are empty strings (can only show device index, not name)"],"tags":["recording","audio-input","external-mic","mediadevices","nice-to-have"],"successCriteria":"- Before starting a recording, app calls enumerateDevices() to list available audio inputs\n- If only one audio input is available: no picker shown, record starts immediately (current behavior)\n- If multiple inputs available: a bottom sheet shows the list with device names; user selects one\n- Selected device is passed to getUserMedia as deviceId constraint\n- Selected deviceId is saved to localStorage; pre-selected on next recording\n- If the saved device is no longer available (unplugged): fall back to default + show a brief 'Using built-in mic' toast\n- Level meter reflects the selected input device","domain":"recording","priority":4,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"If you have an external microphone, USB audio interface, or headset plugged in when you open the recording screen, a small mic icon appears to the left of the record button. Tap it to choose your audio input from the list. Your selection is remembered for next time. If the chosen device is unplugged after selection, the app automatically falls back to the built-in mic and shows a brief notification.","componentFile":"components/recording/DevicePicker.tsx"},{"featureKey":"odio-2026-015","title":"Public Share Player — Unauthenticated Clip Playback","status":"active","problem":"A frozen clip should be shareable outside the band — with a producer, a friend, or social media. The listener should not need a Google account or any signup. Only the frozen render is exposed; no session metadata, band data, or version history leaks through the public page.","schemaVersion":1,"analysis":"The public share page (/share/[token]) fetches clip metadata by publicToken from Postgres. Audio is served via /api/audio/public/[token] — a separate proxy route that looks up the clip by token and streams the finalDriveFileId from Drive using the recorder's stored token. No user auth is required on either the page or the audio route.\n\nPublicPlayer.tsx uses WaveSurfer.js (interact: false) to render the waveform and play the frozen audio. Stamp chips are rendered via StampJumpRow — tappable buttons that seek to their timestamp on tap, consistent with WaveformPlayer and WaveformEditor. WaveformPlayButton renders the shared amber play/pause button. A download button triggers the /api/audio/public/[token] route with a download intent, giving the user the .aac file.\n\nThe public page shows: clip name, band name (optional), clip duration, waveform player with stamps, play/pause, download. No version list, no vote buttons, no comments, no edit actions — nothing that reveals internal band structure.","decisions":[{"decision":"Audio served via server-side proxy even on public pages","rationale":"Even with Drive public permission enabled on the final file, the Drive URL format includes the file ID which reveals internal structure. Proxying via /api/audio/public/[token] keeps the only public identifier as the opaque token, allows revocation (clear token → proxy returns 404), and avoids exposing file IDs in the page source.","date":"2026-04-10"},{"decision":"No version history, no collaboration data on the public page","rationale":"The public page is for external listeners — producers, fans, collaborators outside the band. Exposing version numbers, vote tallies, or comments reveals internal band workflow details. The public page is intentionally minimal: name, waveform, stamps, download.","date":"2026-04-10"}],"implementation":"1. components/share/PublicPlayer.tsx: client component. Props: token, sourceDurationMs, stamps[]. Uses useWaveSurfer({ url: /api/audio/public/{token}, interact: false — no cutMarksRef, no patchDurationUrl, public read-only }). Uses WaveformPlayButton for play/pause. Uses StampJumpRow for stamp chips (tappable, seek on tap) with custom className for layout. No WaveformCanvas overlay — no editing or seeking via waveform drag needed (play-only).\n2. app/share/[token]/page.tsx: server component. Fetches clip by publicToken from Postgres (clips table). If not found or clip.frozen=false: returns 404 page. Renders clip name, duration, PublicPlayer with stamps.\n3. app/api/audio/public/[token]/route.ts: streams audio from Drive. Looks up clip by publicToken, gets finalDriveFileId, fetches recorder's token from NextAuth accounts table, proxies Drive stream with Range header support. No auth middleware — open to public traffic.","knownLimitations":["Public audio proxy uses the recorder's Drive token — if the recorder revokes access, public links break even for frozen clips","No view analytics — there's no way to know how many people have listened to a shared clip","PublicPlayer renders the waveform but the overlay div is not present — users cannot seek by clicking on the waveform (play/pause only). Seeking via stamps is available."],"tags":["public-share","wavesurfer","unauthenticated","frozen","stamps","download"],"successCriteria":"- /share/[token] loads without authentication\n- Waveform renders and plays the frozen render audio\n- Stamp chips displayed with correct emoji and timestamp\n- Play/pause 64px button — large touch target\n- Download button downloads the .aac file\n- Page shows clip name and duration\n- Error state shown if token is invalid or clip has been un-shared\n- Audio not exposed if publicToken is null or clip is not frozen","domain":"render","priority":3,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-11"}],"revisions":[{"date":"2026-04-15","author":"marc+claude","fields_changed":["analysis","implementation","knownLimitations","lastVerifiedDate"],"reason":"Stamp chips in PublicPlayer are now tappable (StampJumpRow, same as WaveformPlayer). WaveformPlayButton extracted as shared component. Updated interact:false. Removed stale limitation about non-tappable stamps. Added limitation about no waveform-click seeking (no overlay div in PublicPlayer)."}],"userGuide":"After freezing a clip, tap 'Enable public share' on the clip detail page to generate a /share/[token] link. Share this URL with anyone — they can open it in any browser without signing in. They'll see the clip name, a waveform player, and stamp markers. They can play, seek, and download the audio. To revoke access, tap 'Enable public share' again to disable — the link immediately stops working.","componentFile":"components/share/PublicPlayer.tsx","lastVerifiedDate":"2026-04-15"},{"featureKey":"odio-2026-006","title":"Recording — Browser-Based Audio Capture","status":"frozen","problem":"The recorder needs to capture multiple songs during a live jam — from a phone browser, one hand, dim room. Between songs the transition to the next recording must be instant. Moments worth keeping must be stampable without interrupting the performance.","schemaVersion":1,"analysis":"Browser MediaRecorder API with getUserMedia. Typical clip: 5-30 min raw. Audio buffered in memory during recording (30 min AAC ~43MB — fits easily). On stop: upload to Google Drive via resumable upload (server generates upload session URL, browser uploads directly to Drive, bypassing Vercel 4.5MB
