body limit). Server then transcodes to AAC via FFmpeg (cross-browser compatibility — Chrome outputs WebM, Safari outputs AAC/MP4). Transcoded file replaces the original in Drive. Clip and v1 version rows created in Postgres. Wake Lock API active during recording (screen-on). Level meter via Web Audio API AnalyserNode. Stamps (fire/keep/uncertain/idea) buffered in memory, written to Postgres with clip on stop. 'Next Song' button appears after stop: saves current clip + immediately opens new recording, upload continues in background.","decisions":[{"decision":"Resumable Drive upload from browser (bypasses Vercel body limit)","rationale":"Vercel serverless functions have a 4.5MB request body limit. A 30-min recording at 192kbps ~43MB. Sending audio through Vercel would fail. Resumable uploads: server generates a Drive upload session URL, browser POSTs audio blob directly to Drive. Audio never passes through Vercel.","date":"2026-04-10"},{"decision":"Transcode to AAC immediately on upload","rationale":"MediaRecorder outputs WebM/Opus on Chrome and AAC/MP4 on Safari. WebM does not play in Safari. Transcoding immediately on upload ensures one consistent format (AAC) for all playback, editing, and final render — regardless of which browser the recorder used.","date":"2026-04-10"},{"decision":"Any Editor-role member can record — not just the band creator","rationale":"The upload flow already uses the creator's stored refresh_token on the server to generate the Drive resumable upload session URL. The member's browser uploads directly to the creator's Drive. This means multi-recorder support is not an architectural change — it's a role-permission change. Any Editor can initiate a recording and audio lands in the same Drive folder. Reduces the single-point-of-failure where only one person can capture audio on jam night.","date":"2026-04-10"},{"decision":"Two notation types: stamps (typed, no text) and annotations (text notes) — both timestamped","rationale":"Stamps are one-tap typed markers — fire/keep/uncertain/idea — zero friction during playing. Annotations are short text notes for when you want to say something specific. Both appear as pins on the waveform. Keeping them separate preserves the zero-friction stamp UX while allowing richer notes when needed. They serve similar purposes at different levels of effort.","date":"2026-04-10"}],"implementation":"1. app/record/page.tsx: full-screen recording screen — timer, level meter, stamp row, Add note link, record/stop button. Tab bar hidden via usePathname().\n2. hooks/useRecorder.ts: core hook managing MediaRecorder lifecycle, Web Audio AnalyserNode for level meter, Wake Lock API, stamps buffer, annotations buffer, device enumeration and selection, IndexedDB write on stop (via savePendingUpload), upload start.\n3. components/recording/DevicePicker.tsx: bottom sheet listing available audio input devices.\n4. app/record/post/page.tsx: post-record screen — clip name (inline edit), duration, stamp count, upload progress bar, Next Song button, Delete recording button.\n5. hooks/useUploadProgress.ts: polls /api/clips/[clipId] every 3s until transcodeStatus is DONE or FAILED.\n6. lib/pendingUploads.ts: IndexedDB helpers for pending upload persistence.\n7. app/api/upload/init/route.ts: generates Drive resumable upload session URL using creator's stored token.\n8. app/api/upload/finalize/route.ts: transcodes uploaded audio with FFmpeg, creates Clip + ClipVersion rows in Postgres.\n9. STAMP_EMOJI and STAMP_COLORS constants in types/index.ts.","knownLimitations":["iOS Safari stops MediaRecorder if the screen locks or the user switches tabs — Wake Lock API (iOS 16.4+) mitigates accidental sleep; tab switching is user responsibility","If the browser tab is closed before the blob is written to IndexedDB (i.e., during the first few seconds after stop), the audio may be lost — mitigated by writing to IndexedDB immediately on stop before any upload attempt (see feat-recording-resilience)","Resumable upload requires two API round-trips before recording is saved — adds ~2-4s to the stop flow","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — members upload directly to the creator's Drive using the server-generated resumable upload session URL (which uses the creator's stored token)"],"tags":["recording","mediarecorder","audio","wake-lock","stamps","ios","google-drive"],"successCriteria":"- Record button triggers microphone permission request on first use\n- Level meter visible and responsive during recording (horizontal amber bar, 8px tall, full-width)\n- Recording screen is full-screen (tab bar hidden); minimal chrome: timer, level meter, stamps, 'Add note', record/stop button only\n- Stamp buttons (fire/keep/uncertain/idea) always visible; one tap stamps current timestamp; haptic feedback on mobile; 72x72px touch targets\n- Quick text note button: 'Add note' text link → 1-line bottom sheet, submit adds annotation\n- Recording screen usable one-handed in portrait orientation\n- Stop → upload begins immediately; 'Next Song' button available without waiting for upload\n- Post-record screen shows: clip name (editable inline), duration, stamp count, upload progress\n- 'Next Song' opens new recording screen; previous clip uploads in background\n- 'Delete recording' option on post-record screen with confirmation sheet: 'Delete this recording? This cannot be undone.'\n- During upload: persistent top banner 'Uploading Song N… 47%' with amber progress bar visible on any screen\n- Banner dismisses only after upload + transcode confirmed complete\n- Wake Lock active during recording (screen stays on)\n- iOS warning shown if Wake Lock is unavailable\n- Clip appears in session as 'Processing…' until transcode done, then becomes fully interactive\n- All clips play back correctly in Chrome and Safari (AAC source)\n- Any Editor-role band member can initiate a recording (not just band creator/recorder)","domain":"recording","priority":1,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away.","componentFile":"hooks/useRecorder.ts"},{"featureKey":"odio-2026-009","title":"Recording Resilience — IndexedDB Safety Net, Upload Retry, Save-to-Device Fallback","status":"frozen","problem":"A recording is a one-time, irreplaceable event. Currently, if the internet drops during upload or the band creator's Drive token is invalid, the audio blob — which only exists in memory — is permanently lost when the user navigates away or the tab closes. A live jam session cannot be re-played. The recording must survive any upload failure and remain recoverable until it reaches Drive.","schemaVersion":1,"analysis":"The audio blob lives in RAM from record-start until upload completes. If anything breaks during the upload window — network drop, Drive token expiry, browser crash, tab close — the blob is gone. This is the highest-risk data loss scenario in the app.\n\nThe fix is a two-layer safety net:\n\nLayer 1 — IndexedDB persistence (immediate): The moment recording stops and the blob is assembled, write it to IndexedDB before starting the upload. IndexedDB stores binary blobs up to the device's available storage (typically several GB on modern phones), survives page refresh and browser restarts, and is cleared only explicitly. Key: odio-pending-upload-{tempId}. Also store: tempId, recordedAt, durationMs, bandId, sessionId, blob.\n\nLayer 2 — Resumable upload retry: Google Drive resumable uploads natively support resume from a byte offset. If the upload is interrupted mid-transfer, the server stores the upload session URL in the pending record. On retry, the client queries Drive for the current byte offset and resumes from there — no re-upload of already-transferred bytes.","decisions":[{"decision":"IndexedDB as the primary persistence layer for unuploaded audio blobs","rationale":"localStorage cannot store binary blobs. The File System Access API requires explicit user permission. IndexedDB is the only browser-native store that (a) handles large binary data, (b) persists across sessions without user action, and (c) is available in all browsers including iOS Safari 10.3+. A 43MB blob fits easily — IndexedDB storage limits are typically 50-80% of available disk space.","date":"2026-04-10"},{"decision":"Resumable upload — save session URL to IndexedDB for byte-accurate retry","rationale":"A naive retry re-uploads the entire blob from byte 0. For a 43MB file on a slow mobile connection, this could fail again at the same spot. Google Drive resumable uploads let you query the committed offset and resume from there. Storing the uploadSessionUrl in IndexedDB alongside the blob enables true resume, not restart.","date":"2026-04-10"},{"decision":"'Save to device' as the last-resort fallback — never lose the audio","rationale":"If Drive is permanently unavailable (creator deleted their account, Drive quota exceeded, token irrecoverable), the band should still get their recording. A browser download gives them the raw file. They lose the Odio versioning workflow but not the audio. The guarantee is: if you recorded it, you can get the file.","date":"2026-04-10"},{"decision":"Check IndexedDB for pending recordings on every app mount","rationale":"Background Sync is not reliable on iOS Safari. The safest recovery path is: when the app is opened, check for stranded blobs and surface them immediately. This catches the crash-during-upload, tab-closed-early, and came-back-later scenarios without relying on service worker scheduling.","date":"2026-04-10"}],"implementation":"1. lib/pendingUploads.ts: IndexedDB helpers using idb library. Database 'odio-recordings', object store 'pending-uploads'. Functions: savePendingUpload(upload), getPendingUploads(), deletePendingUpload(tempId), updatePendingUpload(tempId, patch).\n2. hooks/useRecorder.ts: calls savePendingUpload immediately on MediaRecorder onstop before any network request.\n3. hooks/usePendingUploads.ts: checks IndexedDB on mount, drives retry logic, manages upload state machine (idle/uploading/paused/error), listens to window 'online' event for auto-retry.\n4. components/recording/PendingUploadsBanner.tsx: recovery banner shown when usePendingUploads reports pending items. Shows count, retry button, save-to-device button, discard button with confirmation.\n5. app/(auth)/layout.tsx: renders PendingUploadsBanner at top of all authenticated pages.\n6. lib/uploadAudio.ts: manages the Drive resumable upload from browser — tracks byte offset, handles chunking, updates IndexedDB with uploadSessionUrl on each successful chunk.\n7. 'Save to device': URL.createObjectURL(blob) + programmatic anchor download. Extension .aac or .webm based on mimeType.","knownLimitations":["IndexedDB is cleared when the user clears browser storage ('Clear site data') — the blob would be lost; this is unavoidable without server-side buffering and is an edge case the user controls","Background Sync (automatic retry when tab is closed and connection restored) is not available on iOS Safari — recovery on iOS requires opening the app manually","Drive resumable upload session URLs expire after 7 days — a blob stranded for > 7 days will need a fresh upload session, not a resume; the implementation must detect this (404 on session URL) and fall back to a new session","Storage pressure on low-end devices: a 43MB blob may trigger the browser's storage eviction policy on devices with < 1GB free — 'Save to device' should be surfaced proactively for large recordings","PostRecordScreen.doUpload() is a standalone async function that writes to IndexedDB directly without going through the Zustand store's action methods — fixed by calling usePendingUploadsStore.getState().refresh() on every status-changing path so the in-memory store stays in sync with IndexedDB and the banner dismisses immediately"],"tags":["recording","indexeddb","resilience","offline","retry","upload","fallback"],"successCriteria":"- Audio blob written to IndexedDB immediately on recording stop, before upload begins\n- IndexedDB entry keyed by tempId; stores blob + recordedAt + durationMs + bandId + sessionId + uploadSessionUrl (if partially started)\n- If upload succeeds: IndexedDB entry cleared; no other change\n- If network drops during upload: banner shows 'Upload paused — waiting for connection'; auto-retries on window 'online' event; resumable upload continues from last committed byte\n- If creator's Drive token is invalid: banner shows 'Drive connection needs renewal — ask [creator name] to re-authorize'; IndexedDB blob retained; retry button enabled once token is refreshed\n- If recording member's own session token expires mid-upload: client silently calls getSession() to refresh; if refresh succeeds, upload resumes automatically; if refresh fails, banner shows 'Session expired — sign in again to resume'; after re-sign-in, IndexedDB blob is still present and recovery banner activates\n- On app reopen: check IndexedDB for pending recordings on mount; if found, show recovery banner: 'You have [N] recording(s) waiting to upload'\n- Recovery banner persists until all pending recordings are uploaded or manually discarded\n- 'Save to device' fallback button available on any failed upload: triggers browser download of blob (.webm or .aac depending on browser)\n- User can discard a pending recording from the recovery UI (with confirmation: 'Discard this recording? It cannot be recovered.')\n- 'Pending uploads' count visible in the Record tab (badge) and on the session screen\n- Successful retry creates the clip in Postgres and Drive exactly as a normal upload would","domain":"recording","priority":2,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"Recording resilience is automatic and invisible when things work. If an upload fails (network drops, Drive token expires), a banner appears at the top of the screen: 'You have [N] recording(s) waiting to upload'. Tap 'Retry' to resume when reconnected. Tap 'Save to device' to download the raw audio file to your phone or computer if Drive is permanently unavailable. Tap 'Discard' (with confirmation) to remove a pending recording from recovery. When the app reopens after a crash, pending recordings are detected automatically.","componentFile":"hooks/usePendingUploads.ts"},{"featureKey":"odio-2026-001","title":"Odio — Collaborative Jam Session Recorder","status":"draft","problem":"Musicians lose the best moments from their jam sessions. When they do record, the raw file is long, unedited, buried — nobody goes back and cleans it up. No tool lets a small band record on any device, pass the recording around in the car on the way home, each person trimming a song into its final form, and arrive with a clean versioned archive — all from a browser, no install, no DAW.","schemaVersion":1,"analysis":"Pure web PWA (Next.js). No native app. Browser MediaRecorder API covers recording on iOS Safari 14.5+, Android Chrome, and desktop. The core primitive is versioning: every clip starts as v1 (raw recording), band members create new versions by marking cut regions, and any version can be frozen — triggering a server-side FFmpeg render. Versions are metadata only (cutMarks + annotations JSON) pointing at the same source audio. No simultaneous editing; linear versioning. Storage split: audio files (.aac) in Google Drive (recorder's account, free), all structured metadata (sessions, clips, versions, votes, comments, stamps) in a free-tier Postgres (Neon or Vercel Postgres). No Supabase. Auth: NextAuth.js + Google OAuth (drive.file scope). Real-time: polling every 5-10s. Edit state in localStorage as safety net; submit requires connection. External services: Google + free Postgres. Cost: $0/month.","decisions":[{"decision":"Web-only PWA — no native app","rationale":"Browser MediaRecorder API works on iOS Safari 14.5+, Android Chrome, and desktop. No install removes friction for bandmates who only need to edit/review. The 'in the car editing' use case requires web access — native would require app install on every bandmate's phone.","date":"2026-04-10"},{"decision":"Google Drive for audio, Neon Postgres for metadata — no Supabase","rationale":"Supabase Storage costs accumulate at ~100MB/session. Google Drive is free (15GB) for audio. Structured metadata (sessions, clips, versions, votes, comments) belongs in a relational DB for querying, not in JSON sidecars with ETag concurrency management. Neon Postgres free tier (512MB) handles years of band metadata. Both services are $0.","date":"2026-04-10"},{"decision":"NextAuth DB adapter required — not JWT-only","rationale":"The audio proxy route serves the recorder's Drive files to all band members. To do this, the server needs the recorder's valid refresh token when any member makes a request — not just when the recorder is logged in. NextAuth's DB adapter stores access_token and refresh_token in Postgres per user, enabling server-side token lookup by user email. JWT-only strategy cannot support this cross-user token access.","date":"2026-04-10"},{"decision":"Versioning as core primitive — versions are metadata, not audio files","rationale":"Storing a full audio file per version would be prohibitively expensive. Versions (cutMarks + annotations JSON) are bytes vs megabytes. Source audio stored once; versions are lightweight edit instructions applied at render time or virtually during preview.","date":"2026-04-10"},{"decision":"Linear versioning only — no simultaneous co-editing","rationale":"Real-time simultaneous editing (CRDT/Y.js) adds significant complexity. The real use case is 3 people each editing a different song. Linear versioning covers all realistic scenarios without conflict resolution logic.","date":"2026-04-10"},{"decision":"localStorage for in-progress edit safety — no offline sync","rationale":"Full offline support adds complexity. The real need is simpler: if the browser crashes mid-edit, cut marks shouldn't be lost. localStorage solves this with minimal code. Submit still requires a connection — that's acceptable.","date":"2026-04-10"},{"decision":"Resumable Drive upload from browser — bypass Vercel body limit","rationale":"Vercel's 4.5MB request body limit cannot accommodate a 30-min audio recording (~43MB). Resumable uploads: server generates a Drive upload session URL, client uploads directly to Drive. Audio never passes through Vercel.","date":"2026-04-10"}],"implementation":"**Stack:** Next.js (App Router) + TypeScript + Tailwind CSS, deployed on Vercel\n**Recording:** Browser MediaRecorder API + Web Audio API (level meter) + Wake Lock API (screen-on)\n**Waveform editing:** wavesurfer.js 7.x (interact:false; cut bands are pure CSS divs — no RegionsPlugin)\n**Storage — audio:** Google Drive (resumable upload bypassing Vercel 4.5MB body limit; transcoded to AAC on finalize)\n**Storage — metadata:** Neon Postgres free tier (sessions, clips, versions, votes, comments, stamps, bands, members)\n**Auth:** NextAuth.js + Google OAuth (drive.file scope) + NextAuth DB adapter (Prisma + Neon, required to store recorder's refresh token for audio proxy)\n**Audio proxy:** Next.js API route fetches audio from recorder's Drive using stored token, streams to client with Range support\n**Real-time:** Client-side polling every 5-10s when session active\n**Render:** fluent-ffmpeg + @ffmpeg-installer/ffmpeg in Next.js API route (triggered on freeze only)\n**Edit safety:** localStorage (cut marks saved on every change, restored on editor reopen, cleared on submit)\n**External services: 2** — Google (OAuth + Drive) + Neon (Postgres). Cost: $0/month.","knownLimitations":["iOS Safari stops MediaRecorder if screen locks or user switches tabs — Wake Lock API (iOS 16.4+) mitigates; warning shown before recording","Polling (not WebSocket) — new versions/votes appear within 5-10s, not instantly","MediaRecorder output format varies by browser (WebM/Opus on Chrome, AAC/MP4 on iOS) — transcoded to AAC on upload","Recorder's Google Drive storage used for band audio — 15GB free, ~350 raw clips before cleanup needed","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — one token serves the whole band"],"tags":["audio","recording","jam","musicians","collaboration","pwa","web","versioning","google-drive","next.js"],"lineage":{"children":["odio-2026-002","odio-2026-003","odio-2026-004","odio-2026-005","odio-2026-006","odio-2026-007","odio-2026-008","odio-2026-009","odio-2026-010","odio-2026-011","odio-2026-012","odio-2026-014","odio-2026-013","odio-2026-015","odio-2026-016","odio-2026-017","odio-2026-018"]},"successCriteria":"- Recorder opens browser (any device), records a session, all clips uploaded to Google Drive and metadata saved to Postgres\n- Band member opens a link in mobile browser, opens a clip in the editor within 2 taps\n- Editor loads waveform via Drive audio proxy, marks cuts, previews result without re-encoding\n- Submitting a version writes to Postgres; others see it within 5-10s via polling\n- Three people can each edit a different clip simultaneously, each producing their own version\n- Freeze triggers server-side render, produces downloadable file within 10s for a typical 2-8 min clip\n- Version history shows full chain with author, timestamp, description, and result duration\n- Total infrastructure cost: $0/month","domain":"audio/collaboration","statusHistory":[],"revisions":[{"date":"2026-04-10","author":"marc+claude","fields_changed":["problem","tags","domain"],"reason":"Initial project creation"},{"date":"2026-04-10","author":"marc+claude","fields_changed":["problem","analysis","successCriteria","implementation","decisions","knownLimitations","tags"],"reason":"Platform pivot to web-only PWA. Versioning as core primitive. PRD v0.2 + Architecture v0.2 + Epics v0.2."},{"date":"2026-04-10","author":"marc+claude","fields_changed":["analysis","implementation","decisions","knownLimitations","tags"],"reason":"Removed Supabase entirely. Google Drive for audio. Postgres for all metadata. NextAuth.js. localStorage safety net only. Architecture v0.3."},{"date":"2026-04-11","author":"marc+claude","fields_changed":["knownLimitations","lineage"],"reason":"Removed stale .meta.json reference (all metadata is now Postgres). Added new child features: clip-detail, public-share-player, upload-banner."}]}];

  document.getElementById('topbar-count').textContent = features.length + ' features';

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s){
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function completeness(f){
    var checks=[!!f.analysis,!!f.implementation,!!(f.decisions&&f.decisions.length),
      !!f.successCriteria,!!(f.knownLimitations&&f.knownLimitations.length),
      !!(f.tags&&f.tags.length),!!f.domain];
    return Math.round(checks.filter(Boolean).length/checks.length*100);
  }

  function statusColor(s){
    switch(s){
      case 'active':     return 'rgba(74,173,114,0.85)';
      case 'frozen':     return 'rgba(91,130,204,0.85)';
      case 'deprecated': return 'rgba(204,91,91,0.85)';
      default:           return 'rgba(196,162,85,0.85)';
    }
  }
  function statusColorSolid(s){
    switch(s){
      case 'active':     return '#4aad72';
      case 'frozen':     return '#5b82cc';
      case 'deprecated': return '#cc5b5b';
      default:           return '#c4a255';
    }
  }
  function statusBg(s){
    switch(s){
      case 'active':     return 'rgba(74,173,114,0.12)';
      case 'frozen':     return 'rgba(91,130,204,0.12)';
      case 'deprecated': return 'rgba(204,91,91,0.12)';
      default:           return 'rgba(196,162,85,0.12)';
    }
  }

  // ── Canvas setup ──────────────────────────────────────────────────────────
  var canvas = document.getElementById('graph-canvas');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0;

  function resize(){
    var dpr = window.devicePixelRatio || 1;
    W = canvas.parentElement.offsetWidth;
    H = canvas.parentElement.offsetHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr,dpr);
    drawFrame();
  }
  window.addEventListener('resize', resize);

  // ── Transform (pan + zoom) ────────────────────────────────────────────────
  var transform = { x: 0, y: 0, scale: 1 };

  function worldToScreen(wx, wy){
    return {
      x: wx * transform.scale + transform.x,
      y: wy * transform.scale + transform.y
    };
  }
  function screenToWorld(sx, sy){
    return {
      x: (sx - transform.x) / transform.scale,
      y: (sy - transform.y) / transform.scale
    };
  }

  // ── Build nodes ───────────────────────────────────────────────────────────
  // Count children per feature
  var childCountMap = {};
  features.forEach(function(f){
    childCountMap[f.featureKey] = 0;
  });
  features.forEach(function(f){
    if(f.lineage && f.lineage.parent && childCountMap.hasOwnProperty(f.lineage.parent)){
      childCountMap[f.lineage.parent]++;
    }
    // Also count explicit children array
    if(f.lineage && f.lineage.children){
      f.lineage.children.forEach(function(ck){
        if(childCountMap.hasOwnProperty(ck)){
          childCountMap[ck] = Math.max(childCountMap[ck]||0, 0);
        }
      });
      childCountMap[f.featureKey] = Math.max(childCountMap[f.featureKey]||0, f.lineage.children.length);
    }
  });

  var nodes = [];
  var nodeMap = {}; // featureKey → node

  // Build nodes first (no position yet)
  features.forEach(function(f){
    var comp = completeness(f);
    var radius = 8 + (comp / 100) * 10;
    var node = { x: 0, y: 0, vx: 0, vy: 0, feature: f, radius: radius, comp: comp, depth: 0, targetY: 0 };
    nodes.push(node);
    nodeMap[f.featureKey] = node;
  });

  // ── Grouping state ────────────────────────────────────────────────────────
  var currentGroupMode = 'lineage';
  var lanes = []; // [{label, sublabel, y, color}]

  var LAYER_H  = 240;
  var H_SPREAD = 190;

  var LANE_COLORS = [
    'rgba(196,162,85,0.028)',  'rgba(74,173,114,0.028)',
    'rgba(91,130,204,0.028)',  'rgba(204,91,91,0.028)',
    'rgba(180,120,200,0.028)', 'rgba(120,200,180,0.028)',
    'rgba(200,150,80,0.028)',  'rgba(80,150,200,0.028)',
  ];
  var STATUS_LANE_COLOR = {
    active:     'rgba(74,173,114,0.05)',
    frozen:     'rgba(91,130,204,0.05)',
    draft:      'rgba(196,162,85,0.05)',
    deprecated: 'rgba(204,91,91,0.05)',
  };

  function assignLayer(groups){
    // groups: [{label, sublabel?, color, keys:[featureKey,...]}]
    // Sets targetY (and resets position + velocity) for each node.
    groups.forEach(function(g, laneIdx){
      var y = laneIdx * LAYER_H;
      var count = g.keys.length;
      lanes.push({ label: g.label, sublabel: g.sublabel||'', y: y, color: g.color });
      g.keys.forEach(function(key, i){
        var nd = nodeMap[key];
        if(!nd) return;
        nd.targetY = y;
        nd.depth   = laneIdx;
        // Reset position to lane with jitter so repulsion has room to spread
        nd.x  = (i - (count-1)/2) * H_SPREAD + (Math.random()-0.5)*20;
        nd.y  = y + (Math.random()-0.5)*30;
        nd.vx = 0; nd.vy = 0;
      });
    });
  }

  function computeLayout(mode){
    lanes = [];
    currentGroupMode = mode;

    if(mode === 'lineage'){
      // BFS depths
      var depths = {};
      var roots  = [];
      features.forEach(function(f){
        var hasParent = f.lineage && f.lineage.parent && nodeMap[f.lineage.parent];
        if(!hasParent){ roots.push(f.featureKey); depths[f.featureKey] = 0; }
      });
      var bfsQ = roots.slice();
      while(bfsQ.length){
        var cur = bfsQ.shift();
        features.forEach(function(f){
          if(f.lineage && f.lineage.parent === cur && depths[f.featureKey]===undefined){
            depths[f.featureKey] = depths[cur] + 1;
            bfsQ.push(f.featureKey);
          }
        });
      }
      features.forEach(function(f){ if(depths[f.featureKey]===undefined) depths[f.featureKey]=0; });

      var byDepth = {};
      var maxDepth = 0;
      features.forEach(function(f){
        var d = depths[f.featureKey];
        maxDepth = Math.max(maxDepth, d);
        if(!byDepth[d]) byDepth[d] = [];
        byDepth[d].push(f.featureKey);
      });
      var groups = [];
      for(var d=0; d<=maxDepth; d++){
        if(!byDepth[d] || !byDepth[d].length) continue;
        byDepth[d].sort();
        groups.push({
          label:    d === 0 ? 'Root' : 'Depth ' + d,
          sublabel: byDepth[d].length + ' feature' + (byDepth[d].length===1?'':'s'),
          color:    LANE_COLORS[d % LANE_COLORS.length],
          keys:     byDepth[d],
        });
      }
      assignLayer(groups);

    } else if(mode === 'domain'){
      var domainMap = {};
      features.forEach(function(f){
        var d = (f.domain||'Uncategorized').trim() || 'Uncategorized';
        if(!domainMap[d]) domainMap[d] = [];
        domainMap[d].push(f.featureKey);
      });
      var domains = Object.keys(domainMap).sort();
      if(domainMap['Uncategorized']){
        // push Uncategorized to end
        domains = domains.filter(function(d){ return d!=='Uncategorized'; });
        domains.push('Uncategorized');
      }
      var groups = domains.map(function(d, i){
        var keys = domainMap[d].slice().sort();
        return {
          label:    d,
          sublabel: keys.length + ' feature' + (keys.length===1?'':'s'),
          color:    LANE_COLORS[i % LANE_COLORS.length],
          keys:     keys,
        };
      });
      assignLayer(groups);

    } else if(mode === 'status'){
      var STATUS_ORDER = ['active', 'frozen', 'draft', 'deprecated'];
      var statusMap = {};
      features.forEach(function(f){
        var s = f.status || 'draft';
        if(!statusMap[s]) statusMap[s] = [];
        statusMap[s].push(f.featureKey);
      });
      // Also catch unknown statuses
      features.forEach(function(f){
        var s = f.status || 'draft';
        if(STATUS_ORDER.indexOf(s) === -1){
          if(!statusMap['draft']) statusMap['draft'] = [];
          statusMap['draft'].push(f.featureKey);
        }
      });
      var groups = STATUS_ORDER
        .filter(function(s){ return statusMap[s] && statusMap[s].length; })
        .map(function(s){
          var keys = statusMap[s].slice().sort();
          return {
            label:    s.charAt(0).toUpperCase() + s.slice(1),
            sublabel: keys.length + ' feature' + (keys.length===1?'':'s'),
            color:    STATUS_LANE_COLOR[s] || LANE_COLORS[0],
            keys:     keys,
          };
        });
      assignLayer(groups);

    } else if(mode === 'timeline'){
      // Group by year from earliest statusHistory entry or lastVerifiedDate
      var yearMap = {};
      features.forEach(function(f){
        var year = 'Unknown';
        if(f.statusHistory && f.statusHistory.length){
          var d = f.statusHistory[0].date || '';
          if(d.length >= 4) year = d.slice(0,4);
        } else if(f.lastVerifiedDate && f.lastVerifiedDate.length >= 4){
          year = f.lastVerifiedDate.slice(0,4);
        }
        if(!yearMap[year]) yearMap[year] = [];
        yearMap[year].push(f.featureKey);
      });
      var years = Object.keys(yearMap).filter(function(y){ return y!=='Unknown'; }).sort();
      if(yearMap['Unknown'] && yearMap['Unknown'].length) years.push('Unknown');
      var groups = years.map(function(y, i){
        var keys = yearMap[y].slice().sort();
        return {
          label:    y === 'Unknown' ? 'No date' : y,
          sublabel: keys.length + ' feature' + (keys.length===1?'':'s'),
          color:    LANE_COLORS[i % LANE_COLORS.length],
          keys:     keys,
        };
      });
      assignLayer(groups);

    } else if(mode === 'completeness'){
      var BUCKETS = [
        { label: 'Complete',  sublabel: '67 – 100%', min: 67, max: 100, color: 'rgba(74,173,114,0.05)',  keys: [] },
        { label: 'Partial',   sublabel: '34 – 66%',  min: 34, max:  66, color: 'rgba(196,162,85,0.05)',  keys: [] },
        { label: 'Sparse',    sublabel: '0 – 33%',   min:  0, max:  33, color: 'rgba(204,91,91,0.05)',   keys: [] },
      ];
      features.forEach(function(f){
        var c = completeness(f);
        for(var i=0;i<BUCKETS.length;i++){
          if(c >= BUCKETS[i].min && c <= BUCKETS[i].max){ BUCKETS[i].keys.push(f.featureKey); break; }
        }
      });
      var groups = BUCKETS
        .filter(function(b){ return b.keys.length; })
        .map(function(b){
          b.keys.sort();
          return { label: b.label, sublabel: b.sublabel + ' · ' + b.keys.length + ' features', color: b.color, keys: b.keys };
        });
      assignLayer(groups);
    }

    // Re-warm simulation
    alpha = Math.min(alpha + 0.6, 1.0);
    if(!simRunning){
      simRunning = true;
      rafId = requestAnimationFrame(tick);
    }
  }

  // ── Build edges ───────────────────────────────────────────────────────────
  var edges = [];
  features.forEach(function(f){
    if(f.lineage && f.lineage.parent){
      var parentNode = nodeMap[f.lineage.parent];
      var childNode  = nodeMap[f.featureKey];
      if(parentNode && childNode){
        edges.push({ source: parentNode, target: childNode });
      }
    }
  });

  // ── Force simulation ──────────────────────────────────────────────────────
  var K_REPEL      = 6000;   // stronger repulsion to spread siblings apart
  var K_SPRING     = 0.05;   // spring along edges
  var REST_LEN     = 180;    // rest length for edge springs
  var GRAVITY      = 0.002;  // weak center-X gravity (layer force handles Y)
  var DAMPING      = 0.78;   // heavier damping for quicker settle
  var LAYER_STRENGTH = 0.15; // attraction toward assigned Y layer
  var MIN_NODE_GAP = 40;     // minimum pixel gap between node surfaces
  var alpha        = 1.0;
  var ALPHA_DECAY  = 0.012;
  var simRunning   = true;
  var rafId        = null;

  function tick(){
    if(alpha < 0.001){
      simRunning = false;
      drawFrame();
      return;
    }

    var n = nodes.length;

    // 1. Repulsion: O(n²) — fine for <200 nodes
    for(var i=0;i<n;i++){
      for(var j=i+1;j<n;j++){
        var ni = nodes[i], nj = nodes[j];
        var dx = nj.x - ni.x;
        var dy = nj.y - ni.y;
        var dist2 = dx*dx + dy*dy;
        if(dist2 < 1) dist2 = 1;
        var dist = Math.sqrt(dist2);
        var f = K_REPEL / dist2;
        var fx = (dx/dist) * f;
        var fy = (dy/dist) * f;
        ni.vx -= fx * alpha;
        ni.vy -= fy * alpha;
        nj.vx += fx * alpha;
        nj.vy += fy * alpha;
      }
    }

    // 2. Spring attraction on edges
    for(var e=0;e<edges.length;e++){
      var edge = edges[e];
      var s = edge.source, t = edge.target;
      var dx = t.x - s.x;
      var dy = t.y - s.y;
      var dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 0.001) continue;
      var stretch = dist - REST_LEN;
      var fmag = K_SPRING * stretch;
      var fx = (dx/dist)*fmag;
      var fy = (dy/dist)*fmag;
      s.vx += fx * alpha;
      s.vy += fy * alpha;
      t.vx -= fx * alpha;
      t.vy -= fy * alpha;
    }

    // 3. Layer attraction — pull each node toward its assigned Y row
    for(var i=0;i<n;i++){
      var nd = nodes[i];
      nd.vy += (nd.targetY - nd.y) * LAYER_STRENGTH * alpha;
      // Weak X gravity toward center column only
      nd.vx += -nd.x * GRAVITY * alpha;
    }

    // 4+5. Velocity damping + position update
    for(var i=0;i<n;i++){
      var nd = nodes[i];
      nd.vx *= DAMPING;
      nd.vy *= DAMPING;
      nd.x  += nd.vx;
      nd.y  += nd.vy;
    }

    // 6. Collision correction — push overlapping nodes apart horizontally
    for(var i=0;i<n;i++){
      for(var j=i+1;j<n;j++){
        var ni = nodes[i], nj = nodes[j];
        var dx = nj.x - ni.x;
        var dy = nj.y - ni.y;
        var minDist = ni.radius + nj.radius + MIN_NODE_GAP;
        var dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < minDist && dist > 0.001){
          var overlap = (minDist - dist) / 2;
          var ux = dx/dist, uy = dy/dist;
          ni.x -= ux * overlap;
          ni.y -= uy * overlap;
          nj.x += ux * overlap;
          nj.y += uy * overlap;
        }
      }
    }

    alpha -= ALPHA_DECAY;

    drawFrame();
    rafId = requestAnimationFrame(tick);
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  var selectedNode = null;

  function drawFrame(){
    ctx.clearRect(0,0,W,H);

    // Dark background gradient
    var grad = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
    grad.addColorStop(0,'#16130f');
    grad.addColorStop(1,'#0e0c0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.scale, transform.scale);

    // Lane background bands (world space)
    drawLaneBands();

    // Draw edges
    for(var e=0;e<edges.length;e++){
      drawEdge(edges[e]);
    }

    // Draw nodes (non-selected first, selected on top)
    for(var i=0;i<nodes.length;i++){
      if(nodes[i] !== selectedNode) drawNode(nodes[i], false);
    }
    if(selectedNode) drawNode(selectedNode, true);

    ctx.restore();

    // Lane labels (screen space — always readable regardless of pan/zoom)
    drawLaneLabels();
  }

  function drawLaneBands(){
    if(!lanes.length) return;
    var BAND_H = LAYER_H;
    lanes.forEach(function(lane, i){
      // Subtle background band
      ctx.fillStyle = lane.color;
      ctx.fillRect(-8000, lane.y - BAND_H/2, 16000, BAND_H);
      // Separator line between lanes
      if(i > 0){
        ctx.beginPath();
        ctx.setLineDash([5, 10]);
        ctx.strokeStyle = 'rgba(42,36,32,0.45)';
        ctx.lineWidth = 0.5 / transform.scale; // stay 0.5px visually
        ctx.moveTo(-8000, lane.y - BAND_H/2);
        ctx.lineTo( 8000, lane.y - BAND_H/2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });
  }

  function drawLaneLabels(){
    if(!lanes.length) return;
    lanes.forEach(function(lane){
      var sy = lane.y * transform.scale + transform.y;
      if(sy < 56 || sy > H + 20) return;
      // Label
      ctx.font = 'bold 10px Cascadia Code, Fira Code, JetBrains Mono, monospace';
      ctx.fillStyle = 'rgba(196,162,85,0.7)';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(lane.label, 14, sy - 7);
      // Sublabel
      if(lane.sublabel){
        ctx.font = '9px Cascadia Code, Fira Code, JetBrains Mono, monospace';
        ctx.fillStyle = 'rgba(122,106,90,0.5)';
        ctx.fillText(lane.sublabel, 14, sy + 7);
      }
    });
  }

  function drawEdge(edge){
    var s = edge.source, t = edge.target;
    var dx = t.x - s.x;
    var dy = t.y - s.y;
    var dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < 0.001) return;

    // In non-lineage modes edges are shown as faint relationship hints
    var isLineage = currentGroupMode === 'lineage';
    var lineAlpha  = isLineage ? 0.9 : 0.22;
    var arrowAlpha = isLineage ? 1.0 : 0.3;

    // Line (stop at node radius)
    var ux = dx/dist, uy = dy/dist;
    var x1 = s.x + ux*s.radius;
    var y1 = s.y + uy*s.radius;
    var x2 = t.x - ux*(t.radius+7); // leave room for arrowhead
    var y2 = t.y - uy*(t.radius+7);

    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    if(!isLineage) ctx.setLineDash([3,6]);
    ctx.strokeStyle='rgba(42,36,32,'+lineAlpha+')';
    ctx.lineWidth=isLineage ? 1.2 : 0.8;
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead at target end
    var arrowLen = isLineage ? 7 : 5;
    var arrowAng = 0.45;
    var ax = t.x - ux*(t.radius+1);
    var ay = t.y - uy*(t.radius+1);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(
      ax - arrowLen*Math.cos(Math.atan2(uy,ux)-arrowAng),
      ay - arrowLen*Math.sin(Math.atan2(uy,ux)-arrowAng)
    );
    ctx.lineTo(
      ax - arrowLen*Math.cos(Math.atan2(uy,ux)+arrowAng),
      ay - arrowLen*Math.sin(Math.atan2(uy,ux)+arrowAng)
    );
    ctx.closePath();
    ctx.fillStyle='rgba(42,36,32,'+arrowAlpha+')';
    ctx.fill();
  }

  function drawNode(node, isSelected){
    var f = node.feature;
    var r = node.radius;

    // Glow for selected
    if(isSelected){
      ctx.beginPath();
      ctx.arc(node.x, node.y, r+6, 0, Math.PI*2);
      var glow = ctx.createRadialGradient(node.x,node.y,r,node.x,node.y,r+10);
      glow.addColorStop(0,'rgba(196,162,85,0.25)');
      glow.addColorStop(1,'rgba(196,162,85,0)');
      ctx.fillStyle=glow;
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI*2);
    ctx.fillStyle = statusColor(f.status);
    ctx.fill();

    // Stroke
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI*2);
    ctx.strokeStyle = isSelected ? '#c4a255' : 'rgba(42,36,32,0.6)';
    ctx.lineWidth   = isSelected ? 2 : 1;
    ctx.stroke();

    // Label (only if zoom > 0.7)
    if(transform.scale > 0.7){
      ctx.font = '10px Cascadia Code, Fira Code, JetBrains Mono, Consolas, monospace';
      ctx.fillStyle = isSelected ? '#c4a255' : 'rgba(176,164,156,0.85)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(f.featureKey, node.x, node.y + r + 4);
    }
  }

  // ── Hit testing ───────────────────────────────────────────────────────────
  function hitTest(sx, sy){
    var world = screenToWorld(sx, sy);
    // Test in reverse order (top-most first), selected node takes priority
    var best = null;
    var bestDist = Infinity;
    for(var i=0;i<nodes.length;i++){
      var nd = nodes[i];
      var dx = world.x - nd.x;
      var dy = world.y - nd.y;
      var dist = Math.sqrt(dx*dx+dy*dy);
      if(dist <= nd.radius + 3 && dist < bestDist){
        best = nd;
        bestDist = dist;
      }
    }
    return best;
  }

  // ── Detail panel ──────────────────────────────────────────────────────────
  var panel      = document.getElementById('detail-panel');
  var detailKey  = document.getElementById('detail-key');
  var detailTitle= document.getElementById('detail-title');
  var detailBadge= document.getElementById('detail-badge');
  var detailProb = document.getElementById('detail-problem');
  var detailDec  = document.getElementById('detail-decisions');
  var detailDom  = document.getElementById('detail-domain');
  var detailComp = document.getElementById('detail-comp');
  var detailTags = document.getElementById('detail-tags');
  var detailLin  = document.getElementById('detail-lineage');

  function openPanel(node){
    var f = node.feature;
    var comp = node.comp;

    detailKey.textContent = f.featureKey;
    detailTitle.textContent = f.title;

    detailBadge.textContent = f.status;
    detailBadge.style.background = statusBg(f.status);
    detailBadge.style.border = '1px solid '+statusColorSolid(f.status)+'44';
    detailBadge.style.color  = statusColorSolid(f.status);

    var problemText = f.problem || '';
    if(problemText.length > 150) problemText = problemText.slice(0,147)+'…';
    detailProb.textContent = problemText;

    // Decisions count
    var decCount = (f.decisions && f.decisions.length) ? f.decisions.length : 0;
    detailDec.innerHTML = decCount > 0
      ? '<span class="detail-meta-label">Decisions:&nbsp;</span><span class="detail-meta-val">'+decCount+'</span>'
      : '';

    // Domain
    detailDom.innerHTML = f.domain
      ? '<span class="detail-meta-label">Domain:&nbsp;</span><span class="detail-meta-val">'+esc(f.domain)+'</span>'
      : '';

    // Completeness bar
    detailComp.innerHTML =
      '<div class="comp-bar-label">Completeness: '+comp+'%</div>'+
      '<div class="comp-bar-track"><div class="comp-bar-fill" style="width:'+comp+'%"></div></div>';

    // Tags
    detailTags.innerHTML = '';
    if(f.tags && f.tags.length){
      f.tags.forEach(function(t){
        var span = document.createElement('span');
        span.className='detail-tag';
        span.textContent=t;
        detailTags.appendChild(span);
      });
    }

    // Lineage
    detailLin.innerHTML = '';
    var hasLineage = f.lineage && (f.lineage.parent || (f.lineage.children&&f.lineage.children.length));
    if(hasLineage){
      var html = '<div class="detail-lineage-section">';
      if(f.lineage.parent){
        html += '<div class="detail-lineage-title">Parent</div>';
        html += '<span class="detail-chip" data-key="'+esc(f.lineage.parent)+'">'+esc(f.lineage.parent)+'</span>';
      }
      if(f.lineage.children && f.lineage.children.length){
        html += '<div class="detail-lineage-title" style="margin-top:10px;">Children ('+f.lineage.children.length+')</div>';
        f.lineage.children.forEach(function(ck){
          html += '<span class="detail-chip" data-key="'+esc(ck)+'">'+esc(ck)+'</span>';
        });
      }
      html += '</div>';
      detailLin.innerHTML = html;

      // Bind chip clicks
      detailLin.querySelectorAll('.detail-chip').forEach(function(chip){
        chip.addEventListener('click', function(){
          var key = chip.getAttribute('data-key');
          var targetNode = nodeMap[key];
          if(targetNode){
            selectNode(targetNode);
            flyTo(targetNode);
          }
        });
      });
    }

    panel.classList.add('open');
  }

  function closePanel(){
    panel.classList.remove('open');
    selectedNode = null;
    drawFrame();
  }

  function selectNode(node){
    selectedNode = node;
    openPanel(node);
    drawFrame();
  }

  document.getElementById('detail-close').addEventListener('click', closePanel);

  // ── Fly-to animation ──────────────────────────────────────────────────────
  function flyTo(node){
    // Center the node in the available viewport (excluding panel)
    var panelWidth = panel.classList.contains('open') ? 300 : 0;
    var targetX = (W - panelWidth) / 2 - node.x * transform.scale;
    var targetY = (H - 48)         / 2 - node.y * transform.scale + 48;

    var startX = transform.x, startY = transform.y;
    var dur = 400, start = performance.now();

    function step(now){
      var t = Math.min((now-start)/dur,1);
      // ease out cubic
      var e = 1 - Math.pow(1-t,3);
      transform.x = startX + (targetX - startX)*e;
      transform.y = startY + (targetY - startY)*e;
      drawFrame();
      if(t<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // ── Mouse interaction ─────────────────────────────────────────────────────
  var isDragging = false;
  var dragStartX = 0, dragStartY = 0;
  var dragStartTX = 0, dragStartTY = 0;
  var hasDragged  = false;
  var DRAG_THRESHOLD = 4;

  canvas.addEventListener('mousedown', function(e){
    isDragging  = true;
    hasDragged  = false;
    dragStartX  = e.clientX;
    dragStartY  = e.clientY;
    dragStartTX = transform.x;
    dragStartTY = transform.y;
    canvas.classList.add('dragging');
  });

  window.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;
    if(Math.abs(dx)>DRAG_THRESHOLD || Math.abs(dy)>DRAG_THRESHOLD) hasDragged=true;
    if(hasDragged){
      transform.x = dragStartTX + dx;
      transform.y = dragStartTY + dy;
      drawFrame();
    }
  });

  window.addEventListener('mouseup', function(e){
    if(!isDragging) return;
    isDragging = false;
    canvas.classList.remove('dragging');
    if(!hasDragged){
      // Click: hit-test
      var hit = hitTest(e.clientX, e.clientY);
      if(hit){
        selectNode(hit);
      } else {
        closePanel();
      }
    }
  });

  // Scroll to zoom
  canvas.addEventListener('wheel', function(e){
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : 0.91;
    var newScale = Math.max(0.2, Math.min(4, transform.scale * factor));

    // Zoom around mouse position
    var mx = e.clientX, my = e.clientY;
    transform.x = mx - (mx - transform.x) * (newScale/transform.scale);
    transform.y = my - (my - transform.y) * (newScale/transform.scale);
    transform.scale = newScale;
    drawFrame();
  }, {passive:false});

  // Touch support (single-finger pan, pinch-zoom)
  var lastTouches = null;
  canvas.addEventListener('touchstart', function(e){
    e.preventDefault();
    lastTouches = Array.from(e.touches);
    hasDragged = false;
    if(e.touches.length===1){
      dragStartX  = e.touches[0].clientX;
      dragStartY  = e.touches[0].clientY;
      dragStartTX = transform.x;
      dragStartTY = transform.y;
    }
  },{passive:false});

  canvas.addEventListener('touchmove', function(e){
    e.preventDefault();
    var touches = Array.from(e.touches);
    if(touches.length===1 && lastTouches && lastTouches.length===1){
      var dx = touches[0].clientX - dragStartX;
      var dy = touches[0].clientY - dragStartY;
      if(Math.abs(dx)>DRAG_THRESHOLD||Math.abs(dy)>DRAG_THRESHOLD) hasDragged=true;
      transform.x = dragStartTX + dx;
      transform.y = dragStartTY + dy;
    } else if(touches.length===2 && lastTouches && lastTouches.length===2){
      var d0 = Math.hypot(lastTouches[0].clientX-lastTouches[1].clientX, lastTouches[0].clientY-lastTouches[1].clientY);
      var d1 = Math.hypot(touches[0].clientX-touches[1].clientX, touches[0].clientY-touches[1].clientY);
      if(d0>0){
        var factor = d1/d0;
        var cx = (touches[0].clientX+touches[1].clientX)/2;
        var cy = (touches[0].clientY+touches[1].clientY)/2;
        var newScale = Math.max(0.2,Math.min(4,transform.scale*factor));
        transform.x = cx-(cx-transform.x)*(newScale/transform.scale);
        transform.y = cy-(cy-transform.y)*(newScale/transform.scale);
        transform.scale = newScale;
      }
      hasDragged = true;
    }
    lastTouches = touches;
    drawFrame();
  },{passive:false});

  canvas.addEventListener('touchend', function(e){
    if(!hasDragged && lastTouches && lastTouches.length===1){
      var t = lastTouches[0];
      var hit = hitTest(t.clientX, t.clientY);
      if(hit) selectNode(hit);
      else closePanel();
    }
    lastTouches = null;
  },{passive:false});

  // ── Reset button ──────────────────────────────────────────────────────────
  function fitLayout(){
    // Compute bounding box of all nodes
    var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    nodes.forEach(function(nd){
      minX=Math.min(minX,nd.x-nd.radius);
      maxX=Math.max(maxX,nd.x+nd.radius);
      minY=Math.min(minY,nd.y-nd.radius);
      maxY=Math.max(maxY,nd.y+nd.radius);
    });
    if(!isFinite(minX)){ minX=-200; maxX=200; minY=-200; maxY=200; }
    var panelWidth = panel.classList.contains('open') ? 300 : 0;
    var vw = W - panelWidth;
    var vh = H - 48;
    var fw = maxX - minX + 80;
    var fh = maxY - minY + 80;
    var fitScale = Math.max(0.25, Math.min(1.2, Math.min(vw/fw, vh/fh)));
    return {
      scale: fitScale,
      x: vw/2 - ((minX+maxX)/2)*fitScale,
      y: 48 + vh/2 - ((minY+maxY)/2)*fitScale
    };
  }

  function resetView(){
    var target = fitLayout();
    var dur = 380, start = performance.now();
    var sx = transform.x, sy = transform.y, ss = transform.scale;

    function step(now){
      var t = Math.min((now-start)/dur,1);
      var e = 1-Math.pow(1-t,3);
      transform.x     = sx + (target.x-sx)*e;
      transform.y     = sy + (target.y-sy)*e;
      transform.scale = ss + (target.scale-ss)*e;
      drawFrame();
      if(t<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  document.getElementById('btn-reset').addEventListener('click', resetView);

  // ── Group-by pills ────────────────────────────────────────────────────────
  var pills = document.querySelectorAll('.group-pill');
  pills.forEach(function(pill){
    pill.addEventListener('click', function(){
      var mode = pill.getAttribute('data-mode');
      if(mode === currentGroupMode) return;
      pills.forEach(function(p){ p.classList.remove('active'); });
      pill.classList.add('active');
      computeLayout(mode);
      // Fit view after a brief settle period
      setTimeout(function(){ resetView(); }, 300);
    });
  });

  // ── Hide instructions after 5 seconds or first interaction ───────────────
  var instructions = document.getElementById('instructions');
  var instrHidden = false;
  function hideInstructions(){
    if(instrHidden) return;
    instrHidden = true;
    instructions.classList.add('hidden');
  }
  setTimeout(hideInstructions, 5000);
  canvas.addEventListener('mousedown', hideInstructions, {once:true});
  canvas.addEventListener('wheel', hideInstructions, {once:true});

  // ── Init ──────────────────────────────────────────────────────────────────
  resize();

  // Compute initial layout (lineage mode) and place nodes
  computeLayout('lineage');

  // Fit view to the initial layout
  var initFit = fitLayout();
  transform.x     = initFit.x;
  transform.y     = initFit.y;
  transform.scale = initFit.scale;

  // Start simulation
  rafId = requestAnimationFrame(tick);

})();
</script>
</body>
</html>
