<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odio · What Shipped — LAC Wiki</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #12100e;
  --bg-sidebar:  #0e0c0a;
  --bg-card:     #1a1714;
  --bg-hover:    #201d1a;
  --bg-active:   #251f18;
  --border:      #2a2420;
  --border-soft: #221e1b;
  --text:        #e8ddd4;
  --text-mid:    #b0a49c;
  --text-soft:   #7a6a5a;
  --accent:      #c4a255;
  --accent-warm: #e8b865;
  --mono:        'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

  --status-active:     #4aad72;
  --status-draft:      #c4a255;
  --status-frozen:     #5b82cc;
  --status-deprecated: #cc5b5b;

  --status-active-bg:     rgba(74,173,114,0.12);
  --status-draft-bg:      rgba(196,162,85,0.12);
  --status-frozen-bg:     rgba(91,130,204,0.12);
  --status-deprecated-bg: rgba(204,91,91,0.12);
}

html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; display: flex; flex-direction: column; }

/* ── Shell ──────────────────────────────────────────────── */

.shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
}
.topbar-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
.topbar-sep  { color: var(--border); }
.topbar-project { font-family: var(--mono); font-size: 12px; color: var(--text-mid); }
.topbar-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-soft); }

.body-row { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ────────────────────────────────────────────── */

.sidebar {
  width: 264px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-soft); }

.sidebar-sort {
  display: flex;
  gap: 4px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sort-btn {
  flex: 1;
  padding: 4px 6px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.sort-btn:hover { color: var(--text-mid); border-color: var(--text-soft); }
.sort-btn.active { background: var(--bg-card); color: var(--accent); border-color: var(--accent); }

.nav-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.nav-tree::-webkit-scrollbar { width: 4px; }
.nav-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Domain group */
.nav-group { margin-bottom: 2px; }

.nav-domain {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  cursor: pointer;
  user-select: none;
}
.nav-domain:hover { color: var(--text-mid); }
.nav-domain-arrow { transition: transform 0.15s; font-size: 8px; }
.nav-domain.collapsed .nav-domain-arrow { transform: rotate(-90deg); }
.nav-domain-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

.nav-group-items { overflow: hidden; }
.nav-group.collapsed .nav-group-items { display: none; }

/* Feature item */
.nav-item {
  display: flex;
  align-items: baseline;
  gap: 7px;
  padding: 5px 14px 5px 18px;
  cursor: pointer;
  user-select: none;
  border-left: 2px solid transparent;
  transition: background 0.1s;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active {
  background: var(--bg-active);
  border-left-color: var(--accent);
}
.nav-item[data-depth="1"] { padding-left: 30px; }
.nav-item[data-depth="2"] { padding-left: 42px; }
.nav-item[data-depth="3"] { padding-left: 54px; }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}
.nav-item[data-status="active"]     .nav-dot { background: var(--status-active); }
.nav-item[data-status="draft"]      .nav-dot { background: var(--status-draft); }
.nav-item[data-status="frozen"]     .nav-dot { background: var(--status-frozen); }
.nav-item[data-status="deprecated"] .nav-dot { background: var(--status-deprecated); opacity: 0.5; }

.nav-item-key {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  flex-shrink: 0;
}
.nav-item-title {
  font-size: 12px;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.nav-item:hover .nav-item-title,
.nav-item.active .nav-item-title { color: var(--text); }
.nav-item.active .nav-item-key { color: var(--accent); }

.nav-child-arrow {
  font-size: 9px;
  color: var(--text-soft);
  flex-shrink: 0;
  opacity: 0.5;
}

/* ── Content ────────────────────────────────────────────── */

.content {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Home / welcome */
.home-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 40px 80px;
}
.home-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}
.home-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}
.home-subtitle {
  font-size: 14px;
  color: var(--text-mid);
  margin-bottom: 40px;
}

.stat-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
}
.stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-pill-num { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-pill-label { color: var(--text-soft); }

.home-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.domain-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 40px;
}
.domain-chip {
  padding: 4px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.domain-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Feature page */
.feature-page {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

.feature-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.feature-key {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-active     { color: var(--status-active);     background: var(--status-active-bg);     border: 1px solid rgba(74,173,114,0.25); }
.badge-draft      { color: var(--status-draft);      background: var(--status-draft-bg);      border: 1px solid rgba(196,162,85,0.25); }
.badge-frozen     { color: var(--status-frozen);     background: var(--status-frozen-bg);     border: 1px solid rgba(91,130,204,0.25); }
.badge-deprecated { color: var(--status-deprecated); background: var(--status-deprecated-bg); border: 1px solid rgba(204,91,91,0.25); }

.badge-domain {
  color: var(--text-mid);
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.feature-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 6px;
}
.feature-completeness {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
  margin-bottom: 12px;
}
.guide-link {
  display: inline-block;
  margin-bottom: 28px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid rgba(196,162,85,0.3);
  border-radius: 4px;
  padding: 3px 10px;
}
.guide-link:hover { background: rgba(196,162,85,0.08); }
.completeness-bar {
  display: inline-block;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 6px;
  position: relative;
  top: -1px;
  overflow: hidden;
}
.completeness-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

/* Sections */
.section { margin-bottom: 36px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
}
.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border);
}

.section-body p { color: var(--text-mid); line-height: 1.75; margin-bottom: 10px; }
.section-body p:last-child { margin-bottom: 0; }
.section-body strong { color: var(--text); }
.section-body code {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
}
.section-body ul { padding-left: 20px; color: var(--text-mid); }
.section-body li { margin-bottom: 4px; line-height: 1.6; }

/* Decision cards */
.decisions-list { display: flex; flex-direction: column; gap: 12px; }

.decision-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 14px 16px;
}
.decision-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.decision-rationale {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 8px;
}
.decision-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.decision-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}
.decision-alts {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}

/* Limitations list */
.limitations-list { display: flex; flex-direction: column; gap: 6px; }
.limitation-item {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.55;
}
.limitation-bullet { color: var(--text-soft); flex-shrink: 0; margin-top: 1px; }

/* Tags row */
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 3px 9px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

/* Lineage */
.lineage-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.lineage-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  text-decoration: none;
}
.lineage-link:hover { border-color: var(--accent); color: var(--accent); }
.lineage-arrow { color: var(--text-soft); font-size: 10px; }

/* Empty states */
.empty { color: var(--text-soft); font-size: 13px; font-style: italic; }

/* No results */
.no-results {
  padding: 24px 18px;
  font-size: 12px;
  color: var(--text-soft);
  text-align: center;
  font-family: var(--mono);
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="topbar-logo">◈ lac</span>
    <span class="topbar-sep">|</span>
    <span class="topbar-project">Odio <span style="opacity:.55;font-weight:400">· What Shipped view</span></span>
    <span class="topbar-count">15 features · 7 domains</span>
  </div>
  <div class="body-row">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="filter-input" placeholder="Filter features…" autocomplete="off" spellcheck="false">
      </div>
      <div class="sidebar-sort">
        <button class="sort-btn active" id="sort-domain" onclick="setSortMode('domain')">Domain</button>
        <button class="sort-btn" id="sort-build" onclick="setSortMode('build-order')">Build Order</button>
      </div>
      <nav class="nav-tree" id="nav-tree"></nav>
    </aside>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
const FEATURES = [{"featureKey":"odio-2026-002","title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","status":"frozen","problem":"@ffmpeg-installer/ffmpeg bundles the FFmpeg binary at ~38MB compressed. Vercel's serverless function size limit is ~50MB (250MB uncompressed). This is the single highest-risk technical constraint in the project. If the bundle is too large or the render takes too long (Vercel function timeout: 10s on Hobby), the entire render architecture needs to change before feat-render can be built. This POC must validate or invalidate the approach before any production code is written.","decisions":[{"decision":"POC before any production render code","rationale":"@ffmpeg-installer/ffmpeg is the highest-risk dependency in the entire project. If it fails on Vercel Hobby, the render feature needs a completely different architecture. Building feat-render on top of an unvalidated assumption would waste significant implementation work. The POC is a 2-4 hour investment that prevents a potential full architectural rethink later.","date":"2026-04-10"}],"knownLimitations":["Vercel Hobby function timeout is 10s — this may be too tight for long clips; Pro plan raises to 300s","If bundle size fails on Hobby, Vercel Pro ($20/month) is the simplest fix — breaks the $0/month cost target"],"tags":["ffmpeg","poc","vercel","bundle-size","spike","render"],"successCriteria":"- Next.js project with @ffmpeg-installer/ffmpeg + fluent-ffmpeg deploys to Vercel Hobby without bundle size error\n- Deployed function executes an atrim+concat operation on a test .aac file\n- Output file is a valid .aac file playable in browser\n- Cold start + render time for a 2-8 min clip is under 30s total (10s preferred)\n- Render time for a 30-min source clip with multiple cut regions is measured and documented\n- If any constraint fails: document exactly which limit was hit and the recommended alternative with cost/complexity trade-off","domain":"render","priority":1,"userGuide":"This is an internal validation endpoint, not a user-facing feature. To test: GET /api/render/poc?url=<public-audio-url>. The endpoint downloads the audio, applies a test cut (removes seconds 0-10), and returns the trimmed file. Used during development to confirm Vercel can run FFmpeg before building the real render pipeline."},{"featureKey":"odio-2026-003","title":"Auth — Google OAuth via NextAuth.js","status":"frozen","problem":"Band members need a shared identity layer — without creating yet another account. Google sign-in is universal in the target audience and doubles as the credential for Google Drive access.","decisions":[{"decision":"drive.file scope at sign-in, not deferred","rationale":"drive.file is needed for all core features (upload recording, read session/clip data, write meta). Deferring it to a later step would require a second OAuth flow and would break the first recording attempt. Request it upfront with a clear explanation in the sign-in screen: 'Odio only accesses files it creates in your Drive.'","date":"2026-04-10"},{"decision":"NextAuth.js with Prisma DB adapter — required from day one, not deferred","rationale":"Supabase Auth adds a paid service. NextAuth.js is open-source and integrates directly with Next.js. The DB adapter (Prisma + Neon) is not optional: it is required to persist the recorder's refresh_token in the accounts table, which is the only way the audio proxy route can stream Drive audio to all band members. JWT-only session strategy is explicitly rejected — it cannot store the refresh_token server-side.","date":"2026-04-10"}],"knownLimitations":["drive.file scope only covers files the app created under that specific user's account — bandmates stream audio through the server-side proxy (which uses the recorder's stored token), so bandmates do not need Drive scope just to listen","Google OAuth tokens expire after 1 hour — NextAuth DB adapter stores refresh_token in Postgres and rotates on expiry; JWT-only strategy is insufficient and must not be used","If the recorder revokes Odio's Drive access (in Google account settings), all audio becomes inaccessible to the entire band until re-authorized"],"tags":["auth","google-oauth","nextauth","session","drive.file"],"successCriteria":"- Sign in with Google works on iOS Safari, Android Chrome, and desktop\n- Session persists across browser restarts (refresh token handled by NextAuth)\n- All private routes redirect to /login if unauthenticated\n- Sign-out clears session and redirects to landing\n- drive.file scope requested at initial sign-in (needed for audio upload and clip access)\n- Token refreshed automatically by NextAuth before expiry\n- Auth state available synchronously on client via Zustand (no flicker)","domain":"auth","priority":1,"userGuide":"Users visit the app and click 'Sign in with Google'. They are prompted to grant Google Drive access (files created by Odio only). After sign-in, they are redirected to the bands home page. Sessions persist across browser restarts. Sign-out via the Band settings page. The /share/[token] public page requires no sign-in."},{"featureKey":"odio-2026-021","title":"BottomSheet — Slide-Up Modal for Confirmations and Input","status":"frozen","problem":"Destructive and important actions (freeze, delete, unfreeze, leave band, stage change) need a deliberate user confirmation step. Inline buttons can be accidentally tapped; a slide-up sheet forces a conscious second action and provides space for consequence copy.","decisions":[{"decision":"All actions that mutate data open a BottomSheet for confirmation","rationale":"Irreversible operations (freeze, delete, cleanup, unfreeze) need a deliberate second step. Bottom sheets allow showing contextual consequences (e.g., 'What gets deleted / What stays') that inline buttons cannot accommodate.","date":"2026-04-10"}],"knownLimitations":["Nested sheets are not supported — opening a sheet from within another sheet will break focus trap","Swipe-down gesture uses touch events only — no mouse drag to dismiss on desktop"],"tags":["bottom-sheet","modal","confirmation","sheet","ui-primitive","accessibility"],"successCriteria":"- Sheet slides up from bottom on open, slides down on close\n- Backdrop tap dismisses sheet\n- Body scroll locked while sheet is open\n- Focus trapped inside sheet (Tab cycles within sheet children)\n- Cancel button always present at bottom of sheet content\n- Swipe-down gesture dismisses\n- z-index above all page content and tab bar","domain":"app-shell","priority":1,"userGuide":"Bottom sheets appear as a slide-up panel when you tap a destructive or important action. Tap outside the sheet or swipe it down to cancel. Tap Cancel inside the sheet to close without taking action."},{"featureKey":"odio-2026-022","title":"Button — Shared Interactive Button Component","status":"frozen","problem":"The app needs consistent interactive button styling across all screens with reliable touch targets (≥44px), accessible focus states, loading states, and semantic variants (primary, danger, ghost) that don't need to be reimplemented per screen.","decisions":[{"decision":"ButtonLink uses Next.js Link, not <a href>","rationale":"Using <a href> for in-app navigation triggers full page reload. Next.js Link performs a client-side transition.","date":"2026-04-11"}],"knownLimitations":["Loading spinner color is fixed (white on primary/danger, text-secondary on ghost) — not customizable per call"],"tags":["button","ui-primitive","accessibility","interaction"],"successCriteria":"- All buttons ≥ 44px tall\n- Primary variant: amber bg (#f59e0b), dark text\n- Danger variant: danger red bg, white text\n- Ghost variant: transparent, text-secondary\n- disabled prop: opacity-60, pointer-events-none, aria-disabled\n- loading prop: spinner replaces label, button remains disabled\n- Full-width option via `fullWidth` prop\n- ButtonLink renders a Next.js Link with same styling","domain":"app-shell","priority":1,"userGuide":"Buttons throughout the app use a consistent amber (primary), red (danger), or subtle (ghost) style. All buttons are large enough to tap comfortably on mobile."},{"featureKey":"odio-2026-006","title":"Recording — Browser-Based Audio Capture","status":"frozen","problem":"The recorder needs to capture multiple songs during a live jam — from a phone browser, one hand, dim room. Between songs the transition to the next recording must be instant. Moments worth keeping must be stampable without interrupting the performance.","decisions":[{"decision":"Resumable Drive upload from browser (bypasses Vercel body limit)","rationale":"Vercel serverless functions have a 4.5MB request body limit. A 30-min recording at 192kbps ~43MB. Sending audio through Vercel would fail. Resumable uploads: server generates a Drive upload session URL, browser POSTs audio blob directly to Drive. Audio never passes through Vercel.","date":"2026-04-10"},{"decision":"Transcode to AAC immediately on upload","rationale":"MediaRecorder outputs WebM/Opus on Chrome and AAC/MP4 on Safari. WebM does not play in Safari. Transcoding immediately on upload ensures one consistent format (AAC) for all playback, editing, and final render — regardless of which browser the recorder used.","date":"2026-04-10"},{"decision":"Any Editor-role member can record — not just the band creator","rationale":"The upload flow already uses the creator's stored refresh_token on the server to generate the Drive resumable upload session URL. The member's browser uploads directly to the creator's Drive. This means multi-recorder support is not an architectural change — it's a role-permission change. Any Editor can initiate a recording and audio lands in the same Drive folder. Reduces the single-point-of-failure where only one person can capture audio on jam night.","date":"2026-04-10"},{"decision":"Two notation types: stamps (typed, no text) and annotations (text notes) — both timestamped","rationale":"Stamps are one-tap typed markers — fire/keep/uncertain/idea — zero friction during playing. Annotations are short text notes for when you want to say something specific. Both appear as pins on the waveform. Keeping them separate preserves the zero-friction stamp UX while allowing richer notes when needed. They serve similar purposes at different levels of effort.","date":"2026-04-10"}],"knownLimitations":["iOS Safari stops MediaRecorder if the screen locks or the user switches tabs — Wake Lock API (iOS 16.4+) mitigates accidental sleep; tab switching is user responsibility","If the browser tab is closed before the blob is written to IndexedDB (i.e., during the first few seconds after stop), the audio may be lost — mitigated by writing to IndexedDB immediately on stop before any upload attempt (see feat-recording-resilience)","Resumable upload requires two API round-trips before recording is saved — adds ~2-4s to the stop flow","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — members upload directly to the creator's Drive using the server-generated resumable upload session URL (which uses the creator's stored token)"],"tags":["recording","mediarecorder","audio","wake-lock","stamps","ios","google-drive"],"successCriteria":"- Record button triggers microphone permission request on first use\n- Level meter visible and responsive during recording (horizontal amber bar, 8px tall, full-width)\n- Recording screen is full-screen (tab bar hidden); minimal chrome: timer, level meter, stamps, 'Add note', record/stop button only\n- Stamp buttons (fire/keep/uncertain/idea) always visible; one tap stamps current timestamp; haptic feedback on mobile; 72x72px touch targets\n- Quick text note button: 'Add note' text link → 1-line bottom sheet, submit adds annotation\n- Recording screen usable one-handed in portrait orientation\n- Stop → upload begins immediately; 'Next Song' button available without waiting for upload\n- Post-record screen shows: clip name (editable inline), duration, stamp count, upload progress\n- 'Next Song' opens new recording screen; previous clip uploads in background\n- 'Delete recording' option on post-record screen with confirmation sheet: 'Delete this recording? This cannot be undone.'\n- During upload: persistent top banner 'Uploading Song N… 47%' with amber progress bar visible on any screen\n- Banner dismisses only after upload + transcode confirmed complete\n- Wake Lock active during recording (screen stays on)\n- iOS warning shown if Wake Lock is unavailable\n- Clip appears in session as 'Processing…' until transcode done, then becomes fully interactive\n- All clips play back correctly in Chrome and Safari (AAC source)\n- Any Editor-role band member can initiate a recording (not just band creator/recorder)","domain":"recording","priority":1,"userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away."},{"featureKey":"odio-2026-014","title":"Render — Server-Side FFmpeg on Freeze + Public Share","status":"frozen","problem":"When a version is frozen, a real audio file must be produced — so the band can download it, share it outside the band, or export it. This cannot happen client-side. The frozen clip should also be shareable publicly without requiring sign-in.","decisions":[{"decision":"Server-side FFmpeg only — no client-side WASM","rationale":"WASM FFmpeg is slow on mobile (~3x slower than native), memory-constrained, and adds bundle size. Server-side runs once per clip lifetime in < 10s on Vercel. Acceptable trade-off.","date":"2026-04-10"},{"decision":"Public share via Drive public permission + Postgres token","rationale":"A frozen clip can be shared outside the band (with a producer, a friend). Setting Drive file permission to 'anyone with link' gives a direct audio URL. Odio stores a short token in Postgres mapping to the clip, so the public URL is /share/[token] (not a raw Drive ID), giving control over revocation.","date":"2026-04-10"}],"knownLimitations":["Vercel /tmp is ephemeral (512MB limit) — source download (~43MB) + FFmpeg output (~10MB) is within limits for typical clips","Render requires recorder's valid Drive token from Postgres — if token refresh fails (e.g., recorder revoked access), render fails with a clear error and re-auth prompt","@ffmpeg-installer/ffmpeg bundles ~38MB compressed — close to Vercel's function size limit; this is the highest-risk technical component and needs a spike before building","Any band Editor role can trigger freeze, but the render always uses the recorder's Drive token — recorder does not need to be signed in at the moment of freeze"],"tags":["ffmpeg","server-side","freeze","render","next.js-api","public-share"],"successCriteria":"- Freeze triggers render within 2s of user confirmation\n- Rendered file available within 10s for a typical 2-8 min output clip\n- Clip page shows lock icon and download button after successful render\n- Render failure shows clear error with retry option\n- Public share toggle: generates /share/[token] URL, shareable outside the band\n- Public page: waveform player + stamps + clip name + date — no other session data exposed\n- Public listener does not need a Google account\n- Download of rendered file available on clip page (authenticated) and public page","domain":"render","priority":2,"userGuide":"On a clip's detail page, tap 'Freeze' on any version to produce the final audio file. The page shows 'Rendering…' for a few seconds, then displays a lock icon and download button. To share publicly: tap the Share icon on a frozen clip and copy the /share/[token] link. Anyone with the link can listen without signing in. To revoke public access, tap Share again and toggle it off."},{"featureKey":"odio-2026-008","title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","status":"frozen","problem":"On jam night, the person who created the band may not always be the one with a phone free to record. Any Editor-role band member should be able to hit Record and have the audio land in the band's shared Drive — without requiring each member to set up their own Drive folder or the band creator to be physically present.","decisions":[{"decision":"Reuse creator's stored token — no per-member Drive setup","rationale":"drive.file OAuth scope only grants access to files the app created under that specific user's account. A member's token cannot write to the creator's Drive folder. The creator's refresh_token (already stored by NextAuth DB adapter for the audio proxy feature) solves this: the server uses the creator's token to generate the Drive upload session URL, and the member's browser uploads directly to Drive using that URL. No additional OAuth consent or per-member Drive setup needed.","date":"2026-04-10"},{"decision":"Editor role can record — Member role cannot","rationale":"Member-only users are passive collaborators (vote, comment). Giving them recording rights would require explaining Drive ownership semantics to every casual invitee. Editors are already trusted with version creation and freeze — recording is a natural extension. The default role for new band invites is Editor, so most band members get recording rights automatically without any explicit configuration.","date":"2026-04-10"},{"decision":"Track recordedByEmail separately from driveOwnerEmail","rationale":"The clip always lives in the creator's Drive (driveOwnerEmail is always the band creator). The person who pressed Record may be someone else entirely. These are distinct facts: one describes file ownership for Drive API operations, the other describes recording attribution for the activity feed and session history. Conflating them would make it impossible to correctly display 'Recorded by X' or debug Drive issues per-clip.","date":"2026-04-10"}],"knownLimitations":["If the band creator revokes Google Drive access, ALL recording attempts by any Editor fail until the creator re-authorizes — one token serves the whole band; there is no per-member fallback","Two Editors recording simultaneously produce two separate clip rows with overlapping timestamps — no merging or conflict detection; both appear in the session normally","The creator's refresh_token is stored server-side in the NextAuth accounts table — this security surface already exists for the audio proxy feature; multi-recorder adds no new exposure"],"tags":["recording","multi-recorder","roles","permissions","google-drive","upload"],"successCriteria":"- Any Editor-role band member sees the Record tab in the bottom nav and can start a recording\n- Member-only role does not see Record tab and cannot access /record\n- /api/upload/init: accepts requests from Editor+ roles; fetches and uses band creator's stored refresh_token to generate Drive upload session URL\n- Token refresh attempt before generating upload URL; returns clear error if creator's token is invalid: 'Band creator needs to re-authorize Drive access'\n- Audio lands in the correct band Drive folder regardless of which Editor recorded\n- Clip row stores both driveOwnerEmail (always the band creator) and recordedByEmail (actual recorder)\n- Activity feed and clip list show 'Recorded by [name]' when recorder differs from band creator\n- If multiple Editors record simultaneously: each gets their own upload session URL; clips created as separate Postgres rows with no conflict\n- Post-record screen and upload banner work identically for all recording members","domain":"recording","priority":2,"userGuide":"Any Editor-role band member can record — not just the band creator. Editors see the Record tab in the nav and can start a recording from their own device. The audio automatically lands in the band's Drive folder (owned by the band creator). If the creator's Drive connection expires, a banner appears: 'Drive connection needs renewal — ask [creator name] to re-authorize.' The clip card shows 'Recorded by X' when the recorder is not the band creator."},{"featureKey":"odio-2026-038","title":"StampJumpRow — Tappable Stamp Chips for Waveform Seek","status":"frozen","problem":"Waveform players and editors display stamps (🔥⭐❓💡) at their recorded timestamps. These stamps are most useful when tappable — jumping to the timestamp lets the band quickly find the moments that were marked during recording.","decisions":[{"decision":"Stamp chips are <button> elements, not styled divs","rationale":"Div elements are not keyboard-accessible and do not reliably receive touch events on all browsers. <button> is semantically correct for interactive elements and gets keyboard focus, Enter/Space activation, and proper touch event handling for free.","date":"2026-04-11"}],"knownLimitations":["Stamp chips are ordered by creation (recording order), not by timestamp — if a user stamped out of order, chips appear out of sequence relative to the waveform"],"tags":["stamps","waveform","navigation","playback","accessibility","shared-component"],"successCriteria":"- Chips rendered as <button> elements (keyboard accessible, screen-reader compatible)\n- Each chip: aria-label='Jump to M:SS' (time formatted in human-readable minutes:seconds)\n- Tap calls onSeek with timestamp in seconds\n- Chip colors: fire=#ef4444, keep=#eab308, uncertain=#f97316, idea=#3b82f6\n- Hidden when stamps array is empty (returns null)\n- className prop accepted for layout context (WaveformPlayer vs. Editor vs. PublicPlayer)","domain":"editing","priority":2,"userGuide":"Colored dots along the bottom of the waveform mark moments stamped during recording. Tap any dot to jump to that moment in the audio."},{"featureKey":"odio-2026-027","title":"AudioBars — Animated Audio Level Indicator","status":"frozen","problem":"During recording, the user needs visual confirmation that the microphone is picking up sound. Without a level indicator, they cannot tell if the mic is connected, if it's recording silence, or if audio is clipping.","decisions":[{"decision":"AudioBars is purely presentational — receives level as a prop","rationale":"Audio level computation (Web Audio API AnalyserNode, getByteFrequencyData) belongs in a hook, not a UI component. The component stays pure and reusable; the hook handles the browser API.","date":"2026-04-15"}],"knownLimitations":["Level computation is frequency-averaged — clipping (levels > 1.0 from Web Audio) is clamped to 1.0 without a visual warning","Bar count is fixed at construction — responsive reflow not supported"],"tags":["audio","level-meter","animation","recording","ui-primitive"],"successCriteria":"- Bars animate responsively to audio level input\n- Silent input: bars at minimum height (not zero — they should breathe slightly)\n- Loud input: bars reach near-maximum height\n- Smooth animation (requestAnimationFrame update from parent, no internal interval)\n- Amber color when active, text-muted when silent\n- Accessible: aria-hidden (purely decorative, level confirmed by text elsewhere)","domain":"recording","priority":2,"userGuide":"The animated bars on the recording screen show that your microphone is working. If they don't move when you speak, check your mic permissions."},{"featureKey":"odio-2026-009","title":"Recording Resilience — IndexedDB Safety Net, Upload Retry, Save-to-Device Fallback","status":"frozen","problem":"A recording is a one-time, irreplaceable event. Currently, if the internet drops during upload or the band creator's Drive token is invalid, the audio blob — which only exists in memory — is permanently lost when the user navigates away or the tab closes. A live jam session cannot be re-played. The recording must survive any upload failure and remain recoverable until it reaches Drive.","decisions":[{"decision":"IndexedDB as the primary persistence layer for unuploaded audio blobs","rationale":"localStorage cannot store binary blobs. The File System Access API requires explicit user permission. IndexedDB is the only browser-native store that (a) handles large binary data, (b) persists across sessions without user action, and (c) is available in all browsers including iOS Safari 10.3+. A 43MB blob fits easily — IndexedDB storage limits are typically 50-80% of available disk space.","date":"2026-04-10"},{"decision":"Resumable upload — save session URL to IndexedDB for byte-accurate retry","rationale":"A naive retry re-uploads the entire blob from byte 0. For a 43MB file on a slow mobile connection, this could fail again at the same spot. Google Drive resumable uploads let you query the committed offset and resume from there. Storing the uploadSessionUrl in IndexedDB alongside the blob enables true resume, not restart.","date":"2026-04-10"},{"decision":"'Save to device' as the last-resort fallback — never lose the audio","rationale":"If Drive is permanently unavailable (creator deleted their account, Drive quota exceeded, token irrecoverable), the band should still get their recording. A browser download gives them the raw file. They lose the Odio versioning workflow but not the audio. The guarantee is: if you recorded it, you can get the file.","date":"2026-04-10"},{"decision":"Check IndexedDB for pending recordings on every app mount","rationale":"Background Sync is not reliable on iOS Safari. The safest recovery path is: when the app is opened, check for stranded blobs and surface them immediately. This catches the crash-during-upload, tab-closed-early, and came-back-later scenarios without relying on service worker scheduling.","date":"2026-04-10"}],"knownLimitations":["IndexedDB is cleared when the user clears browser storage ('Clear site data') — the blob would be lost; this is unavoidable without server-side buffering and is an edge case the user controls","Background Sync (automatic retry when tab is closed and connection restored) is not available on iOS Safari — recovery on iOS requires opening the app manually","Drive resumable upload session URLs expire after 7 days — a blob stranded for > 7 days will need a fresh upload session, not a resume; the implementation must detect this (404 on session URL) and fall back to a new session","Storage pressure on low-end devices: a 43MB blob may trigger the browser's storage eviction policy on devices with < 1GB free — 'Save to device' should be surfaced proactively for large recordings","PostRecordScreen.doUpload() is a standalone async function that writes to IndexedDB directly without going through the Zustand store's action methods — fixed by calling usePendingUploadsStore.getState().refresh() on every status-changing path so the in-memory store stays in sync with IndexedDB and the banner dismisses immediately"],"tags":["recording","indexeddb","resilience","offline","retry","upload","fallback"],"successCriteria":"- Audio blob written to IndexedDB immediately on recording stop, before upload begins\n- IndexedDB entry keyed by tempId; stores blob + recordedAt + durationMs + bandId + sessionId + uploadSessionUrl (if partially started)\n- If upload succeeds: IndexedDB entry cleared; no other change\n- If network drops during upload: banner shows 'Upload paused — waiting for connection'; auto-retries on window 'online' event; resumable upload continues from last committed byte\n- If creator's Drive token is invalid: banner shows 'Drive connection needs renewal — ask [creator name] to re-authorize'; IndexedDB blob retained; retry button enabled once token is refreshed\n- If recording member's own session token expires mid-upload: client silently calls getSession() to refresh; if refresh succeeds, upload resumes automatically; if refresh fails, banner shows 'Session expired — sign in again to resume'; after re-sign-in, IndexedDB blob is still present and recovery banner activates\n- On app reopen: check IndexedDB for pending recordings on mount; if found, show recovery banner: 'You have [N] recording(s) waiting to upload'\n- Recovery banner persists until all pending recordings are uploaded or manually discarded\n- 'Save to device' fallback button available on any failed upload: triggers browser download of blob (.webm or .aac depending on browser)\n- User can discard a pending recording from the recovery UI (with confirmation: 'Discard this recording? It cannot be recovered.')\n- 'Pending uploads' count visible in the Record tab (badge) and on the session screen\n- Successful retry creates the clip in Postgres and Drive exactly as a normal upload would","domain":"recording","priority":2,"userGuide":"Recording resilience is automatic and invisible when things work. If an upload fails (network drops, Drive token expires), a banner appears at the top of the screen: 'You have [N] recording(s) waiting to upload'. Tap 'Retry' to resume when reconnected. Tap 'Save to device' to download the raw audio file to your phone or computer if Drive is permanently unavailable. Tap 'Discard' (with confirmation) to remove a pending recording from recovery. When the app reopens after a crash, pending recordings are detected automatically."},{"featureKey":"odio-2026-017","title":"Storage Management — Drive Quota, Cleanup, Archive","status":"frozen","problem":"Audio files in Google Drive grow over time (~43MB per raw clip, ~10MB per frozen render). The recorder's free Drive tier (15GB) supports roughly 350 raw clips before action is needed. The app must surface this, and provide a clean way to free space after songs are finalized.","decisions":[{"decision":"Cleanup is explicit and manual — no automatic deletion","rationale":"Automatic deletion after freeze could destroy recordings the band wanted to keep. Storage cleanup is a deliberate action. The app nudges (shows quota, shows how much can be freed) but never deletes automatically.","date":"2026-04-10"}],"knownLimitations":["Drive API quota query may not reflect real-time usage — cache with 5-minute TTL","After cleanup, v1 source audio is gone — if the frozen render was also deleted and the band wants to re-edit, they would need to re-record","Drive storage is the recorder's personal quota — shared with all their other Drive content"],"tags":["storage","google-drive","cleanup","archive","quota"],"successCriteria":"- Band settings shows Drive storage used by Odio files (MB / GB)\n- Post-freeze: 'Clean up source audio' button removes raw .aac from Drive, keeps frozen render\n- Confirmation dialog shows exactly what will be deleted and what will remain\n- Archive clip: removes Postgres records + Drive files; cannot be undone\n- Bulk cleanup: 'Clean up all frozen clips in session' removes source audio for all frozen clips at once\n- Storage indicator updates after cleanup\n- Cleaned-up clips remain playable via their frozen render file","domain":"storage","priority":3,"userGuide":"In the Band tab, tap Settings to see Drive storage usage. The bar shows how many MB/GB of Drive are used by this band's recordings. After a clip is frozen and the band is happy with it, tap 'Clean up source audio' on the clip detail page to delete the raw recording from Drive — the final rendered file is kept and the clip remains fully playable. Tap 'Delete clip' (Recorder only) to permanently remove a clip and all its files from Drive."},{"featureKey":"odio-2026-016","title":"Collaboration — Votes, Comments, Stamp Heat Map, Activity","status":"frozen","problem":"After editing, the band needs a lightweight way to converge on which version is final — without a group chat thread full of voice notes and confusion. Voting, timestamped comments, and stamp heat maps give structure without overhead.","decisions":[{"decision":"Votes scoped to version, not clip","rationale":"Voting on a clip as a whole ('is this song good?') is separate from voting on a specific edit ('is this cut right?'). Scoping votes to a version makes it clear what the band is approving — the specific cut. A member can vote Keep on v2 and Revise on v3 if they think v3 overcorrected.","date":"2026-04-10"},{"decision":"No suggest-a-cut feature — comments are text only","rationale":"Suggest-a-cut adds a structured comment type with startMs/endMs that renders as a shaded waveform region with an 'Apply' button. The complexity (schema columns, waveform rendering, editor integration) is not justified for V1. Bandmates who want to suggest a cut can just create a new version themselves — that's what the versioning system is for.","date":"2026-04-10"}],"knownLimitations":["No push notifications — members need to open the app to see new votes/comments","Polling at 5-10s means activity is not instant — acceptable for post-jam async workflow","Stamp heat map is derived from recording-time stamps only (not from member actions during review)"],"tags":["votes","comments","stamps","heat-map","activity","polling","postgres"],"successCriteria":"- Vote (Keep/Revise/Pass) per member per version; tally visible to all; changeable\n- Votes and vote tally update within 5-10s via polling\n- Timestamped comments show as pins on waveform during playback\n- Stamp heat map overlay visible on waveform — denser where more stamps exist\n- Version list: inline mini-player on each version card\n- Activity feed: version creates + votes + comments in order\n- Notification dot on clip when all members have voted Keep on same version\n- Private annotation toggle: any annotation can be marked private (visible only to author)\n- Comment author can edit their comment (shows 'edited' label after edit)\n- Comment author can delete their comment (confirmation required; removes from feed)\n- Clip detail layout: during active versioning, version list is default open tab; after freeze, comments/activity is default open tab","domain":"collaboration","priority":3,"userGuide":"On a clip's detail page, the Versions tab shows all edits; the Comments tab shows the discussion. Vote on any version by tapping Keep, Revise, or Pass — the tally updates for all band members within seconds. Leave a comment in the text field (optionally tap the waveform first to attach a timestamp). When everyone has voted Keep on the same version, a banner appears prompting the Recorder or an Editor to freeze it. Comments can be edited or deleted by their author (long-press or tap the '...' menu)."},{"featureKey":"odio-2026-025","title":"Badge — Count and Status Label Pill","status":"frozen","problem":"Clip cards need to display version count, frozen status, and activity state as compact labels without consuming layout space. A shared badge component prevents inconsistent pill styling across the app.","decisions":[{"decision":"Badge is purely presentational — no click handling","rationale":"Interactive badges (e.g., stage chip that opens a picker) are handled by the caller wrapping Badge in a <button>. Badge itself never manages interaction state.","date":"2026-04-15"}],"knownLimitations":[],"tags":["badge","pill","label","ui-primitive"],"successCriteria":"- Renders as a rounded pill at text-xs\n- All four variants render with correct color scheme\n- Does not break layout when text is long (clips at max-w)","domain":"app-shell","priority":3,"userGuide":"Small labels on clip cards show version count, frozen status, and processing state."},{"featureKey":"odio-2026-026","title":"Skeleton — Loading Placeholder Shimmer","status":"frozen","problem":"Pages that fetch data from Postgres (session list, clip list, waveform) need to show a loading state that communicates structure before content arrives. A blank screen or spinner gives no sense of what's coming.","decisions":[],"knownLimitations":["Caller is responsible for matching Skeleton dimensions to actual content — no auto-sizing"],"tags":["skeleton","loading","shimmer","ui-primitive","performance"],"successCriteria":"- Renders as a grey animated shimmer div\n- animate-pulse (Tailwind) runs on mount\n- Accepts width/height/className props for flexible sizing\n- Does not shift layout when swapped for real content (caller must match dimensions)","domain":"app-shell","priority":3,"userGuide":"Grey shimmer placeholders appear while content is loading."},{"featureKey":"odio-2026-018","title":"Audio Input Selection — External Mic, USB Interface, Headset","status":"frozen","problem":"The recording always uses the device's default microphone. Bands that record with an external condenser mic, USB audio interface, or headset mic plugged in cannot select it — the app always captures from the built-in mic. This limits recording quality for bands that bring audio gear.","decisions":[{"decision":"Picker only shown when multiple inputs exist","rationale":"For the majority of users (phone, built-in mic only), showing a device picker is unnecessary friction. Detecting whether to show the picker at all keeps the zero-overhead path intact for the common case.","date":"2026-04-10"}],"knownLimitations":["iOS Safari does not consistently enumerate Bluetooth audio inputs — users on iOS may not see all available inputs","enumerateDevices() requires microphone permission to return device labels; before permission is granted, labels are empty strings (can only show device index, not name)"],"tags":["recording","audio-input","external-mic","mediadevices","nice-to-have"],"successCriteria":"- Before starting a recording, app calls enumerateDevices() to list available audio inputs\n- If only one audio input is available: no picker shown, record starts immediately (current behavior)\n- If multiple inputs available: a bottom sheet shows the list with device names; user selects one\n- Selected device is passed to getUserMedia as deviceId constraint\n- Selected deviceId is saved to localStorage; pre-selected on next recording\n- If the saved device is no longer available (unplugged): fall back to default + show a brief 'Using built-in mic' toast\n- Level meter reflects the selected input device","domain":"recording","priority":4,"userGuide":"If you have an external microphone, USB audio interface, or headset plugged in when you open the recording screen, a small mic icon appears to the left of the record button. Tap it to choose your audio input from the list. Your selection is remembered for next time. If the chosen device is unplugged after selection, the app automatically falls back to the built-in mic and shows a brief notification."}];

// ── Helpers ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function md(text) {
  if (!text) return '';
  const lines = esc(text).split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.match(/^[-*] /)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + inline(t.slice(2)) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n').split(/\n{2,}/).map(block => {
    const b = block.trim();
    if (!b) return '';
    if (b.startsWith('<ul>') || b.startsWith('<li>')) return b;
    return '<p>' + inline(b.replace(/\n/g, '<br>')) + '</p>';
  }).filter(Boolean).join('\n');
}

function inline(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

function completeness(f) {
  const checks = [
    !!f.analysis, !!f.implementation,
    !!(f.decisions && f.decisions.length),
    !!f.successCriteria,
    !!(f.knownLimitations && f.knownLimitations.length),
    !!(f.tags && f.tags.length),
    !!f.domain,
  ];
  return Math.round(checks.filter(Boolean).length / checks.length * 100);
}

function statusColor(s) {
  return { active: '#4aad72', draft: '#c4a255', frozen: '#5b82cc', deprecated: '#cc5b5b' }[s] || '#c4a255';
}

// ── Tree building ────────────────────────────────────────────────────────────

const VIEW = 'shipped';
const byKey = new Map(FEATURES.map(f => [f.featureKey, f]));

function getChildren(key) {
  return FEATURES.filter(f => f.lineage && f.lineage.parent === key);
}

function isRoot(f) {
  const p = f.lineage && f.lineage.parent;
  return !p || !byKey.has(p);
}

/** Flatten feature + its descendants with depth info */
function flatten(f, depth) {
  const result = [{ feature: f, depth }];
  for (const child of getChildren(f.featureKey)) {
    result.push(...flatten(child, depth + 1));
  }
  return result;
}

// Group root features by domain
function buildGroups(features) {
  const roots = features.filter(isRoot);
  const groups = new Map();

  for (const f of roots) {
    const domain = f.domain || '(no domain)';
    if (!groups.has(domain)) groups.set(domain, []);
    groups.get(domain).push(...flatten(f, 0));
  }
  return groups;
}

// ── Nav rendering ────────────────────────────────────────────────────────────

let activeKey = null;
let sortMode = 'domain';
const collapsedDomains = new Set();

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sort-domain').classList.toggle('active', mode === 'domain');
  document.getElementById('sort-build').classList.toggle('active', mode === 'build-order');
  renderNav(document.getElementById('filter-input').value);
}

function renderNavItem(f, depth) {
  const isChild = depth > 0;
  const hasChildren = getChildren(f.featureKey).length > 0;
  return `<div class="nav-item${f.featureKey === activeKey ? ' active' : ''}"
    data-key="${esc(f.featureKey)}"
    data-status="${esc(f.status)}"
    data-depth="${depth}"
    onclick="navigate('${esc(f.featureKey)}')">
    ${isChild ? '<span class="nav-child-arrow">↳</span>' : '<span class="nav-dot"></span>'}
    ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
    <span class="nav-item-title">${esc(f.title)}</span>
    ${hasChildren ? '<span class="nav-child-arrow" style="margin-left:auto;opacity:0.4">⊕</span>' : ''}
  </div>`;
}

function renderNav(filterText) {
  const nav = document.getElementById('nav-tree');
  const q = (filterText || '').toLowerCase().trim();

  const matchFn = f =>
    f.featureKey.toLowerCase().includes(q) ||
    f.title.toLowerCase().includes(q) ||
    (f.domain && f.domain.toLowerCase().includes(q)) ||
    (f.tags && f.tags.some(t => t.toLowerCase().includes(q)));

  const features = q ? FEATURES.filter(matchFn) : FEATURES;

  if (features.length === 0) {
    nav.innerHTML = '<div class="no-results">No features match</div>';
    return;
  }

  // ── Build Order: flat list sorted by featureKey ───────────────────────────
  if (sortMode === 'build-order' && !q) {
    const sorted = [...FEATURES].sort((a, b) => a.featureKey.localeCompare(b.featureKey));
    nav.innerHTML = sorted.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Search results: flat list ─────────────────────────────────────────────
  if (q) {
    nav.innerHTML = features.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Domain grouping (default) ─────────────────────────────────────────────
  const groups = buildGroups(FEATURES);
  const sortedDomains = [...groups.keys()].sort((a, b) => {
    if (a === '(no domain)') return 1;
    if (b === '(no domain)') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  for (const domain of sortedDomains) {
    const items = groups.get(domain);
    if (!items || items.length === 0) continue;

    const isCollapsed = collapsedDomains.has(domain);

    html += `<div class="nav-group${isCollapsed ? ' collapsed' : ''}" data-domain="${esc(domain)}">
  <div class="nav-domain${isCollapsed ? ' collapsed' : ''}" onclick="toggleDomain(this)">
    <span class="nav-domain-arrow">▾</span>
    <span>${esc(domain)}</span>
    <span class="nav-domain-count">${items.length}</span>
  </div>
  <div class="nav-group-items">`;

    for (const { feature: f, depth } of items) {
      html += renderNavItem(f, depth);
    }

    html += '</div></div>';
  }

  nav.innerHTML = html;
}

function toggleDomain(el) {
  const group = el.closest('.nav-group');
  const domain = group.dataset.domain;
  if (collapsedDomains.has(domain)) {
    collapsedDomains.delete(domain);
    group.classList.remove('collapsed');
    el.classList.remove('collapsed');
  } else {
    collapsedDomains.add(domain);
    group.classList.add('collapsed');
    el.classList.add('collapsed');
  }
}

// ── Content rendering ────────────────────────────────────────────────────────

function renderHome() {
  const content = document.getElementById('content');
  const total = FEATURES.length;

  if (VIEW === 'user') {
    content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">User Guide</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki','').replace(/ · [^·]+ view$/,'').trim())}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'}</div>
  <div class="home-section-title">Features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;padding:10px 14px;">
      <span class="nav-dot"></span>
      <span class="nav-item-title" style="font-size:13px;">${esc(f.title)}</span>
    </div>`).join('')}
  </div>
</div>`;
    return;
  }

  const frozen = FEATURES.filter(f => f.status === 'frozen').length;
  const active = FEATURES.filter(f => f.status === 'active').length;
  const draft  = FEATURES.filter(f => f.status === 'draft').length;
  const depr   = FEATURES.filter(f => f.status === 'deprecated').length;

  const domains = [...new Set(FEATURES.map(f => f.domain).filter(Boolean))].sort();

  const avgCompleteness = FEATURES.length
    ? Math.round(FEATURES.reduce((s, f) => s + completeness(f), 0) / FEATURES.length)
    : 0;

  content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">◈ life-as-code wiki</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki', ''))}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'} · avg ${avgCompleteness}% complete</div>

  <div class="stat-row">
    ${active ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#4aad72"></span><span class="stat-pill-num">${active}</span><span class="stat-pill-label">active</span></div>` : ''}
    ${frozen ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#5b82cc"></span><span class="stat-pill-num">${frozen}</span><span class="stat-pill-label">frozen</span></div>` : ''}
    ${draft  ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#c4a255"></span><span class="stat-pill-num">${draft}</span><span class="stat-pill-label">draft</span></div>` : ''}
    ${depr   ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#cc5b5b"></span><span class="stat-pill-num">${depr}</span><span class="stat-pill-label">deprecated</span></div>` : ''}
  </div>

  ${domains.length ? `<div class="home-section-title">Domains</div>
  <div class="domain-chips">
    ${domains.map(d => `<span class="domain-chip" onclick="filterByDomain('${esc(d)}')">${esc(d)}</span>`).join('')}
  </div>` : ''}

  <div class="home-section-title">All features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;">
      <span class="nav-dot"></span>
      ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
      <span class="nav-item-title">${esc(f.title)}</span>
      ${VIEW !== 'user' ? '<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-soft);">' + completeness(f) + '%</span>' : ''}
    </div>`).join('')}
  </div>
</div>`;
}

function renderFeature(key) {
  const f = byKey.get(key);
  if (!f) { renderHome(); return; }

  const pct = completeness(f);
  const barFill = `<span class="completeness-bar"><span class="completeness-fill" style="width:${pct}%"></span></span>`;

  const children = getChildren(f.featureKey);
  const parent = f.lineage && f.lineage.parent && byKey.get(f.lineage.parent);

  let html = `<div class="feature-page">
  ${VIEW !== 'user' ? `<div class="feature-meta">
    <span class="feature-key">${esc(f.featureKey)}</span>
    <span class="badge badge-${esc(f.status)}"><span class="badge-dot" style="background:${statusColor(f.status)}"></span>${esc(f.status)}</span>
    ${f.domain ? `<span class="badge badge-domain">${esc(f.domain)}</span>` : ''}
  </div>` : ''}
  <div class="feature-title">${esc(f.title)}</div>
  ${VIEW !== 'user' ? `<div class="feature-completeness">${barFill}${pct}% complete</div>` : ''}
  ${f.userGuide ? `<a class="guide-link" href="./lac-guide.html#${esc(f.featureKey)}" target="_self">📖 View User Guide →</a>` : ''}`;

  // Problem
  html += section(VIEW === 'user' ? 'About this feature' : 'Problem', f.problem ? `<div class="section-body">${md(f.problem)}</div>` : '<span class="empty">Not documented.</span>');

  // Analysis
  if (f.analysis)
    html += section('Analysis', `<div class="section-body">${md(f.analysis)}</div>`);

  // Implementation
  if (f.implementation)
    html += section('Implementation', `<div class="section-body">${md(f.implementation)}</div>`);

  // User Guide / Success Criteria
  if (VIEW === 'user') {
    const guideContent = f.userGuide || f.successCriteria;
    if (guideContent)
      html += section('What you can do', `<div class="section-body">${md(guideContent)}</div>`);
  } else {
    if (f.userGuide)
      html += section('User Guide', `<div class="section-body">${md(f.userGuide)}</div>`);
    if (f.successCriteria)
      html += section('Success Criteria', `<div class="section-body">${md(f.successCriteria)}</div>`);
  }

  // Decisions
  if (f.decisions && f.decisions.length) {
    const cards = f.decisions.map(d => `<div class="decision-card">
      <div class="decision-title">${esc(d.decision)}</div>
      <div class="decision-rationale">${md(d.rationale)}</div>
      ${d.date || (d.alternativesConsidered && d.alternativesConsidered.length) ? `<div class="decision-meta">
        ${d.date ? `<span class="decision-date">📅 ${esc(d.date)}</span>` : ''}
        ${d.alternativesConsidered && d.alternativesConsidered.length ? `<span class="decision-alts">Considered: ${d.alternativesConsidered.map(esc).join(', ')}</span>` : ''}
      </div>` : ''}
    </div>`).join('');
    html += section('Decisions', `<div class="decisions-list">${cards}</div>`, f.decisions.length);
  }

  // Known Limitations
  if (f.knownLimitations && f.knownLimitations.length) {
    const items = f.knownLimitations.map(l =>
      `<div class="limitation-item"><span class="limitation-bullet">—</span><span>${md(l)}</span></div>`
    ).join('');
    html += section('Known Limitations', `<div class="limitations-list">${items}</div>`, f.knownLimitations.length);
  }

  // Tags
  if (f.tags && f.tags.length) {
    const chips = f.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
    html += section(VIEW === 'user' ? 'Topics' : 'Tags', `<div class="tags-row">${chips}</div>`);
  }

  // Lineage
  if (parent || children.length) {
    let lineage = '<div class="lineage-row">';
    if (VIEW === 'user') {
      if (parent) {
        lineage += `<span class="lineage-arrow">Part of</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">${esc(parent.title)}</a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">Related</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">${esc(c.title)}</a>`;
        }
      }
    } else {
      if (parent) {
        lineage += `<span class="lineage-arrow">parent ↑</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">
            ${esc(parent.featureKey)} — ${esc(parent.title)}
          </a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">children ↓</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">
            ${esc(c.featureKey)} — ${esc(c.title)}
          </a>`;
        }
      }
    }
    lineage += '</div>';
    html += section(VIEW === 'user' ? 'Related' : 'Lineage', lineage);
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

function section(label, body, count) {
  const countHtml = count != null ? `<span class="section-count">(${count})</span>` : '';
  return `<div class="section">
  <div class="section-header">
    <span class="section-label">${label}</span>${countHtml}
  </div>
  ${body}
</div>`;
}

// ── Navigation ───────────────────────────────────────────────────────────────

function navigate(key) {
  activeKey = key;
  location.hash = key ? '#' + key : '';
  renderNav(document.getElementById('filter-input').value);
  if (key) {
    renderFeature(key);
    // Scroll nav item into view
    const el = document.querySelector(`.nav-item[data-key="${key}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  } else {
    renderHome();
  }
}

function filterByDomain(domain) {
  const input = document.getElementById('filter-input');
  input.value = domain;
  renderNav(domain);
}

// Filter input
document.getElementById('filter-input').addEventListener('input', e => {
  renderNav(e.target.value);
});

// ── Boot ─────────────────────────────────────────────────────────────────────

const hashKey = location.hash.slice(1);
if (hashKey && byKey.has(hashKey)) {
  activeKey = hashKey;
  renderNav('');
  renderFeature(hashKey);
  setTimeout(() => {
    const el = document.querySelector(`.nav-item[data-key="${hashKey}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, 0);
} else {
  renderNav('');
  renderHome();
}

window.navigate = navigate;
window.toggleDomain = toggleDomain;
window.filterByDomain = filterByDomain;
window.setSortMode = setSortMode;
</script>
</body>
</html>
