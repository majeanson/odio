"status":"frozen","problem":"The recorder needs to capture multiple songs during a live jam — from a phone browser, one hand, dim room. Between songs the transition to the next recording must be instant. Moments worth keeping must be stampable without interrupting the performance.","schemaVersion":1,"analysis":"Browser MediaRecorder API with getUserMedia. Typical clip: 5-30 min raw. Audio buffered in memory during recording (30 min AAC ~43MB — fits easily). On stop: upload to Google Drive via resumable upload (server generates upload session URL, browser uploads directly to Drive, bypassing Vercel 4.5MB body limit). Server then transcodes to AAC via FFmpeg (cross-browser compatibility — Chrome outputs WebM, Safari outputs AAC/MP4). Transcoded file replaces the original in Drive. Clip and v1 version rows created in Postgres. Wake Lock API active during recording (screen-on). Level meter via Web Audio API AnalyserNode. Stamps (fire/keep/uncertain/idea) buffered in memory, written to Postgres with clip on stop. 'Next Song' button appears after stop: saves current clip + immediately opens new recording, upload continues in background.","decisions":[{"decision":"Resumable Drive upload from browser (bypasses Vercel body limit)","rationale":"Vercel serverless functions have a 4.5MB request body limit. A 30-min recording at 192kbps ~43MB. Sending audio through Vercel would fail. Resumable uploads: server generates a Drive upload session URL, browser POSTs audio blob directly to Drive. Audio never passes through Vercel.","date":"2026-04-10"},{"decision":"Transcode to AAC immediately on upload","rationale":"MediaRecorder outputs WebM/Opus on Chrome and AAC/MP4 on Safari. WebM does not play in Safari. Transcoding immediately on upload ensures one consistent format (AAC) for all playback, editing, and final render — regardless of which browser the recorder used.","date":"2026-04-10"},{"decision":"Any Editor-role member can record — not just the band creator","rationale":"The upload flow already uses the creator's stored refresh_token on the server to generate the Drive resumable upload session URL. The member's browser uploads directly to the creator's Drive. This means multi-recorder support is not an architectural change — it's a role-permission change. Any Editor can initiate a recording and audio lands in the same Drive folder. Reduces the single-point-of-failure where only one person can capture audio on jam night.","date":"2026-04-10"},{"decision":"Two notation types: stamps (typed, no text) and annotations (text notes) — both timestamped","rationale":"Stamps are one-tap typed markers — fire/keep/uncertain/idea — zero friction during playing. Annotations are short text notes for when you want to say something specific. Both appear as pins on the waveform. Keeping them separate preserves the zero-friction stamp UX while allowing richer notes when needed. They serve similar purposes at different levels of effort.","date":"2026-04-10"}],"implementation":"1. app/record/page.tsx: full-screen recording screen — timer, level meter, stamp row, Add note link, record/stop button. Tab bar hidden via usePathname().\n2. hooks/useRecorder.ts: core hook managing MediaRecorder lifecycle, Web Audio AnalyserNode for level meter, Wake Lock API, stamps buffer, annotations buffer, device enumeration and selection, IndexedDB write on stop (via savePendingUpload), upload start.\n3. components/recording/DevicePicker.tsx: bottom sheet listing available audio input devices.\n4. app/record/post/page.tsx: post-record screen — clip name (inline edit), duration, stamp count, upload progress bar, Next Song button, Delete recording button.\n5. hooks/useUploadProgress.ts: polls /api/clips/[clipId] every 3s until transcodeStatus is DONE or FAILED.\n6. lib/pendingUploads.ts: IndexedDB helpers for pending upload persistence.\n7. app/api/upload/init/route.ts: generates Drive resumable upload session URL using creator's stored token.\n8. app/api/upload/finalize/route.ts: transcodes uploaded audio with FFmpeg, creates Clip + ClipVersion rows in Postgres.\n9. STAMP_EMOJI and STAMP_COLORS constants in types/index.ts.","knownLimitations":["iOS Safari stops MediaRecorder if the screen locks or the user switches tabs — Wake Lock API (iOS 16.4+) mitigates accidental sleep; tab switching is user responsibility","If the browser tab is closed before the blob is written to IndexedDB (i.e., during the first few seconds after stop), the audio may be lost — mitigated by writing to IndexedDB immediately on stop before any upload attempt (see feat-recording-resilience)","Resumable upload requires two API round-trips before recording is saved — adds ~2-4s to the stop flow","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — members upload directly to the creator's Drive using the server-generated resumable upload session URL (which uses the creator's stored token)"],"tags":["recording","mediarecorder","audio","wake-lock","stamps","ios","google-drive"],"successCriteria":"- Record button triggers microphone permission request on first use\n- Level meter visible and responsive during recording (horizontal amber bar, 8px tall, full-width)\n- Recording screen is full-screen (tab bar hidden); minimal chrome: timer, level meter, stamps, 'Add note', record/stop button only\n- Stamp buttons (fire/keep/uncertain/idea) always visible; one tap stamps current timestamp; haptic feedback on mobile; 72x72px touch targets\n- Quick text note button: 'Add note' text link → 1-line bottom sheet, submit adds annotation\n- Recording screen usable one-handed in portrait orientation\n- Stop → upload begins immediately; 'Next Song' button available without waiting for upload\n- Post-record screen shows: clip name (editable inline), duration, stamp count, upload progress\n- 'Next Song' opens new recording screen; previous clip uploads in background\n- 'Delete recording' option on post-record screen with confirmation sheet: 'Delete this recording? This cannot be undone.'\n- During upload: persistent top banner 'Uploading Song N… 47%' with amber progress bar visible on any screen\n- Banner dismisses only after upload + transcode confirmed complete\n- Wake Lock active during recording (screen stays on)\n- iOS warning shown if Wake Lock is unavailable\n- Clip appears in session as 'Processing…' until transcode done, then becomes fully interactive\n- All clips play back correctly in Chrome and Safari (AAC source)\n- Any Editor-role band member can initiate a recording (not just band creator/recorder)","domain":"recording","priority":1,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away.","componentFile":"hooks/useRecorder.ts"},{"featureKey":"odio-2026-009","title":"Recording Resilience — IndexedDB Safety Net, Upload Retry, Save-to-Device Fallback","status":"frozen","problem":"A recording is a one-time, irreplaceable event. Currently, if the internet drops during upload or the band creator's Drive token is invalid, the audio blob — which only exists in memory — is permanently lost when the user navigates away or the tab closes. A live jam session cannot be re-played. The recording must survive any upload failure and remain recoverable until it reaches Drive.","schemaVersion":1,"analysis":"The audio blob lives in RAM from record-start until upload completes. If anything breaks during the upload window — network drop, Drive token expiry, browser crash, tab close — the blob is gone. This is the highest-risk data loss scenario in the app.\n\nThe fix is a two-layer safety net:\n\nLayer 1 — IndexedDB persistence (immediate): The moment recording stops and the blob is assembled, write it to IndexedDB before starting the upload. IndexedDB stores binary blobs up to the device's available storage (typically several GB on modern phones), survives page refresh and browser restarts, and is cleared only explicitly. Key: odio-pending-upload-{tempId}. Also store: tempId, recordedAt, durationMs, bandId, sessionId, blob.\n\nLayer 2 — Resumable upload retry: Google Drive resumable uploads natively support resume from a byte offset. If the upload is interrupted mid-transfer, the server stores the upload session URL in the pending record. On retry, the client queries Drive for the current byte offset and resumes from there — no re-upload of already-transferred bytes.","decisions":[{"decision":"IndexedDB as the primary persistence layer for unuploaded audio blobs","rationale":"localStorage cannot store binary blobs. The File System Access API requires explicit user permission. IndexedDB is the only browser-native store that (a) handles large binary data, (b) persists across sessions without user action, and (c) is available in all browsers including iOS Safari 10.3+. A 43MB blob fits easily — IndexedDB storage limits are typically 50-80% of available disk space.","date":"2026-04-10"},{"decision":"Resumable upload — save session URL to IndexedDB for byte-accurate retry","rationale":"A naive retry re-uploads the entire blob from byte 0. For a 43MB file on a slow mobile connection, this could fail again at the same spot. Google Drive resumable uploads let you query the committed offset and resume from there. Storing the uploadSessionUrl in IndexedDB alongside the blob enables true resume, not restart.","date":"2026-04-10"},{"decision":"'Save to device' as the last-resort fallback — never lose the audio","rationale":"If Drive is permanently unavailable (creator deleted their account, Drive quota exceeded, token irrecoverable), the band should still get their recording. A browser download gives them the raw file. They lose the Odio versioning workflow but not the audio. The guarantee is: if you recorded it, you can get the file.","date":"2026-04-10"},{"decision":"Check IndexedDB for pending recordings on every app mount","rationale":"Background Sync is not reliable on iOS Safari. The safest recovery path is: when the app is opened, check for stranded blobs and surface them immediately. This catches the crash-during-upload, tab-closed-early, and came-back-later scenarios without relying on service worker scheduling.","date":"2026-04-10"}],"implementation":"1. lib/pendingUploads.ts: IndexedDB helpers using idb library. Database 'odio-recordings', object store 'pending-uploads'. Functions: savePendingUpload(upload), getPendingUploads(), deletePendingUpload(tempId), updatePendingUpload(tempId, patch).\n2. hooks/useRecorder.ts: calls savePendingUpload immediately on MediaRecorder onstop before any network request.\n3. hooks/usePendingUploads.ts: checks IndexedDB on mount, drives retry logic, manages upload state machine (idle/uploading/paused/error), listens to window 'online' event for auto-retry.\n4. components/recording/PendingUploadsBanner.tsx: recovery banner shown when usePendingUploads reports pending items. Shows count, retry button, save-to-device button, discard button with confirmation.\n5. app/(auth)/layout.tsx: renders PendingUploadsBanner at top of all authenticated pages.\n6. lib/uploadAudio.ts: manages the Drive resumable upload from browser — tracks byte offset, handles chunking, updates IndexedDB with uploadSessionUrl on each successful chunk.\n7. 'Save to device': URL.createObjectURL(blob) + programmatic anchor download. Extension .aac or .webm based on mimeType.","knownLimitations":["IndexedDB is cleared when the user clears browser storage ('Clear site data') — the blob would be lost; this is unavoidable without server-side buffering and is an edge case the user controls","Background Sync (automatic retry when tab is closed and connection restored) is not available on iOS Safari — recovery on iOS requires opening the app manually","Drive resumable upload session URLs expire after 7 days — a blob stranded for > 7 days will need a fresh upload session, not a resume; the implementation must detect this (404 on session URL) and fall back to a new session","Storage pressure on low-end devices: a 43MB blob may trigger the browser's storage eviction policy on devices with < 1GB free — 'Save to device' should be surfaced proactively for large recordings"],"tags":["recording","indexeddb","resilience","offline","retry","upload","fallback"],"successCriteria":"- Audio blob written to IndexedDB immediately on recording stop, before upload begins\n- IndexedDB entry keyed by tempId; stores blob + recordedAt + durationMs + bandId + sessionId + uploadSessionUrl (if partially started)\n- If upload succeeds: IndexedDB entry cleared; no other change\n- If network drops during upload: banner shows 'Upload paused — waiting for connection'; auto-retries on window 'online' event; resumable upload continues from last committed byte\n- If creator's Drive token is invalid: banner shows 'Drive connection needs renewal — ask [creator name] to re-authorize'; IndexedDB blob retained; retry button enabled once token is refreshed\n- If recording member's own session token expires mid-upload: client silently calls getSession() to refresh; if refresh succeeds, upload resumes automatically; if refresh fails, banner shows 'Session expired — sign in again to resume'; after re-sign-in, IndexedDB blob is still present and recovery banner activates\n- On app reopen: check IndexedDB for pending recordings on mount; if found, show recovery banner: 'You have [N] recording(s) waiting to upload'\n- Recovery banner persists until all pending recordings are uploaded or manually discarded\n- 'Save to device' fallback button available on any failed upload: triggers browser download of blob (.webm or .aac depending on browser)\n- User can discard a pending recording from the recovery UI (with confirmation: 'Discard this recording? It cannot be recovered.')\n- 'Pending uploads' count visible in the Record tab (badge) and on the session screen\n- Successful retry creates the clip in Postgres and Drive exactly as a normal upload would","domain":"recording","priority":2,"statusHistory":[{"from":"draft","to":"active","date":"2026-04-10"},{"from":"active","to":"frozen","date":"2026-04-10"}],"userGuide":"Recording resilience is automatic and invisible when things work. If an upload fails (network drops, Drive token expires), a banner appears at the top of the screen: 'You have [N] recording(s) waiting to upload'. Tap 'Retry' to resume when reconnected. Tap 'Save to device' to download the raw audio file to your phone or computer if Drive is permanently unavailable. Tap 'Discard' (with confirmation) to remove a pending recording from recovery. When the app reopens after a crash, pending recordings are detected automatically.","componentFile":"hooks/usePendingUploads.ts"},{"featureKey":"odio-2026-001","title":"Odio — Collaborative Jam Session Recorder","status":"draft","problem":"Musicians lose the best moments from their jam sessions. When they do record, the raw file is long, unedited, buried — nobody goes back and cleans it up. No tool lets a small band record on any device, pass the recording around in the car on the way home, each person trimming a song into its final form, and arrive with a clean versioned archive — all from a browser, no install, no DAW.","schemaVersion":1,"analysis":"Pure web PWA (Next.js). No native app. Browser MediaRecorder API covers recording on iOS Safari 14.5+, Android Chrome, and desktop. The core primitive is versioning: every clip starts as v1 (raw recording), band members create new versions by marking cut regions, and any version can be frozen — triggering a server-side FFmpeg render. Versions are metadata only (cutMarks + annotations JSON) pointing at the same source audio. No simultaneous editing; linear versioning. Storage split: audio files (.aac) in Google Drive (recorder's account, free), all structured metadata (sessions, clips, versions, votes, comments, stamps) in a free-tier Postgres (Neon or Vercel Postgres). No Supabase. Auth: NextAuth.js + Google OAuth (drive.file scope). Real-time: polling every 5-10s. Edit state in localStorage as safety net; submit requires connection. External services: Google + free Postgres. Cost: $0/month.","decisions":[{"decision":"Web-only PWA — no native app","rationale":"Browser MediaRecorder API works on iOS Safari 14.5+, Android Chrome, and desktop. No install removes friction for bandmates who only need to edit/review. The 'in the car editing' use case requires web access — native would require app install on every bandmate's phone.","date":"2026-04-10"},{"decision":"Google Drive for audio, Neon Postgres for metadata — no Supabase","rationale":"Supabase Storage costs accumulate at ~100MB/session. Google Drive is free (15GB) for audio. Structured metadata (sessions, clips, versions, votes, comments) belongs in a relational DB for querying, not in JSON sidecars with ETag concurrency management. Neon Postgres free tier (512MB) handles years of band metadata. Both services are $0.","date":"2026-04-10"},{"decision":"NextAuth DB adapter required — not JWT-only","rationale":"The audio proxy route serves the recorder's Drive files to all band members. To do this, the server needs the recorder's valid refresh token when any member makes a request — not just when the recorder is logged in. NextAuth's DB adapter stores access_token and refresh_token in Postgres per user, enabling server-side token lookup by user email. JWT-only strategy cannot support this cross-user token access.","date":"2026-04-10"},{"decision":"Versioning as core primitive — versions are metadata, not audio files","rationale":"Storing a full audio file per version would be prohibitively expensive. Versions (cutMarks + annotations JSON) are bytes vs megabytes. Source audio stored once; versions are lightweight edit instructions applied at render time or virtually during preview.","date":"2026-04-10"},{"decision":"Linear versioning only — no simultaneous co-editing","rationale":"Real-time simultaneous editing (CRDT/Y.js) adds significant complexity. The real use case is 3 people each editing a different song. Linear versioning covers all realistic scenarios without conflict resolution logic.","date":"2026-04-10"},{"decision":"localStorage for in-progress edit safety — no offline sync","rationale":"Full offline support adds complexity. The real need is simpler: if the browser crashes mid-edit, cut marks shouldn't be lost. localStorage solves this with minimal code. Submit still requires a connection — that's acceptable.","date":"2026-04-10"},{"decision":"Resumable Drive upload from browser — bypass Vercel body limit","rationale":"Vercel's 4.5MB request body limit cannot accommodate a 30-min audio recording (~43MB). Resumable uploads: server generates a Drive upload session URL, client uploads directly to Drive. Audio never passes through Vercel.","date":"2026-04-10"}],"implementation":"**Stack:** Next.js (App Router) + TypeScript + Tailwind CSS, deployed on Vercel\n**Recording:** Browser MediaRecorder API + Web Audio API (level meter) + Wake Lock API (screen-on)\n**Waveform editing:** wavesurfer.js 7.x + Regions plugin\n**Storage — audio:** Google Drive (resumable upload bypassing Vercel 4.5MB body limit; transcoded to AAC on finalize)\n**Storage — metadata:** Neon Postgres free tier (sessions, clips, versions, votes, comments, stamps, bands, members)\n**Auth:** NextAuth.js + Google OAuth (drive.file scope) + NextAuth DB adapter (Prisma + Neon, required to store recorder's refresh token for audio proxy)\n**Audio proxy:** Next.js API route fetches audio from recorder's Drive using stored token, streams to client with Range support\n**Real-time:** Client-side polling every 5-10s when session active\n**Render:** fluent-ffmpeg + @ffmpeg-installer/ffmpeg in Next.js API route (triggered on freeze only)\n**Edit safety:** localStorage (cut marks saved on every change, restored on editor reopen, cleared on submit)\n**External services: 2** — Google (OAuth + Drive) + Neon (Postgres). Cost: $0/month.","knownLimitations":["iOS Safari stops MediaRecorder if screen locks or user switches tabs — Wake Lock API (iOS 16.4+) mitigates; warning shown before recording","Polling (not WebSocket) — new versions/votes appear within 5-10s, not instantly","MediaRecorder output format varies by browser (WebM/Opus on Chrome, AAC/MP4 on iOS) — transcoded to AAC on upload","Recorder's Google Drive storage used for band audio — 15GB free, ~350 raw clips before cleanup needed","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — one token serves the whole band"],"tags":["audio","recording","jam","musicians","collaboration","pwa","web","versioning","google-drive","next.js"],"lineage":{"children":["odio-2026-002","odio-2026-003","odio-2026-004","odio-2026-005","odio-2026-006","odio-2026-007","odio-2026-008","odio-2026-009","odio-2026-010","odio-2026-011","odio-2026-012","odio-2026-014","odio-2026-013","odio-2026-015","odio-2026-016","odio-2026-017","odio-2026-018"]},"successCriteria":"- Recorder opens browser (any device), records a session, all clips uploaded to Google Drive and metadata saved to Postgres\n- Band member opens a link in mobile browser, opens a clip in the editor within 2 taps\n- Editor loads waveform via Drive audio proxy, marks cuts, previews result without re-encoding\n- Submitting a version writes to Postgres; others see it within 5-10s via polling\n- Three people can each edit a different clip simultaneously, each producing their own version\n- Freeze triggers server-side render, produces downloadable file within 10s for a typical 2-8 min clip\n- Version history shows full chain with author, timestamp, description, and result duration\n- Total infrastructure cost: $0/month","domain":"audio/collaboration","statusHistory":[],"revisions":[{"date":"2026-04-10","author":"marc+claude","fields_changed":["problem","tags","domain"],"reason":"Initial project creation"},{"date":"2026-04-10","author":"marc+claude","fields_changed":["problem","analysis","successCriteria","implementation","decisions","knownLimitations","tags"],"reason":"Platform pivot to web-only PWA. Versioning as core primitive. PRD v0.2 + Architecture v0.2 + Epics v0.2."},{"date":"2026-04-10","author":"marc+claude","fields_changed":["analysis","implementation","decisions","knownLimitations","tags"],"reason":"Removed Supabase entirely. Google Drive for audio. Postgres for all metadata. NextAuth.js. localStorage safety net only. Architecture v0.3."},{"date":"2026-04-11","author":"marc+claude","fields_changed":["knownLimitations","lineage"],"reason":"Removed stale .meta.json reference (all metadata is now Postgres). Added new child features: clip-detail, public-share-player, upload-banner."}]}];

// ── Helpers ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function md(text) {
  if (!text) return '';
  const lines = esc(text).split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.match(/^[-*] /)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + inline(t.slice(2)) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n').split(/\n{2,}/).map(block => {
    const b = block.trim();
    if (!b) return '';
    if (b.startsWith('<ul>') || b.startsWith('<li>')) return b;
    return '<p>' + inline(b.replace(/\n/g, '<br>')) + '</p>';
  }).filter(Boolean).join('\n');
}

function inline(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

function completeness(f) {
  const checks = [
    !!f.analysis, !!f.implementation,
    !!(f.decisions && f.decisions.length),
    !!f.successCriteria,
    !!(f.knownLimitations && f.knownLimitations.length),
    !!(f.tags && f.tags.length),
    !!f.domain,
  ];
  return Math.round(checks.filter(Boolean).length / checks.length * 100);
}

function statusColor(s) {
  return { active: '#4aad72', draft: '#c4a255', frozen: '#5b82cc', deprecated: '#cc5b5b' }[s] || '#c4a255';
}

// ── Tree building ────────────────────────────────────────────────────────────

const VIEW = '';
const byKey = new Map(FEATURES.map(f => [f.featureKey, f]));

function getChildren(key) {
  return FEATURES.filter(f => f.lineage && f.lineage.parent === key);
}

function isRoot(f) {
  const p = f.lineage && f.lineage.parent;
  return !p || !byKey.has(p);
}

/** Flatten feature + its descendants with depth info */
function flatten(f, depth) {
  const result = [{ feature: f, depth }];
  for (const child of getChildren(f.featureKey)) {
    result.push(...flatten(child, depth + 1));
  }
  return result;
}

// Group root features by domain
function buildGroups(features) {
  const roots = features.filter(isRoot);
  const groups = new Map();

  for (const f of roots) {
    const domain = f.domain || '(no domain)';
    if (!groups.has(domain)) groups.set(domain, []);
    groups.get(domain).push(...flatten(f, 0));
  }
  return groups;
}

// ── Nav rendering ────────────────────────────────────────────────────────────

let activeKey = null;
let sortMode = 'domain';
const collapsedDomains = new Set();

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sort-domain').classList.toggle('active', mode === 'domain');
  document.getElementById('sort-build').classList.toggle('active', mode === 'build-order');
  renderNav(document.getElementById('filter-input').value);
}

function renderNavItem(f, depth) {
  const isChild = depth > 0;
  const hasChildren = getChildren(f.featureKey).length > 0;
  return `<div class="nav-item${f.featureKey === activeKey ? ' active' : ''}"
    data-key="${esc(f.featureKey)}"
    data-status="${esc(f.status)}"
    data-depth="${depth}"
    onclick="navigate('${esc(f.featureKey)}')">
    ${isChild ? '<span class="nav-child-arrow">↳</span>' : '<span class="nav-dot"></span>'}
    ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
    <span class="nav-item-title">${esc(f.title)}</span>
    ${hasChildren ? '<span class="nav-child-arrow" style="margin-left:auto;opacity:0.4">⊕</span>' : ''}
  </div>`;
}

function renderNav(filterText) {
  const nav = document.getElementById('nav-tree');
  const q = (filterText || '').toLowerCase().trim();

  const matchFn = f =>
    f.featureKey.toLowerCase().includes(q) ||
    f.title.toLowerCase().includes(q) ||
    (f.domain && f.domain.toLowerCase().includes(q)) ||
    (f.tags && f.tags.some(t => t.toLowerCase().includes(q)));

  const features = q ? FEATURES.filter(matchFn) : FEATURES;

  if (features.length === 0) {
    nav.innerHTML = '<div class="no-results">No features match</div>';
    return;
  }

  // ── Build Order: flat list sorted by featureKey ───────────────────────────
  if (sortMode === 'build-order' && !q) {
    const sorted = [...FEATURES].sort((a, b) => a.featureKey.localeCompare(b.featureKey));
    nav.innerHTML = sorted.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Search results: flat list ─────────────────────────────────────────────
  if (q) {
    nav.innerHTML = features.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Domain grouping (default) ─────────────────────────────────────────────
  const groups = buildGroups(FEATURES);
  const sortedDomains = [...groups.keys()].sort((a, b) => {
    if (a === '(no domain)') return 1;
    if (b === '(no domain)') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  for (const domain of sortedDomains) {
    const items = groups.get(domain);
    if (!items || items.length === 0) continue;

    const isCollapsed = collapsedDomains.has(domain);

    html += `<div class="nav-group${isCollapsed ? ' collapsed' : ''}" data-domain="${esc(domain)}">
  <div class="nav-domain${isCollapsed ? ' collapsed' : ''}" onclick="toggleDomain(this)">
    <span class="nav-domain-arrow">▾</span>
    <span>${esc(domain)}</span>
    <span class="nav-domain-count">${items.length}</span>
  </div>
  <div class="nav-group-items">`;

    for (const { feature: f, depth } of items) {
      html += renderNavItem(f, depth);
    }

    html += '</div></div>';
  }

  nav.innerHTML = html;
}

function toggleDomain(el) {
  const group = el.closest('.nav-group');
  const domain = group.dataset.domain;
  if (collapsedDomains.has(domain)) {
    collapsedDomains.delete(domain);
    group.classList.remove('collapsed');
    el.classList.remove('collapsed');
  } else {
    collapsedDomains.add(domain);
    group.classList.add('collapsed');
    el.classList.add('collapsed');
  }
}

// ── Content rendering ────────────────────────────────────────────────────────

function renderHome() {
  const content = document.getElementById('content');
  const total = FEATURES.length;

  if (VIEW === 'user') {
    content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">User Guide</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki','').replace(/ · [^·]+ view$/,'').trim())}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'}</div>
  <div class="home-section-title">Features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;padding:10px 14px;">
      <span class="nav-dot"></span>
      <span class="nav-item-title" style="font-size:13px;">${esc(f.title)}</span>
    </div>`).join('')}
  </div>
</div>`;
    return;
  }

  const frozen = FEATURES.filter(f => f.status === 'frozen').length;
  const active = FEATURES.filter(f => f.status === 'active').length;
  const draft  = FEATURES.filter(f => f.status === 'draft').length;
  const depr   = FEATURES.filter(f => f.status === 'deprecated').length;

  const domains = [...new Set(FEATURES.map(f => f.domain).filter(Boolean))].sort();

  const avgCompleteness = FEATURES.length
    ? Math.round(FEATURES.reduce((s, f) => s + completeness(f), 0) / FEATURES.length)
    : 0;

  content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">◈ life-as-code wiki</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki', ''))}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'} · avg ${avgCompleteness}% complete</div>

  <div class="stat-row">
    ${active ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#4aad72"></span><span class="stat-pill-num">${active}</span><span class="stat-pill-label">active</span></div>` : ''}
    ${frozen ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#5b82cc"></span><span class="stat-pill-num">${frozen}</span><span class="stat-pill-label">frozen</span></div>` : ''}
    ${draft  ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#c4a255"></span><span class="stat-pill-num">${draft}</span><span class="stat-pill-label">draft</span></div>` : ''}
    ${depr   ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#cc5b5b"></span><span class="stat-pill-num">${depr}</span><span class="stat-pill-label">deprecated</span></div>` : ''}
  </div>

  ${domains.length ? `<div class="home-section-title">Domains</div>
  <div class="domain-chips">
    ${domains.map(d => `<span class="domain-chip" onclick="filterByDomain('${esc(d)}')">${esc(d)}</span>`).join('')}
  </div>` : ''}

  <div class="home-section-title">All features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;">
      <span class="nav-dot"></span>
      ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
      <span class="nav-item-title">${esc(f.title)}</span>
      ${VIEW !== 'user' ? '<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-soft);">' + completeness(f) + '%</span>' : ''}
    </div>`).join('')}
  </div>
</div>`;
}

function renderFeature(key) {
  const f = byKey.get(key);
  if (!f) { renderHome(); return; }

  const pct = completeness(f);
  const barFill = `<span class="completeness-bar"><span class="completeness-fill" style="width:${pct}%"></span></span>`;

  const children = getChildren(f.featureKey);
  const parent = f.lineage && f.lineage.parent && byKey.get(f.lineage.parent);

  let html = `<div class="feature-page">
  ${VIEW !== 'user' ? `<div class="feature-meta">
    <span class="feature-key">${esc(f.featureKey)}</span>
    <span class="badge badge-${esc(f.status)}"><span class="badge-dot" style="background:${statusColor(f.status)}"></span>${esc(f.status)}</span>
    ${f.domain ? `<span class="badge badge-domain">${esc(f.domain)}</span>` : ''}
  </div>` : ''}
  <div class="feature-title">${esc(f.title)}</div>
  ${VIEW !== 'user' ? `<div class="feature-completeness">${barFill}${pct}% complete</div>` : ''}`;

  // Problem
  html += section(VIEW === 'user' ? 'About this feature' : 'Problem', f.problem ? `<div class="section-body">${md(f.problem)}</div>` : '<span class="empty">Not documented.</span>');

  // Analysis
  if (f.analysis)
    html += section('Analysis', `<div class="section-body">${md(f.analysis)}</div>`);

  // Implementation
  if (f.implementation)
    html += section('Implementation', `<div class="section-body">${md(f.implementation)}</div>`);

  // User Guide / Success Criteria
  if (VIEW === 'user') {
    const guideContent = f.userGuide || f.successCriteria;
    if (guideContent)
      html += section('What you can do', `<div class="section-body">${md(guideContent)}</div>`);
  } else {
    if (f.userGuide)
      html += section('User Guide', `<div class="section-body">${md(f.userGuide)}</div>`);
    if (f.successCriteria)
      html += section('Success Criteria', `<div class="section-body">${md(f.successCriteria)}</div>`);
  }

  // Decisions
  if (f.decisions && f.decisions.length) {
    const cards = f.decisions.map(d => `<div class="decision-card">
      <div class="decision-title">${esc(d.decision)}</div>
      <div class="decision-rationale">${md(d.rationale)}</div>
      ${d.date || (d.alternativesConsidered && d.alternativesConsidered.length) ? `<div class="decision-meta">
        ${d.date ? `<span class="decision-date">📅 ${esc(d.date)}</span>` : ''}
        ${d.alternativesConsidered && d.alternativesConsidered.length ? `<span class="decision-alts">Considered: ${d.alternativesConsidered.map(esc).join(', ')}</span>` : ''}
      </div>` : ''}
    </div>`).join('');
    html += section('Decisions', `<div class="decisions-list">${cards}</div>`, f.decisions.length);
  }

  // Known Limitations
  if (f.knownLimitations && f.knownLimitations.length) {
    const items = f.knownLimitations.map(l =>
      `<div class="limitation-item"><span class="limitation-bullet">—</span><span>${md(l)}</span></div>`
    ).join('');
    html += section('Known Limitations', `<div class="limitations-list">${items}</div>`, f.knownLimitations.length);
  }

  // Tags
  if (f.tags && f.tags.length) {
    const chips = f.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
    html += section(VIEW === 'user' ? 'Topics' : 'Tags', `<div class="tags-row">${chips}</div>`);
  }

  // Lineage
  if (parent || children.length) {
    let lineage = '<div class="lineage-row">';
    if (VIEW === 'user') {
      if (parent) {
        lineage += `<span class="lineage-arrow">Part of</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">${esc(parent.title)}</a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">Related</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">${esc(c.title)}</a>`;
        }
      }
    } else {
      if (parent) {
        lineage += `<span class="lineage-arrow">parent ↑</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">
            ${esc(parent.featureKey)} — ${esc(parent.title)}
          </a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">children ↓</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">
            ${esc(c.featureKey)} — ${esc(c.title)}
          </a>`;
        }
      }
    }
    lineage += '</div>';
    html += section(VIEW === 'user' ? 'Related' : 'Lineage', lineage);
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

function section(label, body, count) {
  const countHtml = count != null ? `<span class="section-count">(${count})</span>` : '';
  return `<div class="section">
  <div class="section-header">
    <span class="section-label">${label}</span>${countHtml}
  </div>
  ${body}
</div>`;
}

// ── Navigation ───────────────────────────────────────────────────────────────

function navigate(key) {
  activeKey = key;
  location.hash = key ? '#' + key : '';
  renderNav(document.getElementById('filter-input').value);
  if (key) {
    renderFeature(key);
    // Scroll nav item into view
    const el = document.querySelector(`.nav-item[data-key="${key}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  } else {
    renderHome();
  }
}

function filterByDomain(domain) {
  const input = document.getElementById('filter-input');
  input.value = domain;
  renderNav(domain);
}

// Filter input
document.getElementById('filter-input').addEventListener('input', e => {
  renderNav(e.target.value);
});

// ── Boot ─────────────────────────────────────────────────────────────────────

const hashKey = location.hash.slice(1);
if (hashKey && byKey.has(hashKey)) {
  activeKey = hashKey;
  renderNav('');
  renderFeature(hashKey);
  setTimeout(() => {
    const el = document.querySelector(`.nav-item[data-key="${hashKey}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, 0);
} else {
  renderNav('');
  renderHome();
}

window.navigate = navigate;
window.toggleDomain = toggleDomain;
window.filterByDomain = filterByDomain;
window.setSortMode = setSortMode;
</script>
</body>
</html>
