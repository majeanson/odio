ion inline. Vote Keep, Revise, or Pass to share your opinion with the band."},{"featureKey":"odio-2026-034","title":"VotePanel — Keep / Revise / Pass Vote UI","status":"active","problem":"After editing, the band needs to converge on which version is ready. A lightweight vote (Keep/Revise/Pass) scoped per version gives structure to 'should we ship this cut?' without requiring a group call or a long comment thread.","decisions":[{"decision":"Votes are mutable — tapping a different option replaces current vote","rationale":"Band opinions evolve as new versions are submitted. A member who voted Revise on v2 should be able to change to Keep on v3 without a delete-then-create flow. PATCH endpoint upserts on (clipId, userEmail) unique constraint.","date":"2026-04-15"}],"knownLimitations":["Vote button layout is cramped on narrow screens when all three labels are shown — consider icon-only mode below 320px"],"tags":["votes","collaboration","polling","keep","revise","pass","clip-detail"],"successCriteria":"- Keep/Revise/Pass buttons rendered equally spaced\n- Current user's vote highlighted with amber border\n- Tapping another option: optimistic UI update immediately, PATCH to Postgres\n- Tally shows all vote counts in text-xs below buttons\n- Votes can be cast on any version (not just latest)\n- Hidden (returns null) when isFrozen\n- Disabled (aria-disabled) when offline (isOnline=false prop)","domain":"collaboration","priority":2,"userGuide":"Tap Keep, Revise, or Pass to vote on a version. You can change your vote anytime. The tally below shows what everyone thinks."},{"featureKey":"odio-2026-039","title":"WaveformCanvas — Waveform Presenter with Cut Region Overlay","status":"active","problem":"The waveform display needs to show the audio waveform, cut regions (red or dark overlays), stamp dots, annotation pins, and a drag-interaction overlay — all layered correctly without WaveSurfer's built-in interactions (which conflict with custom cut region handling).","decisions":[{"decision":"Cut bands are pure CSS absolute divs, not WaveSurfer RegionsPlugin","rationale":"RegionsPlugin creates DOM nodes inside the waveform container that intercept pointer events even with pointer-events:none on individual regions because the Plugin wrapper div captures them. Pure CSS divs with pointer-events:none have no such interference. See timeline-editor/feature.json for full rationale.","date":"2026-04-15"}],"knownLimitations":["Cut band position calculation is scroll-synchronized but not zoom-animated — positions jump on zoom level change (no transition)","Suggested-cut overlays from collaboration are display-only — no apply/dismiss controls in WaveformCanvas itself"],"tags":["waveform","canvas","cut-regions","overlay","pointer-events","wavesurfer","css-divs"],"successCriteria":"- WaveSurfer mounts in container div with interact:false\n- Cut bands (CSS divs) render at correct positions for given cutMarks, zoom, scroll\n- pointer-events:none on cut bands — click-to-seek works through them\n- Overlay div at z-20 intercepts all pointer events in edit variant\n- Player variant: no overlay, no handles, dark masking bands (not red)\n- Suggested-cut overlays render in orange dashed style, distinct from user cuts\n- Edge grip indicators visible as visual affordance at 24px from each cut edge\n- Preview cut band renders during drag-create (before release)\n- Stamp dots render at computed timestamp positions\n- Waveform loads progressively — shimmer shown on unrendered segments","domain":"editing","priority":1,"userGuide":"The waveform display shows your audio as a wave. Red (or dark) bands show cut regions. Colored dots show moments stamped during recording. In the editor, drag on the waveform to add a cut."},{"featureKey":"odio-2026-010","title":"Upload Banner — Persistent Upload Progress Across All Pages","status":"active","problem":"After stopping a recording, the band member needs to navigate away (to another song, to the session list, to collaborate) without losing visibility into whether the upload succeeded. The upload progress must persist across all pages — not just the record screen — as a fixed top banner.","decisions":[{"decision":"Most actionable upload shown first — errors before paused before active","rationale":"A token error requires a human action (band creator re-authorizes). A session error requires sign-in. These block recovery and are more urgent than an active upload silently progressing. Showing errors first ensures the user notices and acts on the blocker rather than assuming uploads are fine.","date":"2026-04-10"},{"decision":"No close button on active/paused uploads; dismiss button only on error states","rationale":"Closing an active or paused upload banner hides critical progress state and gives false confidence. But permanently blocking the UI for an unresolvable error (token-error, session-error) that the user cannot fix immediately is hostile — they may need to navigate while waiting for the creator to re-authorize. Error states have an ✕ dismiss button that hides the banner without discarding the upload (it can still be retried from any page).","date":"2026-04-11"}],"knownLimitations":["Banner occupies top space — sticky headers below must consume --upload-banner-h CSS variable; new pages with their own sticky headers need to adopt this pattern","On desktop the banner is offset md:left-[220px] to avoid the sidebar; if the sidebar width changes, this value must be updated manually","Progress bar accuracy depends on IndexedDB byteOffset being updated frequently during upload; if updates are sparse, the bar may jump","'Save file' downloads the raw browser-recorded blob (WebM on Chrome, AAC/MP4 on Safari) — not the transcoded AAC that would normally be stored in Drive"],"tags":["upload","banner","progress","resilience","indexeddb","retry","fixed-ui"],"successCriteria":"- Banner visible on every authenticated page during any upload state\n- Active upload: amber background, spinner, clip name, progress bar at bottom of banner\n- Paused upload: shows 'Upload paused — waiting for connection' with Retry button\n- Token error: shows 'Drive connection needs renewal — ask band creator to re-authorize' with Retry + Save file buttons\n- Session error: shows 'Session expired — sign in again to resume upload' with Retry + Save file buttons\n- Multiple pending: shows primary (most urgent) with '+N more' count\n- Banner disappears when all uploads complete (uploads.length === 0)\n- 'Save file' triggers browser download of raw blob (.aac or .webm)","domain":"recording","priority":2,"userGuide":"After stopping a recording, a banner appears at the top of every screen showing upload progress. If the upload completes successfully, the banner disappears automatically. If the connection drops, the banner shows 'Upload paused' with a Retry button — tap it once reconnected. If the band creator's Drive connection expires, the banner shows an error with a 'Save file' button as a last resort to download the raw recording to your device."},{"featureKey":"odio-2026-047","title":"AuthShell — Authenticated Layout Wrapper","status":"active","problem":"All authenticated pages need shared layout elements: the BottomTabBar, the UploadBanner (persistent upload progress), and eventually the OfflineBanner (global offline indicator). These cannot live at the page level — they'd need to be duplicated on every route. A single client-side shell mounts them once.","decisions":[{"decision":"AuthShell is a client component even though most of its content is static","rationale":"usePathname() requires a client component. Without usePathname(), BottomTabBar cannot determine which tabs to show or hide, and routing context cannot be passed down. The cost of a client boundary here is minimal — AuthShell itself renders no heavy content.","date":"2026-04-11"}],"knownLimitations":["bandId/sessionId extraction is regex-based on pathname — URL structure changes require updating the extraction logic"],"tags":["layout","auth","shell","upload-banner","offline-banner","bottom-tab-bar"],"successCriteria":"- UploadBanner mounted and visible on all authenticated pages\n- BottomTabBar mounted at bottom of viewport\n- bandId and sessionId correctly extracted from pathname and passed to BottomTabBar\n- OfflineBanner slot ready for mounting (even if component not yet implemented)\n- Children content renders between top (banners) and bottom (tab bar) sections","domain":"app-shell","priority":1,"userGuide":"AuthShell is an internal layout component — users don't interact with it directly. It ensures the upload progress bar and tab navigation are always visible."},{"featureKey":"odio-2026-046","title":"BottomTabBar — Four-Tab Persistent Navigation","status":"active","problem":"The app has four distinct areas (Sessions, Record, Clips, Band) that need to be reachable in one tap from anywhere in the app. Hierarchical-only navigation (back buttons) would require 3+ taps to switch from editing a clip to starting a new recording mid-jam.","decisions":[{"decision":"Tab bar hidden during editor, not just partially visible","rationale":"The timeline editor is near-full-screen — the waveform, cut list, and submit button need all available vertical space. A partial tab bar would either cover content or require the editor to shrink. Full hide keeps the editing surface clean.","date":"2026-04-10"}],"knownLimitations":["Clips tab disappears when navigating from session to band settings — the sessionId context is not preserved in the URL and is lost","Tab bar height is hardcoded at 56px — not responsive to font size settings"],"tags":["navigation","tab-bar","routing","bottom-nav","mobile-first","role-based"],"successCriteria":"- Four tabs visible on all non-editor routes\n- Active tab: amber icon + label\n- Hidden on /bands/.../clips/.../edit routes\n- Record tab hidden for MEMBER role\n- Clips tab hidden when !sessionId\n- Record tab shows pulsing amber ring when recording is active\n- 44×56px touch target per tab\n- Content never hidden behind tab bar (pb-[calc(56px+env(safe-area-inset-bottom))] on pages)","domain":"app-shell","priority":1,"userGuide":"The tab bar at the bottom of the screen lets you switch between Sessions, Record, Clips, and Band settings with a single tap from anywhere in the app."},{"featureKey":"odio-2026-004","title":"App Shell — Navigation, Dark Theme, Onboarding, Empty States","status":"active","problem":"The app needs a solid foundation: a responsive web app that works on any device, navigates between recording/editing/collaboration screens fluidly, enforces auth correctly, handles first-time setup (create a band, link a Drive folder) with minimal friction, and never shows a blank screen.","decisions":[{"decision":"No PWA in V1 — standard responsive web app only","rationale":"PWA manifest + service worker caching adds complexity without a compelling V1 benefit. The app is used on a browser in the car or at home — bookmarking is sufficient.","date":"2026-04-10"},{"decision":"Dark-only, no light/dark toggle","rationale":"Primary use context is dim rehearsal rooms and cars at night. Background #0a0a0a, accent amber #f59e0b.","date":"2026-04-10"},{"decision":"Bottom tab bar navigation (not hierarchical-only)","rationale":"Record needs to be reachable from anywhere in one tap during a live jam. Tab bar hidden only on /edit (full-screen waveform editor).","date":"2026-04-10"},{"decision":"PageLayout back button uses Next.js <Link>, not <a href>","rationale":"Using <a href> for in-app navigation triggers a full page reload on every back tap — visible flash, loses scroll position, re-runs server components. <Link> performs a client-side transition via the Next.js router.","date":"2026-04-11"},{"decision":"Session page uses pb-[calc(56px+env(safe-area-inset-bottom))] not pb-safe","rationale":"pb-safe only accounts for the device's safe area inset (home indicator bar). The fixed 56px tab bar sits on top of that. Without adding 56px, the last clip card could be hidden behind the tab bar on short viewports.","date":"2026-04-11"},{"decision":"Hide 'Clips' tab when no sessionId context","rationale":"When the user is on the band home page or any page without a session context, the Clips tab linked to /bands/[bandId] — identical to the Sessions tab. Having two tabs going to the same URL is confusing and clutters the navigation.","date":"2026-04-11"},{"decision":"System fonts only — no custom font loading","rationale":"App is used in dark, low-bandwidth settings. Custom fonts add bundle size, FOUT risk, and load time for zero perceptible benefit.","date":"2026-04-10"}],"knownLimitations":["No add-to-home-screen in V1 — users must bookmark the app in their browser","Tab bar not animated — no transition effects between tabs"],"tags":["navigation","dark-theme","onboarding","mobile-first","next.js","empty-states","bottom-tab-bar"],"successCriteria":"- Dark theme renders correctly everywhere; no light mode; high contrast readable in dim rehearsal room or car\n- System fonts only — no web font loading\n- Bottom tab bar: Sessions / Record / Clips / Band — always visible except timeline editor\n- Clips tab hidden when outside a session context (avoids duplicate tab destinations)\n- Record tab hidden for MEMBER-role users\n- All interactive elements have touch targets >= 44px\n- Unauthenticated users land on / and see sign-in only\n- First-run: new user with no bands sees 'Create band' wizard immediately after sign-in\n- /share/[token] is public — no auth required, no private data exposed\n- Back navigation is client-side (no full reload)\n- Content never hidden behind tab bar (correct safe-area + 56px clearance)\n- Empty states guide users to the next action at every dead end","domain":"app-shell","priority":1,"userGuide":"After signing in, users land on their bands list. The bottom tab bar (Sessions / Record / Clips / Band) is always visible. Tap Record to go directly to the recording screen from anywhere. The Clips tab appears once you're inside a session — it shows the current session's clips. On first sign-in with no bands, the app redirects to a setup wizard to create the first band."},{"featureKey":"odio-2026-048","title":"PageLayout — Standard Page Wrapper with Back Button","status":"active","problem":"Every deep-navigation page (clip detail, band settings, editor, band creation) needs a standard header with a back button and page title, plus correct bottom padding to clear the fixed tab bar and device safe area. Without a shared PageLayout, every page reimplements this boilerplate differently.","decisions":[{"decision":"Back button uses Next.js Link, not <a href> or router.back()","rationale":"<a href> triggers full page reload. router.back() goes to the previous history entry which may not be the intended parent page. An explicit backHref with <Link> is predictable and SSR-compatible.","date":"2026-04-11"}],"knownLimitations":["pageTitle and backLabel are static — no dynamic updates after mount (e.g., updating the title as clip name is edited requires the caller to update props)"],"tags":["layout","navigation","back-button","page-wrapper","safe-area"],"successCriteria":"- Header renders with back button (chevron-left icon + back label) and page title\n- Back button navigates via Next.js Link (client-side, no reload)\n- Content scrollable, does not hide behind tab bar\n- pb-[calc(56px+env(safe-area-inset-bottom))] on content area\n- Optional right header slot rendered when provided\n- Compatible with AuthShell (does not add its own UploadBanner or BottomTabBar)","domain":"app-shell","priority":1,"userGuide":"Internal layout component. The back arrow at the top-left of each page uses this component to navigate back."},{"featureKey":"odio-2026-031","title":"AddNoteSheet — Inline Note Capture During Recording","status":"draft","problem":"During recording, a band member sometimes wants to capture a longer thought than a stamp allows — 're-record the bridge', 'drummer was off-tempo here', 'strong verse'. Stamps are single-emoji; notes allow free text. But the note input must not disrupt the recording or require navigating away.","decisions":[{"decision":"env(keyboard-inset-height) not a BottomSheet — custom positioning","rationale":"The shared BottomSheet component positions itself fixed at the bottom of the viewport. With a keyboard open, 'bottom of viewport' is behind the keyboard on many browsers. env(keyboard-inset-height) (part of the CSS Visual Viewport API, supported on iOS 15.4+, Chrome 110+) allows the sheet to sit above the keyboard exactly. This cannot be achieved with the generic BottomSheet component without adding keyboard-awareness to it.","date":"2026-04-15"}],"knownLimitations":["env(keyboard-inset-height) not supported on iOS < 15.4 or Chrome < 110 — sheet may appear partially behind keyboard on older browsers","120-char limit is a UX spec requirement — notes longer than 120 chars are not supported"],"tags":["recording","annotation","note","sheet","keyboard","ios"],"successCriteria":"- Sheet slides up from bottom and sits above keyboard (not hidden behind it)\n- Uses env(keyboard-inset-height) for keyboard-aware positioning on iOS and Android\n- Single-line input with placeholder 'What just happened?'\n- Character counter visible at 100+ chars, max 120\n- Save button calls onSave(text, currentTimestampMs), dismisses sheet\n- Cancel button dismisses, discards\n- Swipe-down gesture dismisses, discards\n- No haptic on save\n- Recording (MediaRecorder) continues without interruption during sheet interaction","domain":"recording","priority":2},{"featureKey":"odio-2026-018","title":"Audio Input Selection — External Mic, USB Interface, Headset","status":"frozen","problem":"The recording always uses the device's default microphone. Bands that record with an external condenser mic, USB audio interface, or headset mic plugged in cannot select it — the app always captures from the built-in mic. This limits recording quality for bands that bring audio gear.","decisions":[{"decision":"Picker only shown when multiple inputs exist","rationale":"For the majority of users (phone, built-in mic only), showing a device picker is unnecessary friction. Detecting whether to show the picker at all keeps the zero-overhead path intact for the common case.","date":"2026-04-10"}],"knownLimitations":["iOS Safari does not consistently enumerate Bluetooth audio inputs — users on iOS may not see all available inputs","enumerateDevices() requires microphone permission to return device labels; before permission is granted, labels are empty strings (can only show device index, not name)"],"tags":["recording","audio-input","external-mic","mediadevices","nice-to-have"],"successCriteria":"- Before starting a recording, app calls enumerateDevices() to list available audio inputs\n- If only one audio input is available: no picker shown, record starts immediately (current behavior)\n- If multiple inputs available: a bottom sheet shows the list with device names; user selects one\n- Selected device is passed to getUserMedia as deviceId constraint\n- Selected deviceId is saved to localStorage; pre-selected on next recording\n- If the saved device is no longer available (unplugged): fall back to default + show a brief 'Using built-in mic' toast\n- Level meter reflects the selected input device","domain":"recording","priority":4,"userGuide":"If you have an external microphone, USB audio interface, or headset plugged in when you open the recording screen, a small mic icon appears to the left of the record button. Tap it to choose your audio input from the list. Your selection is remembered for next time. If the chosen device is unplugged after selection, the app automatically falls back to the built-in mic and shows a brief notification."},{"featureKey":"odio-2026-029","title":"LiveWaveform — Real-Time Audio Level Meter During Recording","status":"active","problem":"The recorder needs immediate visual confirmation that their microphone is active and capturing audio. A static screen during recording creates anxiety — is it actually recording? Is the mic too quiet? Is anything happening?","decisions":[{"decision":"LiveWaveform receives analyserNode as a prop — does not own getUserMedia","rationale":"A single MediaStream and AudioContext must be shared between LiveWaveform (for visualization) and MediaRecorder (for recording). If LiveWaveform owned getUserMedia, there would be two mic permission requests and two separate streams. The parent recording page owns the stream and passes the analyserNode down.","date":"2026-04-15"}],"knownLimitations":["AudioContext is suspended on iOS until a user gesture — level meter may start at 0 even after mic permission is granted; parent must call audioContext.resume() on first user tap","Decay rate is hardcoded to 0.8x per frame — not configurable"],"tags":["recording","audio","level-meter","waveform","real-time","web-audio"],"successCriteria":"- Horizontal bar fills proportionally to microphone input level\n- Smooth animation — no jarring jumps, natural decay on silence\n- Updates at ~60fps\n- bar height: 8px, full width\n- Amber fill on dark background\n- Bar does not flicker to zero between frames on normal speech","domain":"recording","priority":2,"userGuide":"The amber bar at the top of the recording screen moves in response to sound. If it stays still while you're speaking, your microphone may not be working."},{"featureKey":"odio-2026-030","title":"StampHint — First-Use Tooltip for Stamp Buttons","status":"draft","problem":"The StampRow buttons show emoji only (🔥⭐❓💡) with no labels for maximum recording-screen clarity. First-time users don't know what each stamp means. A permanent label row would clutter the recording screen; a one-time hint achieves onboarding without ongoing noise.","decisions":[{"decision":"StampHint is a separate component from StampRow","rationale":"StampRow is a pure interaction component — it should not contain any onboarding logic. StampHint is the onboarding layer. Separating them keeps StampRow clean and allows StampHint to be removed or replaced independently.","date":"2026-04-15"}],"knownLimitations":["localStorage is per-browser — hint will show again if user switches to a different browser or device","hint timing is hardcoded to 5s — not configurable"],"tags":["onboarding","hint","tooltip","stamps","first-use","localstorage"],"successCriteria":"- Shown on first visit to Recording Screen only (localStorage flag absent)\n- Label row appears beneath stamp buttons with correct emoji-label pairs\n- Auto-dismisses after 5s\n- Dismisses immediately on first stamp tap\n- Sets localStorage flag on dismiss — never shown again on subsequent visits\n- Does not shift record button position (absolute positioning, not in normal flow)\n- Fade-out animation on dismiss","domain":"recording","priority":3},{"featureKey":"odio-2026-028","title":"StampRow — One-Tap Timestamp Annotation During Recording","status":"active","problem":"During a live recording, a band member wants to mark interesting moments (a great riff, an uncertain section, an idea) without interrupting the take. Any UI with confirmation dialogs or text input is too slow and disruptive mid-jam.","decisions":[{"decision":"onPointerDown instead of onClick for minimum latency","rationale":"onClick fires after both pointerdown + pointerup (adds ~100-150ms vs pointerdown). For a live musical timestamp, 100ms earlier capture is meaningful — the beat has moved on. StampType annotation is written on pointerdown.","date":"2026-04-15"},{"decision":"Stamps flushed to Postgres on recording stop, not per-stamp","rationale":"One Postgres write per stamp during recording creates N roundtrips mid-take, each competing with the audio recording thread. Batch write on stop: one POST /api/clips/[clipId]/stamps with all stamps collected during the session.","date":"2026-04-15"}],"knownLimitations":["navigator.vibrate() not supported on iOS — no haptic on Apple devices","Stamp timestamps are relative to recording start (elapsedMs) — if recording is paused (e.g., wake lock interruption), timestamps after the pause will be offset"],"tags":["stamps","annotation","recording","haptic","touch","one-tap"],"successCriteria":"- Four stamp buttons rendered in equal horizontal distribution\n- Each button: minimum 72×72px touch target\n- Tap triggers light haptic (navigator.vibrate(50) where supported) + brief scale animation (0.95 → 1.0, 100ms)\n- Stamp saved with correct currentTimestampMs at moment of tap (not on release)\n- No confirmation step\n- First-use hint labels shown by StampHint (separate component) — StampRow itself has no hint logic","domain":"recording","priority":1,"userGuide":"Tap any of the four icons while recording to mark that moment — 🔥 for something hot, ⭐ to flag a keeper, ❓ for uncertainty, 💡 for an idea. Your marks appear as colored dots on the waveform later."},{"featureKey":"odio-2026-032","title":"WakeLockWarning — Screen-Lock Risk Banner Before Recording","status":"draft","problem":"iOS below 16.4 and any browser where Wake Lock API is denied will allow the screen to lock during recording. When the screen locks, iOS stops MediaRecorder — the recording silently ends. The user doesn't know until they look at their phone and find a partial clip. This warning must appear BEFORE recording starts, not mid-session.","decisions":[{"decision":"Warning appears before first tap, not on Wake Lock acquisition failure","rationale":"Wake Lock can only be acquired after recording starts (or after a user gesture). Waiting until acquisition to show a warning means the user may already be mid-take when they learn their screen can lock. Showing the banner on mount (before any tap) gives them time to read and prepare.","date":"2026-04-15"}],"knownLimitations":["Wake Lock availability check (`'wakeLock' in navigator`) does not guarantee successful acquisition — even supported browsers may deny Wake Lock in low-power mode","No re-show after dismiss: if user dismisses and then the screen locks, they may be confused"],"tags":["recording","wake-lock","ios","warning","resilience","banner"],"successCriteria":"- On mount: check 'wakeLock' in navigator\n- If unsupported: banner renders above record button before first recording tap\n- Banner: amber bg, dismiss × button, warning text\n- Banner does not block record button tap — it's above, not overlapping\n- On dismiss: banner hides for this session\n- During recording: visibilitychange listener active. On page hidden: emit onInterrupt()\n- onInterrupt() handled by recording page (shows post-record screen with partial clip)","domain":"recording","priority":2},{"featureKey":"odio-2026-007","title":"Session Management — Sessions, Clips, Naming, Stages","status":"active","problem":"A jam night produces 3-8 clips. Band members need to find, name, and navigate them easily. The recorder needs to delete mistakes. After many sessions, the band needs to track which songs are developed vs. still just ideas.","decisions":[{"decision":"Death metal auto-names instead of 'Song N - time'","rationale":"Sequential names ('Song 1', 'Song 2') are useless for identifying a specific take days later. Time-based names are hard to remember. Short evocative word pairs from a curated death metal vocabulary (adjectives: Putrid, Severed, Ancient; nouns: Descent, Throne, Ritual) are memorable, distinguishable, and set the right tone for a band app.","date":"2026-04-11"},{"decision":"'···' overflow button replaces long-press for clip delete","rationale":"Long-press is a non-discoverable interaction pattern — users have no visual affordance to find it. Accidental long-press on a clip name (when trying to rename) could trigger a delete sheet unexpectedly. A visible '···' button is a universal mobile pattern and makes the delete action findable without instruction.","date":"2026-04-11"},{"decision":"Sessions and clips in Postgres, audio files in Drive","rationale":"Postgres is readable by all band members without Drive folder sharing. Session/clip browsing works immediately for new members.","date":"2026-04-10"},{"decision":"Song stage is separate from frozen status","rationale":"'Frozen' means this recording is done. Stage tracks the song's creative progress, not the file state.","date":"2026-04-10"}],"knownLimitations":["Death metal names are random — two clips in a session could get the same name (rare, detectable, user can rename)","Drive storage is under the recorder's account — ~43MB per 30-min clip, 15GB Drive free tier supports ~350 raw clips before cleanup needed","Clip delete requires two steps: Postgres record deletion + Drive file deletion — if one fails, manual reconciliation may be needed"],"tags":["sessions","clips","crud","naming","song-stage","postgres","death-metal-names"],"successCriteria":"- Session auto-created on first record of the night\n- Session name is editable inline by any member\n- Clip auto-named with a memorable death metal name (adjective + noun, e.g. 'Putrid Descent')\n- Any band member can rename a clip by tapping the clip name\n- Shuffle button next to clip name generates a new death metal name and saves immediately (only on non-frozen clips)\n- ClipCard shows animated spinner while transcodeStatus is PENDING\n- Delete clip via '···' button → confirmation sheet → delete (RECORDER only)\n- Clip list shows: name, raw duration, version count, frozen lock, stage chip, processing spinner\n- Stage chip shows on non-frozen clips: colored pill (idea=gray, sketch=blue, developing=amber, demo-ready=green)\n- Session has optional notes field (notes icon → bottom sheet editor)\n- Clip has song stage field: idea / sketch / developing / demo-ready (default: idea)\n- Last clip is never hidden behind the bottom tab bar\n- Storage indicator shows Drive quota used by this band's audio files","domain":"sessions","priority":1,"userGuide":"Sessions appear in the band's session list sorted by date. Tap a session to see its clips. Tap the session name to rename it. Tap the notes icon to add session notes. Tap the QR icon to show a QR code bandmates can scan to join. Each clip card shows its auto-generated name, duration, version count, stage, and current status. Tap the clip name to rename it inline. Tap the shuffle icon next to the name to roll a new death metal name — saves automatically. Tap the stage chip (idea / sketch / developing / demo-ready) to see the song's creative state; change it from the clip detail. Tap anywhere else on the card to open the clip detail. Tap '···' on a clip to delete it (Recorder-only — requires confirmation)."},{"featureKey":"odio-2026-054","title":"SessionHeaderClient — Session Page Title with Inline Name Edit","status":"active","problem":"The session clip list needs a page title that shows the session name and allows inline rename (tap to edit). The rename must PATCH to Postgres immediately — no separate save button.","decisions":[],"knownLimitations":[],"tags":["session","header","inline-edit","rename","navigation"],"successCriteria":"- Session name rendered as tappable InlineEdit (max 40ch)\n- Tap → keyboard opens, inline input\n- Save (Return) → PATCH /api/sessions/[sessionId] { name }, page title updates immediately\n- Cancel (blur/Escape) → reverts to original name\n- Header right slot: '+ New Clip' for Recorder/Editor, absent for Member","domain":"sessions","priority":2,"userGuide":"Tap the session name at the top of a session to rename it. Changes are saved automatically when you press Return."},{"featureKey":"odio-2026-053","title":"SessionNotesSheet — Session-Level Notes Editor","status":"active","problem":"A band may want to capture session-level context — 'rehearsal at Marco's place, trying the new bridge section' — that doesn't belong on any individual clip. Session notes give the band a shared scratchpad for each jam night.","decisions":[],"knownLimitations":["Notes field is not collaborative — last save wins (no conflict resolution for simultaneous edits)"],"tags":["session","notes","bottom-sheet","metadata","text-input"],"successCriteria":"- BottomSheet opens with current session notes pre-filled in textarea\n- Multi-line textarea, vertical resize, min-height 4 lines\n- Save: PATCH to Postgres, sheet dismisses, session card preview updates\n- Cancel: discards changes, sheet dismisses\n- Empty notes: allowed (blanks the notes field)\n- Loading state on Save button while PATCH in-flight","domain":"sessions","priority":3,"userGuide":"Tap the notes icon on a session to add shared notes for the whole band — 'great energy on song 3', 'fix the chorus next time'. Notes are visible to everyone in the band."},{"featureKey":"odio-2026-015","title":"Public Share Player — Unauthenticated Clip Playback","status":"active","problem":"A frozen clip should be shareable outside the band — with a producer, a friend, or social media. The listener should not need a Google account or any signup. Only the frozen render is exposed; no session metadata, band data, or version history leaks through the public page.","decisions":[{"decision":"Audio served via server-side proxy even on public pages","rationale":"Even with Drive public permission enabled on the final file, the Drive URL format includes the file ID which reveals internal structure. Proxying via /api/audio/public/[token] keeps the only public identifier as the opaque token, allows revocation (clear token → proxy returns 404), and avoids exposing file IDs in the page source.","date":"2026-04-10"},{"decision":"No version history, no collaboration data on the public page","rationale":"The public page is for external listeners — producers, fans, collaborators outside the band. Exposing version numbers, vote tallies, or comments reveals internal band workflow details. The public page is intentionally minimal: name, waveform, stamps, download.","date":"2026-04-10"}],"knownLimitations":["Public audio proxy uses the recorder's Drive token — if the recorder revokes access, public links break even for frozen clips","No view analytics — there's no way to know how many people have listened to a shared clip","PublicPlayer renders the waveform but the overlay div is not present — users cannot seek by clicking on the waveform (play/pause only). Seeking via stamps is available."],"tags":["public-share","wavesurfer","unauthenticated","frozen","stamps","download"],"successCriteria":"- /share/[token] loads without authentication\n- Waveform renders and plays the frozen render audio\n- Stamp chips displayed with correct emoji and timestamp\n- Play/pause 64px button — large touch target\n- Download button downloads the .aac file\n- Page shows clip name and duration\n- Error state shown if token is invalid or clip has been un-shared\n- Audio not exposed if publicToken is null or clip is not frozen","domain":"render","priority":3,"userGuide":"After freezing a clip, tap 'Enable public share' on the clip detail page to generate a /share/[token] link. Share this URL with anyone — they can open it in any browser without signing in. They'll see the clip name, a waveform player, and stamp markers. They can play, seek, and download the audio. To revoke access, tap 'Enable public share' again to disable — the link immediately stops working."},{"featureKey":"odio-2026-027","title":"AudioBars — Animated Audio Level Indicator","status":"frozen","problem":"During recording, the user needs visual confirmation that the microphone is picking up sound. Without a level indicator, they cannot tell if the mic is connected, if it's recording silence, or if audio is clipping.","decisions":[{"decision":"AudioBars is purely presentational — receives level as a prop","rationale":"Audio level computation (Web Audio API AnalyserNode, getByteFrequencyData) belongs in a hook, not a UI component. The component stays pure and reusable; the hook handles the browser API.","date":"2026-04-15"}],"knownLimitations":["Level computation is frequency-averaged — clipping (levels > 1.0 from Web Audio) is clamped to 1.0 without a visual warning","Bar count is fixed at construction — responsive reflow not supported"],"tags":["audio","level-meter","animation","recording","ui-primitive"],"successCriteria":"- Bars animate responsively to audio level input\n- Silent input: bars at minimum height (not zero — they should breathe slightly)\n- Loud input: bars reach near-maximum height\n- Smooth animation (requestAnimationFrame update from parent, no internal interval)\n- Amber color when active, text-muted when silent\n- Accessible: aria-hidden (purely decorative, level confirmed by text elsewhere)","domain":"recording","priority":2,"userGuide":"The animated bars on the recording screen show that your microphone is working. If they don't move when you speak, check your mic permissions."},{"featureKey":"odio-2026-025","title":"Badge — Count and Status Label Pill","status":"frozen","problem":"Clip cards need to display version count, frozen status, and activity state as compact labels without consuming layout space. A shared badge component prevents inconsistent pill styling across the app.","decisions":[{"decision":"Badge is purely presentational — no click handling","rationale":"Interactive badges (e.g., stage chip that opens a picker) are handled by the caller wrapping Badge in a <button>. Badge itself never manages interaction state.","date":"2026-04-15"}],"knownLimitations":[],"tags":["badge","pill","label","ui-primitive"],"successCriteria":"- Renders as a rounded pill at text-xs\n- All four variants render with correct color scheme\n- Does not break layout when text is long (clips at max-w)","domain":"app-shell","priority":3,"userGuide":"Small labels on clip cards show version count, frozen status, and processing state."},{"featureKey":"odio-2026-021","title":"BottomSheet — Slide-Up Modal for Confirmations and Input","status":"frozen","problem":"Destructive and important actions (freeze, delete, unfreeze, leave band, stage change) need a deliberate user confirmation step. Inline buttons can be accidentally tapped; a slide-up sheet forces a conscious second action and provides space for consequence copy.","decisions":[{"decision":"All actions that mutate data open a BottomSheet for confirmation","rationale":"Irreversible operations (freeze, delete, cleanup, unfreeze) need a deliberate second step. Bottom sheets allow showing contextual consequences (e.g., 'What gets deleted / What stays') that inline buttons cannot accommodate.","date":"2026-04-10"}],"knownLimitations":["Nested sheets are not supported — opening a sheet from within another sheet will break focus trap","Swipe-down gesture uses touch events only — no mouse drag to dismiss on desktop"],"tags":["bottom-sheet","modal","confirmation","sheet","ui-primitive","accessibility"],"successCriteria":"- Sheet slides up from bottom on open, slides down on close\n- Backdrop tap dismisses sheet\n- Body scroll locked while sheet is open\n- Focus trapped inside sheet (Tab cycles within sheet children)\n- Cancel button always present at bottom of sheet content\n- Swipe-down gesture dismisses\n- z-index above all page content and tab bar","domain":"app-shell","priority":1,"userGuide":"Bottom sheets appear as a slide-up panel when you tap a destructive or important action. Tap outside the sheet or swipe it down to cancel. Tap Cancel inside the sheet to close without taking action."},{"featureKey":"odio-2026-022","title":"Button — Shared Interactive Button Component","status":"frozen","problem":"The app needs consistent interactive button styling across all screens with reliable touch targets (≥44px), accessible focus states, loading states, and semantic variants (primary, danger, ghost) that don't need to be reimplemented per screen.","decisions":[{"decision":"ButtonLink uses Next.js Link, not <a href>","rationale":"Using <a href> for in-app navigation triggers full page reload. Next.js Link performs a client-side transition.","date":"2026-04-11"}],"knownLimitations":["Loading spinner color is fixed (white on primary/danger, text-secondary on ghost) — not customizable per call"],"tags":["button","ui-primitive","accessibility","interaction"],"successCriteria":"- All buttons ≥ 44px tall\n- Primary variant: amber bg (#f59e0b), dark text\n- Danger variant: danger red bg, white text\n- Ghost variant: transparent, text-secondary\n- disabled prop: opacity-60, pointer-events-none, aria-disabled\n- loading prop: spinner replaces label, button remains disabled\n- Full-width option via `fullWidth` prop\n- ButtonLink renders a Next.js Link with same styling","domain":"app-shell","priority":1,"userGuide":"Buttons throughout the app use a consistent amber (primary), red (danger), or subtle (ghost) style. All buttons are large enough to tap comfortably on mobile."},{"featureKey":"odio-2026-023","title":"EmptyState — Zero-Content Placeholder with Action","status":"active","problem":"Several screens (Session List, Clip List, Band Members) can be empty on first visit or after deletes. A blank screen gives no guidance on what to do next — users need a visual cue that emptiness is intentional plus a clear next action.","decisions":[{"decision":"Role-based CTA filtering is the caller's responsibility, not EmptyState's","rationale":"EmptyState is a generic UI primitive — it should not know about band roles. The caller (Session List page) passes actionLabel only when the current user is allowed to take that action. EmptyState renders whatever it receives.","date":"2026-04-15"}],"knownLimitations":["Only supports a single CTA — multi-action empty states (e.g., 'Create band' or 'Join band') must be handled with custom layouts"],"tags":["empty-state","onboarding","zero-state","ui-primitive","accessibility"],"successCriteria":"- Renders in center of available space (flex col, items-center, justify-center, min-h set by caller)\n- Icon: lucide icon name passed as prop, rendered at 48px, text-muted color\n- Heading: text-xl text-primary font-semibold\n- Subtext: text-sm text-secondary mt-2\n- CTA button: amber primary variant, shown only when actionLabel prop is provided\n- Role-conditional CTA: Record button hidden for MEMBER-role users on Session List empty state (caller handles role check before passing actionLabel prop)","domain":"app-shell","priority":2,"userGuide":"When a list has no items, a helpful message appears explaining the empty state and offering the next action to take."},{"featureKey":"odio-2026-024","title":"InlineEdit — Tap-to-Edit Text Field","status":"active","problem":"Session names, clip names, and band name are all editable. Adding a separate 'Edit' icon/button next to each name clutters the UI, especially on small-screen cards. The standard pattern in mobile UIs is tap-the-text-to-edit.","decisions":[{"decision":"Tap away (blur) discards rather than saves","rationale":"On mobile, the keyboard dismiss gesture triggers a blur event. If blur = save, accidentally dismissing the keyboard would commit an incomplete name. Explicit Return/Done is the save gesture — blur is always a cancel.","date":"2026-04-15"}],"knownLimitations":["No multi-line support — clip names limited to single line","On iOS, tapping away on certain screen areas may not reliably fire blur — user must tap Return to save"],"tags":["inline-edit","rename","input","ui-primitive","accessibility"],"successCriteria":"- Tap name text → input appears with same styling, keyboard opens\n- Return/Done → calls onSave(value), transitions back to text mode\n- Tap away (blur) → discards, reverts to original value\n- Escape → discards, reverts to original value\n- Empty string not saveable — reverts to previous on submit\n- maxLength enforced (no characters beyond limit accepted)\n- Loading state while onSave is in-flight (input disabled, subtle spinner)\n- Error state if onSave throws (brief inline error text, reverts to text mode after 2s)","domain":"app-shell","priority":2,"userGuide":"Tap any session name, clip name, or band name to rename it directly. Type the new name and press Done or Return to save. Tap anywhere else to cancel without saving."},{"featureKey":"odio-2026-020","title":"OfflineBanner — No-Connection State Degradation","status":"draft","problem":"When a user loses their network connection mid-session, the app currently fails silently — vote buttons appear interactive but fail on submit, session lists appear to work but show stale data with no indication. This creates confusion and distrust.","decisions":[{"decision":"Recording screen is exempt from OfflineBanner","rationale":"MediaRecorder is fully local — recording works without a connection. Showing an offline banner on the recording screen would alarm the user mid-take when there's nothing actually wrong with their workflow. Upload queuing (UploadBanner + IndexedDB) handles the connectivity issue for uploads.","date":"2026-04-15"},{"decision":"Disable mutations, not navigation, while offline","rationale":"Full app lockdown while offline (preventing navigation) is hostile — the user may be browsing session history or reviewing versions while waiting to reconnect. Only block writes; reads from cached state remain available.","date":"2026-04-15"}],"knownLimitations":["navigator.onLine is unreliable in some environments (can report online while behind a captive portal) — OfflineBanner is best-effort","Queued mutations are not persisted — if the user navigates away and back while offline, pending votes/comments are lost"],"tags":["offline","network","resilience","banner","degradation","ui-primitive"],"successCriteria":"- OfflineBanner hidden when navigator.onLine is true\n- OfflineBanner appears within 1s of connection loss\n- Vote buttons disabled while offline (aria-disabled, tooltip 'You're offline')\n- Comment submit disabled while offline\n- Stage chip tap blocked while offline\n- Submit version button disabled while offline\n- Play audio, read sessions/clips/versions, browse comments: unaffected by offline state\n- Recording screen: no OfflineBanner; upload queue handles separately\n- On reconnect: banner shows 'Back online' for 2s then dismisses\n- Banner does not shift page layout (fixed positioning, content has top padding = banner height)","domain":"app-shell","priority":2},{"featureKey":"odio-2026-026","title":"Skeleton — Loading Placeholder Shimmer","status":"frozen","problem":"Pages that fetch data from Postgres (session list, clip list, waveform) need to show a loading state that communicates structure before content arrives. A blank screen or spinner gives no sense of what's coming.","decisions":[],"knownLimitations":["Caller is responsible for matching Skeleton dimensions to actual content — no auto-sizing"],"tags":["skeleton","loading","shimmer","ui-primitive","performance"],"successCriteria":"- Renders as a grey animated shimmer div\n- animate-pulse (Tailwind) runs on mount\n- Accepts width/height/className props for flexible sizing\n- Does not shift layout when swapped for real content (caller must match dimensions)","domain":"app-shell","priority":3,"userGuide":"Grey shimmer placeholders appear while content is loading."},{"featureKey":"odio-2026-019","title":"Toast — Global Feedback Notification System","status":"draft","problem":"Multiple screens need to surface transient feedback (upload done, vote saved, copy confirmed, offline detected) without navigating away or blocking the UI. Currently each screen implements its own ad-hoc feedback UI, creating inconsistent timing, placement, and styling.","decisions":[{"decision":"No action buttons in toasts","rationale":"Toasts are purely informational — they confirm that something happened or failed. Actions (Retry, Undo, Confirm) require deliberate user intent and should live in bottom sheets where they have more visual weight and cannot be accidentally tapped during auto-dismiss.","date":"2026-04-15"},{"decision":"FIFO queue, max 1 visible","rationale":"Stacking toasts creates visual clutter and competes with the tab bar. A queue ensures all toasts are seen without overlapping. FIFO is natural — the first error fired is the most contextually relevant.","date":"2026-04-15"}],"knownLimitations":["No persistence — toasts are lost on page reload","Cannot be triggered from server components — only from client components via showToast()"],"tags":["toast","feedback","notification","queue","ui-primitive","accessibility"],"successCriteria":"- Toast appears at bottom of viewport, 16px above tab bar, on any showToast() call from any screen\n- Only one toast visible at a time; second toast queues and appears after first dismisses\n- info/success dismiss after 3s; error dismisses after 5s\n- × dismiss button always present and functional (32px min tap target)\n- Three visual types render correctly with correct border accent\n- Text wraps up to 2 lines — does not truncate\n- No action buttons in toasts — any action triggers a bottom sheet instead\n- Toast does not overlap tab bar or bottom safe area\n- Works on all screens including those where tab bar is hidden (recording, editor)","domain":"app-shell","priority":1},{"featureKey":"odio-2026-006","title":"Recording — Browser-Based Audio Capture","status":"frozen","problem":"The recorder needs to capture multiple songs during a live jam — from a phone browser, one hand, dim room. Between songs the transition to the next recording must be instant. Moments worth keeping must be stampable without interrupting the performance.","decisions":[{"decision":"Resumable Drive upload from browser (bypasses Vercel body limit)","rationale":"Vercel serverless functions have a 4.5MB request body limit. A 30-min recording at 192kbps ~43MB. Sending audio through Vercel would fail. Resumable uploads: server generates a Drive upload session URL, browser POSTs audio blob directly to Drive. Audio never passes through Vercel.","date":"2026-04-10"},{"decision":"Transcode to AAC immediately on upload","rationale":"MediaRecorder outputs WebM/Opus on Chrome and AAC/MP4 on Safari. WebM does not play in Safari. Transcoding immediately on upload ensures one consistent format (AAC) for all playback, editing, and final render — regardless of which browser the recorder used.","date":"2026-04-10"},{"decision":"Any Editor-role member can record — not just the band creator","rationale":"The upload flow already uses the creator's stored refresh_token on the server to generate the Drive resumable upload session URL. The member's browser uploads directly to the creator's Drive. This means multi-recorder support is not an architectural change — it's a role-permission change. Any Editor can initiate a recording and audio lands in the same Drive folder. Reduces the single-point-of-failure where only one person can capture audio on jam night.","date":"2026-04-10"},{"decision":"Two notation types: stamps (typed, no text) and annotations (text notes) — both timestamped","rationale":"Stamps are one-tap typed markers — fire/keep/uncertain/idea — zero friction during playing. Annotations are short text notes for when you want to say something specific. Both appear as pins on the waveform. Keeping them separate preserves the zero-friction stamp UX while allowing richer notes when needed. They serve similar purposes at different levels of effort.","date":"2026-04-10"}],"knownLimitations":["iOS Safari stops MediaRecorder if the screen locks or the user switches tabs — Wake Lock API (iOS 16.4+) mitigates accidental sleep; tab switching is user responsibility","If the browser tab is closed before the blob is written to IndexedDB (i.e., during the first few seconds after stop), the audio may be lost — mitigated by writing to IndexedDB immediately on stop before any upload attempt (see feat-recording-resilience)","Resumable upload requires two API round-trips before recording is saved — adds ~2-4s to the stop flow","Any Editor-role member can initiate a recording, but all audio lands in the band creator's Drive — members upload directly to the creator's Drive using the server-generated resumable upload session URL (which uses the creator's stored token)"],"tags":["recording","mediarecorder","audio","wake-lock","stamps","ios","google-drive"],"successCriteria":"- Record button triggers microphone permission request on first use\n- Level meter visible and responsive during recording (horizontal amber bar, 8px tall, full-width)\n- Recording screen is full-screen (tab bar hidden); minimal chrome: timer, level meter, stamps, 'Add note', record/stop button only\n- Stamp buttons (fire/keep/uncertain/idea) always visible; one tap stamps current timestamp; haptic feedback on mobile; 72x72px touch targets\n- Quick text note button: 'Add note' text link → 1-line bottom sheet, submit adds annotation\n- Recording screen usable one-handed in portrait orientation\n- Stop → upload begins immediately; 'Next Song' button available without waiting for upload\n- Post-record screen shows: clip name (editable inline), duration, stamp count, upload progress\n- 'Next Song' opens new recording screen; previous clip uploads in background\n- 'Delete recording' option on post-record screen with confirmation sheet: 'Delete this recording? This cannot be undone.'\n- During upload: persistent top banner 'Uploading Song N… 47%' with amber progress bar visible on any screen\n- Banner dismisses only after upload + transcode confirmed complete\n- Wake Lock active during recording (screen stays on)\n- iOS warning shown if Wake Lock is unavailable\n- Clip appears in session as 'Processing…' until transcode done, then becomes fully interactive\n- All clips play back correctly in Chrome and Safari (AAC source)\n- Any Editor-role band member can initiate a recording (not just band creator/recorder)","domain":"recording","priority":1,"userGuide":"Tap the Record tab from anywhere. On the recording screen, tap the large circle button to start. The timer runs; the level meter shows audio input. Tap stamp buttons (fire/keep/uncertain/idea) any time to mark notable moments. Tap 'Add note' to type a quick text annotation. Tap the square stop button to finish. After stopping, name the clip on the post-record screen, tap 'Next Song' to immediately start another recording while the previous one uploads in the background, or navigate away."},{"featureKey":"odio-2026-009","title":"Recording Resilience — IndexedDB Safety Net, Upload Retry, Save-to-Device Fallback","status":"frozen","problem":"A recording is a one-time, irreplaceable event. Currently, if the internet drops during upload or the band creator's Drive token is invalid, the audio blob — which only exists in memory — is permanently lost when the user navigates away or the tab closes. A live jam session cannot be re-played. The recording must survive any upload failure and remain recoverable until it reaches Drive.","decisions":[{"decision":"IndexedDB as the primary persistence layer for unuploaded audio blobs","rationale":"localStorage cannot store binary blobs. The File System Access API requires explicit user permission. IndexedDB is the only browser-native store that (a) handles large binary data, (b) persists across sessions without user action, and (c) is available in all browsers including iOS Safari 10.3+. A 43MB blob fits easily — IndexedDB storage limits are typically 50-80% of available disk space.","date":"2026-04-10"},{"decision":"Resumable upload — save session URL to IndexedDB for byte-accurate retry","rationale":"A naive retry re-uploads the entire blob from byte 0. For a 43MB file on a slow mobile connection, this could fail again at the same spot. Google Drive resumable uploads let you query the committed offset and resume from there. Storing the uploadSessionUrl in IndexedDB alongside the blob enables true resume, not restart.","date":"2026-04-10"},{"decision":"'Save to device' as the last-resort fallback — never lose the audio","rationale":"If Drive is permanently unavailable (creator deleted their account, Drive quota exceeded, token irrecoverable), the band should still get their recording. A browser download gives them the raw file. They lose the Odio versioning workflow but not the audio. The guarantee is: if you recorded it, you can get the file.","date":"2026-04-10"},{"decision":"Check IndexedDB for pending recordings on every app mount","rationale":"Background Sync is not reliable on iOS Safari. The safest recovery path is: when the app is opened, check for stranded blobs and surface them immediately. This catches the crash-during-upload, tab-closed-early, and came-back-later scenarios without relying on service worker scheduling.","date":"2026-04-10"}],"knownLimitations":["IndexedDB is cleared when the user clears browser storage ('Clear site data') — the blob would be lost; this is unavoidable without server-side buffering and is an edge case the user controls","Background Sync (automatic retry when tab is closed and connection restored) is not available on iOS Safari — recovery on iOS requires opening the app manually","Drive resumable upload session URLs expire after 7 days — a blob stranded for > 7 days will need a fresh upload session, not a resume; the implementation must detect this (404 on session URL) and fall back to a new session","Storage pressure on low-end devices: a 43MB blob may trigger the browser's storage eviction policy on devices with < 1GB free — 'Save to device' should be surfaced proactively for large recordings","PostRecordScreen.doUpload() is a standalone async function that writes to IndexedDB directly without going through the Zustand store's action methods — fixed by calling usePendingUploadsStore.getState().refresh() on every status-changing path so the in-memory store stays in sync with IndexedDB and the banner dismisses immediately"],"tags":["recording","indexeddb","resilience","offline","retry","upload","fallback"],"successCriteria":"- Audio blob written to IndexedDB immediately on recording stop, before upload begins\n- IndexedDB entry keyed by tempId; stores blob + recordedAt + durationMs + bandId + sessionId + uploadSessionUrl (if partially started)\n- If upload succeeds: IndexedDB entry cleared; no other change\n- If network drops during upload: banner shows 'Upload paused — waiting for connection'; auto-retries on window 'online' event; resumable upload continues from last committed byte\n- If creator's Drive token is invalid: banner shows 'Drive connection needs renewal — ask [creator name] to re-authorize'; IndexedDB blob retained; retry button enabled once token is refreshed\n- If recording member's own session token expires mid-upload: client silently calls getSession() to refresh; if refresh succeeds, upload resumes automatically; if refresh fails, banner shows 'Session expired — sign in again to resume'; after re-sign-in, IndexedDB blob is still present and recovery banner activates\n- On app reopen: check IndexedDB for pending recordings on mount; if found, show recovery banner: 'You have [N] recording(s) waiting to upload'\n- Recovery banner persists until all pending recordings are uploaded or manually discarded\n- 'Save to device' fallback button available on any failed upload: triggers browser download of blob (.webm or .aac depending on browser)\n- User can discard a pending recording from the recovery UI (with confirmation: 'Discard this recording? It cannot be recovered.')\n- 'Pending uploads' count visible in the Record tab (badge) and on the session screen\n- Successful retry creates the clip in Postgres and Drive exactly as a normal upload would","domain":"recording","priority":2,"userGuide":"Recording resilience is automatic and invisible when things work. If an upload fails (network drops, Drive token expires), a banner appears at the top of the screen: 'You have [N] recording(s) waiting to upload'. Tap 'Retry' to resume when reconnected. Tap 'Save to device' to download the raw audio file to your phone or computer if Drive is permanently unavailable. Tap 'Discard' (with confirmation) to remove a pending recording from recovery. When the app reopens after a crash, pending recordings are detected automatically."}];

// ── Helpers ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function md(text) {
  if (!text) return '';
  const lines = esc(text).split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.match(/^[-*] /)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + inline(t.slice(2)) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n').split(/\n{2,}/).map(block => {
    const b = block.trim();
    if (!b) return '';
    if (b.startsWith('<ul>') || b.startsWith('<li>')) return b;
    return '<p>' + inline(b.replace(/\n/g, '<br>')) + '</p>';
  }).filter(Boolean).join('\n');
}

function inline(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

function completeness(f) {
  const checks = [
    !!f.analysis, !!f.implementation,
    !!(f.decisions && f.decisions.length),
    !!f.successCriteria,
    !!(f.knownLimitations && f.knownLimitations.length),
    !!(f.tags && f.tags.length),
    !!f.domain,
  ];
  return Math.round(checks.filter(Boolean).length / checks.length * 100);
}

function statusColor(s) {
  return { active: '#4aad72', draft: '#c4a255', frozen: '#5b82cc', deprecated: '#cc5b5b' }[s] || '#c4a255';
}

// ── Tree building ────────────────────────────────────────────────────────────

const VIEW = 'shipped';
const byKey = new Map(FEATURES.map(f => [f.featureKey, f]));

function getChildren(key) {
  return FEATURES.filter(f => f.lineage && f.lineage.parent === key);
}

function isRoot(f) {
  const p = f.lineage && f.lineage.parent;
  return !p || !byKey.has(p);
}

/** Flatten feature + its descendants with depth info */
function flatten(f, depth) {
  const result = [{ feature: f, depth }];
  for (const child of getChildren(f.featureKey)) {
    result.push(...flatten(child, depth + 1));
  }
  return result;
}

// Group root features by domain
function buildGroups(features) {
  const roots = features.filter(isRoot);
  const groups = new Map();

  for (const f of roots) {
    const domain = f.domain || '(no domain)';
    if (!groups.has(domain)) groups.set(domain, []);
    groups.get(domain).push(...flatten(f, 0));
  }
  return groups;
}

// ── Nav rendering ────────────────────────────────────────────────────────────

let activeKey = null;
let sortMode = 'domain';
const collapsedDomains = new Set();

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sort-domain').classList.toggle('active', mode === 'domain');
  document.getElementById('sort-build').classList.toggle('active', mode === 'build-order');
  renderNav(document.getElementById('filter-input').value);
}

function renderNavItem(f, depth) {
  const isChild = depth > 0;
  const hasChildren = getChildren(f.featureKey).length > 0;
  return `<div class="nav-item${f.featureKey === activeKey ? ' active' : ''}"
    data-key="${esc(f.featureKey)}"
    data-status="${esc(f.status)}"
    data-depth="${depth}"
    onclick="navigate('${esc(f.featureKey)}')">
    ${isChild ? '<span class="nav-child-arrow">↳</span>' : '<span class="nav-dot"></span>'}
    ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
    <span class="nav-item-title">${esc(f.title)}</span>
    ${hasChildren ? '<span class="nav-child-arrow" style="margin-left:auto;opacity:0.4">⊕</span>' : ''}
  </div>`;
}

function renderNav(filterText) {
  const nav = document.getElementById('nav-tree');
  const q = (filterText || '').toLowerCase().trim();

  const matchFn = f =>
    f.featureKey.toLowerCase().includes(q) ||
    f.title.toLowerCase().includes(q) ||
    (f.domain && f.domain.toLowerCase().includes(q)) ||
    (f.tags && f.tags.some(t => t.toLowerCase().includes(q)));

  const features = q ? FEATURES.filter(matchFn) : FEATURES;

  if (features.length === 0) {
    nav.innerHTML = '<div class="no-results">No features match</div>';
    return;
  }

  // ── Build Order: flat list sorted by featureKey ───────────────────────────
  if (sortMode === 'build-order' && !q) {
    const sorted = [...FEATURES].sort((a, b) => a.featureKey.localeCompare(b.featureKey));
    nav.innerHTML = sorted.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Search results: flat list ─────────────────────────────────────────────
  if (q) {
    nav.innerHTML = features.map(f => renderNavItem(f, 0)).join('');
    return;
  }

  // ── Domain grouping (default) ─────────────────────────────────────────────
  const groups = buildGroups(FEATURES);
  const sortedDomains = [...groups.keys()].sort((a, b) => {
    if (a === '(no domain)') return 1;
    if (b === '(no domain)') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  for (const domain of sortedDomains) {
    const items = groups.get(domain);
    if (!items || items.length === 0) continue;

    const isCollapsed = collapsedDomains.has(domain);

    html += `<div class="nav-group${isCollapsed ? ' collapsed' : ''}" data-domain="${esc(domain)}">
  <div class="nav-domain${isCollapsed ? ' collapsed' : ''}" onclick="toggleDomain(this)">
    <span class="nav-domain-arrow">▾</span>
    <span>${esc(domain)}</span>
    <span class="nav-domain-count">${items.length}</span>
  </div>
  <div class="nav-group-items">`;

    for (const { feature: f, depth } of items) {
      html += renderNavItem(f, depth);
    }

    html += '</div></div>';
  }

  nav.innerHTML = html;
}

function toggleDomain(el) {
  const group = el.closest('.nav-group');
  const domain = group.dataset.domain;
  if (collapsedDomains.has(domain)) {
    collapsedDomains.delete(domain);
    group.classList.remove('collapsed');
    el.classList.remove('collapsed');
  } else {
    collapsedDomains.add(domain);
    group.classList.add('collapsed');
    el.classList.add('collapsed');
  }
}

// ── Content rendering ────────────────────────────────────────────────────────

function renderHome() {
  const content = document.getElementById('content');
  const total = FEATURES.length;

  if (VIEW === 'user') {
    content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">User Guide</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki','').replace(/ · [^·]+ view$/,'').trim())}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'}</div>
  <div class="home-section-title">Features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;padding:10px 14px;">
      <span class="nav-dot"></span>
      <span class="nav-item-title" style="font-size:13px;">${esc(f.title)}</span>
    </div>`).join('')}
  </div>
</div>`;
    return;
  }

  const frozen = FEATURES.filter(f => f.status === 'frozen').length;
  const active = FEATURES.filter(f => f.status === 'active').length;
  const draft  = FEATURES.filter(f => f.status === 'draft').length;
  const depr   = FEATURES.filter(f => f.status === 'deprecated').length;

  const domains = [...new Set(FEATURES.map(f => f.domain).filter(Boolean))].sort();

  const avgCompleteness = FEATURES.length
    ? Math.round(FEATURES.reduce((s, f) => s + completeness(f), 0) / FEATURES.length)
    : 0;

  content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">◈ life-as-code wiki</div>
  <div class="home-title">${esc(document.title.replace(' — LAC Wiki', ''))}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? '' : 's'} · avg ${avgCompleteness}% complete</div>

  <div class="stat-row">
    ${active ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#4aad72"></span><span class="stat-pill-num">${active}</span><span class="stat-pill-label">active</span></div>` : ''}
    ${frozen ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#5b82cc"></span><span class="stat-pill-num">${frozen}</span><span class="stat-pill-label">frozen</span></div>` : ''}
    ${draft  ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#c4a255"></span><span class="stat-pill-num">${draft}</span><span class="stat-pill-label">draft</span></div>` : ''}
    ${depr   ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#cc5b5b"></span><span class="stat-pill-num">${depr}</span><span class="stat-pill-label">deprecated</span></div>` : ''}
  </div>

  ${domains.length ? `<div class="home-section-title">Domains</div>
  <div class="domain-chips">
    ${domains.map(d => `<span class="domain-chip" onclick="filterByDomain('${esc(d)}')">${esc(d)}</span>`).join('')}
  </div>` : ''}

  <div class="home-section-title">All features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(f => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;">
      <span class="nav-dot"></span>
      ${VIEW !== 'user' ? '<span class="nav-item-key">' + esc(f.featureKey) + '</span>' : ''}
      <span class="nav-item-title">${esc(f.title)}</span>
      ${VIEW !== 'user' ? '<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-soft);">' + completeness(f) + '%</span>' : ''}
    </div>`).join('')}
  </div>
</div>`;
}

function renderFeature(key) {
  const f = byKey.get(key);
  if (!f) { renderHome(); return; }

  const pct = completeness(f);
  const barFill = `<span class="completeness-bar"><span class="completeness-fill" style="width:${pct}%"></span></span>`;

  const children = getChildren(f.featureKey);
  const parent = f.lineage && f.lineage.parent && byKey.get(f.lineage.parent);

  let html = `<div class="feature-page">
  ${VIEW !== 'user' ? `<div class="feature-meta">
    <span class="feature-key">${esc(f.featureKey)}</span>
    <span class="badge badge-${esc(f.status)}"><span class="badge-dot" style="background:${statusColor(f.status)}"></span>${esc(f.status)}</span>
    ${f.domain ? `<span class="badge badge-domain">${esc(f.domain)}</span>` : ''}
  </div>` : ''}
  <div class="feature-title">${esc(f.title)}</div>
  ${VIEW !== 'user' ? `<div class="feature-completeness">${barFill}${pct}% complete</div>` : ''}
  ${f.userGuide ? `<a class="guide-link" href="./lac-guide.html#${esc(f.featureKey)}" target="_self">📖 View User Guide →</a>` : ''}`;

  // Problem
  html += section(VIEW === 'user' ? 'About this feature' : 'Problem', f.problem ? `<div class="section-body">${md(f.problem)}</div>` : '<span class="empty">Not documented.</span>');

  // Analysis
  if (f.analysis)
    html += section('Analysis', `<div class="section-body">${md(f.analysis)}</div>`);

  // Implementation
  if (f.implementation)
    html += section('Implementation', `<div class="section-body">${md(f.implementation)}</div>`);

  // User Guide / Success Criteria
  if (VIEW === 'user') {
    const guideContent = f.userGuide || f.successCriteria;
    if (guideContent)
      html += section('What you can do', `<div class="section-body">${md(guideContent)}</div>`);
  } else {
    if (f.userGuide)
      html += section('User Guide', `<div class="section-body">${md(f.userGuide)}</div>`);
    if (f.successCriteria)
      html += section('Success Criteria', `<div class="section-body">${md(f.successCriteria)}</div>`);
  }

  // Decisions
  if (f.decisions && f.decisions.length) {
    const cards = f.decisions.map(d => `<div class="decision-card">
      <div class="decision-title">${esc(d.decision)}</div>
      <div class="decision-rationale">${md(d.rationale)}</div>
      ${d.date || (d.alternativesConsidered && d.alternativesConsidered.length) ? `<div class="decision-meta">
        ${d.date ? `<span class="decision-date">📅 ${esc(d.date)}</span>` : ''}
        ${d.alternativesConsidered && d.alternativesConsidered.length ? `<span class="decision-alts">Considered: ${d.alternativesConsidered.map(esc).join(', ')}</span>` : ''}
      </div>` : ''}
    </div>`).join('');
    html += section('Decisions', `<div class="decisions-list">${cards}</div>`, f.decisions.length);
  }

  // Known Limitations
  if (f.knownLimitations && f.knownLimitations.length) {
    const items = f.knownLimitations.map(l =>
      `<div class="limitation-item"><span class="limitation-bullet">—</span><span>${md(l)}</span></div>`
    ).join('');
    html += section('Known Limitations', `<div class="limitations-list">${items}</div>`, f.knownLimitations.length);
  }

  // Tags
  if (f.tags && f.tags.length) {
    const chips = f.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
    html += section(VIEW === 'user' ? 'Topics' : 'Tags', `<div class="tags-row">${chips}</div>`);
  }

  // Lineage
  if (parent || children.length) {
    let lineage = '<div class="lineage-row">';
    if (VIEW === 'user') {
      if (parent) {
        lineage += `<span class="lineage-arrow">Part of</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">${esc(parent.title)}</a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">Related</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">${esc(c.title)}</a>`;
        }
      }
    } else {
      if (parent) {
        lineage += `<span class="lineage-arrow">parent ↑</span>
          <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">
            ${esc(parent.featureKey)} — ${esc(parent.title)}
          </a>`;
      }
      if (parent && children.length) lineage += '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
      if (children.length) {
        lineage += '<span class="lineage-arrow">children ↓</span>';
        for (const c of children) {
          lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">
            ${esc(c.featureKey)} — ${esc(c.title)}
          </a>`;
        }
      }
    }
    lineage += '</div>';
    html += section(VIEW === 'user' ? 'Related' : 'Lineage', lineage);
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

function section(label, body, count) {
  const countHtml = count != null ? `<span class="section-count">(${count})</span>` : '';
  return `<div class="section">
  <div class="section-header">
    <span class="section-label">${label}</span>${countHtml}
  </div>
  ${body}
</div>`;
}

// ── Navigation ───────────────────────────────────────────────────────────────

function navigate(key) {
  activeKey = key;
  location.hash = key ? '#' + key : '';
  renderNav(document.getElementById('filter-input').value);
  if (key) {
    renderFeature(key);
    // Scroll nav item into view
    const el = document.querySelector(`.nav-item[data-key="${key}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  } else {
    renderHome();
  }
}

function filterByDomain(domain) {
  const input = document.getElementById('filter-input');
  input.value = domain;
  renderNav(domain);
}

// Filter input
document.getElementById('filter-input').addEventListener('input', e => {
  renderNav(e.target.value);
});

// ── Boot ─────────────────────────────────────────────────────────────────────

const hashKey = location.hash.slice(1);
if (hashKey && byKey.has(hashKey)) {
  activeKey = hashKey;
  renderNav('');
  renderFeature(hashKey);
  setTimeout(() => {
    const el = document.querySelector(`.nav-item[data-key="${hashKey}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, 0);
} else {
  renderNav('');
  renderHome();
}

window.navigate = navigate;
window.toggleDomain = toggleDomain;
window.filterByDomain = filterByDomain;
window.setSortMode = setSortMode;
</script>
</body>
</html>
