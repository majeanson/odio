<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>app · What Shipped — LAC Wiki</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #12100e;
  --bg-sidebar:  #0e0c0a;
  --bg-card:     #1a1714;
  --bg-hover:    #201d1a;
  --bg-active:   #251f18;
  --border:      #2a2420;
  --border-soft: #221e1b;
  --text:        #e8ddd4;
  --text-mid:    #b0a49c;
  --text-soft:   #7a6a5a;
  --accent:      #c4a255;
  --accent-warm: #e8b865;
  --mono:        'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

  --status-active:     #4aad72;
  --status-draft:      #c4a255;
  --status-frozen:     #5b82cc;
  --status-deprecated: #cc5b5b;

  --status-active-bg:     rgba(74,173,114,0.12);
  --status-draft-bg:      rgba(196,162,85,0.12);
  --status-frozen-bg:     rgba(91,130,204,0.12);
  --status-deprecated-bg: rgba(204,91,91,0.12);
}

html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; display: flex; flex-direction: column; }

/* ── Shell ──────────────────────────────────────────────── */

.shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
}
.topbar-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
.topbar-sep  { color: var(--border); }
.topbar-project { font-family: var(--mono); font-size: 12px; color: var(--text-mid); }
.topbar-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-soft); }

.body-row { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ────────────────────────────────────────────── */

.sidebar {
  width: 264px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-soft); }

.sidebar-sort {
  display: flex;
  gap: 4px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sort-btn {
  flex: 1;
  padding: 4px 6px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.sort-btn:hover { color: var(--text-mid); border-color: var(--text-soft); }
.sort-btn.active { background: var(--bg-card); color: var(--accent); border-color: var(--accent); }

.nav-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.nav-tree::-webkit-scrollbar { width: 4px; }
.nav-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Domain group */
.nav-group { margin-bottom: 2px; }

.nav-domain {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  cursor: pointer;
  user-select: none;
}
.nav-domain:hover { color: var(--text-mid); }
.nav-domain-arrow { transition: transform 0.15s; font-size: 8px; }
.nav-domain.collapsed .nav-domain-arrow { transform: rotate(-90deg); }
.nav-domain-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

.nav-group-items { overflow: hidden; }
.nav-group.collapsed .nav-group-items { display: none; }

/* Feature item */
.nav-item {
  display: flex;
  align-items: baseline;
  gap: 7px;
  padding: 5px 14px 5px 18px;
  cursor: pointer;
  user-select: none;
  border-left: 2px solid transparent;
  transition: background 0.1s;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active {
  background: var(--bg-active);
  border-left-color: var(--accent);
}
.nav-item[data-depth="1"] { padding-left: 30px; }
.nav-item[data-depth="2"] { padding-left: 42px; }
.nav-item[data-depth="3"] { padding-left: 54px; }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}
.nav-item[data-status="active"]     .nav-dot { background: var(--status-active); }
.nav-item[data-status="draft"]      .nav-dot { background: var(--status-draft); }
.nav-item[data-status="frozen"]     .nav-dot { background: var(--status-frozen); }
.nav-item[data-status="deprecated"] .nav-dot { background: var(--status-deprecated); opacity: 0.5; }

.nav-item-key {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
  flex-shrink: 0;
}
.nav-item-title {
  font-size: 12px;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.nav-item:hover .nav-item-title,
.nav-item.active .nav-item-title { color: var(--text); }
.nav-item.active .nav-item-key { color: var(--accent); }

.nav-child-arrow {
  font-size: 9px;
  color: var(--text-soft);
  flex-shrink: 0;
  opacity: 0.5;
}

/* ── Content ────────────────────────────────────────────── */

.content {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Home / welcome */
.home-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 40px 80px;
}
.home-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}
.home-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}
.home-subtitle {
  font-size: 14px;
  color: var(--text-mid);
  margin-bottom: 40px;
}

.stat-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
}
.stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-pill-num { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-pill-label { color: var(--text-soft); }

.home-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.domain-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 40px;
}
.domain-chip {
  padding: 4px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.domain-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Feature page */
.feature-page {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

.feature-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.feature-key {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-active     { color: var(--status-active);     background: var(--status-active-bg);     border: 1px solid rgba(74,173,114,0.25); }
.badge-draft      { color: var(--status-draft);      background: var(--status-draft-bg);      border: 1px solid rgba(196,162,85,0.25); }
.badge-frozen     { color: var(--status-frozen);     background: var(--status-frozen-bg);     border: 1px solid rgba(91,130,204,0.25); }
.badge-deprecated { color: var(--status-deprecated); background: var(--status-deprecated-bg); border: 1px solid rgba(204,91,91,0.25); }

.badge-domain {
  color: var(--text-mid);
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.feature-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 6px;
}
.feature-completeness {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
  margin-bottom: 12px;
}
.guide-link {
  display: inline-block;
  margin-bottom: 28px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid rgba(196,162,85,0.3);
  border-radius: 4px;
  padding: 3px 10px;
}
.guide-link:hover { background: rgba(196,162,85,0.08); }
.completeness-bar {
  display: inline-block;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 6px;
  position: relative;
  top: -1px;
  overflow: hidden;
}
.completeness-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

/* Sections */
.section { margin-bottom: 36px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
}
.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border);
}

.section-body p { color: var(--text-mid); line-height: 1.75; margin-bottom: 10px; }
.section-body p:last-child { margin-bottom: 0; }
.section-body strong { color: var(--text); }
.section-body code {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
}
.section-body ul { padding-left: 20px; color: var(--text-mid); }
.section-body li { margin-bottom: 4px; line-height: 1.6; }

/* Decision cards */
.decisions-list { display: flex; flex-direction: column; gap: 12px; }

.decision-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 14px 16px;
}
.decision-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.decision-rationale {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 8px;
}
.decision-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.decision-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}
.decision-alts {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-soft);
}

/* Limitations list */
.limitations-list { display: flex; flex-direction: column; gap: 6px; }
.limitation-item {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.55;
}
.limitation-bullet { color: var(--text-soft); flex-shrink: 0; margin-top: 1px; }

/* Tags row */
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 3px 9px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}

/* Lineage */
.lineage-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.lineage-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  text-decoration: none;
}
.lineage-link:hover { border-color: var(--accent); color: var(--accent); }
.lineage-arrow { color: var(--text-soft); font-size: 10px; }

/* Empty states */
.empty { color: var(--text-soft); font-size: 13px; font-style: italic; }

/* No results */
.no-results {
  padding: 24px 18px;
  font-size: 12px;
  color: var(--text-soft);
  text-align: center;
  font-family: var(--mono);
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="topbar-logo">◈ lac</span>
    <span class="topbar-sep">|</span>
    <span class="topbar-project">app <span style="opacity:.55;font-weight:400">· What Shipped view</span></span>
    <span class="topbar-count">53 features · 10 domains</span>
  </div>
  <div class="body-row">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="filter-input" placeholder="Filter features…" autocomplete="off" spellcheck="false">
      </div>
      <div class="sidebar-sort">
        <button class="sort-btn active" id="sort-domain" onclick="setSortMode('domain')">Domain</button>
        <button class="sort-btn" id="sort-build" onclick="setSortMode('build-order')">Build Order</button>
      </div>
      <nav class="nav-tree" id="nav-tree"></nav>
    </aside>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
const FEATURES = [{"featureKey":"odio-2026-017","title":"Storage Management — Drive Quota, Cleanup, Archive","status":"frozen","problem":"Audio files in Google Drive grow over time (~43MB per raw clip, ~10MB per frozen render). The recorder's free Drive tier (15GB) supports roughly 350 raw clips before action is needed. The app must surface this, and provide a clean way to free space after songs are finalized.","decisions":[{"decision":"Cleanup is explicit and manual — no automatic deletion","rationale":"Automatic deletion after freeze could destroy recordings the band wanted to keep. Storage cleanup is a deliberate action. The app nudges (shows quota, shows how much can be freed) but never deletes automatically.","date":"2026-04-10"}],"knownLimitations":["Drive API quota query may not reflect real-time usage — cache with 5-minute TTL","After cleanup, v1 source audio is gone — if the frozen render was also deleted and the band wants to re-edit, they would need to re-record","Drive storage is the recorder's personal quota — shared with all their other Drive content"],"tags":["storage","google-drive","cleanup","archive","quota"],"successCriteria":"- Band settings shows Drive storage used by Odio files (MB / GB)\n- Post-freeze: 'Clean up source audio' button removes raw .aac from Drive, keeps frozen render\n- Confirmation dialog shows exactly what will be deleted and what will remain\n- Archive clip: removes Postgres records + Drive files; cannot be undone\n- Bulk cleanup: 'Clean up all frozen clips in session' removes source audio for all frozen clips at once\n- Storage indicator updates after cleanup\n- Cleaned-up clips remain playable via their frozen render file","domain":"storage","priority":3,"userGuide":"In the Band tab, tap Settings to see Drive storage usage. The bar shows how many MB/GB of Drive are used by this band's recordings. After a clip is frozen and the band is happy with it, tap 'Clean up source audio' on the clip detail page to delete the raw recording from Drive — the final rendered file is kept and the clip remains fully playable. Tap 'Delete clip' (Recorder only) to permanently remove a clip and all its files from Drive."},{"featureKey":"odio-2026-014","title":"Render — Server-Side FFmpeg on Freeze + Public Share","status":"frozen","problem":"When a version is frozen, a real audio file must be produced — so the band can download it, share it outside the band, or export it. This cannot happen client-side. The frozen clip should also be shareable publicly without requiring sign-in.","decisions":[{"decision":"Server-side FFmpeg only — no client-side WASM","rationale":"WASM FFmpeg is slow on mobile (~3x slower than native), memory-constrained, and adds bundle size. Server-side runs once per clip lifetime in < 10s on Vercel. Acceptable trade-off.","date":"2026-04-10"},{"decision":"Public share via Drive public permission + Postgres token","rationale":"A frozen clip can be shared outside the band (with a producer, a friend). Setting Drive file permission to 'anyone with link' gives a direct audio URL. Odio stores a short token in Postgres mapping to the clip, so the public URL is /share/[token] (not a raw Drive ID), giving control over revocation.","date":"2026-04-10"}],"knownLimitations":["Vercel /tmp is ephemeral (512MB limit) — source download (~43MB) + FFmpeg output (~10MB) is within limits for typical clips","Render requires recorder's valid Drive token from Postgres — if token refresh fails (e.g., recorder revoked access), render fails with a clear error and re-auth prompt","@ffmpeg-installer/ffmpeg bundles ~38MB compressed — close to Vercel's function size limit; this is the highest-risk technical component and needs a spike before building","Any band Editor role can trigger freeze, but the render always uses the recorder's Drive token — recorder does not need to be signed in at the moment of freeze"],"tags":["ffmpeg","server-side","freeze","render","next.js-api","public-share"],"successCriteria":"- Freeze triggers render within 2s of user confirmation\n- Rendered file available within 10s for a typical 2-8 min output clip\n- Clip page shows lock icon and download button after successful render\n- Render failure shows clear error with retry option\n- Public share toggle: generates /share/[token] URL, shareable outside the band\n- Public page: waveform player + stamps + clip name + date — no other session data exposed\n- Public listener does not need a Google account\n- Download of rendered file available on clip page (authenticated) and public page","domain":"render","priority":2,"userGuide":"On a clip's detail page, tap 'Freeze' on any version to produce the final audio file. The page shows 'Rendering…' for a few seconds, then displays a lock icon and download button. To share publicly: tap the Share icon on a frozen clip and copy the /share/[token] link. Anyone with the link can listen without signing in. To revoke public access, tap Share again and toggle it off."},{"featureKey":"odio-2026-012","title":"Versioning — Version Chain, Waveform Editor, Waveform Player, Freeze","status":"active","problem":"A raw recording needs to evolve from v1 (messy, includes setup and dead air) to vFinal (clean, trimmed) through collaborative edits — with full history and a clear end state (freeze). The band needs to listen to any version, compare versions, and hear exactly what a cut sounds like before committing.","decisions":[{"decision":"WaveformPlayer and WaveformEditor are separate components","rationale":"A single component that handles both playback and editing requires mode-switching logic, conditional overlays, and competing event handlers. Separate components have clear single responsibilities: Player = listen, Editor = cut. The edit page is always in edit mode; no toggle needed. The detail page never needs editing. Each component can be reasoned about and tested independently.","date":"2026-04-11"},{"decision":"interact:false + single overlay div for all pointer handling (no enableDragSelection, no RegionsPlugin)","rationale":"WaveSurfer's enableDragSelection registers a permanent pointer overlay that consumes all pointer events — including click-to-seek. Once called, seeking by clicking is broken. interact:false disables WaveSurfer's built-in event handling entirely. A single overlay div (absolute inset-0, touch-none) inside WaveformCanvas intercepts all pointer events and forwards them to useCutInteraction (trim mode) or useSplitInteraction (split mode).","date":"2026-04-15"},{"decision":"Split produces independent trimmed Drive files immediately (not virtual clips sharing source)","rationale":"Original model: Part A and Part B shared Song X's Drive file and applied cuts virtually — correct waveform, wrong duration in clip list (both showed full 9-min duration instead of 4 min and 5 min). Trimmed files fix duration display without special-casing. They also make Part A and Part B genuinely independent: they can be frozen separately without needing X's file, and X's source can be safely deleted from Drive once A and B are confirmed. FFmpeg at split time costs a few seconds of processing but eliminates a class of edge cases.","date":"2026-04-11"},{"decision":"No provenance UI on split children","rationale":"Showing scissors icons and a 'Split into' provenance card on Song X implied that Song X was consumed or changed by the split. The correct mental model is: X exists unchanged, A and B are new songs. Their name might hint at their origin (e.g. 'Groove - Part A') but they are first-class independent songs from the moment they're created. Provenance exists in the DB (sourceClipId) for integrity but is not surfaced in the UI.","date":"2026-04-11"},{"decision":"Split navigates to session page, not back to clip detail","rationale":"After a split, three clips exist (original + Part A + Part B). router.back() would return to the original clip's detail — neither Part A nor Part B would be visible. router.push(sessionHref) lands on the session clip list where all three are visible and accessible.","date":"2026-04-11"},{"decision":"No version deselect — clicking active version keeps it selected","rationale":"Deselecting a version set selectedVersionId to null, which caused the player to show 'no cuts' (raw audio). This 'null = raw audio' state had no UI label and was visually identical to a version with no cuts. Confusing. Clicking the active version now keeps it selected — the player always reflects a known version.","date":"2026-04-11"},{"decision":"Versions are metadata only — not audio files","rationale":"Audio duplication per version is prohibitively expensive (43MB+ per clip). Versions are cut instructions (cutMarks JSON). Source audio stored once in Drive. Real audio file produced only on freeze.","date":"2026-04-10"},{"decision":"localStorage for in-progress edit safety","rationale":"Full offline sync adds complexity. The real risk is a browser crash mid-edit. localStorage persists cut marks across crashes. Key: odio:draft:{clipId}. Cleared on successful submit.","date":"2026-04-10"}],"knownLimitations":["Split takes a few seconds on the server (FFmpeg download + trim + upload) — the UI shows a loading state on the confirm button but gives no progress indicator","After splitting, the original Song X remains in the session — the band must manually delete it from the Drive page once they've confirmed A and B are good","If two members edit the same version simultaneously they both produce the next version number — band sees two versions at the same level and must choose","Submit requires internet connection — cuts safe in localStorage but cannot be written to Postgres offline"],"tags":["versioning","version-history","freeze","wavesurfer","waveform-editor","waveform-player","localstorage","skip-cuts","split"],"successCriteria":"- Version list shows full chain: v number, description, result duration, cut count\n- Selecting a version in the detail page updates the waveform player to skip that version's cuts\n- Click-to-seek works on the waveform — clicking anywhere moves the playhead, play starts from that position\n- Stamp chips in the player are tappable and seek to that timestamp\n- After playback ends, cursor resets to start (no amber pin at right edge)\n- Submit button is always active — description is optional\n- Any member can create a version from any existing version\n- Trim shortcut pre-seeds start+end cut marks\n- Split: marks a time position → FFmpeg trims two independent Drive files (Part A: 0→split, Part B: split→end) → creates two new clips each with their own driveFileId and correct sourceDurationMs → original clip unchanged → navigates to session page showing all three clips\n- Split children show correct durations (4 min / 5 min) in the clip list — not the full original duration\n- Split children are fully independent songs with no visible lineage to the original (no scissors icon, no provenance card)\n- Drag on the edit waveform creates a cut region\n- Freeze locks the version and triggers render (see feat-render)\n- In-progress edits survive browser crash via localStorage draft\n- Draft banner shown on editor reopen with Resume / Dismiss","domain":"versioning","priority":2,"userGuide":"From a clip's detail page, select a version in the Versions section to hear that version's cuts applied. Tapping stamp chips (🔥 ⭐ etc.) in the player seeks to that moment. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song at a chosen time position — mark the split point on the waveform, confirm, and Odio creates Part A and Part B as two fully independent new songs, each with their own trimmed audio file in Drive. The original song stays in the session unchanged. After confirming Part A and Part B are good, go to Settings → Manage files / sync to delete the original's source from Drive. Tap 'Start from' pills to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional."},{"featureKey":"odio-2026-002","title":"FFmpeg POC — Validate Bundle Size and Render Pipeline on Vercel","status":"frozen","problem":"@ffmpeg-installer/ffmpeg bundles the FFmpeg binary at ~38MB compressed. Vercel's serverless function size limit is ~50MB (250MB uncompressed). This is the single highest-risk technical constraint in the project. If the bundle is too large or the render takes too long (Vercel function timeout: 10s on Hobby), the entire render architecture needs to change before feat-render can be built. This POC must validate or invalidate the approach before any production code is written.","decisions":[{"decision":"POC before any production render code","rationale":"@ffmpeg-installer/ffmpeg is the highest-risk dependency in the entire project. If it fails on Vercel Hobby, the render feature needs a completely different architecture. Building feat-render on top of an unvalidated assumption would waste significant implementation work. The POC is a 2-4 hour investment that prevents a potential full architectural rethink later.","date":"2026-04-10"}],"knownLimitations":["Vercel Hobby function timeout is 10s — this may be too tight for long clips; Pro plan raises to 300s","If bundle size fails on Hobby, Vercel Pro ($20/month) is the simplest fix — breaks the $0/month cost target"],"tags":["ffmpeg","poc","vercel","bundle-size","spike","render"],"successCriteria":"- Next.js project with @ffmpeg-installer/ffmpeg + fluent-ffmpeg deploys to Vercel Hobby without bundle size error\n- Deployed function executes an atrim+concat operation on a test .aac file\n- Output file is a valid .aac file playable in browser\n- Cold start + render time for a 2-8 min clip is under 30s total (10s preferred)\n- Render time for a 30-min source clip with multiple cut regions is measured and documented\n- If any constraint fails: document exactly which limit was hit and the recommended alternative with cost/complexity trade-off","domain":"render","priority":1,"userGuide":"This is an internal validation endpoint, not a user-facing feature. To test: GET /api/render/poc?url=<public-audio-url>. The endpoint downloads the audio, applies a test cut (removes seconds 0-10), and returns the trimmed file. Used during development to confirm Vercel can run FFmpeg before building the real render pipeline."},{"featureKey":"odio-2026-008","title":"Multi-Recorder — Any Editor Can Record Into the Band's Drive","status":"frozen","problem":"On jam night, the person who created the band may not always be the one with a phone free to record. Any Editor-role band member should be able to hit Record and have the audio land in the band's shared Drive — without requiring each member to set up their own Drive folder or the band creator to be physically present.","decisions":[{"decision":"Reuse creator's stored token — no per-member Drive setup","rationale":"drive.file OAuth scope only grants access to files the app created under that specific user's account. A member's token cannot write to the creator's Drive folder. The creator's refresh_token (already stored by NextAuth DB adapter for the audio proxy feature) solves this: the server uses the creator's token to generate the Drive upload session URL, and the member's browser uploads directly to Drive using that URL. No additional OAuth consent or per-member Drive setup needed.","date":"2026-04-10"},{"decision":"Editor role can record — Member role cannot","rationale":"Member-only users are passive collaborators (vote, comment). Giving them recording rights would require explaining Drive ownership semantics to every casual invitee. Editors are already trusted with version creation and freeze — recording is a natural extension. The default role for new band invites is Editor, so most band members get recording rights automatically without any explicit configuration.","date":"2026-04-10"},{"decision":"Track recordedByEmail separately from driveOwnerEmail","rationale":"The clip always lives in the creator's Drive (driveOwnerEmail is always the band creator). The person who pressed Record may be someone else entirely. These are distinct facts: one describes file ownership for Drive API operations, the other describes recording attribution for the activity feed and session history. Conflating them would make it impossible to correctly display 'Recorded by X' or debug Drive issues per-clip.","date":"2026-04-10"}],"knownLimitations":["If the band creator revokes Google Drive access, ALL recording attempts by any Editor fail until the creator re-authorizes — one token serves the whole band; there is no per-member fallback","Two Editors recording simultaneously produce two separate clip rows with overlapping timestamps — no merging or conflict detection; both appear in the session normally","The creator's refresh_token is stored server-side in the NextAuth accounts table — this security surface already exists for the audio proxy feature; multi-recorder adds no new exposure"],"tags":["recording","multi-recorder","roles","permissions","google-drive","upload"],"successCriteria":"- Any Editor-role band member sees the Record tab in the bottom nav and can start a recording\n- Member-only role does not see Record tab and cannot access /record\n- /api/upload/init: accepts requests from Editor+ roles; fetches and uses band creator's stored refresh_token to generate Drive upload session URL\n- Token refresh attempt before generating upload URL; returns clear error if creator's token is invalid: 'Band creator needs to re-authorize Drive access'\n- Audio lands in the correct band Drive folder regardless of which Editor recorded\n- Clip row stores both driveOwnerEmail (always the band creator) and recordedByEmail (actual recorder)\n- Activity feed and clip list show 'Recorded by [name]' when recorder differs from band creator\n- If multiple Editors record simultaneously: each gets their own upload session URL; clips created as separate Postgres rows with no conflict\n- Post-record screen and upload banner work identically for all recording members","domain":"recording","priority":2,"userGuide":"Any Editor-role band member can record — not just the band creator. Editors see the Record tab in the nav and can start a recording from their own device. The audio automatically lands in the band's Drive folder (owned by the band creator). If the creator's Drive connection expires, a banner appears: 'Drive connection needs renewal — ask [creator name] to re-authorize.' The clip card shows 'Recorded by X' when the recorder is not the band creator."},{"featureKey":"odio-2026-003","title":"Auth — Google OAuth via NextAuth.js","status":"frozen","problem":"Band members need a shared identity layer — without creating yet another account. Google sign-in is universal in the target audience and doubles as the credential for Google Drive access.","decisions":[{"decision":"drive.file scope at sign-in, not deferred","rationale":"drive.file is needed for all core features (upload recording, read session/clip data, write meta). Deferring it to a later step would require a second OAuth flow and would break the first recording attempt. Request it upfront with a clear explanation in the sign-in screen: 'Odio only accesses files it creates in your Drive.'","date":"2026-04-10"},{"decision":"NextAuth.js with Prisma DB adapter — required from day one, not deferred","rationale":"Supabase Auth adds a paid service. NextAuth.js is open-source and integrates directly with Next.js. The DB adapter (Prisma + Neon) is not optional: it is required to persist the recorder's refresh_token in the accounts table, which is the only way the audio proxy route can stream Drive audio to all band members. JWT-only session strategy is explicitly rejected — it cannot store the refresh_token server-side.","date":"2026-04-10"}],"knownLimitations":["drive.file scope only covers files the app created under that specific user's account — bandmates stream audio through the server-side proxy (which uses the recorder's stored token), so bandmates do not need Drive scope just to listen","Google OAuth tokens expire after 1 hour — NextAuth DB adapter stores refresh_token in Postgres and rotates on expiry; JWT-only strategy is insufficient and must not be used","If the recorder revokes Odio's Drive access (in Google account settings), all audio becomes inaccessible to the entire band until re-authorized"],"tags":["auth","google-oauth","nextauth","session","drive.file"],"successCriteria":"- Sign in with Google works on iOS Safari, Android Chrome, and desktop\n- Session persists across browser restarts (refresh token handled by NextAuth)\n- All private routes redirect to /login if unauthenticated\n- Sign-out clears session and redirects to landing\n- drive.file scope requested at initial sign-in (needed for audio upload and clip access)\n- Token refreshed automatically by NextAuth before expiry\n- Auth state available synchronously on client via Zustand (no flicker)","domain":"auth","priority":1,"userGuide":"Users visit the app and click 'Sign in with Google'. They are prompted to grant Google Drive access (files created by Odio only). After sign-in, they are redirected to the bands home page. Sessions persist across browser restarts. Sign-out via the Band settings page. The /share/[token] public page requires no sign-in."},{"featureKey":"odio-2026-052","title":"BandShareButton — Invite Link and QR Code Generator","status":"active","problem":"Band creators need to bring bandmates into the app quickly — ideally by showing a QR code that others can scan, or by sharing a link. The invite mechanism must work in a rehearsal space (QR scan) and asynchronously (link via message).","decisions":[{"decision":"Invite tokens are band-scoped (not single-use or per-person)","rationale":"A single-use token breaks the 'show the QR code in a rehearsal room and everyone scans it' use case. A band-scoped token allows unlimited joins from the same link until the Recorder revokes it. Revocation is explicit and requires a deliberate action.","date":"2026-04-15"}],"knownLimitations":["QR code is generated client-side — requires JavaScript to render; no SSR fallback","navigator.clipboard.writeText() requires HTTPS (standard for production, may fail in development without HTTPS)"],"tags":["band","invite","qr-code","share","settings","onboarding"],"successCriteria":"- Invite link copyable with 'Copied!' feedback (2s) on tap\n- QR code rendered in dark theme (white modules on dark bg)\n- QR code scannable on physical phone screen at arm's length\n- Token generated on band creation, persisted in Postgres\n- Token revoke option in Band Settings (generates a new token, old links stop working)\n- Large QR display mode for first-run (150x150px minimum)","domain":"band","priority":2,"userGuide":"In Band Settings, tap 'Copy link' to copy your band invite link and share it with bandmates. They can also scan the QR code directly from your screen to join instantly."},{"featureKey":"odio-2026-051","title":"DriveRelink — Drive Token Expiry Detection and Re-Authorization","status":"draft","problem":"The entire band's audio access depends on the Recorder's Google Drive token. If that token expires, is revoked, or Google account permissions change, all band members lose access to all audio — waveforms fail to load, editors error, the public share player goes dark. The Recorder needs a clear path to restore access without losing any data.","decisions":[{"decision":"Recovery path is Recorder-only, shown in Band Settings","rationale":"Only the Recorder's token is used for audio proxy. Non-Recorder members cannot fix this — they have no Drive auth. Showing a 'reconnect' option to non-Recorders would be frustrating and misleading. Band Settings is the appropriate place for admin-level actions like re-authorization.","date":"2026-04-15"}],"knownLimitations":["Token expiry detection relies on the audio proxy returning a specific error code — if Drive returns a generic error instead, the reconnect flow is not triggered","Reconnect requires the Recorder to be online and able to complete the Google OAuth flow — no offline recovery path"],"tags":["drive","auth","token","reconnect","resilience","band-settings","error-recovery"],"successCriteria":"- Audio proxy 503 with drive-token-expired detected in WaveformPlayer/Editor/PublicPlayer\n- Band Settings: danger banner shown when Recorder's Drive token is invalid\n- 'Reconnect' button initiates Google OAuth (drive.file scope) for Recorder\n- OAuth success: NextAuth stores new tokens, audio proxy works on next request\n- Audio-consuming components: 'Audio unavailable — recorder needs to reconnect Drive' shown instead of waveform when 503 detected\n- No retry button on audio components (retry would also fail)\n- Band members see 'Audio unavailable' message without a path to fix it themselves (only Recorder can reconnect)","domain":"band","priority":1},{"featureKey":"odio-2026-005","title":"Band Space — Band Creation, Invites, Drive Folder, Members","status":"active","problem":"Band members need a shared space where all sessions are visible and access is controlled. Joining must be frictionless. The recorder's Google Drive folder is the audio source of truth — the app needs to bridge from 'here is an invite link' to 'you now have access to the band's recordings'.","decisions":[{"decision":"Pill buttons for role change instead of native <select>","rationale":"Native <select> is styled by the OS and looks visually inconsistent with the dark app design. Pill buttons (Editor | Member) are always visible, immediately tappable, and make the current role and the available roles obvious at a glance without opening a dropdown.","date":"2026-04-11"},{"decision":"Remove/Leave actions require confirmation sheet before executing","rationale":"Text underline links ('Remove', 'Leave band') have no visual weight — they look like navigation links, not destructive actions. A tap mis-aimed at the email text could accidentally trigger removal. A confirmation bottom sheet with a red danger button adds the right friction for an irreversible action.","date":"2026-04-11"},{"decision":"Postgres for band membership, Drive for audio access","rationale":"Drive's drive.file scope prevents one user from reading files created by another. Band membership and session/clip metadata live in Postgres. Audio files live in the recorder's Drive, shared at the folder level via standard Drive sharing.","date":"2026-04-10"},{"decision":"Manual Drive folder sharing — no programmatic share","rationale":"Programmatic sharing requires storing and using the recorder's refresh token for Drive Permissions API calls — sensitive security surface. Manual sharing (recorder shares via Drive UI, one time per member) avoids this.","date":"2026-04-10"}],"knownLimitations":["New members cannot hear audio until the recorder manually shares the Drive folder with their Google email","If the recorder loses access to their Google account, band audio becomes inaccessible — no recovery path without exporting files first","Drive sync checks file existence but does not verify file integrity or playback quality","Deleting a clip from the Drive page removes it globally — all band members lose access immediately"],"tags":["band","invite","members","google-drive","postgres","qr-code","role-management"],"successCriteria":"- Create band: enter name → band record created in Postgres → invite link generated\n- Invite link opens a join page: shows band name, prompts Google sign-in\n- After joining, app shows member's Google email with clear instruction to recorder to share Drive folder\n- Session screen shows QR code of current session URL\n- Band member list: display name + email, role badge, join date\n- Recorder can change member roles using styled pill buttons (Editor / Member) — no native select\n- Remove member: visible button → confirmation sheet → delete from Postgres\n- Leave band: visible button → confirmation sheet → redirect to /bands\n- Multiple bands: user sees all their bands on the home screen\n- Band roles: Recorder (full access + unfreeze), Editor (create versions + freeze + record), Member (vote + comment only)\n- Default role for new members: Editor","domain":"band","priority":1,"userGuide":"Create a band from the home screen. Share the invite link or QR code with bandmates — they sign in with Google and join as Editors. After someone joins, their email appears in Settings → Members. Share the Drive folder with that email from Google Drive (one-time step). In Settings, use the pill buttons to switch a member between Editor and Member role. Tap Remove to remove a member (confirmation required). Non-Recorder members can Leave band from their own member row (confirmation required). Editors and Recorders can open 'Manage files / sync' from the Storage section to see all Drive files grouped by session. Hit 'Sync' to check which files still exist in Drive (green dot = ok, red dot = missing). Delete a source file to free Drive space while keeping the clip and its versions. Delete a clip to remove it entirely from Odio and Drive."},{"featureKey":"odio-2026-050","title":"JoinBandClient — Invite Link Band Join Flow","status":"active","problem":"Most users arrive in Odio as joiners — they received an invite link from a band creator. The join flow must be frictionless: one tap to join, then immediately into the band's session list. No Drive authorization needed for joiners (they don't upload).","decisions":[{"decision":"Joiners are not prompted for Drive scope","rationale":"Audio upload and Drive access belong to the Recorder's account only. Joiners (Editor/Member) never upload audio. Requesting drive.file from joiners is unnecessary and increases friction — it adds an extra OAuth consent screen for a permission they'll never use.","date":"2026-04-15"}],"knownLimitations":["Invite tokens are single-use or time-limited — expired tokens show an error with no way to request a new one from this screen"],"tags":["band","onboarding","invite","join","first-run"],"successCriteria":"- Renders band name and 'Join [Band Name]' button\n- Button tap: POST to join endpoint, navigates to session list on success\n- Error states: 'Invalid invite link', 'Already a member', 'Invite has expired'\n- No Drive authorization step (joiners are MEMBER or EDITOR role — no drive.file scope requested)\n- Loading state on join button while POST in-flight","domain":"band","priority":1,"userGuide":"When you follow a band invite link, you'll see the band name and a Join button. Tap it to get immediate access to the band's sessions and clips."},{"featureKey":"odio-2026-049","title":"MemberRow — Band Member List Row with Role Management","status":"active","problem":"Band Settings lists all members with their roles. The Recorder needs to change roles and remove members from within the same row — without navigating to a separate member-management screen.","decisions":[{"decision":"Self-role is always non-editable","rationale":"A Recorder downgrading themselves to Member with no other Recorder would leave the band with no one able to create sessions or freeze clips. Blocking self-role change prevents accidental lockout.","date":"2026-04-15"}],"knownLimitations":["Role change is immediate with no undo — if Recorder accidentally changes another member's role, they must manually change it back","Drive access (if any) is not revoked when a member is removed — audio files on Drive are unaffected"],"tags":["band","members","role","settings","role-picker","remove-member"],"successCriteria":"- Avatar initials + name + email rendered per row\n- Role chip: interactive for Recorder (not self), static for all others\n- Tap role chip → BottomSheet with 3 role options, current highlighted\n- Select role → PATCH to Postgres, chip updates optimistically\n- Self-role chip: disabled, tooltip text\n- Delete: swipe-left (iOS) or long-press (Android/desktop) → confirm sheet → DELETE membership\n- After delete: member row removed from list immediately","domain":"band","priority":2,"userGuide":"In Band Settings, each member row shows their role. As the band creator (Recorder), you can tap a member's role chip to change it or swipe to remove them from the band."},{"featureKey":"odio-2026-045","title":"BackNavSheet — Discard Confirmation When Leaving Editor with Unsaved Cuts","status":"draft","problem":"If a user taps the back button in the Timeline Editor while they have unsaved cut regions, they will lose their work silently. The UX spec v2.0 requires an explicit confirmation with three options: keep the draft for later, discard, or cancel.","decisions":[{"decision":"Discard option is a text link, not a full-width danger button","rationale":"A full-width red 'Discard' button risks accidental taps — it would be directly below the 'Keep draft' button in a small sheet. Making discard a text link (small, centered) requires more deliberate intent. The asymmetry signals that 'Keep draft' is the recommended default action.","date":"2026-04-15"}],"knownLimitations":["localStorage draft key is per-clipId — if the user has multiple browser tabs open editing the same clip, drafts may conflict"],"tags":["editor","back-navigation","discard","draft","localstorage","ux"],"successCriteria":"- Sheet opens when back button tapped and hasUnsaved=true\n- 'Keep draft + leave': writes cutMarks to localStorage (key: odio:draft:{clipId}), then router.back()\n- 'Discard edits + leave': clears localStorage draft, router.back()\n- 'Cancel': closes sheet, stays in editor\n- Sheet NOT shown when hasUnsaved=false (clean state)\n- Danger option uses text link style, not a full-width red button (reduces accidental taps)","domain":"editing","priority":2},{"featureKey":"odio-2026-013","title":"Clip Detail — Coordinator, Actions Panel, Freeze, Share, Stage, Cleanup","status":"active","problem":"The clip detail page must coordinate multiple independent concerns — playback, version selection, actions, and collaboration — without letting any one section own state that another needs. A band member should be able to select a version, hear exactly that version's cuts, vote on it, and trigger lifecycle actions (stage change, freeze, share, cleanup) all from one screen.","decisions":[{"decision":"No version deselect — clicking active version keeps it selected","rationale":"Deselecting a version set selectedVersionId to null, which caused the player to show 'no cuts' (raw audio). This 'null = raw audio' state had no UI label and was visually identical to a version with no cuts. Confusing. Clicking the active version now keeps it selected — the player always reflects a known version.","date":"2026-04-11"},{"decision":"Actions section hidden when !canEdit && !frozen","rationale":"MEMBER-role users on non-frozen clips have no available actions (they can't edit, can't freeze, can't share, can't clean up). Rendering an empty Actions section produces phantom whitespace between the Versions section and the Collaboration section. Hiding it entirely keeps the layout clean.","date":"2026-04-11"},{"decision":"Freeze picker lets user select which version to freeze, not locked to latest","rationale":"The band may have decided version 3 was better than version 4 (which went too far). Locking to 'latest version only' would force them to create a v5 that reverts v4 just to freeze it. The picker lets any Editor choose any version as the final render.","date":"2026-04-11"},{"decision":"All actions use bottom-sheet confirmation, not inline destructive buttons","rationale":"Freeze, cleanup, and unfreeze are irreversible or hard-to-reverse operations. A confirmation sheet with clear consequence text (what gets deleted, what stays) gives the user one more mental checkpoint before committing. Bottom sheets also allow showing contextual info (e.g., the cleanup sheet's 'Will be deleted / Will remain' info boxes).","date":"2026-04-11"}],"knownLimitations":["Share link generation requires clip to be frozen — members cannot share a clip-in-progress","publicToken is stored in Postgres; if the tokens table is cleared, existing share links break","Unfreeze does not delete the rendered Drive file — it simply sets frozen=false. The rendered file remains in Drive until cleanup or clip delete."],"tags":["clip-detail","coordinator","freeze","share","stage","cleanup","actions","version-selection"],"successCriteria":"- Selecting a version updates WaveformPlayer to skip that version's cuts\n- Clicking the active version keeps it selected (no deselect to null state)\n- Actions section hidden when member role + non-frozen (no phantom whitespace)\n- Stage picker opens as bottom sheet with 4 options; current stage highlighted\n- Freeze picker shows version list; pre-selects latest version; on confirm: renders clip, updates UI\n- Freeze error shown inline in freeze sheet; dismiss-able\n- Post-freeze callout banner appears after a successful freeze in the same session\n- Frozen status row shows Unfreeze option for RECORDER, lock icon for non-Recorder\n- Share toggle generates /share/[token] URL and copies to clipboard\n- Copy feedback: button label changes to 'Copied!' for 2 seconds\n- Cleanup sheet shows exactly what gets deleted and what remains before confirming\n- Processing row visible while transcodeStatus is PENDING; disappears when DONE\n- All bottom sheets have consistent Cancel button\n- Edit cuts link visible when canEdit && !frozen — navigates to /edit page\n- Vote tab shows 'Voting on v{N}' context card with version description; tapping 'change' switches to Versions tab","domain":"versioning","priority":2,"userGuide":"Open a clip from the session list. The waveform player at the top always plays the selected version. The Edit tab is your main workspace: tap 'Edit cuts' at the top to open the full-screen editor; tap any version card to switch what you hear (latest version is listed first, original at the bottom). Once you're happy with a version, tap Freeze to lock it — you'll be prompted to generate a share link right away. The Team tab is for post-edit collaboration: it shows who voted for what on the current version and the full comment thread. Tap 'change' in the voting header to switch which version the band is voting on."},{"featureKey":"odio-2026-037","title":"ClipCard — Clip Row in Session Clip List","status":"active","problem":"The session clip list is the primary navigation surface for the editing workflow. Each row must communicate a clip's name, duration, version count, stage, and activity state at a glance — plus support quick-delete for the Recorder without leaving the list.","decisions":[{"decision":"Activity indicator is amber left border, not a dot or badge","rationale":"A dot badge competes visually with the version count badge and stage chip. An amber left border draws the eye subtly to the card without cluttering the metadata display. Border clears on clip detail visit (server marks as viewed or client tracks in sessionStorage).","date":"2026-04-15"}],"knownLimitations":["Swipe-left gesture is iOS Safari native feel only — Android swipe-left has no gesture affordance","InlineEdit within a tappable card: tap on the name text must be captured by InlineEdit, not by the card's navigation handler — requires stopPropagation on the InlineEdit wrapper"],"tags":["clip","clip-list","card","navigation","stage","activity-indicator","delete"],"successCriteria":"- Clip name editable inline (InlineEdit, max 60ch)\n- Duration shows source duration → result duration if versions exist\n- Version count badge visible\n- StageSelector chip tappable by Editor/Recorder, static for Member\n- Frozen lock icon visible when frozen\n- amber left border when new activity since last visit\n- Processing state: 60% opacity, spinner, no edit/stage controls, toast on tap\n- Swipe-left delete on iOS → danger button → BottomSheet confirm\n- Long-press delete on Android/desktop → context menu → BottomSheet confirm\n- Tap navigates to clip detail","domain":"sessions","priority":2,"userGuide":"Each row in a session's clip list shows a recording. Tap a clip to open it. Tap the stage chip to update where the song is at. Tap the clip name to rename it. Swipe left to delete (only if you're the recorder)."},{"featureKey":"odio-2026-016","title":"Collaboration — Votes, Comments, Stamp Heat Map, Activity","status":"frozen","problem":"After editing, the band needs a lightweight way to converge on which version is final — without a group chat thread full of voice notes and confusion. Voting, timestamped comments, and stamp heat maps give structure without overhead.","decisions":[{"decision":"Votes scoped to version, not clip","rationale":"Voting on a clip as a whole ('is this song good?') is separate from voting on a specific edit ('is this cut right?'). Scoping votes to a version makes it clear what the band is approving — the specific cut. A member can vote Keep on v2 and Revise on v3 if they think v3 overcorrected.","date":"2026-04-10"},{"decision":"No suggest-a-cut feature — comments are text only","rationale":"Suggest-a-cut adds a structured comment type with startMs/endMs that renders as a shaded waveform region with an 'Apply' button. The complexity (schema columns, waveform rendering, editor integration) is not justified for V1. Bandmates who want to suggest a cut can just create a new version themselves — that's what the versioning system is for.","date":"2026-04-10"}],"knownLimitations":["No push notifications — members need to open the app to see new votes/comments","Polling at 5-10s means activity is not instant — acceptable for post-jam async workflow","Stamp heat map is derived from recording-time stamps only (not from member actions during review)"],"tags":["votes","comments","stamps","heat-map","activity","polling","postgres"],"successCriteria":"- Vote (Keep/Revise/Pass) per member per version; tally visible to all; changeable\n- Votes and vote tally update within 5-10s via polling\n- Timestamped comments show as pins on waveform during playback\n- Stamp heat map overlay visible on waveform — denser where more stamps exist\n- Version list: inline mini-player on each version card\n- Activity feed: version creates + votes + comments in order\n- Notification dot on clip when all members have voted Keep on same version\n- Private annotation toggle: any annotation can be marked private (visible only to author)\n- Comment author can edit their comment (shows 'edited' label after edit)\n- Comment author can delete their comment (confirmation required; removes from feed)\n- Clip detail layout: during active versioning, version list is default open tab; after freeze, comments/activity is default open tab","domain":"collaboration","priority":3,"userGuide":"On a clip's detail page, the Versions tab shows all edits; the Comments tab shows the discussion. Vote on any version by tapping Keep, Revise, or Pass — the tally updates for all band members within seconds. Leave a comment in the text field (optionally tap the waveform first to attach a timestamp). When everyone has voted Keep on the same version, a banner appears prompting the Recorder or an Editor to freeze it. Comments can be edited or deleted by their author (long-press or tap the '...' menu)."},{"featureKey":"odio-2026-041","title":"CutList — Cut Region List with Nudge Controls","status":"active","problem":"Dragging cut region handles on a waveform on mobile is imprecise for fine adjustments (±100ms range). Users need a fallback precision control for exact trimming without requiring zooming in and dragging handles at the pixel level.","decisions":[{"decision":"Nudge increments are ±10ms and ±100ms","rationale":"10ms is fine-grained enough for frame-accurate trimming. 100ms is fast-traverse for larger adjustments. 1ms would require many taps; 1s steps would be too coarse for precise trimming. Two levels cover the full range of use cases.","date":"2026-04-15"}],"knownLimitations":["Long cut lists (>5 regions) push the submit button far down the page on mobile — consider a fixed submit button in future","Nudge does not debounce API calls — each tap writes to localStorage draft immediately but Postgres writes are batched at submit"],"tags":["editor","cut-list","nudge","precision","cut-regions","accessibility"],"successCriteria":"- All current cut regions listed in order (sorted by start time)\n- Each row: index, startMs formatted, endMs formatted, duration removed\n- Expand: shows ±10ms ±100ms nudge buttons for both start and end edges\n- Nudge: updates cut boundary, respects 1s minimum region size and overlap constraints\n- 'Remove' × button: removes this cut region, adds to undo stack\n- 'Zoom to cut': calls parent's applyZoom + scroll to position cut region full-width in viewport\n- ExpandedCutId prop (controlled) — parent manages which row is open","domain":"editing","priority":2,"userGuide":"The cut list below the waveform shows all your marked cuts. Tap any cut to expand it and fine-tune the start or end time with the nudge buttons. Tap the × to remove a cut."},{"featureKey":"odio-2026-042","title":"DraftRestoreBanner — Recover Unsaved Cuts After Browser Crash","status":"active","problem":"If a user's browser crashes or the page reloads mid-edit, all cut regions are lost — the editor opens blank. The user may not realise their work was saved in localStorage and abandon the session assuming the work is gone.","decisions":[{"decision":"Show=false when cutMarks.length > 0","rationale":"If the editor already has cuts (e.g., user navigated Edit from a version that had cuts), the draft is irrelevant — the current state IS the working set. Showing the draft banner when cuts already exist would confuse the user and potentially overwrite valid in-flight edits.","date":"2026-04-15"}],"knownLimitations":["Draft key is per-clipId, not per-clipId+versionId — if the user edits a different version, the same draft key is used and may restore mismatched cuts"],"tags":["editor","draft","localstorage","resilience","recovery","banner"],"successCriteria":"- Banner visible only when hasDraft=true AND cutMarks.length === 0\n- 'Resume editing' button: calls onResume() which loads draft cutMarks into WaveformEditor state\n- 'Dismiss' button: calls onDismiss() which clears localStorage draft + hasDraft becomes false\n- Banner does not appear when editor already has cuts (user navigated back with live state)\n- Banner does not reappear after dismissal in same session","domain":"editing","priority":2,"userGuide":"If your browser closed unexpectedly while you were editing cuts, a banner appears when you return offering to restore your work. Tap 'Resume' to get your cuts back, or 'Dismiss' to start fresh."},{"featureKey":"odio-2026-040","title":"EditorToolbar — Trim / Clear All / Split Quick-Action Buttons","status":"active","problem":"Creating cut regions by dragging is precise but slow for the most common editing tasks: trimming dead air from the start and end (80% of edits), and splitting a clip at a specific time. Quick-action buttons accelerate these workflows without requiring manual dragging.","decisions":[{"decision":"Trim pre-seeds at 20% boundaries without confirmation","rationale":"The 20% default gives enough buffer for typical dead air at the start and end of a jam recording. Pre-seeding without confirmation means the user can immediately see and drag the handles — this is faster than showing a dialog asking 'how much to trim'. The undo stack captures this operation.","date":"2026-04-15"}],"knownLimitations":["Trim percentages (20%/80%) are hardcoded — not configurable per clip"],"tags":["editor","toolbar","trim","split","cut-regions","quick-action"],"successCriteria":"- Trim button: adds start/end cuts at 20%/80% boundaries immediately\n- Clear All: removes all cuts, disabled when hasCuts=false\n- Split: enters split mode, shows WaveformSplitter panel, WaveformCanvas shows split marker\n- All buttons: minimum 44px touch target\n- Trim and Clear All do not require confirmation\n- Split requires confirmation (in WaveformSplitter sheet before API call)","domain":"editing","priority":2,"userGuide":"Tap Trim to automatically mark the start and end of the recording for trimming — then drag the region handles to adjust. Tap Clear All to start over. Tap Split to cut a song into two separate clips."},{"featureKey":"odio-2026-036","title":"MiniPlayer — Inline Audio Playback on Version Cards","status":"draft","problem":"On the clip detail version list, a band member wants to quickly audition a specific version to check if an edit worked — without opening the full editor or navigating to a separate playback screen. They need a play button directly on the version card.","decisions":[{"decision":"No seek bar on MiniPlayer","rationale":"The MiniPlayer is for quick auditioning — 'does this edit sound right?' A seek bar implies the user wants fine-grained listening control. That level of attention belongs in the full WaveformPlayer (clip detail top) or WaveformEditor. MiniPlayer is listen-from-start only.","date":"2026-04-15"}],"knownLimitations":["Audio proxy adds server-side latency vs. direct URL — first play may take 500-1000ms to start on cold connection","Skip-cuts during playback is client-side virtual preview — very short cuts (<200ms) may not be accurately skipped due to timeupdate resolution"],"tags":["audio","playback","version-card","mini-player","inline","clip-detail"],"successCriteria":"- 40px circle play/pause button, bg-elevated color\n- Elapsed timer in ui-monospace text-xs to the right of button, shows while playing\n- isPlaying=true: pause icon, timer counting up\n- isPlaying=false: play icon, timer at last position or 0\n- onToggle called on button tap\n- Audio plays from start on first play; resumes from paused position if paused mid-play\n- Card area tap does not trigger play (event not propagated from card tap to mini-player)\n- Disabled state when clip is still processing (transcodeStatus = PENDING)","domain":"versioning","priority":2},{"featureKey":"odio-2026-035","title":"StageSelector — Clip Development Stage Picker","status":"active","problem":"A band tracks each clip's creative stage (idea / sketch / developing / demo-ready) to know which songs are close to done vs. just started. This needs to be changeable from both the clip list (quick update inline) and the clip detail page without navigating.","decisions":[{"decision":"Stage change happens in a bottom sheet, not an inline dropdown","rationale":"An inline dropdown (select element) on a dark mobile UI is hard to style consistently across browsers. A BottomSheet provides native-feeling interaction with full control over appearance, matching the app's bottom-sheet-for-all-choices pattern.","date":"2026-04-15"}],"knownLimitations":["Stage change is not versioned — no history of stage transitions stored"],"tags":["stage","clip-detail","clip-list","picker","bottom-sheet","metadata"],"successCriteria":"- Stage badge tappable by Recorder/Editor, static for Member\n- Tap → BottomSheet with 4 options, current highlighted in amber\n- Select → optimistic update + PATCH to Postgres + sheet dismiss\n- Stage chip colors: idea (muted), sketch (blue-dim), developing (amber-dim), demo-ready (green-dim)\n- Accessible: aria-label 'Change stage' on button, aria-checked on active option","domain":"versioning","priority":3,"userGuide":"Tap the stage chip (Idea, Sketch, Developing, Demo-Ready) on any clip to update where the song is in the creative process. Changes are visible to all band members immediately."},{"featureKey":"odio-2026-038","title":"StampJumpRow — Tappable Stamp Chips for Waveform Seek","status":"frozen","problem":"Waveform players and editors display stamps (🔥⭐❓💡) at their recorded timestamps. These stamps are most useful when tappable — jumping to the timestamp lets the band quickly find the moments that were marked during recording.","decisions":[{"decision":"Stamp chips are <button> elements, not styled divs","rationale":"Div elements are not keyboard-accessible and do not reliably receive touch events on all browsers. <button> is semantically correct for interactive elements and gets keyboard focus, Enter/Space activation, and proper touch event handling for free.","date":"2026-04-11"}],"knownLimitations":["Stamp chips are ordered by creation (recording order), not by timestamp — if a user stamped out of order, chips appear out of sequence relative to the waveform"],"tags":["stamps","waveform","navigation","playback","accessibility","shared-component"],"successCriteria":"- Chips rendered as <button> elements (keyboard accessible, screen-reader compatible)\n- Each chip: aria-label='Jump to M:SS' (time formatted in human-readable minutes:seconds)\n- Tap calls onSeek with timestamp in seconds\n- Chip colors: fire=#ef4444, keep=#eab308, uncertain=#f97316, idea=#3b82f6\n- Hidden when stamps array is empty (returns null)\n- className prop accepted for layout context (WaveformPlayer vs. Editor vs. PublicPlayer)","domain":"editing","priority":2,"userGuide":"Colored dots along the bottom of the waveform mark moments stamped during recording. Tap any dot to jump to that moment in the audio."},{"featureKey":"odio-2026-043","title":"SubmitVersionSheet — Version Description and Submission Confirmation","status":"active","problem":"Submitting a new version is the final step of the editing workflow. The sheet provides one last chance to add a description ('removed setup noise', 'trimmed to 3:20') before committing. It also guards against submitting a version with no cuts.","decisions":[{"decision":"Description is optional — submit allowed with empty description","rationale":"Forcing a description adds friction to the most common case (quick trim edit where 'what changed?' is obvious from the cut marks). The description field exists for when the editor wants to explain a non-obvious choice. It should never block submission.","date":"2026-04-15"},{"decision":"Sheet owns submitting/error state, not WaveformEditor","rationale":"The submission spinner and error state are only relevant during the sheet interaction. WaveformEditor should not need to know about these transient UI states. The sheet is a contained async flow.","date":"2026-04-15"}],"knownLimitations":["Error messages from onSubmit() are shown raw — no user-friendly error mapping"],"tags":["editor","submit","version","bottom-sheet","description","zero-change-guard"],"successCriteria":"- Opens as BottomSheet from 'Submit as v[N]' button\n- Description field: optional textarea, max 200ch, placeholder 'What changed? (optional)'\n- Zero-change guard: Submit blocked (inline message shown) when no cut regions exist\n- Submit with cuts: calls onSubmit(description), shows spinner, error inline on failure\n- Cancel button: closes sheet, returns to editor with cuts intact\n- 'v[N]' in the button label correctly reflects next version number","domain":"editing","priority":1,"userGuide":"After marking your cuts, tap 'Submit edit' to save a new version. You can optionally describe what changed. Tap Submit to confirm — your version will be visible to the whole band within seconds."},{"featureKey":"odio-2026-011","title":"Timeline Editor — WaveformPlayer, WaveformEditor, Cut Regions, Version Submit","status":"active","problem":"Band members need to trim dead air and setup noise from a recording — visually, in a browser, on a phone in a car or on a laptop at home — and preview the result before committing it as a new version. The clip detail page needs a pure playback experience that skips cuts during listen; the edit page needs a full-screen editor for creating cut regions.","decisions":[{"decision":"WaveformPlayer and WaveformEditor are separate components","rationale":"A single component handling both playback and editing requires mode-switching logic, conditional overlays, and competing event handlers. Separate components have clear single responsibilities: Player = listen, Editor = cut. The edit page is always in edit mode; no toggle needed. The detail page never needs editing. Each component can be reasoned about and tested independently.","date":"2026-04-11"},{"decision":"interact:false + single overlay div for all pointer handling (no enableDragSelection)","rationale":"WaveSurfer's enableDragSelection registers a permanent pointer overlay that consumes all pointer events — including click-to-seek. Once called, seeking by clicking is broken. interact:false disables WaveSurfer's built-in event handling entirely. A single custom overlay div (absolute inset-0, touch-none, z-20) inside WaveformCanvas intercepts all pointer events and delegates to useCutInteraction (trim mode) or useSplitInteraction (split mode). Both hooks implement the tap-vs-drag state machine and setPointerCapture for mobile.","alternativesConsidered":["interact:true + WaveSurfer's built-in seek — breaks once enableDragSelection is called","RegionsPlugin for cut visualization — adds DOM weight, region resize handles conflict with overlay"],"date":"2026-04-15"},{"decision":"Cut bands are pure CSS divs, not WaveSurfer regions","rationale":"WaveSurfer RegionsPlugin creates DOM nodes inside the waveform container that sit above the waveform canvas. These nodes intercept pointer events even with pointerEvents:none on individual regions because the RegionsPlugin wrapper div captures them first. Pure CSS absolute-positioned divs with pointer-events:none do not interfere with the overlay div at all, and their position can be computed from millisecond values without any WaveSurfer API calls.","alternativesConsidered":["WaveSurfer RegionsPlugin — conflicts with custom overlay, harder to scroll-correct positions","Canvas overlay — requires repainting on every animation frame; CSS divs reflow only on prop change"],"date":"2026-04-15"},{"decision":"Stamp chips in WaveformPlayer/WaveformEditor/PublicPlayer are tappable buttons via StampJumpRow","rationale":"Divs are not keyboard-accessible and do not receive touch events reliably on all browsers. Using <button> elements makes stamp chips proper interactive controls. StampJumpRow is a shared component used by all three players — one source of truth for chip styling and seek behavior.","date":"2026-04-11"},{"decision":"Split navigates to session page, not back to clip detail","rationale":"After a split, two clips exist. router.back() would go back to the original clip's detail page — the user would not see Part B at all without manually navigating. router.push(sessionHref) lands on the session clip list where both Part A and Part B are visible and accessible.","date":"2026-04-11"},{"decision":"Virtual cut preview via seek — no re-encode","rationale":"Re-encoding for preview requires server round-trip or WASM FFmpeg. WaveSurfer can seek to any position — skip cut regions during playback by intercepting timeupdate events in useWaveSurfer. Zero server cost, instant response.","date":"2026-04-10"},{"decision":"Drive audio proxied through Next.js API route","rationale":"Drive API download URLs require an Authorization header with the user's access token. Browsers cannot add auth headers to an <audio> src or WaveSurfer source URL. Proxying through a Next.js API route (which has the token server-side) solves this without exposing the token to the client.","date":"2026-04-10"},{"decision":"localStorage for in-progress edit safety","rationale":"Full offline sync adds complexity. The real risk is a browser crash mid-edit. localStorage persists cut marks across crashes. Key: odio:draft:{clipId}. Cleared on successful submit.","date":"2026-04-10"}],"knownLimitations":["Audio proxy route adds latency vs direct URL — mitigated by the server having fast egress to Google's CDN","If the clip's Drive file is unavailable (recorder revoked share, Drive outage), editor shows an error with Reconnect Drive option","Zoom level resets to 1x when entering split mode — by design, split mode always shows the full waveform for context"],"tags":["wavesurfer","waveform","cut-regions","preview","web","touch","localstorage","waveform-player","waveform-editor","skip-cuts","split","trim","stamps"],"successCriteria":"- Waveform renders within 3 seconds of opening on a typical 10-min clip\n- Audio plays via Drive proxied URL — seeking supported via Range requests\n- Click-to-seek works — clicking anywhere on the waveform moves the playhead; play starts from that position\n- Stamp chips in WaveformPlayer are tappable <button> elements that seek to their timestamp\n- Cut regions in WaveformPlayer are dark overlays with pointer-events:none — they display cuts but never block click-to-seek\n- Skip-cuts playback works in WaveformPlayer: entering a cut region during play immediately jumps to region end\n- Drag on the WaveformEditor waveform creates a red cut region\n- Dragging within 24px of an existing cut edge resizes that edge (no remove-and-redraw needed)\n- Tap (< 8px movement) in WaveformEditor seeks without creating a region\n- Trim button pre-seeds start cut + end cut at 20% from each boundary\n- Clear All button removes all cuts\n- Split: marks a time → creates Part B clip + v2 on original → navigates to session page showing both\n- 'Start from vN' pills load a previous version's cuts as starting point\n- Submit button active when cuts exist — description optional\n- Draft auto-saved on every cut change; Resume/Dismiss banner shown on reopen after crash\n- Tab bar hidden during editing (edit page is near full-screen)\n- Virtual result duration updates in real time in WaveformEditor top bar","domain":"editing","priority":2,"userGuide":"From a clip's detail page, the waveform player shows cuts as dark overlays. Tap any stamp chip to jump to that moment. Click-to-seek works anywhere on the waveform — even on cut overlays. Tap 'Edit cuts' to open the full-screen editor. In the editor: drag on the waveform to create a red cut region; drag the edge of an existing region to resize it; tap Trim to pre-seed start/end cuts; tap Clear all to reset; tap Split to divide the song into two clips at a chosen time position. Tap 'Start from vN' to load a previous version's cuts as a starting point. Tap 'Submit edit' to save as a new version — description is optional. Draft cuts survive browser crashes and are recovered on reopen."},{"featureKey":"odio-2026-044","title":"UnsavedBadge — Unsaved Edits Indicator in Editor Top Bar","status":"draft","problem":"The Timeline Editor's top bar shows the back button and the duration readout. When the user has added cut regions that haven't been submitted yet, there's no clear visual indicator. Tapping the back button with unsaved cuts would silently discard them — but the user doesn't know they're unsaved.","decisions":[{"decision":"Badge is purely display — no click action","rationale":"The badge is a state indicator, not a button. The back-navigation action is on the back button. Clicking the badge directly should do nothing — it would be confusing if tapping 'Unsaved' opened a save dialog.","date":"2026-04-15"}],"knownLimitations":["Badge relies on cutMarks.length being the source of truth — if cutMarks state drifts from localStorage draft, badge may show incorrect state"],"tags":["editor","unsaved","badge","top-bar","draft","indicator"],"successCriteria":"- Renders as amber dot + 'Unsaved' text-xs in top bar when cutMarks.length > 0\n- Hidden when cutMarks.length === 0\n- Hidden after successful submission\n- Positioned between back button and duration readout in top bar\n- aria-live='polite' (announces state to screen readers when it appears)","domain":"editing","priority":3},{"featureKey":"odio-2026-033","title":"VersionCard — Version Row in Clip Detail Version List","status":"active","problem":"The clip detail page lists all versions of a clip newest-first. Each row must communicate: which version it is, who made it, when, and how long the result is — plus allow selecting it for playback and jumping into the editor. This is the highest-frequency interaction on the clip detail screen.","decisions":[{"decision":"Vote buttons hidden (not disabled) on frozen clips","rationale":"A frozen clip is decided — voting UI has no purpose and adds visual noise. Hiding it entirely keeps the frozen version card clean. Non-frozen versions on a frozen clip should also not show vote buttons — the versioning workflow is over.","date":"2026-04-15"},{"decision":"Mini-player controlled by parent (isPlaying, onPlayToggle props)","rationale":"Only one mini-player can be active at a time. If each VersionCard owned its own audio element, multiple could play simultaneously. Parent ClipDetailClient tracks activePlayingVersionId and passes isPlaying=true to the correct card only.","date":"2026-04-15"}],"knownLimitations":["Relative time ('5 min ago') uses client-side date computation — may be stale between polls","Description 'Show more' expands in-place — no animation"],"tags":["version","clip-detail","mini-player","playback","selection","truncation"],"successCriteria":"- Renders v{N}, truncated name (12ch max), relative time, duration in one line\n- Description 2-line clamped with 'Show more' if > 2 lines\n- Mini-player play/pause button (40px) plays this version's audio from start\n- Only one mini-player active at a time (controlled by parent)\n- Vote row: Keep/Revise/Pass buttons, tally visible below\n- Votes are mutable (tapping another option replaces)\n- 'Edit from this version' links to /edit?fromVersionId={id}\n- On frozen clip: 'Edit from this version' hidden, vote buttons hidden, lock icon on frozen version\n- Selected card: amber left border (4px)\n- Tap outside mini-player selects card and notifies parent","domain":"versioning","priority":2,"userGuide":"Each row in the clip's version list represents one edit. Tap the row to hear that version in the waveform player above. Tap the play button to listen to just that vers
